body:
  text: 明嗣祖沙門東吳通問編定笠澤居士華亭施沛彚集臨濟宗大鑑下第二十一世之上徑山範禪師法嗣袁州仰山雪巖祖欽禪師閩之漳州人五歲出家十六剃染十八行腳初參雙林洎妙峯善石田薰諸老無所發明聞天目禮住淨慈懷香請益目示臨濟三頓痛棒話亦無所入遂上徑山謁無準和尚依準最久鋭志咨參封被脅不至席者數載有修上座者時激勵之一日上蒲團忽然面前豁開如地陷一般目前淨倮倮地靜悄悄地浮逼逼地半月餘動相不生自茲坐定礙膺十年尋常入室每遇舉主人公便可打𨁝跳若教舉起衲僧巴鼻佛祖爪牙更無有下口處後同忠石梁過天目佛殿前行擡眸見一株古柏觸著向來所得境界和底一時揚下礙膺之物𪹼然而散如在暗室出白日之下從此不疑生不疑死不疑佛不疑祖方始見徑山老人立地處後舉示人曰正好與三十拄杖出世瓣香酬恩上堂少林一曲五傳至於六祖山深水寒發太古之清音調翻南嶽九世至於慈明唱高和峻奏絶聽之希聲所以佛法盛于江西湖南恢恢然浩浩然不可得而名焉豈料三百年來土曠人稀道隨時變黃鍾大呂寂而不作鄭音衛響亦乃不聞欽上座固無長處既在浙江那畔被一陳業風吹到潭州城裏只得改腔換調向十字街頭重翻此曲去也且道是何節拍擊拂子曰萬年歡復舉趙州和尚曰金佛不度爐木佛不度火泥佛不度水真佛內裏坐師曰揭示如來正體發明向上宗猷趙州固是好手只是不合強生節目新龍興見處又且不然金佛度爐木佛度火泥佛度水真佛聻切忌話墮忽有箇漢出來道你恁麼正是強生節目拍膝一下將謂無人證明上堂一見便見一得永得展手曰撒開兩手大家看畢竟明明是何物潭州內外有一十八座城門白日行人千千萬萬往往來來一任東西南北謝首座維那上堂人天眼目佛祖綱維千差萬別一以貫之如何見得克賓法戰不勝南泉斬却貓兒上堂春日晴燒痕青布穀催耕處處鳴雖然底事最分明只是不得將眼看并耳聽何故才有一絲頭便有一絲頭上堂吹毛劒囓鏃機肘後符頂門眼潭州城裏起五千間寨屋道林寺裏借一百名夫你輩後生晚進茄子瓠子喫現成飯知什麼碗上堂石門巇嶮玉峽潺湲未到此間不妨疑著到則到矣平展一句又作麼生古路鐵蛇橫浴佛上堂四月八生悉達九龍吐水浴金軀雲門一棒要打殺是大神呪是大明呪是無上呪汝等諸人還見黃面老子麼以拄杖一時打散上堂杜鵑啼血滿華枝底事匆匆苦勸歸歸到故鄉還似客村村緑暗與紅稀函蓋乾坤句隨波逐浪句截斷衆流句向者裏薦得一串穿却楊岐驢子三隻腳上堂才恁麼不恁麼有來繇沒來繇十里灘頭廖胡子釣得一雙紅鱗錦尾放下却是條鰍因甚如此斷岸孤舟上堂落華三月雨殘夢五更鐘聲色都消盡玄關又一重却不得道更須直下盡底掀翻何故須彌山上堂是亦剗非亦剗令下無私棒頭有眼因思黃檗大師道汝等諸人與麼行腳何處有今日也是睦州擔板上堂水不洗水金不博金青天白日自古自今山僧到者裏直是插手不入汝等諸人還信自己是仰山麼曹溪波浪如相似無限平人被陸沉上堂道在日用日用不知飢只喫飯寒只添衣晴天皧日挂枯梨點簡溪頭梅樹向陽偷放南枝上堂春雨溟濛春雲靉靆忽然杲日當空天不能遮地不能載正恁麼時如來禪且置祖師禪未在因甚如此只許參不許會上堂呼六為五破二作三眼觀東北意在西南仰山門下却不用者般茶飯何故佛法不怕爛上堂熏風自南來殿閣生微涼諸佛出身處切忌錯商量縱使言前薦得句外承當仰山敢道未在何故嫩竹敲風鳴翡翠芰荷翻雨潑鴛鴦上堂純清絶點正是真常流注打破鏡來未免一場狼藉不若遇飯喫飯遇茶喫茶曉來獨立空庭外間對寒梅幾樹華上堂海水不可斗量虗空不可尺度淨地不可撒沙爛泥不可著腳者四轉語轉轉有落處且道落在什麼處東京大相國寺裏有樹芭蕉風吹雨打一似破袈裟上堂有句無句如藤倚樹白鷺下田千點雪黃鸝上樹一枝華三千里外賣却布單不遠而來因甚放下泥盤呵呵大笑毗婆尸佛早留心直至如今不得妙上堂禪樹上叫喧喧道門前風浩浩冷地思量真好笑且道笑箇什麼等間拾得鄭州梨看來却是青州棗上堂箇事本成現覓則不可見白圭本無瑕琢磨翻成玷執之以實法空中生閃電視之為等間腳下添紅線珍重學道人好好看方便作麼生急須著眼看仙人莫看仙人手中扇師在衆時有鑄鐘偈曰通身只是一張口百煉爐中輥出來斷送夕陽歸去後又催明月上樓臺無準忌拈香盡道先師今日死誰知今日是生朝不知却有何憑據紫柏黃檀一處燒僧問如何是德山棒師曰穿過你髑髏曰如何是臨濟喝師曰還聞麼問如何是一喝如金剛王寶劍師曰切忌傷鋒犯手曰如何是一喝如踞地師子師曰真箇可憐生曰如何是一喝作探竿影草師曰不得面前背後曰如何是一喝不作一喝用師曰却須參始得問如何是五家宗旨師曰有口祇堪喫飯曰若不借問爭達本源師曰未敢相許曰如何是溈仰宗師曰父慈子孝曰如何是臨濟宗師曰迅雷不及掩耳曰如何是曹洞宗師曰三更不借夜明簾曰如何是雲門宗師曰體露金風曰如何是法眼宗師曰山自青水自緑僧曰五家宗派蒙師指向上宗乘事若何師曰頭頂天腳踏地師憫綱宗失據因為提挈拈頌激揚敲唱見諦超宗一時宗風為之振起初住潭州龍興繼遷湘西道林南明佛日仙居護聖及湖州光孝末後咸淳己巳住袁州仰山世稱法窟第一云元帝賜賚尊禮至元丁亥寄竹篦麈拂及緑水青山一同授記與高峯原妙以讚示曰上大今已無人雪巖可知禮也虗名塞破乾坤分付原妙侍者壽七十餘示寂台州國清靈叟源禪師上堂舉僧問趙州真如凡聖皆是夢言如何是真言州曰唵部臨𠷑師曰趙州禪只在口皮邊看他與麼也是喚鐘作甕忽有問靈叟却向他道飢時但喫飯且道與古人是同是別西天梵語此土唐言上堂炎自炎涼自涼法無二法不用商量只如人人鼻孔在面上則固是知有我更問你別沼荷香何似深村稻香示防意如城偈曰六門長鎖舊封疆已是攀緣萬慮忘昨夜貧家忽遭劫元來禍起自蕭牆守口如瓶偈曰明明只在鼻孔下動著無非是禍門直下放教如木棎青天白日怒雷奔明州天童別山祖智禪師姓楊氏蜀之順慶人年十四得度初聞僧誦華嚴經彌勒樓閣入已還閉恍如夢覺遂頌靈雲見桃華曰萬緑叢中紅一點幾人歡喜幾人愁遍叩浙翁琰無際派高原泉淳菴淨妙峯善諸老宿最後見無準於雪竇準知是法器待之彌峻時或棒喝交下一語不少貸師擬對輒噤不能發繇是知解都喪久之作而言曰吾生平伎倆皆死法也今見此翁始行活路既而準移徑山命師分座嘉熙戊戌洞庭天王虗席迎師主之寶祐丙辰天童州帥吳公潛奏師道行師被旨携一囊一至縛茆以居寧郡久不雨師禱之輒應繇是人情奔湊不三年百廢具舉天童始還舊觀上堂舉世尊將入涅槃文殊請再轉法輪世尊咄曰文殊吾四十九年未嘗説一字汝請吾再轉法輪是吾曾轉法輪耶頌曰老漢平生大脫空將無作有誑盲聾臨行一句方真實又是闍黎飯後鐘庚辰九月旦忽示衆曰雲淡月華新木脫山露骨有天有地來幾箇眼睛活有省問者師曰不及相見各自努力越十日夜分呼侍者囑後事叉手而寂壽六十有七坐五十四夏塔全身於中峯密菴窣堵波之右福州雪峯環溪一禪師舉大通智勝佛十劫坐道場佛法不現前不得成佛道頌曰劫初鑄就毗盧印古篆雕蟲尚宛然堪笑堪悲人不識却嫌字畫不完全題布袋和尚讚曰逢人乞一文袋裏敵國富不是下生遲嫌佛不肯做舉即心即佛頌曰即心即佛砒霜狼毒起死回生不消一服杭州淨慈斷橋妙倫禪師台州黃巖徐氏子母劉夢月而孕年十八落髮於永嘉廣慈院初見谷源道于瑞巖聞舉麻三斤話疑之遍叩諸方一日于雲居見山堂閲楞嚴至蚊蟲螻蟻無有言説而能辦事釋然有省曰趙州柏樹子話可煞直截旋謁無準於雪竇準以狗子因何有業識令師下語凡三十轉不契師曰可無方便乎準以真淨所頌示之師竦然良久忽聞板聲通身汗下於是脫然無疑準移育王雙徑師皆分座出世祗園遷瑞巖國清後主淨慈上堂荊山有玉獲得者不在荊山赤水有珠拾得者不在赤水衲僧有無位真人證得者出入不在面門驀拈拄杖橫按曰會麼幽州江口石人蹲上堂舉慈明室中安一盆水盆上橫一柄劍劍上安一緉草鞋凡見僧來便指擬議便打師頌曰百華叢裏躍鞭過俊逸風流有許多未第儒生偷眼覷滿懷無奈舊愁何上堂德山低頭夾山點頭俱胝豎起手指頭玄沙築破腳指頭拈拄杖都來不出山僧拄杖頭何以見得卓拄杖一葉落天下秋上堂舉達觀穎禪師示衆曰七佛是性隸萬法是心奴且道主人翁在甚麼處自喝曰七佛已下出頭又自諾曰各自祇候師曰喚七佛為性隸指萬法是心奴達觀自謂有出身路及乎自喝自諾又是奴隸邊事主人翁何曾夢見大衆要見麼以拂子拂一拂曉來一陳春風動開遍園林百樣華將終與衆入室罷作手書辭諸山及魏國公公饋藥不受又使人問曰師生天台因甚死淨慈師答曰日出東方夜落西遂書偈而化世壽六十二僧臘四十四明州天童月坡明禪師舉僧問雲門久雨不晴時如何門曰劄師頌曰雲門者一劄吹毛光透匣若不是張華徒勞眼眨眨舉良遂參麻谷因緣頌曰携鋤不顧便好回去誰人敢道你是座主舉離四句絶百非話頌曰離四句絶百非相推過幾曾知者僧擔一擔懵懂換得兩頭淈𣸩歸舉熏風自南來殿閣生微涼公案頌曰賣扇老婆手遮日一種風流出當家説與途中未歸客何須向外喫波楂廬山東林指南直禪師送僧還成都偈曰智不到處道一句一句當機便到家宿鷺亭前風擺柳錦官城畔雨催華明州雪竇希叟紹曇禪師西蜀人出世佛隴上堂僧問向上宗乘事若何師曰簷頭滴滴分明歷歷乃曰西子湖邊泛渺茫一堤寒緑看垂楊誰知業債難逃避開眼堂堂入鑊湯到者裏如何即得擬欲爛煨黃獨不顧紫泥未免蹈古人腳迹擬欲關空鎖夢塞路斷橋又恐坐在葛藤窠裏不如隨分納些些俯順時宜去拈拄杖豎窮三際橫亙十方靠拄杖碧眼黃頭會不得野梅風定暗浮香上堂三月春云暮韶華似酒濃鶯啼楊柳雨蝶弄海棠風若作境會過山尋蟻迹不作境會度水覓魚蹤畢竟如何故鄉歸路遠日暮泣途窮住雪竇上堂一宿覺三擔土腳未跨門丰骨已露等間舉一步危徑結寒華信彩示一機斷崖飛瀑布雖然要跨乳峯門即易要入乳峯室即難何故鴻飛冥冥弋人何慕上堂發得一機活出得一言當萬里無片雲青天合喫棒不待春風著意開暗香已在梅華上舉僧問南泉師居方丈將何指南泉曰昨夜三更失却牛天明起來失却火頌曰奴顏婢膝走人間羞見羊裘七里灘文叔雖為天子貴子陵元作故人看寄天童和尚偈曰翁翁八十再生牙爛嚼虗空吐出查撒向玲瓏巖畔樹枝枝葉葉是曇華杭州靈隱退耕寧禪師初住嘉興崇聖次遷蘇之報恩慧日承天萬壽後遷靈隱上堂目前無法意在目前雨餘山色翠風暖鳥聲喧拍禪牀堪笑老胡無轉智少室峯前坐九年上堂舉香林因僧問年窮歲盡時如何林曰東村王老夜燒錢師曰王老燒錢言端語端綿包特石鐵裹泥團上堂極目千峯鎖翠滿空柳絮飛綿可憐無位真人一向草宿露眠啞三春看又過何日是歸年舉巖頭問欽山如何是真言欽曰南無佛陀耶頌曰隨機有問隨機答不是禪兮不是玄後代無端翻譯出却將梵語作唐言舉僧問趙州和尚姓甚麼州曰常州有曰甲子多少州曰蘇州有頌曰蘇州有常州有三月江南啼鷓鴣堪笑有年無德漢被人拶著強分疏福州雪峯絶岸可湘禪師舉僧問曹山雪覆千山為甚孤峯不白山曰須知有異中異曰如何是異中異山曰不墮諸山色頌曰言中彼此帶幽玄盡向言中辨正偏孤負一條官驛路茫茫沉在月明前舉僧問歸宗如何是玄旨歸曰無人能會曰向者如何歸曰有向即乖曰不向者如何歸曰誰求玄旨又曰去無汝用心處曰豈無方便門令學人得入歸曰觀音妙智力能救世間苦曰如何是觀音妙智力歸敲鼎蓋三下曰子還聞麼曰聞歸曰我何不聞僧無語歸以棒趂下頌曰三聲鼎蓋普門開苦海勞生喚不回九十春光今已半空飛華片點莓苔漁浦接待偈曰吳山那畔越山前有飯充飢有榻眠到此便能休歇去帝鄉猶隔一潮船明州天童西巖了慧禪師蓬州羅氏子垂髫與羣兒戲必摶泥沙為佛塔像一日玉掌山祖燈至其舍師向之合掌父母以師資宿契遂令出家燈授以般舟三昧非其志辭往成都謁瓌菴照於昭覺器之屬令南詢乃參浙翁琰于徑山聞高原泉為人徑直心慕之往叩適原赴台之瑞巖師與俱一日原問山河大地是有是無師擬開口原即喝出復以偈呈原曰沒交涉師一日偶書白楊示衆語原閲之笑曰寫字與做言句儘得爭奈沒交涉何師憤然原曰汝緣不在此可往見雪竇無準和尚師秉命造謁自陳來歷準呵曰熟睡去既而令充不釐務侍者一日謂師曰覷不透處只在鼻尖頭道不著處不離唇皮上討之則千里萬里師抗聲曰將謂有多少準遷育王師侍行從容承稟乃盡其要逮準移徑山師居第二座自是聲動叢林節齋趙觀文作牧蘇州舉師開法定慧遷永嘉能仁江州東林後至天童佛涅槃上堂拈拄杖召大衆黃面瞿曇乃竺乾猛將以慈悲為弓矢以智慧為戈矛統百萬雄兵勇不可當布三百餘陳勢不可敵如是四十九年演出五千餘卷兵書雖流落人間而未嘗有一字漏泄因與生死魔軍為冤為對遂於跋提河邊築一巨城名為涅槃于其城中先以紫磨金軀犒賞諸兵令其瞻仰取足再三撫諭而又散以八斛四斗珍珠其謀意無他必欲打破生死牢關普與盡大地衆生共行通天活路得到大安隱大解脫之場而後已豈謂二千餘載猶未遂其志未奏其功山僧既知其力盡計窮不免劍相助去也以拄杖畫一畫四海浪平龍睡穩九天雲淨鶴飛高芙蓉長老至上堂舉芙蓉和尚訪實性大師實性上堂右邊拈拄杖向左邊曰若不是芙蓉師兄也大難委悉頌曰陪盡老精神杯盤越樣新誰知村店酒難勸玉樓人舉泐潭常禪師面壁坐南泉至乃撫常背常曰阿誰泉曰普願常曰如何泉曰也尋常常曰汝何多事頌曰面壁堆危引客過問誰那更問如何道尋常已成多事簡點儂家事更多師在衆日為亡僧訥侍者起龕至龕前連呼訥侍者三乃曰三喚不譍果然是訥頂門放出遼天鶻師先依妙峯於靈隱嘗題兩廊畫壁曰幸是十方無壁落誰將五彩畫虗空善財眼裏生華翳去却一重又一重晚年退居幻智菴將終誡執事已問曰今何時對曰二鼓矣遂放身而逝實景定三年三月十一日也壽六十五夏四十七越州光孝石室輝禪師上堂舉城東老姥與佛同生不欲見佛每見佛來即便回避雖然如此回顧東西總皆是佛遂以手掩面十指掌中亦總是佛師頌曰平生不願佛相逢十指尖頭現紺容夾路桃華風雨後馬蹄何處避殘紅靈隱薰禪師法嗣杭州淨慈愚極慧禪師參石田於靈隱一日室中舉雲門念七話連舉十數轉無人下語忽有一僧才跨門田遽曰雪峰輥毬師侍傍聳耳而聽豁然領悟衝口説偈曰雲門念七雪峰輥毬白蘋紅蓼明月孤舟田頷之住北禪日謝劍南儒藏主雲谷慶藏主無則珍藏主上堂舉白雲師祖開堂拈香有曰衆中衣道友有一言半句利益我者同伸報謝山僧乍住二三故人遠來相訪又非一言半句者比豈無片香以為供養燒楓香是著菩提邊事燒黃熟是著説佛説祖邊事而今猛炳一爐也要盡大地人知道浙西管內嘉興府川原道地且道燒底是甚麼香良久曰不下閣送寧禪人偈曰心未寧時為汝安落華小雨釀春寒斷橋流水孤山路楊柳絲絲拂畫欄杭州中竺雪屋珂禪師上堂枯桑知天風海水知天寒且道衲僧知箇甚麼知道飯是米做直饒恁麼閻羅老子索飯錢有日在師以宋鼎既遷即謝寺事金山賢默菴雅知師且尊其道行時元兵下江南默菴被總兵伯顏脅置幕中從至武林默菴言于伯顏請師住靈隱親持請疏扣門師抽關露半面問曰汝為誰默菴曰和尚故人某甲也師落關曰我不識你蓋師雖處世外而以忠節自持故不屑靈隱之命斷江恩有詩曰雪屋今亡四十年高風凜凜尚依然伯顏丞相拜牀下不肯為渠來冷泉天童禮禪師法嗣明州育王橫川如珙禪師永嘉人出大姓林氏父崇夫有處士名師其季也始孩不肉食年十五從季父沙門正則祝髮受具戒於廣慈初參石田薰癡絶沖無所入繼登太白謁天目禮和尚咨決所疑目舉南山筀笋東海烏賊話師擬對目便打豁然有省親炙久之後為斷橋倫公所重請師分座復舉出世鴈山之靈巖次遷能仁瑞光後被旨住育王僧問如何是教外別傳底句師曰不落玄妙僧曰恁麼則一超直入如來地師曰且緩緩問如何是學人行履處師曰你適才從甚處上來僧曰如何報得四恩去師曰你且從適才路下去問如何是聞復翳根除師曰一不成二不是曰如何是塵消覺圓淨師曰漏木杓破笊籬問有問趙州如何是祖師西來意曰庭前柏樹子有問慶雲曰庭前無柏樹一等是問西來意為甚所答不同師曰不是闍黎問老僧也不知上堂地大水大火大風大若一念無疑地不能礙若一念無愛水不能溺若一念無瞋火不能燒若一念無喜風不能飄如此即是無依道人佛從無依生若悟無依佛亦無得中秋上堂馬祖與百丈智藏南泉三人玩月各呈自己見解於月有甚交涉月輪有圓有缺孤光透徹謂之月光菩薩照破山河大地昏暗開一切衆生心地昏暗老僧出母胎時正當今夜拈却門前大案山放你諸人東去西去上堂魯祖三昧最省力才見僧來便面壁育王三昧更省力才見僧來便合掌南山北山如牛拽磨腳瘦草鞋寬地肥茄子大上堂妙明心印印佛則一手指天一手指地印法則狗銜赦書諸侯避道印僧則箇箇盂口向天還有自印者麼若能自印則行住坐臥一一明了上堂本無纖塵法礙你眼睛何得自昧東西不辨南北不分千聖不傳底事只在你面前不可錯過上堂先佛有頂𩕳一機祖師有末後一句總向諸人面前拈出破知解窠窟截生死根株正體獨露妙用全真一塵中現寶王剎毛端上轉大法輪開爐上堂僧出曰丙丁童子來求火師曰歸去生柴帶葉燒乃曰古鏡闊一丈火爐闊一丈火焰為三世諸佛説法三世諸佛立地聽你諸人長連牀上垔地聽上堂百千三昧門百千神通門百千妙用門你總入不得你為三昧礙神通礙妙用礙直饒不礙也入不得舉唐肅宗問忠國師百年後所須何物國師曰與老僧造箇無縫塔宗曰就師請塔樣國師良久曰會麼宗曰不會國師曰吾有付法弟子耽源却諳此事請問之後詔問耽源源有頌曰湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識師曰無縫塔實難會若去國師良久處會瞎却自己眼若去國師道吾有付法弟子耽源却諳此事請問之處會瞎却自己眼若去肅宗道就師請塔樣處會瞎却自己眼若去耽源四句偈裏會瞎却自己眼夜參少室無門戶如何便得通夜深寧耐立聽我話西東嘗室中垂語曰南山筀笋東海烏賊有僧遽掩師口曰請和尚更道師以手托開曰朝看東南暮看西北舉黃龍三關頌曰佛手驢腳容易見最難道處是生緣黃梅不是周家子七歲傳衣便會禪舉南泉斬貓話頌曰一刀成兩段釋得二僧爭草鞋頭戴出貓兒無再生舉魯祖面壁頌曰人來面壁成何事爭得心開現本源空劫已前諸佛子話頭不舉自然圓師痛有宋以來宗教濫觴古響瘖鬱引宗據祖屏遏今學崖聳標立不隨俗好惡其住育王能仁皆自公選不依阿苟榮一日謂衆曰病叟今年六十六死日將至火化好土化好西堂唯菴曰山前有片荒地師即命疊石為塔復自銘曰天生一穴藏吾枯骨骨朽成土土能生物結箇葫蘆挂趙州壁永脫輪回超三世佛將示寂書訣衆語而化世壽六十八僧臘五十三時至正二十六年三月十八日也奉全身瘞焉所著有三會語録三卷杭州淨慈石林行鞏禪師初住安吉上方遷思溪法寶隆興黃龍吳郡承天後住淨慈上堂橫眸碧漢萬國風清垂手紅塵千峯日出才恁麼便不恁麼所以道我此法印為欲利益世間故説在所遊方勿妄宣傳橫按拄杖曰佛滅二千二百單六載沙門行鞏今於苕霅盡頭鼓鐘清處顯示此印絲毫無有妄者卓拄杖曰謹白上堂山靜課華蜂股重林空含籜笋肌明倚欄不覺成癡兀又得黃鸝喚一聲思溪恁麼道好喫拄杖六十何故為他不合隨聲逐色上堂水鄉水闊地多溼六月華蚊𭪿如鐵夜半起來笑不輟煩惱不輟作什麼牀頭一柄扇無端又打折上堂三家村裏牛動尾巴搖拂子與者箇相去多少擲拂子洎合停囚長智上堂雪峯輥毬禾山打鼓祕魔擎叉道吾作舞一切賢聖皆以無為法而有差別喝一喝下座室中垂示盡大地是箇金剛正體向甚處著上座芭蕉聞雷而抽且道是有情是無情南屏山下壁立三關透不過者一錯百錯透得過者千難萬難忽有不甘底出來道既透得過因甚麼也難去明日來與你仔細相看又詰僧曰如何是你自己僧擬對師便推出舉黃龍見慈明因緣頌曰錯錯戲海驪龍沖霄遼鶴老慈明無著莫笑裏重重露栓索佛手一展日月昏大江從此風濤惡嘉興府天寧冰谷衍禪師上堂朔風何蕭蕭吹彼巖下衣家業久荒蕪遊子胡不歸人生百歲豈長保昨日少年今已老翻憶寒山子十年歸不得忘却來時道上堂劫石可消恩情難斷拍膝一下蒿冢青松下年年挂紙錢上堂冷風疏雨做新年寂寞寒冰古澗邊暖閣地爐煨榾柮送窮不用更燒錢聖節上堂心王安六國通天地闊車書同風從虎雲從龍深惟海高惟嵩萬靈無處參化工但知一氣復鴻濛擊拂子蘇州虎丘雲耕靖禪師上堂我若不説破恐汝不回頭我若説破又恐諸人日後罵我去上堂山僧若真正舉揚河步亭無汝著腳分且抑下威光隨汝根器未説超宗異目若知得虎丘山高一百三十尺舍利塔是隋朝建立也許汝有箇入處甘心下劣又爭怪得老僧上堂龍門無宿客箇箇無退步底道理矮疏山三千里外賣布單跛雲門被拶腳折汝輩只管悠悠過日浴佛上堂我觀如來前際不來後際不去今亦不住且道大殿裏香湯沐浴箇什麼若也會得手中杓子拈放自由其或未然明年今日依舊胡潑亂潑上堂冷如冰霜細如米末水不能漂火不能熱王母晝下雲旗翻子規夜啼山竹裂上堂古人道依經解義三世佛冤離經一字還同魔説依與離既不可得畢竟如何卓拄杖漁人只看絲綸上不見蘆華對蓼紅上堂拈拄杖雲巖看山玩水拄杖子亦乃看山玩水雲巖渾身病苦拄杖子亦乃渾身病苦雲巖脫體輕安拄杖子亦乃脫體輕安卓拄杖擘開華嶽易除却愛憎難雲巢巖禪師法嗣蘇州萬壽訥堂辨禪師上堂釋迦老子降誕王宮好箇初生孩子不妨令人疑著及乎道天上天下唯吾獨尊敗闕了也後來冷地羞慚四十九年三百餘會救搭也救搭不來收拾也收拾不上諸仁者要見釋迦老子敗闕處麼是非只為多開口煩惱皆因強出頭上堂你也在者裏我也在者裏人天交接兩得相見時清休唱太平歌一貫文糴三斗半米二貫五百文買一箇大絹好諸禪德雖然如此廚中有剩飯路上有飢人上堂舉僧問古德萬境來侵時如何德曰坐却著古德有障斷狂瀾底手段未免勞心費力或有人問金山萬境來侵時如何只向他道我既無心于萬物何妨萬物常圍繞上堂我若與你説破將後必須罵我我若不與你説破又恐你因循蹉過忽有箇漢出來道長老話墮了也只向他道老僧罪過悼雲巢和尚偈曰人傳師死已多時我獨躊蹰未決疑既是巢空雲又散春深猶有子規啼寄鐵鞭和尚偈曰思量四句寄承天湊得完全缺半邊頌又不成詩不是如何拈出向人前寄無準和尚偈曰鱉與猿交割不開兄呼弟應似忘懷及乎説到誵訛處又却心肝不帶來蘇州虎丘清溪義禪師送僧偈曰台山萬疊入眉青途路同行各奔程清曉雞啼茅店月是誰先起喚師兄華藏通禪師法嗣杭州徑山虗舟普度禪師維揚江都人姓史氏稍長無處俗意母識其志俾依郡之天寧出家會與畢將軍舟遇共語大奇之曰此兒短小精悍音吐如鐘他日法門爪牙也携歸武林從東堂院祖信受業師奮志參方初見鐵牛印於靈隱已而江東西湖南北悉遍歷焉時無礙唱道饒州薦福師特往叩入室次礙問不與萬法為侶者是甚麼人師曰金香爐下鐵崑崙礙曰將謂者矮子有長處師曲躬作禮曰謝和尚證明天童晦巖光大慈石巖璉虎丘石室迪一見皆器異淳祐初制府趙信菴以金陵半山請師出世次遷潤之金山潭之鹿苑撫之疏山蘇之承天景定間太傅賈魏公奏補中天竺復請旨升靈隱至元丁丑詔住徑山上堂邪人説正法正法悉皆邪正人説邪法邪法悉皆正卓拄杖一下邪耶正耶又卓一下説耶不説耶向者裏揀辨得出黃金為屋未為貴玉食錦衣何足榮上堂萬法是心光諸緣惟性曉本無迷悟人只要今日了既無迷悟了箇什麼卓拄杖一下千言萬語無人會又逐流鶯過短牆上堂舉雲門和尚示衆曰汝等諸人在此過夏山僧深不欲向你道惜取眉毛好師曰雲門靈龜曳尾拂迹迹生靈隱即不然汝等諸人在此過夏山僧直截向你道口是禍門上堂舉臨濟和尚道有一人論劫在途中不離家舍有一人離家舍不在途中那箇合受人天供養師頌曰兔馬有角牛羊無角寸毫尺釐天地寥廓潘閬倒騎驢攧殺黃番綽師住徑山值火餘志圖恢復將有緒俄示微疾索筆大書曰八十二年駕無底船踏翻歸去明月一天擲筆而逝時四月二十四日也全身塔寺東十里罘罳塢之陽淨慈道禪師法嗣蘇州萬壽高峯嶽禪師讚初祖偈曰開旗展陳入梁未覩天顏早已降縱有神通難展款翩翩一葦渡長江雪竇謙禪師法嗣蘇州承天覺菴夢真禪師宣州人八歲為僧十九受具二十行腳見尊宿七八員不能了決慕無準道風遂登徑山叩見每到室中戰怖話頭也不記得自此不去入室晝夜只是坐禪一日廊下行聞火板鳴有省私自歡喜知得本命元辰落處於是入室準問你是喫粥喫飯僧參禪學道僧師抗聲曰喫粥喫飯僧準曰更須飽喫始得師曰謝和尚供養自此只是看狗子無佛性話無入作處乃過雪竇見大歇歇問作麼生是生死底事師曰眉毛安眼上歇曰眉毛因甚安眼上師曰説著令人轉不堪歇又問汝甚處來師曰徑山來歇曰火後事作麼生師曰五峯依舊插天高歇曰那事還曾壞麼師叉手向前曰幸喜不曾動著遂挂搭歸堂師自知未穩心下常熱閧閧地一夜更深舉首見琉璃燈豁然大悟從前所得一時冰消瓦解次日入室歇舉如何是佛三腳驢子弄蹄行聲未絶師曰一任𨁝跳歇曰甚處與楊岐相見師曰當面蹉過復執侍久之開法永慶遷連雲升何山至承天上堂將心學佛攝入魔宮擬心參禪墮在陰界直饒嫌佛不肯做被拄杖子穿過髑髏若恁麼看來直是無用心處卓拄杖携取詩書歸舊隱野華啼鳥一般春上堂庭前翠竹青青砌下黃華鬱鬱喚作真如體又是般若用喚作般若用又是真如體忽有箇出來道我見從上佛祖説了萬千體用不似承天者樣蹊蹺莫是智過佛祖耶杜撰臆説耶卓拄杖好向暮天沙上望西風驚起鴈行斜上堂舉韶國師曰通玄峯頂不是人間心外無法滿目青山師召大衆韶國師好箇頌子只是打成兩橛承天亦有箇頌雙峨峰頂上是青天夜半捉烏雞伸手不見掌喝一喝上堂三伏熱不似人心熱行路險不似人心險萬斛清風碧玉盤不知誰共倚闌干忽有箇出來道長老正恁麼時如何是祖師西來意向他道作賊人心虗舉世尊才生下一手指天一手指地周行七步目顧四方曰天上天下唯吾獨尊雲門曰我當時若見一棒打殺與狗子喫貴圖天下太平頌曰生來自恨錯同條鐵鑄心肝也合消還你獨尊三界內奈何今日又明朝至元間有賢首宗講主奏請江南兩浙名剎易為華嚴教寺奉旨南來抵承天次日師升座博引華嚴旨要縱橫放肆剖析諸師論解纖微若指諸掌講主聞所未聞大沾法益且謂承天長老尚如是矧杭之巨剎大宗師耶因回奏遂寢前旨霍山昭禪師上堂即心即佛嘉眉果閬懷裏有狀非心非佛筠袁虔吉頭上插筆不是心不是佛不是物漳泉福建頭匾似扇只可聞名不可見面慧巖象潭泳禪師上堂舉無著和尚至五臺與老翁喫茶次翁拈起玻璃盞問曰南方還有者箇麼著曰無翁曰尋常將甚麼喫茶著無對師頌曰五臺凝望思遲遲白日青天被鬼迷最苦一般難理會玻璃盞子喫茶時一關溥禪師舉馬祖令僧問大梅曰和尚見馬大師得箇甚麼便住此山梅曰大師道即心即佛我便向者裏住頌曰只將馬祖鉛刀子裂破漫天鐵網羅碧沼夜敲荷葉雨至今貧恨一身多台州國清溪西澤禪師普説略曰參玄上士行腳高流撥草瞻風到一處所便乃供下入門口款謂之生死事大無常迅速衆兄弟生死若是有從古至今無有一人能免生死若是無爭奈目前生死何生死亦有亦無不有不無當恁麼時還有漏網底麼既是走透無門臘月三十日撞到面前畢竟如何支準等是踏破草鞋歲月飄忽不可把玩要須窮教去處分明與前來入門口款相應始得又曰便只恁麼歇去則適來説出許多絡索甚處安著直饒諸人一時不受打疊得淨盡山僧却有箇古話舉似諸人記得長慶示衆曰淨潔打疊了却須近前來就我覓有一棒到你當生慙愧無一棒到你又作麼生雪竇曰淨潔打疊了却須近前來就我覓有一棒到你則屈著你無一棒到你與你平出二大老好一棒未免作得失論量天封則不然淨潔打疊了却須近前來就我覓有一棒到你華鋪錦上無一棒到你霜加雪上且道前頭為人後頭為人辨明得出後次挂牌時却來通吐道場巖禪師法嗣杭州徑山虗堂智愚禪師四明人出世嘉禾興聖遷光孝明之顯孝延福瑞巖婺之寶林四明育王柏巖杭之淨慈徑山歷住十剎室中垂語曰己眼未明底因甚將虗空作布袴著畫地為牢因甚透者箇不過入海算沙底因甚向針鋒頭上翹足僧問聲前一句不墮常機轉位就功如何相見師曰問訊不出手僧曰且道天子萬年又作麼生師曰瑞草生嘉運靈華結早春僧曰直得九州四海雷動風飛師曰出門惟恐不先到上堂春風如刀春雨如膏衲僧門下何用叨叨上堂言而足終日言而盡道言而不足終日言而盡物且道道與物是一是二若道是一為甚麼客山高主山低若道是二為甚麼天地一指萬物一馬箇裏緇素得出還你草鞋錢其或不然但願來年蠶麥熟羅睺羅兒與一文結夏上堂有一人日消萬兩黃金同此聖制只是無人識得若有人識得許伊日消萬兩黃金上堂寶林初無門戶與人近傍亦不置之於無何有之鄉只要諸人如鐵入土與土俱化然後可以發越其如運糞入者吾末如之何上堂舉松源師祖臨示寂告衆曰久參兄弟正路上行者有只不能用黑豆法臨濟之道將泯絶無聞傷哉師曰鷲峯老人大似倚杖騎馬雖無僵仆之患未免傍觀者醜師晚住淨慈入院日參徒問答次忽天使傳旨問趙州因甚八十行腳虗堂因甚八十住山師乃舉趙州行腳到臨濟話頌曰趙州八十方行腳虗堂八十再住山別有一機恢佛祖九重城裏動龍顏天使以頌回奏上大悅特賜米五百石絹百匹其住育王徑山亦賜賚優渥嘗舉東寺示衆曰心不是佛智不是道劍去久矣爾方刻舟頌曰昨日因過竹院西鄰家稚子隔溪啼山寒水肅半黃落無數歸鴉卜樹棲又舉大慈上堂曰山僧不解答話祇解識病時有僧出慈便歸方丈頌曰輕如毫末重如山地角天涯去復還黃葉隕時山骨露水邊依舊石生斑十月初八日示寂塔於徑山直嶺下高麗國嘗請師供養八載問法弟子常隨千指嘉靖間王遣法嗣到山掃塔云明州天童石帆衍禪師舉陸亙太夫問南泉師姓甚麼泉曰姓王曰還有眷屬麼泉曰四臣不昧曰王居何位泉曰玉殿苔生曰玉殿苔生時如何泉曰不居正位師頌曰金鴨香銷更漏深沉沉玉殿紫苔生高空有月千門照大道無人獨自行舉大顛擯首座因緣頌曰一串摩尼覿面當機賺殺首座疑殺昌黎弄盡許多窮伎倆春秋元自不曾知金山開禪師法嗣杭州徑山石溪心月禪師眉州人上堂舉僧問九峯如何是學人自己峯曰更問阿誰僧曰便恁麼承當時如何峯曰須彌還更戴須彌頌曰自家冷暖自家知祖意西來更問誰全體承當全體是須彌頂上載須彌舉晦堂禪師因黃山谷太史問捷經處乞師指示堂曰祇如仲尼道二三子以我為隱乎吾無隱乎爾太史居常如何理論谷擬對堂曰不是不是谷迷悶不已一日侍堂山行時方巖桂盛放堂曰太史聞木稚香麼谷曰聞堂曰吾無隱乎爾谷釋然即禮拜曰和尚恁麼老婆心切堂笑曰祇要公到家耳頌曰渠儂家住白雲鄉南北東西路渺茫幾度欲歸歸未得忽聞巖桂送幽香舉龐居士有男不婚有女不嫁頌曰收拾山雲海月情團圞鼻直眼眉橫龜毛拂子兔角杖敲得虗空嚗嚗聲舉龐公訪大同提笊籬因緣拈曰普濟把定被龐公痛處一錐直得左轉右側前依後隨笊籬提起處相呼作舞時若言依樣畫貓兒定把黃金鑄子期僧問如何是佛師曰矮子看戲送僧還雙林偈曰未到雙林見舊遊眉橫新月眼橫秋寒暄未舉宜先問因甚橋流水不流六月初九日示寂徑山沖禪師法嗣福州神光北山隆禪師示衆曰即心即佛有水有竹屋便好非心非佛不襪不冠身自繇不是心不是佛不是物間倚闌干立清曉紅芭蕉引碧牽牛禮鏡清塔偈曰慣問門前什麼聲池蛙笑汝自蛙鳴年來荒却天華寺正令方才一半行高臺此山應禪師上堂舉大隨菴側有一龜僧問一切衆生皮裹骨者箇衆生因甚骨裹皮隨拈草履覆龜背上僧無語師頌曰休將皮骨強分張得六藏時且六藏隻履盡情都蓋了者僧無事可思量明州天童簡翁敬禪師上堂舉大梅即心即佛話頌曰郎心葉薄妾冰清郎説黃金妾不應假使偶然通一笑半生誰信守孤燈舉文殊問菴提遮女生以何為義話頌曰問處分明答處端當機覿面不相謾死生生死元無際月上青山玉一團
