body:
  text: 明嗣祖沙門東吳通問編定笠澤居士華亭施沛彚集臨濟宗大鑑下第三十世寶峯瑄禪師法嗣竟陵荊門天琦本瑞禪師南昌鍾陵人父江堂母徐氏年二十忽念色身無常棄家遠遊投荊門無説能剃髮能示萬法歸一一歸何處話後遇高郵全首座同往襄陽途中偶聞婦人呼豬聲全曰阿娘牆裏喚哪哪途路師僧會也麼拶破者些關棙子娘娘依舊是婆婆師矍然汗下一日染病甚劇有暉禪者勉師曰病中工夫切不可放過昔大慧和尚在徑山患背瘡晝夜叫喚或問和尚還有不痛底麼慧曰有曰作麼生是不痛底慧曰痛殺人痛殺人師於言下豁然透得娘娘依舊是婆婆意旨又一日聞山鹿叫喚會得日用之中無不是底道理復往蜀中謁楚山問曰某甲間時看來了然明白及至臨機因何茫然山曰毫釐有差天地懸隔後遊金陵途中忽然如從夢覺從前所得一場懡㦬遂參寶峯瑄和尚於高峯針芥相契遂蒙印證語具寶峯章師嘗示衆曰祖師西來不立文字直指人心見性成佛更無別法若向者裏知箇落處定也有分慧也有分宗也有分教也有分佛法世法無可不可腰纏十萬貫騎鶴上揚州其或不然定也不是慧也不是宗也不是教也不是蓋為不識本心名為狂妄經云虗妄浮心多諸巧見不能成就圓覺方便諸佛諸祖惟傳一心不傳別法汝等不達本心便向外求於妄心中起妄功用所謂如邀空華欲結空果縱經塵劫只名有為須知見性成佛性乃不是見他人之性佛乃不是成他人之佛決定是汝諸人本有之性與十方法界秋毫不昧人人本具箇箇不無但向二六時中一一之處回光返照看是阿誰不得執定祇在一處須是於一切處大起疑情將高就下將錯就錯一絲一毫毋令放過行時便看者行底是誰住時便看者住底是誰坐時便看者坐底是誰臥時便看者臥底是誰見色時便看者見底是誰聞聲時便看者聞底是誰覺一觸時便看者覺底是誰知一法時便看者知底是誰乃至語默動靜回頭轉腦屙屎放尿著衣喫飯迎賓待客周旋往返一一返看晝夜無疲倘若一念忘了便看者忘了底是誰妄想起時便看者妄想底是誰你道不會只者不會底又是阿誰現今疑慮你看者疑慮底又是阿誰如是看來看去不妨頭頭獨露法法全彰萬境不能侵諸緣不能入得失是非都無縫罅明暗色空了無彼此山河大地日月星辰盡聖盡凡都盧祇是一箇誰字更無別念上下無路進退無門山盡水窮情消見絶豁然𪹼地一聲方知非假他求不是一番寒徹骨爭得梅華撲鼻香又曰世間無法出世間無法透得者兩箇無法歸家穩坐師行腳時嘗遇隆首座者謂師曰青青翠竹盡是真如鬱鬱黃華無非般若師指庭前柏曰時人見此一株柏如夢相似雲溪瑛禪師法嗣匡山天池林隱淨菴智素禪師東萊趙氏子生於正德甲戌八月十八日早年父母俱喪年十五從五臺天成寺大用祝髮謁雲溪瑛得旨後住天池上堂體露金風光皎潔一色明明無間歇羚羊挂角覓無蹤海底蟾蜍吞却月荊藩請住東山上堂在天天高在地地厚一毫端上應時納祐此猶是者邊事且道那邊事作麼生拊几曰釋迦睡重彌勒起遲下座寶芳進禪師法嗣嘉興府東塔野翁曉禪師無趣空參每呈見解師皆不諾一日謂趣曰我有一言要與汝説趣聳耳而聽師但笑而不諾趣再四懇請師復笑趣始具威儀作禮跽而哀懇師乃曰祖師西來直指人心見性成佛貴在直下體究子若果信得及可放下萬緣參箇一歸何處趣從此死心看話頭經三載一日聞雞鳴有省詣師求證師反覆徵詰後付衣拂復示偈曰非法非非法非性非非性非心非非心付汝心法竟吉菴祚禪師法嗣嘉興府天寧法舟道濟禪師郡之思賢里張氏子年十八猛省出家父母難之至二十一歲投天寧為行者時默堂受寶月法印歸自繁昌師往謁服勤久之復詣東禪從昂公祝髮參吉菴祚菴門庭孤峻師朝夕咨叩一日聞磬聲豁然洞徹菴印可之未幾長安覺王寺請居第一座室中秉拂機用莫能湊泊嘉靖初住金陵安隱僧問如何是安隱境師曰三山半落青天外二水中分白鷺洲曰如何是安隱家風師曰石虎山前鬬泥牛水底眠僧曰不會師曰用會作麼精嚴寺晚參精嚴寺裏撞鐘府譙樓上擂鼓同時顯大神通穿透千門萬戶大衆還聞麼若道不聞爭奈鐘鼓分明人人有耳若道聞將甚麼聞即今鼓絶鐘消聞底事作麼生試道看卓拄杖黃金自有黃金價終不和沙賣與人陸五臺居士問畫前元有易不師曰若無伏羲將甚麼畫臺曰畫後如何師曰元無一畫臺曰現有六十四卦何得言無師曰莫著文字臺曰請和尚離文字發一爻看師召居士臺應諾師曰者一爻從何處起又問至人無夢何也師曰常人於現前虗幻分別境界不知全體是夢認為實有而以昏昧想心繫念神識紛飛境界為夢所謂寤寐俱夢夢中復作夢也至人於自心境界如實而知故於現前虗幻境界妙用泠然通徹無礙而睡夢亦自明明而知歷歷而覺所謂寤寐一如者也故至人無夢之説非有無之無乃是無夢無非夢夢與非夢一而已矣又問夢裏須臾何以歷涉萬里師彈指一下曰千里萬里只在者裏問聖人有妄念不師曰無曰既無妄念何用兢兢業業師曰兢兢業業故無妄也問為政何如得無倦師曰榮辱得喪毀譽是非一切不管但虗其心行其所無事則無倦矣問終日喫飯何故不曾咬著一粒米師曰喫飯底人居士還曾見不問四方上下有窮盡不師曰居士試返觀自己心量有窮盡不士良久曰實無窮盡師曰世界亦然又問地獄實有不師曰人作了惡歷歷自知雖經久遠憶持不忘便是業鏡自心明知自惡不能自釋便是法王心地不空地獄實有心若空了地獄隨空示人偈曰工夫不間四威儀聽板聞鐘好下疑打破未生時面目好來爐畔受鉗鎚道本無為豈屬修有修頭上更安頭虗空若使重加柄野草間華正好愁將謂衣中有寶珠衣穿方信寶珠無前年尚有無珠説今日無珠説也無內不尋思外不求大千沙界一毫收塵塵剎剎蓮華藏認著依然是外頭人人心上古彌陀末法人中不信多念念他方求佛去不知念念是彌陀後遷辨山晚年復退歸天寧庚申秋示疾或請説偈師舉手搖曳而逝世壽七十四僧臘五十二茶毗塔於禪悅堂天通顯禪師法嗣湖州天池月泉玉芝法聚禪師嘉禾富氏子母馮生於弘治壬子十一月二十九日兒時每藉地趺坐折草念佛母曰此兒他日必為佛弟子稍長淹通經史年十四從資聖堅法師受業芟染受具矢志參學夙夜匪懈一日閲壇經有省往謁吉菴祚不契復見法舟濟多所啓發偶會陽明王公于多士中王拈袖中鎖匙問師見麼師曰見王復納入袖中曰見麼師曰見王曰未在師疑不決一日聞僧舉僧問大顛和尚如何是見性顛曰見即是性不覺釋然一笑述偈曰湖光倚杖三千頃山色開門五六峯觸目本來成現事蒲團今不鍊頑空未幾結制於漏澤之雲峯忽憶雪巖和尚問高峯正睡著時無夢無想無見無聞主人公在甚麼處便見得生死一致寤寐一如一日聞友人誦天通夢居禪師碧峯寺裏有如來之句遂詣碧峯才見便問碧峯寺裏有如來莫便是和尚不峯曰上座還見麼師曰總見也是金屑落眼峯曰者漢死去多少時汝來為他乞命便歸方丈次日峯上堂舉古德曰打破大唐國覓箇不會佛法底也無又曰向南方走了一轉拄杖頭不曾撥著一箇會佛法底此二語甚有誵訛試為酬一語看師曰前不構村後不迭店峯曰未在更道師曰不遇知音者徒勞話歲寒峯曰有甚得力句試舉看師遂呈二偈峯曰未免落人圈䙡師曰如何得不落人圈䙡峯便掌曰是落不落師豁然大悟平昔所蘊皆冰釋已而侍峯過杭遊南屏至宗鏡堂峯登座曰此處正好説法師曰説法已竟峯便下座顧師問曰何者是我所説底法師曰劍去久矣峯頷之遂蒙印可後歸隱天池衲子日臻遂成叢席示衆至道無為非有為無以造其深絶學無學非力學無以臻其極譬猶玉之在璞珠之在淵非剖鑿探求終無以獲故雪山苦行六年少林壁觀九載以至斷臂求法腰石負舂趙州三十年不雜用心香林四十年方成一片孜孜矻矻廢寢忘餐惟欲究明大事者皆參禪學道之榜樣也奈茲禪林秋暮法道荒涼逐妄隨邪無復自振惟知粥飯現成不愧虗消信施或遊心異學肆志辨聰或穿鑿機緣馳求義解是皆唐喪光陰徒增業識如舍父窮子飄轉無據可勝嘆哉若是英靈漢直須于生死岸頭猛著精彩一念純真纖塵不立如遇怨敵單刀直入不顧危亡如墮深井念念無他但求出路若能具如是深心管取到家有日在上堂舉趙州勘二菴主公案頌曰鋪席經過只一般爭知死貨活人拈東行賣貴西行賤看破方知不值錢上堂釋迦世尊降誕於毗藍園中一手指天一手指地周行七步目顧四方曰天上天下唯我獨尊已是漏逗不少末後拈華示衆曰吾有正法眼藏涅槃妙心分付摩訶迦葉露布重彰末法兒孫不啻狂狗趂塊便恁麼休去猶較些子使再揚家醜以聾瞽後昆豈豫之所願哉只如衆兄弟久參練達者舉著便知寧堪矢上加尖若是初機晚進不免曲垂方便還有問話者麼僧問金軀初降九龍吐水聖誕重逢未審有何祥瑞師曰金鳳銜華呈瑞彩錦鶯翻調奏新篁曰周行指顧示真機今日如何露消息師拈拄杖曰拄杖子上透三十三天築著帝釋鼻孔下透十八重地獄擊破閻羅王頂門俯應羣機萬象森羅咸稽首宣揚般若大地山河側耳聽僧曰恁麼則昔時靈鷲今日天池師曰一道禪光輝宇宙莫將今古較疏親便下座陵五臺居士問東土一千七百善知識即今總在什麼處師指庭樹鳴蟬曰者裏也有一箇士曰聲響便是麼師曰喚作聲響即蹉過也士又指石問曰無情説法只如者箇作麼説得師曰居士喚者箇作什麼士曰石頭師曰又道説不得師於嘉靖癸丑五月十九日示寂世壽七十二僧臘五十八有語録二卷行世壽堂松禪師法嗣建寧府雙峯古音淨琴禪師本郡建陽蔡氏子自幼卓犖不羈每嘆曰世間有求皆苦不如蚤覓箇出身處年二十五從東峯祝髮初見大闡無所啓發次謁性空關主得遇宿衲靜晃鄰席一日見晃閲古梅語録中有僧上方丈曰某有箇入處梅便打出僧又進方丈梅復打出晃笑曰者僧實有悟處只是大法未明耳師聆晃語便起身設禮求示入道旨要晃曰佛性雖人人本有若不以智慧攻化只名凡夫今欲成辦此事直須盡掃葛藤枝蔓只將一句無義味話頭自疑自問自逼自拶不肯求人説破不肯依義穿鑿決要命根頓斷親證親悟如此晝三夜三迫勒將去年深月久忽然心華發明如雲開見日古人公案一一洞了始知無禪可參無佛可做頭頭上了物物上通如人到家不問路也師蒙示誨即死心研究看萬法歸一一歸何處話復過滇南參壽堂抵雞鳴灘忽然大悟洎見壽堂針芥相投即承記莂歸隱雙峯正德壬申遷瑞岩示衆學道人當截斷諸緣屏息雜念單提本參話頭於行住坐臥苦樂逆順一切時中不得忘失凡靜中所見善惡境緣皆繇不正思惟但只瞑目靜坐心不精采意順境流半夢半醒或貪靜境致見種種境界若是正因衲子做工夫當睡便睡一覺便醒起來抖擻精神摩娑兩眼咬定牙關揑緊拳頭專心正念切切偲偲疑來疑去到水窮山盡時節忽然疑團迸散頓見自己一段本地風光非從外得到者箇時節才名入門得地更要求明眼宗匠決擇不可便休一法不明直須辨明一理不通直須通透假使悟後不能通達化門古人謂之坐在百尺竿頭不能至于一切智海懸崖撒手自肯承當絶後再蘇欺君不得珍重金臺覺禪師法嗣杭州徑山萬松慧林禪師郡之仁和沈氏子從天目平舒獲聞心要後遊金陵聞僧誦丹霞禪師上堂語遂大徹時伏牛空幻寓廣德師往謁呈所見即蒙印可後住徑山一日辭衆書偈曰七十六年萍蹤何倚本無去來應緣而已書畢而逝大鑑下第三十一世天琦瑞禪師法嗣隨州關子嶺龍泉無聞絶學正聰禪師邵武人族姓奚母吳氏髫年出家二十受具習止觀唯識論一日有宿衲詰師曰大通智勝佛十劫坐道場佛法不現前不得成佛道其意云何師依文答之宿譏訶而去師從此激勵疑情頓發坐臥不安經六載一日聞馬嘶大悟遂往見天琦乃蒙印可住後上堂舉僧問雲門如何是一代時教門曰對一説龍泉則不然若有問山僧如何是一代時教劈脊便打曰合取狗口僧問如何是本來面目師曰石香亭曰便恁麼去時如何師曰喪却了也問今朝四月八日天下叢林皆慶如來聖誕未審如來何處降生師於几畫圓相示之笑巖寶參一日圍爐次師曰人人有箇本來父母子之父母今在何處巖曰一火焚之師曰恁麼則子無父母耶巖曰有則有佛眼覷不見師曰子還見不巖曰不見師曰子何不見巖曰若見即非真父母師曰善哉巖復呈偈曰本來真父母歷劫不曾離起坐承他力寒溫亦共知相逢不相見相見不相識為問今何在分明呈似師師即付以偈曰汝心即吾心吾心本無心無心同佛心佛心非吾心復囑曰汝當護持緣熟智愚皆度師于壬申七月初一示微疾訣衆説偈趺坐而逝全身塔于寺右沔州古岩禪師中年雙目失明笑巖參師問何所來巖曰親從關子嶺來師曰無聞老兄好麼巖曰好師曰如何見得好巖曰老來康健師曰爭見得康健巖曰著衣喫飯坐臥經行師曰與麼則不出常情巖曰要且常情莫測師仰面大笑翌日巖入室師曰嶺頭老兄先師嘗許他悟處見骨只是太朴無博學巖曰和尚博學乎師曰老僧亦非博學巖曰恁麼則一同也師曰亦有不同處巖曰如何是不同處師曰他有眼我無眼巖曰和尚若無眼爭見得渠無博學師又大笑囑曰子器非凡宜深根固蒂廣作利益非汝而誰惜吾衰老不及見矣巖拜謝而去伏牛濟菴大休實禪師新鄭李氏子幼嬰疾苦甫數歲父母慮其不育命投寶珠受業年二十訪老宿古心示萬法歸一一歸何處話尋入火場打三有省述偈曰法身本無相法相本來空會得者消息處處顯家風後往謁天奇和尚途中遇天真月印二禪客同至關子嶺奇問你三人一路麼師曰雖然一路來處不同奇曰如何是你本來面目師便珍重奇曰未在更道師便喝奇曰父母未生前喝箇甚麼師無語而出自後數呈伎倆奇皆不諾一日侍奇于承天奇問曰藏身處沒蹤迹沒蹤迹處莫藏身你作麼生會師曰當堂不正坐那赴兩頭機奇為助喜住後升座須彌作舞海水騰波龍象交參人天共聚大地山河同宣妙句三賢十聖共證菩提眉藏寶劍起寒光袖隱金鎚行正令明殺活顯全機舉拂子還有明眼衲僧不顧危亡向前一肩擔荷得麼便下座笑巖參問如何是祖師西來意師豎起拂子巖曰此外更有指示也無師擲下拂子巖便禮拜復敘問參關子嶺話師曰怪道親見作家來巖便喝少頃師又問曰我那老兄別來四十年未知近日鼻孔如何巖曰與和尚鼻孔一般師曰上座還見老僧鼻孔麼巖曰見師曰向甚麼處見巖曰兩眼下口門上師曰有祕密句曾向上座道麼巖曰曾道師曰試舉看巖曰合取臭口師拈拂子巖便喝拂袖而出天池素禪師法嗣襄陽府大覺圓禪師漢川人儀貌豐碩聲如洪鐘參叩淨菴默契菴付偈曰一枝正法眼列祖傳來付汝待時至馨香遍九垓師受囑後隱居襄西笑巖爽菴參謁求依侍師曰上座錯了也老拙平生溫飽自適別無所長爽曰某等生死事大語未竟師約而笑曰老拙亦有生死何獨爾有爽曰某恨晚進多無恆志和尚豈拒人哉師曰出家兒本自無事爾何無事生事少間曰粥飯自辦始得師方便莫測最惡時機不淳誠一日室中舉外道問佛不問有言不問無言世尊良久外道大悟師曰問既不涉有無良久亦是間名正恁麼時外道悟箇什麼巖擬進語師遽以手掩其口曰猶挂唇齒在巖乃釋然曰可謂東土衲僧不及西天外道占偈曰自笑當年畫模則幾番紅了幾番黑如今謝主老還鄉那管平生得未得師稱賞之後無疾而化世壽七十三僧臘五十三野翁曉禪師法嗣嘉興府無趣如空禪師本郡秀水施氏子生於弘治辛亥十月十八日幼慕宗乘留心體究同法舟濟參訪數載後見野翁徹法源底啓關示衆自結玄關自活埋自吾閉也自吾開一拳打破玄關竅放出從前者漢來元宵示衆畫角聲中薦得觀音未是作家彩燈影裏知歸室利謾誇好手恁麼告報與諸人也須笑破虗空口若也未瞥然再看鼇山顛倒走參小參衆立定師喝一喝曰禍出私門便歸方丈示衆舉修多羅教曰以思惟心測度如來圓覺境界如將螢火燒須彌山師曰我且問你諸人如來境界既是測度不得底畢竟如何合煞喝一喝還見教意麼便下座示衆言前薦得已天涯句下承當路轉賒一擊鐵圍如粉碎海天空闊鴈行斜除夕小參時窮何似日窮好月若窮來歲亦然三十六旬窮過了東村王老夜燒錢老漢並無一物應箇時節因緣拈拄杖只有者箇無窮無盡歷劫經年今夜隨時送去免教涉蔓相牽擲下拄杖歷劫得來今斷送拍雙空手接新年示衆佛是衆生屋裏了事人衆生是佛屋裏不了事漢若要一樣但佛與衆生一時放却則無了無不了卓拄杖但於事上通無事見色聞聲不用聾端陽示衆佳節端陽何曾訂約五月五日年年撞著風搖蒲劍碧楞楞日照榴華紅灼灼道在時節因緣豈論正法末法向來著意馳求通身是草今日信手拈來無不是藥豎拂子大衆且道此藥治甚麼病擊拂子不但老維摩藥王藥上也喫一帖示衆豁開頂門眼照徹大千界既作法中王於法得自在師一夕湖邊步月適遇一僧師曰明月與清風水天同一色人人在箇中只是出不得僧曰打草驚蛇作麼師曰上座又作麼生僧曰看腳下師大笑曰將謂胡鬚赤更有赤鬚胡萬曆己卯仲冬師謂門人性沖曰來歲中秋五六之間吾行矣子宜知庚辰八月十六日沖以前期而至師示微疾集衆説偈曰生來死去空華死去生來一夢皮囊付與丙丁公白骨斷橋隨衆阿呵呵明月清風吟弄語畢端坐而逝世壽九十無盡海禪師法嗣大休宗隆禪師僧問如何是祖師西來意師曰黃瓜茄子天寧濟禪師法嗣嘉興府胥山雲谷法會禪師本郡嘉善懷氏子芟染於大雲寺時法舟掩室於天寧師往參叩示以念佛是誰話一日齋次食器墜地豁然有省僧問如何是祖師西來意師曰有水皆含月無山不帶雲僧曰莫更有奇特處麼師曰切忌喚龜作鱉問如何某甲直捷用心處師曰舉不顧即差誤擬思量何劫悟師居常不設臥具晝夜危坐四十餘年如同一日萬曆三年正月五日示寂壽七十臘五十六嘉興府精嚴東溪方澤禪師郡之嘉善人族姓任首謁法舟於天寧一日室中舉龍潭見天皇公案至何處不指示心要言下有省後蒙印可解制秉拂佛法雖遍一切世間而未嘗有絲毫透漏作麼生結雖未嘗有絲毫透漏亦未嘗有絲毫囊藏又作麼生解故知百丈大師曲引初機為此方便誑唬之辭其實莫能結莫能解也設使有箇孟八郎漢出來道我能向百丈大師結不得處一結結斷直使天下衲僧忘前失後求出無門亦能向百丈大師解不得處一解解開直使天下衲僧七狼八藉竄身無地却甚奇特諸上座彼既丈夫我能不爾良久擊拂子一下曰吽天池聚禪師法嗣浮峰普恩上座山陰金氏子年十歲往從延福鑑湖受業至十九忽念生死事大奮志尋師初至大慈叩無際首座示以心生則種種法生之語師當下有所契入有偈曰返本還源便到家亦無玄妙可稱誇湛然一片真如性迷失皆因一念差復見法舟于天寧呈所見舟可之又謁萬松休于烏石峯松問何來師曰天寧松曰有何言句師舉前話松曰不是不是師曰天寧道是和尚如何道不是松曰天寧則是我則不是師疑不決後參玉芝復舉前話芝曰是與不是未出常情二俱喫棒有分師曰如何是出常情句芝與一掌師當下豁然平昔礙膺一時融釋芝曰汝既如是當善護持復以偈囑曰莫學支流辨濁清是非盡處出常情鐵鞭擊碎珊瑚月會看東山水上行雙峯琴禪師法嗣建寧府斗峯天真道覺禪師本郡建安張氏子看萬法歸一一歸何處話久而有省占偈曰一手拍兮一手鼓無位真人出格舞口中唱出無腔歌三千諸佛同一母往見古音求證音稱賞之大鑑下第三十二世關嶺聰禪師法嗣北京善果月心笑巖德寶禪師金臺之世族父吳門母丁氏生於正德壬申臘月望日早失恃怙年弱冠偶詣講席聽講華嚴大疏至十地品不覺身心廓然嘆曰千古同一幻夢耳遂決志出家逾年往從廣惠大寂能祝髮明年受具朝參夕叩雖深信知有不肯自休務期親證遍謁大用月舟古春古拙諸老後至關子嶺參無聞和尚問十聖三賢已全聖智如何道不明斯旨聞乃厲聲曰十聖三賢汝已知如何是斯旨速道速道師連下數語皆不契遂發憤寢食俱廢一日攜籃到澗邊洗菜一莖菜葉墮水旋轉捉不住忽有省提籃喜躍而歸聞立簷下問是甚麼師曰一籃菜聞曰何不別道師曰請和尚別問來至晚入室聞舉玄沙敢保老兄未徹話師曰賊入空室聞曰者則公案不得草草師喝一喝拂袖便出未幾復往見濟菴古岩大覺諸尊宿皆器重之後再參無聞乃授記莂復親炙年餘辭去回翔湘漢間後抵金陵寓淨海牛首高座等處數載復還金臺初居圓通次遷南寺鹿苑慈光善果諸剎端陽上堂舉大慧和尚上堂曰今朝又是五月五大鬼拍手小鬼舞驀然撞著桃符神兩手槌胸叫冤苦師曰大慧老漢大似少箇禁方向青天白日見神見鬼笑巖則不然今朝正是五月五雲從龍兮風從虎山僧要與現前諸大聖凡賭箇賭信手拈來百草頭甜者甜兮苦者苦拈拄杖驀然突出者一條穿過從上諸佛祖是你現前諸人百樣具有為甚麼只少者一箇忽有箇見義勇為底憤憤地向前道和尚且莫壓良為賤若論者一箇敢道人人不欠分毫放下拄杖曰汝宛不知何妨矢上更加尖堆上重添土上堂男兒固奮沖天志莫若從頭放下來直把髑髑枯死盡仍教死眼豁然開上堂舉南嶽讓和尚一日問衆曰道一為人説法也未曰已為衆説法了也尚曰總未見人過箇消息來乃密遣一僧去探囑曰待渠上堂時便出問作麼生看渠有何言句可記將來僧往一如所教馬祖曰自從胡亂後三十年不少鹽醬僧回舉似尚深肯之師曰馬大師三十年不少鹽醬方可聚徒説法山僧者裏三十年不曾見箇鹽醬汝等在者裏討什麼碗以拄杖一時趂散上堂當門一隻箭來者看方便擬進問如何穿過髑髏面僧參問從上千七百老凍儂某甲今日一串穿來獻與和尚伏請判斷時門外忽聞犬吠師遽顧侍者看是什麼客來侍者出問話僧罔措師曰上座適才問什麼僧擬重舉師與連棒打出一日有二尼參禮拜起各立左右師曰女子如來前入定有錢不解使臺山婆子驀直去解使却無錢你道者兩箇老婆禪如何得恰好去二尼左邊走過右邊右邊走過左邊合掌相向各噓一聲師曰與麼非但解老婆禪更會鼓粥飯氣尼曰和尚惜取眉毛好師曰山僧眉毛且置我試問你周金剛買油餈點心食到口邊被婆子奪却劉鐵磨請溈山往臺山大會齋溈山不赴等是者箇時節你道為什麼取舍不同二尼作禮曰某等若不來禮拜和尚爭得見古人神通大用師曰好各與三十棒恰值拄杖不在且歸茶堂喫茶僧問如何是文殊普見三昧師曰死人眼曰如何是觀音普聞三昧師曰死人耳曰如何是一言道盡底句師曰死人口一僧請益金剛經為人輕賤話師曰汝有疑否僧曰有疑師曰有疑則為人輕賤無疑則應墮惡道僧沉吟師曰會麼僧曰不會師曰把出你不會底來看僧曰不會教某甲把出箇什麼師曰汝之罪業劃然消矣僧歡喜禮謝而去問玄沙不出嶺保壽不渡河落第幾機師曰總落第二機曰如何是第一機師曰玄沙不出嶺保壽不渡河曰畢竟得箇什麼師曰灼然畢竟得箇什麼問如何是奪人不奪境師曰一文錢一箇大燒餅曰如何是奪境不奪人師曰喫在肚裏了當下飽欣欣曰如何是人境兩俱奪師曰你無一文錢也只甘受餓曰如何是人境俱不奪師曰雲門胡餅金牛飯空腹而來滿腹歸僧問祖意教意是同是別師曰柳影橫塘魚上樹槐陰地馬登枝僧曰與麼則形影兩分曲直自顯去也師曰未曾飽食廬陵米徒把蒲團認作天僧參問承聞諸佛出世為一大事因緣請問和尚如何是大事因緣師曰著衣喫飯屙屎放尿僧不肯不禮拜而出師喚回示以偈曰諸佛出於世唯為大因緣屙屎並放尿飢餐困打眠目前緊急事人只欲上天談玄共説妙遭罪復輸錢僧慚惶作禮而去一日有兩官人遊山入門哦曰茂松修竹回顧見師便問如何是道人家風師曰茂松修竹曰有何旨趣師曰自家觀不足留與客來看有士人閲師淨土偈乃問佛説是經則有六方諸佛出廣長舌相作證今吾師説偈有何殊證師曰居士舌頭亦不短又問何為不思議功德師曰前街人喚犬後巷罵貓兒又問老師今年高壽了師曰論年不見箇葷腥作麼不稿瘦了僧問處處入法界念念見遮那如何是遮那師曰淨地不須屙舉趙州和尚問投子大死底人却活時如何投子曰不許夜行投明須到師頌曰三十六物都灰燼只遺一雙枯眼睛置向九衢深夜後無光明處作光明舉世尊拈華公案頌曰師資妙契芥投針似海如山無處尋石火光中曾著眼始知佛祖不傳心舉經題字頌曰黑白未分已墮偏那堪擬議費鑽研西乾此土諸賢聖鼻孔撩天總被穿示座主偈曰荷鉏到處賣工夫三兩文錢足可圖鉏得他家田地淨自家田地盡荒蕪示僧法中幽趣眼中醫向上玄機境上塵黑漆桶邊篐子斷太平國內自由人靜坐寒岩此病難男兒爭肯自相瞞轉身一步無多子始信塵含法界寬師嘗室中垂語曰佛未出世祖未西來元無佛法世法之名迥出黑山鬼窟一句作麼生道又曰佛既出世祖已西來佛法世法相為建立不犯化門道將一句來又曰佛生凡聖對待之門世法佛法名言強立總拈過一邊衲僧本分一句試道將來又曰尋常間語言問答甚平易甚不思議剛被人問箇如何是汝本有底佛性為甚麼却反眼豎口啞又曰既為佛子志階佛地因甚一箇佛字最不喜聞師晚年退居京城柳巷於萬曆辛巳正月十六日示寂奉全身塔於小西門外世壽七十僧臘四十有八大川洪禪師法嗣五臺山龍樹菴寶應禪師一日晨興覩明星有省述偈曰日出東山月沉西嶂昨日今朝曾無兩樣五臺山楚峯和尚居祕魔崖十餘載木食澗飲人不堪其憂師恬如也一日聞火𪹼聲豁然大悟占偈曰眼睛突出死柴頭赫赫神光照四洲觸處現成人不委幾回春去又逢秋玉堂和尚僧問如何是道師曰看腳下曰如何行履師曰驀直去無趣空禪師法嗣蘇州車溪無幻古湛性沖禪師秀水張氏子初以俗士見無趣遂有所契尋棄家從趣芟染趣一日問師曰徑山頌三玄三要曰徹骨徹髓道一句三玄三要絶遮護此二句中山僧欲取一句為法你道取那一句好師曰和尚適才問那一句趣瞋目叱曰得恁無記性師曰祇為和尚徹骨徹髓趣曰不然為汝一人即得爭奈大衆何師曰取即不辭孤負先聖喪我後人趣曰如是如是師往徑山結茅集無趣語録一日歸覲趣曰一向作得些什麼事師曰某甲買得一段田收得原本契書請和尚僉押即將集本呈上趣接得展看曰者是我底你底聻師曰和尚不得攙行奪市趣便將集本擲下師便趨出少頃呈偈趣曰者是你作底麼師曰某甲鼓粥飯氣若謂有所作孤負和尚不少趣點首住後示衆大道無向背至理絶言詮迥出三乘高超十地萬法不到處特地光輝生佛未分時靈源獨耀不落見聞不隨聲色直下無一絲毫頭遍界全彰奇特事直饒棒頭取證喝下承當猶是曲為今時更或光境俱忘契心平等究竟亦非的旨所以道向上一路千聖不傳學者勞形如猿捉影到者裏絶行絶解絶照絶用絶理絶事若倚天長劍凜凜神威如鐵牛之機羅籠不住今日明眼人前不敢囊藏被蓋八字打開去也拈拂子曰諸上座還委悉麼耀古騰今只者是大千沙界一間身示衆孤峯頂上闊步大千十字街頭知音少遇不禮維摩詰不尊傅大士良久出頭天外看誰是箇般人示衆三界唯心萬法唯識卓拄杖昨宵時雨滴空階一片緑苔俱打溼示衆大道體寬長空絶迹按下雲頭別通消息同生同死風行草偃且道把住為人好放行為人好乾坤一合地胡餅日月兩輪天氣毬示衆明明百草頭明明祖師意笑殺老龐公至今猶瞌睡魯祖見人便面壁不解寒溫祕魔走到便擎叉全無禮義南山鱉鼻不若死鰌西院鑷刀渾如鈍鋸且道大悲如何為人輪王總未拋三寸遍界先聞刀斧聲浴佛上堂毗籃園裏曾呈醜古佛堂前又露形不是日光三昧力如何洗得你身清大衆釋迦老子今日誕生未審此時還曾落地也未一僧出曰落地了也師曰你見甚麼人説僧無語師曰杓卜聽虗聲僧問清虗之理畢竟無身時如何師曰道者合如是曰向上更有事也無師曰雪隱鷺鷥飛始見柳藏鸚鵡語方知問和尚百年後向甚麼處去師曰千株松下百草頭邊師燒火次僧問如何是自性天真佛師曰與我般一束柴來僧肩柴至又問師曰者奴子好惡也不識便打問如何是最上一乘師曰藤穿篾縛曰意旨如何師曰三十年後僧參師問何處來曰廬山師曰古人道不向廬山尋落處象王鼻孔漫撩天如何是廬山落處曰請和尚尊重師便低頭休去示念佛偈發心念佛循公道念念無私佛即靈念到公私俱不現唯心唯佛更何論念佛休論間與忙時時無間始相當一聲喚醒慈悲主剎剎塵塵是淨真心念佛錦添華功德難量等海沙六處顯然全體現同名同號更無差火炮偈團圝無縫罅綿密不通風一點無明發分身剎土中示人動口全拋一片心擬思量處不知音百千年外看家話倒腹傾腸説與君起念求心心即念頓然無念念無心九重之內常為主徹古該今不動尊盡心竭力作工夫內外推尋實總無正恁麼時無計可忽聞村內一聲歌即心即佛隔皮言非佛非心亦是權端的要知真實處直須吐盡野狐涎師菴居二十餘載萬曆庚戌受徑山請不數月疾作仍返車溪辛亥冬示寂茶毗塔於徑山世壽七十二僧臘三十大鑑下第三十三世笑巖寶禪師法嗣常州宜興龍池一心幻有正傳禪師溧陽李氏子年二十二往荊溪投靜樂院樂菴芟染蒙菴示誨師遂矢志曰若不見性明心決不將身倒睡一夕聞琉璃燈華熚𪹼聲有省舉似菴菴頷之未幾菴遷化師直造燕都謁笑巖和尚於觀音菴巖問上座何來師曰南方巖曰來此擬需何事師曰但乞和尚印證心地工夫巖曰若果識得心地那更有工夫印證耶師曰雖然不得不舉似過巖曰參堂去師珍重便出至晚入室方具述所以巖驀踢出隻履曰向者裏道一句看遂把話頭一時打斷懡㦬而出通夕不寐翌旦巖出方丈見師猶佇立簷下驀喚上座師回顧巖翹一足作修羅障日月勢師豁然悟旨後禮辭巖乃書曹溪正派源流付之復贈一笠曰覆之毋露圭角師受囑徑往臺山縛茅於祕魔岩居十有三載會鶴徵唐公問道懇師南還住荊溪之龍池居六載復遊燕都寓普照後歸龍池上堂無上法王有大陀羅尼門名為圓覺驀豎拂子曰會麼子已飛天外去呆郎猶向月邊尋上堂一切法不有一切法不無若能如是會水上按葫蘆佛誕上堂今晨四月八日是我釋迦如來示生降誕之時山僧忽然思量起來二千五百餘年已來不知有多少路見不平之輩務要別尋一箇人來與我釋迦老子比勝負較優劣殊不知我釋迦如來是何等一箇面孔汝諸人還知得我釋迦如來腳跟立地處麼還曾夢見我釋迦如來頂相麼良久曰舉手扳南斗回身倚北辰出頭天外看誰是箇般人驀豎拂子曰雲門大師來也擲拂子便下座上堂老僧者裏不問你久參晚進貴要正知見知見若正了生死如反掌大抵不落斷常有無二乘偏見更有甚麼商量若有僧問作麼生是正知見但向他道老僧在你腳下良久喝一喝下座僧問如何是祖師西來意師曰屋北鹿獨宿僧曰不會師曰溪西雞齊啼問如何是奇特事師曰蝦蟆捕大蟲僧曰恁麼則不奇特也師曰貓兒捉老鼠僧禮拜師便喝僧曰老和尚為甚麼放某甲不過師厲聲曰老僧有事你且去有士人訪次舉僧問雲門如何是諸佛出身處門曰東山水上行問師意作麼生師曰無孔笛幾人解吹士曰弟子試問和尚得否師曰得士曰如何是諸佛出身處師曰西河火裏坐士大夫從師遊師每舉門前冷落車馬稀老大嫁作商人婦二語罕有契者有山居偈曰五峯雲頂古文殊盡日跏趺總笑余半點苦寒禁不得躊躇未了又躊躇師風度簡易神觀凝肅以法道為己任而機用妙密迥出常情于萬曆甲寅二月十二日示寂先一日有僧自臺山來師與劇談宿昔抵暮索浴衆察師意懇請遺訓師舉所著帽者三衆無語師撫膝奄然而逝世壽六十六僧臘四十四茶毗靈骨塔于本山之右金陵靈谷曇芝禪師參笑巖問曰古人道打破鏡來相見既打破鏡向什麼處相見巖曰慚惶殺人師於言下釋然領旨遂忘却禮拜舞蹈而出服勤數載巖付偈曰微笑拈華第一機相傳八八未知非今將從上非非法分付英賢力荷歸五臺瑞峯三際廣通禪師久侍笑巖室中機契付以偈曰一念不生諸數滅萬機休罷十方空界空數滅漚澄海諸佛衆生影現中後居臺山壽昌經參問曰某於古德機緣尚有疑處乞師指示師曰試舉看昌曰臨濟大師道佛法無多子畢竟是箇什麼師曰向道無多子又是箇什麼昌曰玄沙謂靈雲未徹那裏是他未徹處師曰大似玄沙未徹昌曰趙州道臺山婆子我為汝勘破了也未審勘破在什麼處師曰却是婆子勘破趙州昌又擬進問師曰知是般事便休昌禮謝而退嘉興府天寧幻也佛慧禪師會稽史氏子母夢僧託宿而娠幼志出家年十四禮天台松谷受業一日晨課至白毫宛轉五須彌忽然身心脫落前後際斷舉示谷谷令參訪遂往燕都謁笑巖和尚親炙久之蒙印可後住燕山天寧上堂簫吹鳳至琴奏鶴來展龍降杖攜虎伏因緣會遇針芥相投諸仁者即今是醒邪夢邪悟邪迷邪莫有道得底麼良久曰鐘聲徹曉夢魂多雞唱黃昏沉醉客若欲了生脫死也不消得唵穆栗臨娑訶便下座示衆西來大意乾屎橛多少禪人咬嚼不徹當時我悔來遲不然攔𮌎推他一跌管教他屙又屙不出免使兒孫橫説豎説咦曉送千峯日春回大地華柳煙門外緑遊子未歸家參居四載遷優曇多寶晚年南還寓嘉禾天寧僧參師曰甚處神祇何方靈聖僧曰金粟師曰在彼作甚麼曰充園頭師曰蔬菜臨割時還叫痛麼僧作負痛勢師曰老僧刀也未下叫喚作麼僧曰今日親見和尚師曰如盲摸象各説異端師于利濟之事靡不從事處身節儉未嘗干謁將示寂命侍僧取曆日視之曰二日可吾去矣侍僧驚問何往師曰吾將有所適僧跪泣願為衆少留師笑曰更後三日亦可至期沐浴跏趺而逝時崇禎戊辰八月五日也壽九十有一塔全身于城北之懶石菴師有懶石語行世車溪沖禪師法嗣嘉興府南明慧廣禪師鹽官韓氏子出家於興善寺謁無幻沖示趙州無字話一日遊徑山就地拈得片紙有觀方知彼去去者不至方之句釋然有省往見無幻舉似之遂蒙印可後首衆於徑山示衆前年年鼻孔無半邊去年年兩眼不完全今年年精骨獻青天顧左右曰廣上座禪已説了汝等作麼生會良久曰參泰昌改元仲冬二十七日囑後事畢奄然而逝大鑑下第三十四世禹門傳禪師法嗣明州天童密雲圓悟禪師宜興蔣氏父曦母潘兒時喜兀坐若有所憶持者及長睹壇經深信宗門下事一日採薪見堆柴突露面前有省二十九棄家投龍池幻有和尚三十三祝髮時中看得心境兩立請益於幻幻曰若到者田地便放身倒臥師益昏惑幻唯罵詈偶過銅棺山忽覺情與無情煥然等現覔纖毫過患不可得正所謂大地平沉底境界時幻居燕都普照師往省覲幻曰汝離我三載有新會處麼師曰一人有慶萬民樂業幻曰汝又作麼生師曰特來省覲和尚幻曰念子遠來放汝三十棒師拂袖便出一日侍立次幻曰忽有人問汝如何抵對師向前豎起拳幻亦舉拳曰老僧不曉得者箇是什麼意思師曰莫道和尚不曉得三世諸佛也不曉得一日幻召師至前拈起拂子曰諸方還有者箇麼師震聲一喝幻曰好喝師又連喝兩喝歸位立幻曰更喝一喝看師便出法堂次日幻上堂以衣拂付之一日召師入室曰老僧昨夜起來走一轉把柄都在手裏了汝等為我扶持佛法師曰若據某甲扶持佛法任他都來總與三十棒莫道分明為賞罰僧問如何是五眼圓明師曰老僧祇有兩隻問如何是奪人不奪境師曰百萬軍中斬顏良曰如何是奪境不奪人師曰取了荊州放魯肅曰如何是人境兩俱奪師曰殺却陳友諒併吞數十州曰如何是人境俱不奪師曰當今天下太平國王萬歲曰料簡已蒙師指示全提向上事如何師以拄杖𭣟曰速退速退問某甲到此一月不見堂頭時如何師曰者老漢甚處去也僧擬議師便打上堂一葉落天下秋一塵起大地收今朝七月六日無論一葉落不落而天下秋衆兄弟已備知矣舉拂子一塵起也作麼生是大地收底道理擲下拂子若知撲落非他物始信縱橫不是塵下座普請上堂據衆兄弟擔了飯米來伴悟上座各各計明己躬下事不合動靜衆兄弟然而諺有之曰有例不可滅無例不可興百丈和尚創叢林立規矩有普請例及諸尊宿亦有普請説所謂作則均其勞飯則同其食自今觀之似乎不然作者應當作間者應當間致令古風雕喪法門淡薄無他蓋主法者不舉之過也要且者般事無處得藏竄所以謂之大道謂之公案擔荷者般事須是者般漢若是畏刀避箭躲懶偷安不足為伴雖然却有箇驗處且道以何為驗良久曰打鼓普請看上堂我覺洪師弟募萬人緣要往臺山齋僧今日先從家裏齋起悟上座無以報答驀拈拄杖曰不但洪師弟設使釋迦老子文殊普賢諸大菩薩乃至獅象狐狼泥豬疥狗法界有情總到者裏悟上座別無供養總與他一頓從教怨入骨髓永劫不忘擲下拄杖將此深心奉塵剎是則名為報佛恩下座上堂六月日頭真箇熱赤肉團邊如火逼試問現前諸兄弟無位真人徹未徹若也徹向無陰陽地上豎去橫來若也未徹未免明日熱如今日下座上堂開方便門示真實相拈拄杖擊香几一下方便門開也豎起拄杖真實相示也諸人還委悉麼若也見得徹去便可以拈拄杖作丈六金身用將丈六金身作拄杖子用然後拄杖子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾汝等諸人切莫向古廟裏去躲一棒打折你驢腰莫言不道下座解制上堂八月一結制畢腰間包頭上笠通玄寺裏放門開行腳衲僧攙先出被人拶著要翻身切莫隨人穿却鼻復舉洞山曰秋初夏末將謂忘却東去西去亂走作麼直須向萬里無寸草處去坐斷路頭石霜曰出門便是草奴見婢殷勤大陽曰直饒不出門亦是草漫漫地同坑無異土者隊老漢總被山僧折倒了也諸人還知出身處也無若也知得日銷萬兩黃金不為分外其或未然萬古碧潭空界月再三撈摝始應知喝一喝下座上堂今朝五月五日知事頭首要老僧升座應箇時節老僧再三思量無可計較何也雄黃燒酒固是不宜要且無箇銅錢買糯穀思量到計窮力極忽然得箇富不有餘貧無不足底平等法門正好與世移風易俗乃擎起兩拳曰只將者兩箇大糭子供養大衆一任橫咬豎咬忽然咬著自家底管取人人飽足免得窮廝煎餓廝炒上堂僧問如何是過去佛師曰釋迦老子曰如何是現在佛師曰大地衆生曰如何是未來佛師曰莫妄想乃曰諸人盡道解制殊不知天童之制結解不結解總不必論只如老僧終日趂著大衆不挑甎便搬瓦不運土便擡石見你們稍遲縮不是喊便是罵汝諸人作麼生會還知老漢為人處麼良久曰三生六十劫師於萬曆丁巳繼席龍池次遷台之通玄禾之金粟閩之黃檗明之育王天童凡六坐道場三十餘年宗風大振座下踰三萬指海內宿衲久已領徒住山者嚮師之風願就弟子之列親炙座下師於去就纖毫不苟每嘆應菴老祖著草鞋住院其於天童雖以無功用行變化荊棘林於笑談之頃然數出山每為護法挽留室中示門弟子每舉懶殘和尚偈及寒涕垂膺話且曰貞觀嚮道欲瞻風彩上表遜謝往返三四引頸就刃神色儼然我敬四祖道信大師茅茨石室纍煩聖主且請前行吾從別道澡身淨髮跏趺而逝吾敬汾州無業和尚休心息念斷絶扳援賜紫及號力陳昔誓收付有司恬然受刑吾敬芙蓉道楷禪師崇禎辛巳國戚康宇田公為皇貴妃賫紫衣入山請師升座説法復得俞旨住持金陵報恩師以衰老遜謝明年春拽杖歸通玄七月三日示微疾五日手書復護法祁侍御六日有僧自都中來問喝作喝會棒作棒會入地獄如箭射畢竟作麼生會師便打僧禮拜師曰千句萬句皆從自了自己不了喫棒不了七日晨興巡閲匠工如平日及午歸丈室語侍僧倦甚登寢榻少頃方起坐跏趺未竟泊然而逝世壽七十有七僧臘四十有六全身迎還天童塔於幻智菴右隴常州磬山天隱圓修禪師荊溪閔氏子自幼失怙鬻蔬奉母聖賢懿行聞輒能行祖以義讓居旃陀羅肆師愍而不樂恆持觀世音菩薩名號弱冠聽講楞嚴一切衆生皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉惕然知有生死大事遂往投龍池幻有和尚二十四得度參父母未生前本來面目久未有入一日隨幻出窑同事謂聞四大名山菩薩出現神通廣大幻曰者裏也不少師進曰如何是者裏神通幻曰快度磚來師於言下有得時中逾覺精采偶展楞嚴至佛咄阿難此非汝心驀然打失本參會幻北行師掩關龍池閲古人公案復於雲門扇子話去不得力究兩載聞驢鳴大悟乃曰忽聞驢子呌驚起當人笑萬別與千差非聲非色閙解關與同參密雲公趨京都覲幻於普照寺幻曰別來三載各呈似看師進曰人説北地寒我説南方暖寒暖不知人窮人知寒暖幻頷之次日入室問歷歷孤明時如何幻曰待汝到此與你道師便喝幻曰汝還起緣心麼師拂袖便出又事幻著衣次幻指椅曰汝上坐待我拜你為師師笑呈偈曰木人提唱笑呵呵更著衣衫誰識他昨日覸來是男子今朝還作老婆婆幻笑曰此甚愜老僧意復與同參遊歷教海遍謁諸尊宿事幻掌記室南北往來盡得心髓萬曆庚申誅茅石磬次遷法濟後住報恩上堂曰禪非解會道絶功勳妙體湛然真機獨露不可以心思不可以意想不可以言宣不可以默照不可以色見不可以聲求一念回光便同本有恁麼則釋迦老子睹明星時見箇甚麼來者裏透得頓越三祇坐斷報化佛頭隨時著衣喫飯還有向上一路在驀豎拄杖曰釋迦老子在諸人眼睫毛上放光動地祇是不得動著動著則三十拄杖何故不見道丈夫自有沖天志不向如來行處行上堂一塵不立猶在半途截斷衆流尚居門外且道誰是到家者顧左右云觀音菩薩將錢買糊餅放下手時原來是饅頭到者裏直得如天普蓋似地普擎耳裏藏得須彌山眼裏著得四大海方有語話分且道此人渾身在甚麼處委悉麼數聲清磬是非外一箇間人天地間上堂拈拄杖曰老僧有時拈拄杖子不作拄杖子用有時拈拄杖子作拄杖子用有時以拄杖子行遍四天下擲向壁角落裏有時拋下拄杖子獨自打頓去諸人者裏見得便會得我臨濟大師的賓中主主中賓賓中賓主中主雖然切不得動著動著則打你頭破腦裂莫言不道卓拄杖示衆今朝正是臘月半大事分明須了辦莫待臨時有屈伸解脫門開成大患堂中箇箇老成人著著拈來要方便言言見諦剔祖燈自古傳持吹毛劍吹毛劍有何驗當陽拈出與人薦驀擲拄杖曰洎合停囚長智示衆靈源湛寂智體自如觸處洞然隨方應用目前無法拈來物物全彰箇裏無私舉起頭頭成現須是恁麼人行得恁麼事且道那箇是恁麼人禾山打鼓雪峯輥毬趙州喫茶雲門糊餅到者裏總用不著且道有甚長處卓拄杖曰偶然獨立千峯頂間看湖帆自往來示衆舉雲門曰盡十方世界乾坤大地天下老和尚以拄杖畫一畫曰百雜碎雪竇曰者老漢是即是要且無出身之路如今拄杖在雪竇手裏復橫按曰東西南北甚處得來師曰雲門解放不解收雪竇解收不解放山僧今日拄杖子在手卓一下曰盡十方世界乃至天下老和尚總在者裏要東便東要西便西要南便南要北便北到者裏還有全放全收者麼喝一喝曰豈容淺見衲僧會惟許通方作者知示衆今時禪門大變總是箇弄虗頭漢教壞人家男女不肯指點人做實地工夫剛剛學些魔嘴説話不顧本分中黑漆漆地老僧者裏不比諸方容人打口令謂之參禪若要在此住須將從前學來的盡情吐却淨淨地本分參究一回討箇分曉始得若不如斯唐喪光陰有何利益一日琇書記攜二貓上方丈問師那箇好師指曰者箇好琇便擲下而去復入見貓在地便與一踏師拈拄杖打趂琇轉身曰和尚也爭命師打曰你不知鼠的害只欲行祖師門下事琇高聲曰説甚祖師不祖師師曰與麼為甚踏殺貓琇曰和尚作者箇説話入地獄如箭射師乃低頭歸方丈至晚小參舉前話曰老僧到者裏性命幾合不存衆中有人代得一轉語相救老僧麼箬菴曰大衆和尚今日普請拂袖便出師曰過去了也琇曰箭去西天十萬里猶在大明國裏擬議亦出師卓拄杖曰雖然如是不因漁父引爭得見波濤僧問如何是第一句中薦得堪與佛祖為師師曰覿面春風和氣眉分八字縱橫如何是第二句中薦得堪與人天為師師曰揭開雲裏月休向暗中行如何是第三句中薦得自救不了師曰言中有響知歸不免借他家路問如何是法身邊事師曰黑漆桶如何是法身師曰爛東瓜如何是法身向上事師曰三家村裏酒簾子問如何是句到意不到師曰言言見諦步步迷蹤如何是意到句不到師曰只在舌頭尖盡力吐不出如何是意句俱到師曰有時獨倚庭欄上間看梅開三五枝如何是意句俱不到師曰落花流水去空負浪遊人問山嶽傾頺為甚煙霞不散師曰捨大戀小曰獨臨玉鏡為甚眉目不睹師曰打破鏡來相見問日裏即有睡中即無如何得寤寐一如去師曰誰與你道的有無曰不會師曰不會最親切問最初一步即不問未審踏著箇甚麼師曰半夜裏偷瓜曰偷後如何師曰未到你在問世尊睹明星意旨如何師曰黑裏白僧曰三乘等觀性空而得道如何是性空師拈拂示曰者箇三十七文買的問學人未到磬山先喫棒了也師曰空頭禪和曰再求賜棒師曰老僧無者間氣力師風儀磊落賦性恬退親炙龍池凡一十八載纍命分座説法皆辭遜初入磬谷值雪深五十餘日炊煙幾絶師於飢禽野獸中安之晏如獨念法門衰晚師道陵夷力恢濟上綱宗大闡別傳旨趣痛呵穿鑿嚴辨正邪四方嚮道之士承風踵接競喧宇內磬山崇禎乙亥九月二十三日示寂世壽六十有一僧臘三十有七奉全身塔於報恩順治己亥門人崇遺命遷塔歸荊溪海會寺之左紹興府雲門雪嶠圓信禪師鄞縣朱氏子年九歲聞誦彌陀經水鳥樹林皆悉念佛念法念僧遂知信向佛乘至二十九歲棄家後訪秦望禎公禎舉他心問僧何處來僧曰天竺心曰我聞有三天竺你從那一竺來速道速道其僧茫然無對師聞舉疑情頓發次日拽杖登石高聲提曰從那一竺來速道速道忽然前後際斷如空中出迸日輪相似乃説偈曰石貼背脊骨翻身脅肋骨仔細看將來動也動不得復喝曰張三殺人李四償命欲往天台訪尋知識印證忽擡頭見古雲門三字豁然大悟復説偈曰一上天台雲更深腳跟踏斷草鞋繩比丘五百無蹤影若見他時打斷筋遂返縛茅隻髻峯復謁雲棲蓮池大師呈偈曰不解西方不學禪偶來塵世只隨緣三間茅屋傍溪住兩扇竹關月眠破盡衲衣那有結養長頭髮欲成顛自從會得西來意白雪飄飄六月天次參龍池室中機契萬曆四十三年遷徑山千指菴後住廬山開先癸未遷嘉禾東塔晚住越之雲門僧問如何是雙髻家風師曰一堆土竈萬箇峯頭僧曰大師法嗣何人師曰遠山終日看雲裏鐵牛嘶曰如何是祖師西來意師曰破二作三曰意旨如何師曰常言俗語問月生雲際時如何師曰甚麼時節曰樹雕葉落時如何師曰鳥不宿問四大分散時向甚麼處去師曰棺材裏曰意旨如何師曰埋在土裏僧禮拜師便喝出上堂四十年來恁麼行斬開碧落血腥腥其中果有希奇事師子遊行不問程稽首燈王如來普願微塵國土衆生同入般若波羅蜜門大衆且道般若波羅蜜門作麼生入舉拂子曰鑒升座見身無實是佛身了心如幻是佛幻了得身心本性空斯人與佛何殊別某上座則不然鮎魚水底聚子貼天飛會得箇中意成佛更無疑崇禎八年開府余大成司理黃端伯等衆護法訪師請於徑山大殿上堂咄咄咄徑山乃唐宋已來之徑山擊拂子八十一人在此經過非今日之徑山非一日之徑山也千年常住一朝僧今日祖令當行十方坐斷且道還有祥瑞也無鐘樓生耳朵佛殿又懷胎黃公問如何是鐘樓生耳朵師拈起香曰會取者箇黃曰如何是佛殿又懷胎師曰産下也黃禮拜曰須是和尚始得師乃曰今承衆檀越命老僧登於此座理荒殘之祖席扶陳爛之頽綱者箇喚作狗尾續貂那管家家門前火把子釣魚船上謝三郎即不問媳婦騎驢阿家牽道將一句來還有人道得麼一拂擊開金殿月萬家無箇不光明即日衆居士延師齋於寒翠樓師曰老僧今年六十六復輪指曰丙丁戊己庚良久怪道把人牽來拽去元來水牯牛入命宮拖泥帶水東觸西觸雖然且喜水足草足一日示微疾書訣衆偈曰小兒曹生死路上須逍遙皎月冰霜曉喫杯茶坐脫去了書畢擲筆而逝時丁亥八月二十六日也世壽七十七僧臘四十八全身塔於雲門右麓湖州淨名抱朴大蓮禪師臨安駱氏子年十五投妙嚴祝髮二十二往雲棲受具初遊講席一日自念數年以來於教相旨趣雖有理會處生死岸頭全用不著遂更衣入徑山禪期三七日中廓然洞徹述偈曰自幼失親娘遍覓於他鄉驀然一相見更不再思量解制即往荊溪叩龍池幻有和尚問曰自遠趣風乞師指示池曰老僧牙齒疏缺師曰親切處更乞一言池據座師喚侍者點茶來池曰上座不妨伶俐師曰某甲耳聾池休去一日辭去池曰老僧猶有語言未盡在師曰和尚言雖未盡其意某甲巳知池曰且道老僧意作麼生師便喝池曰再喝一喝看師轉身便出池以源流拂子付之住後僧問佛是何義師曰覺義僧曰佛還迷否師曰迷僧曰既覺云何復迷師曰不迷又問作麼僧曰也須問過師拈棒打出問如何是奪人不奪境師曰蛺蝶穿華彰曰如何是奪境不奪人師曰掀眉掃白雲曰如何是人境兩俱奪師曰彼此無消息曰如何是人境俱不奪師曰推看月明魚山熊居士問萬法歸一一歸何處師舉茶杯曰請茶熊曰我在青州作一領布衫重七斤作麼生師曰脫殼烏龜飛上天問如何是麻三斤師曰斤兩分明師於崇禎二年八月示寂興善廣禪師法嗣嘉興府普明鴛湖妙用禪師海寧鄭氏子從興善南明廣公受業嘗謁無幻沖指示法要後度夏徑山偶閲思益經有省述偈呈廣廣呵之執侍數載一日檢傳燈至演祖下載清風公案膺礙釋然同雪嶠大師夜話次雪忽舉手指月曰者半箇那裏去了師乃良久雪曰也只得半箇師曰者半箇那裏去了雪亦良久師曰也只得半箇一日示寂索筆書偈曰生也錯死也錯鐵牛掣斷黃金索擲下筆曰咄遂泊然而寂時崇禎十五年十月十一日也續燈存稿補遺黃龍忠禪師法嗣大鑑下第十七世袁州慈化普菴印肅禪師本郡宜春余氏子母黃生于政和乙未十一月草七日誕時有異徵年十五往從壽隆賢公受業賢以法華授師師曰諸佛玄旨貴悟自心數墨循行何益於道賢大異之俾服勤左右閲七載始獲剃染受具戒遂參牧菴于溈山禮拜起便問萬法歸一一歸何處菴舉拂示之師當下契旨尋還受業踰十年至紹興癸酉始受慈化請住後緇素翕然嚮風諸緣畢集不數載梵宇金碧如從天降雄壯妙麗甲於湖南師雖乘願而出濟物利生猶自以所詣為未足乾乾朝夕脅不沾席者十有二年一日閲華嚴合論至達木情忘知心體合豁然大悟述偈曰揑不成團撥不開何須南嶽又天台六根門首無人用惹得胡僧特地來後於乾道己丑七月草一日忽索筆書偈于丈室西壁沐浴更衣跏趺而逝世壽五十五僧臘二十八奉全身塔於本山有語録四卷行世月幻禪師法嗣大鑑下第二十七世伏牛物外無念圓信禪師金臺高氏子生于宣德己酉九歲出家受具後首見無際于隆恩有省入天順己卯歸牛山結茅辛巳復詣繁昌參月幻幻問何處來師曰牛山幻曰人在者裏牛聻師曰覿面不相識全體露堂堂幻曰雖然如是頭角不全在師曰某甲今日山行困幻復拈起竹篦曰喚作竹篦則觸不喚作竹篦則背上座作麼生師曰有勞神用幻曰未在更道師便進前奪竹篦擲于地幻軒渠大笑師曰某甲罪過便作禮幻乃撫而印之師菴居三十載開法伏牛僧問龐居士道一種沒絃琴惟師彈得妙某甲今日請和尚彈看師咳嗽一聲僧曰不會師曰鐘作鐘鳴鼓作鼓響僧曰意旨如何師曰馬祖去世久矣問如何是即心即佛師曰富兒易驕曰非心非佛又作麼生師曰窮坑難滿曰某甲不會師曰若道即心即佛大似好肉剜瘡若言非心非佛何異灸瘡加艾直饒道不是心不是佛不是物也是平地喫交且道畢竟如何坐來拭几添香火粥罷呼童洗鉢盂潔空通禪師法嗣大鑑下第二十八世黔中正法雪光禪師族趙氏遍歷諸方至靈峯度夏聞舉嚴陽尊者問趙州公案有省舉似寂照照曰無功用處正好用功莫認些子光影有誤生平復結冬于景德一日定中聞巖瀑聲觸發默舉從上佛祖機緣一一透得遂往參潔空從頭舉似之空曰不見道莫謂無心云是道無心猶隔一重關道了便入寢室師自是茫無意緒懷疑不決一日見寒山詩吾心似秋月之句凝滯頓釋後菴居古山臨終書偈而逝雪峯瑞禪師法嗣大鑑下第二十八世性空和尚嘗作顯宗歌曰達此宗無今古拶破虗空還自補聲色堆頭妙覺場放去收來無間阻體中妙夜半木人臨鏡照波斯南岸嚼寒冰塞北胡兒街市閙用中玄石女吹笙碧樹巔趙州葫蘆挂東壁村中王老夜燒錢玄中玄妙中妙寶絲網裏鬬明珠須向暗中通一竅海潮音熾然説師子筋琴彈白雪兩岸青山笑點頭百年狐兔形摧滅大闡通禪師法嗣大鑑下第二十九世君峯清祥上座久依大闡一日忽有省呈偈曰法性空無礙平等觀自在截斷兩頭機是名超三界性空和尚法嗣大鑑下第二十九世荊州圓通夢菴懶牧湛覺禪師長安曲江張氏子幼慕禪悅從藍田秀芟染矢志究明生死大事朝夕孜孜至于寢食俱廢一日有省往見性空求為決擇遂蒙印證成化丙戌開法圓通上堂選佛場草深三尺空王殿浪捲千尋圓通有一句子囫圇吐不出吐出不囫圇若有人檢點得出許他具一隻眼
