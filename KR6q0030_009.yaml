body:
  text: 明嗣祖沙門東吳通問編定笠澤居士華亭施沛彚集臨濟宗大鑑下第二十五世伏龍長禪師法嗣蘇州鄧尉萬峯時蔚禪師溫州樂清金氏子襁褓中見僧輒微笑合掌年十三從演慶昇法師受業十六得度十九至杭受具戒參虎跑止岩示不是心不是佛不是物話遂往明州達蓬山佛趾寺側卓菴晝夜力參一日聞寺主舉溈山踢倒淨瓶公案驀地觸發說偈曰顛顛倒倒老南泉累我工夫却半年當下若還親薦得如何不進劈胷拳遂往謁無見於華頂見囑師住山仍返達蓬後聞千巖提唱直造伏龍叩見巖曰將甚麼來與老僧相見師豎起拳曰者裏與和尚相見巖曰死了燒了向何處安身立命師曰漚生漚滅水還在風息波平月印潭巖曰莫要請益受戒麼師掩耳而出明日普請砍松次師拈圓石作獻珠狀曰請和尚酬價巖曰不值半文錢師曰瞎巖曰我也瞎你也瞎師曰瞎瞎即呈偈曰龍宮女子將珠獻價值三千與大千却被傍觀人決破誰知不值半文錢巖謂左右曰蔚山主頗有衲僧氣息遂命居第一座一日巖陞座舉無風荷葉動決定有魚行師出眾震聲一喝拂袖便出卓菴於蘭溪之嵩山凡九載巖甞寄偈曰鬱鬱黃華滿目秋白雲端坐碧峯頭無賓主句輕拈出一喝千江水逆流三為手書招之愛重彌至旋𢌿以法衣頂相僧問如何是嵩山境師曰四面好山擎日月一湖秋水浸青天曰如何是境中人師曰三仙描不就終不與君傳問如何是目前事師曰眉毛眼上橫曰莫是他安身立命處也無師曰錯認定盤星二僧參師問那裏來僧曰隴西師曰我聞隴西有鸚鵡是否僧曰是師曰還會吟詩作賦麼僧曰會師曰會吟甚麼詩試道看僧無對師便打曰妄語漢汝不從隴西來復問第二位道看僧作舞勢師曰是即是爭奈口口不同自代曰上大人丘乙己開堂拈香畢乃曰千聖難明不了因代相傳古到今今日嵩山重舉似銕樹華開別是春向無影樹下打眠宏開飯店於虗空背上經行大闡宗乘塵塵剎剎全彰物物頭頭合轍擊碎魔王窠臼斷送衲子命根不作奇特商量不作玄玅解會直得淨名杜口共贊昇平巖頭密啟咸宣至化正與麼時祝聖報恩一句作麼生道一片定光輝宇宙直教萬國奉君恩上堂舒兩手曰大開方便門便從者裏入復握拳曰閉却牢關說家裏話且道不開不閉一句又作麼生良久斂僧伽黎下座上堂三世諸佛如是說歷代祖師如是說天下老和尚如是說嵩山亦如是說若有不如是說者與他三十棒若有如是說者亦與他三十棒何故卓拄杖嵩山門下令不虗行上堂月頭是初一光明漸漸出月尾是三十光明何處覓假饒老釋迦也道拈不出拈得出萬事畢有人道得出來道看如無嵩山與諸人露箇消息展兩手曰我見燈明佛本光瑞如此後遊姑蘇鄧尉喜其山水盤結遂駐錫焉未幾四眾咸集成大伽藍名曰聖恩洪武十四年正月二十九日忽集眾曰老僧時節至矣即說偈曰七十九年一味杜田懸崖撒手杲日當天語畢泊然而寂奉全身瘞於院西塔曰永光杭州天龍水菴無用守貴禪師婺之甄氏子十八歲往投里之康侯山芟染泰定間游浙西適值千巖居龍華師叩之默有所契龍華去天龍密邇大道平公力圖起廢挽師與巖主之會巖去烏傷師與俱焉至正丙戌復謁中峯和尚羣疑頓釋旋退居嘉禾一夕夢大道曰我已棄人間世師驚疑拏舟訪之由是復主天龍一日忽索筆書偈曰一蝸臭殻內外穢惡撒手便行虗空振鐸天龍一指今猶昨擲筆而逝行省丞相達識銕木爾為主後事築慈濟塔院於天龍西岡奉全身瘞焉師生平不畜長物寒暑一衲律身甚嚴甞墮一齒弟子函櫝中生舍利五色世壽七十有二松江府華亭松隱唯菴德然禪師里之張氏子幼從無用貴公祝髮徧叩諸方未有所契後於千巖會中聞上堂語豁然悟入甞見石屋珙謂師曰子緣當在華亭因書松隱二字授之師遵懸記歸里築室於郭滙之陽遂名松隱足不踰閫者三載甞刺血書華嚴有天華滿庭之異感居民為建寶坊洎千巖遷化眾請師繼席開堂日僧問遠離松水來據龍峰海眾臨筵請師祝聖師曰萬年松在祝融峰曰祝聖已蒙師指示列祖家風事若何師曰冬到寒食一百五曰莫便是和尚為人處也無師曰斧頭是銕作曰恁麼則龍門無宿客也師曰早已點頟曰若不登樓望焉知滄海深師曰你道老僧眉毛有幾莖曰一堂風冷澹千古意分明師曰蹉過不少曰承師有言向上一路千聖不傳還端的也無師曰那裏得者消息來曰賣金須遇買金人師便喝曰金屑雖貴落眼成瞖又作麼生師曰好向繡湖湖上看月明夜夜散金波曰三十年後此話大行師曰杜撰禪和如麻似粟僧曰大眾證明學人禮拜師乃曰第一義諦已被東白和尚一槌擊碎了也未免向第二義門露箇消息山僧數年搓得一條龜毛索子今日拈來將三世諸佛西天四七東土二三天下老和尚鼻孔一串穿却了也且道山河大地艸木叢林森羅萬象有情無情甚處得來良久莫將閒學解埋沒祖師心復舉三聖道我逢人則不出出則便為人興化道我逢人則出出則不為人師曰者兩箇老漢同門出入宿世冤家一人向孤峰頂上臥月眠雲一人向十字街頭揚塵簸土點檢將來二俱漏逗各與三十拄杖且道新龍峰與麼提持是賞渠是罰渠驀拈拄杖卓一卓天上有星皆拱北人間無水不朝東上堂日可冷月可熱眾魔不能壞真說有來由無途轍六月炎炎撒冰雪文殊無處著渾身普賢特地呈醜拙是真說非真說若無閒事挂心頭便是人間好時節喝一喝卓拄杖謝藏主維那上堂天無門地無戶俊快衲僧一任來去藏裏摩尼照徹十方洞裏桃華千葩競吐假劫外之春風應今時之律呂海神夜半看鮫珠眼光挂在扶桑樹喝一喝結制上堂煖氣相接正在斯時深深冷灰裏撥著星兒之火向死柴頭上發機燎起亙天烈焰燒却舜若多神面皮敢問諸人作麼生回避擲拄杖下座上堂今朝是初一龍象如稻麻有事與無事歸堂去喫茶上堂達磨西來不立文字直指人心見性成佛大眾作麼生說箇見性成佛底道理良久幸是無瘡勿傷之也結制上堂蠟人為驗始於今日九十日中推功辨的黃面老瞿曇結住布袋頭百萬人天咸皆受屈松隱結制總不恁麼以手作搖櫓勢曰山僧即今駕無底銕船普請大眾同入大圓覺海遊戲去也喝一喝看取定南鍼歲旦上堂元正啟祚萬物咸亨驀拈拄杖曰拄杖子昨夜抽條今朝吐蘂華開五葉香徧大千且道還當得新年頭佛法也無卓拄杖一下喝一喝臘八上堂明星一見出山來剛道孃生兩眼開不是髑髏乾得盡爭知春色上桃腮上堂德山棒臨濟喝拈放一邊諸人脚跟下道將一句來以拄杖畫一畫毗婆尸佛早留心直至如今不得玅示人佛是眾生界中了事漢眾生是佛界中不了事人若欲決了此事但向十二時中四威儀內折旋俯仰與人酬錯處看是什麼道理忽爾妄想滅知見忘突出自家一段光明洞徹十虗無絲毫隔礙始知佛與眾生本性平等一身清淨多身清淨一世界清淨多世界清淨無一塵不是真如境界無一剎不是解脫道場所以永嘉大師曰一月普現一切水一切水月一月攝諸佛法身入我性我性同共如來合斯言豈欺我哉示醫士話頭一則耆婆藥大藏諸經和劑方抹過二途開口笑不勞鍼砭起膏肓化燈油劫初一點光明種猛烈工夫拶出來瀉入碧瑠璃裏去三千諸佛笑顏開坐禪銘參禪的的非細事貴在當人發真志真志不發願不堅決定茫茫墮生死古德垂慈何太切教人參玄要直截話頭一則重千鈞盡力提持須猛烈進前退後知幾回恰似冰爐煉生銕冰爐煉銕真箇難竭盡精神豈容歇驀然一拶火星飛面門簉破通身熱鉗鎚玅密始見真手兮眼兮用處親就中煉出吹毛利干將鏌鎁爭比倫耿耿寒光耀空碧在在處處興家國外道天魔盡喪魂銕頟銅頭俱失色古今庫藏無此珍天上人間何處覓殷勤為報參玄人趂此後生須努力婺州清隱蘭室德馨禪師義烏方氏子年二十四投伏龍祝髮執侍數載復力抵諸方久之歸覲會千巖遷化乃結茅城西榜曰清隱後聖壽虗席四眾請師主之蘇平仲嘗過訪師寒溫之外不措一辭蘇曰千巖老師見客口如懸河娓娓不倦師今默然何也師曰道無隱顯焉有語默昔吾先師未嘗不言然而未嘗言今吾未嘗言然而未嘗不言也蘇乃擊節稱賞洪武壬子十一月十四日示微疾集眾訣別端坐而逝留龕七日顏色如生茶毗五色舍利無數世壽七十僧臘四十有六婺州華山明叟昌菴主本郡浦江人縛茅於里之華山往謁千巖禪師示以入道旨要旋歸晝夜孳孳不怠一日忽辭眾說偈曰生本無生滅亦無滅撒手便行虗空片月語畢端坐而逝時洪武丙辰十月三日也古梅友禪師法嗣潤州金山慈舟濟禪師西竺作禮曰某甲拏得賊來請和尚決斷師曰贓在甚麼處竺拍案一下師往復徵詰復曰諸佛不說列祖不傳除却搖唇鼓舌瞚目揚眉還我到家一句來竺默然師曰去聖時遙尚有此子善自護持一峯寧禪師西竺呈見解師為勘驗示偈曰青山疊疊雨濛濛師子金毛撥不通我也自知時未至十回放箭九回空弁山安禪師法嗣杭州正傳院祖庭空谷景隆禪師姑蘇洞庭黿山陳氏子初見嬾雲開示法要後於虎丘禮石菴祝髮會菴遷靈隱師相隨七載因往天目禮高峯祖塔憩錫歲餘忽有省入徑造嬾雲求證雲為助喜後住碧巖僧問如何是佛法的的大意師曰此問最親切曰覿露堂堂時如何師曰途路未為真曰南人如問雪我道是楊華師曰喚鐘作甕又爭得晚年於西湖修吉山卜地為生壙築室以居名曰正傳塔院復自製塔銘其略曰嗚呼死生一夢骨塔奚為葢表佛法流芳靈蹤不斷即幻明真以致佛祖命脈源遠流長矣幻身雖滅佛性不遷後之來者見窣堵崚嶒峯巒蒼翠鳥鳴喬木泉瀉幽岩不馳外境不執內心盡忘愛惡陶然泰和始知法界為身虗空為口萬象為舌晝夜說法未嘗間歇於此見得明透得徹如醉忽醒廓然領悟便見佛祖不曾涅槃老僧不曾圓寂大圓鏡中覿面相見西來祖意兩手分付如古師嗣雲門青師嗣大陽無前後無去來大千沙界自他不隔於毫端十世古今始終不離於當念嬾雲和尚是景隆受業師之受業師景隆心法受印可於嬾雲即南極安禪師也得臨濟正傳二十世上泝天真則無極源雪巖欽前後嗣法亦無定規前嗣後者阿難嗣迦葉後嗣前者興化嗣臨濟理貫古今詣實為至銘曰廓周法界空蕩無涯羣靈昇墜恒無已時佛祖埀應為導為師宿膺微幸值斯化儀不善弘道隨力所宜卒於武林骨窆山崖窣堵奠安山同壽期以幻歸幻有為無為成住壞空斯道坦夷正統九年春景隆五十二歲著所著有空谷集尚直尚理編福林度禪師法嗣金陵天界古拙俊禪師姑蘇之松陵人年十三往越州日鑄寺出家十五歲祝髮受具戒首謁石屋珙次見三衢嬾牧得禪定工夫復往叩古梅於高仰禮拜起即依實供通梅打趂出如是三度被打遂結伴歸里立限壁觀九年每三年燃一指歷燃三指一日忽然瞥地乃往參福林法戰相契遂留首眾時年二十八矣眾推出世師遁跡出山留偈曰半載相依唱祖機幾番談道奉嚴威出山便說歸時路又是重添眼上眉韜光岩壑三十餘年有平生最愛隈岩谷三十年來嬾送迎之句洪武間奉旨剃度千僧至繁昌眾請東廬山開堂普說示眾禪之一字亦是強名云何曰參在信而已擬議即乖開口即錯若是發心不真志不猛利者邊經冬那邊過夏今日進前明日退後久久摸索不著便道佛法無靈驗却向外邊記一肚抄一部如臭糟甕相似是者般野狐精直饒到彌勒下生有甚交涉真正道流若要脫生死須透祖師關祖關透生死脫不是說了便休要將從上諸祖做箇樣子趙州老人四十餘年不雜用心為甚麼事長慶稜公坐破蒲團七箇為甚麼事香林老師四十年方成一片為甚麼事乃至歷代真實履踐尅苦勵志為甚麼事山僧今日口喃喃地引古驗今為甚麼事諸禪德既有從上不惜身命積功累德玅悟親證底樣子何不發大勇猛起大精進對三寶前深發重願若生死不明祖關不透誓不下山如是發願之後截斷千差路頭不與萬法為侶向長連牀上七尺單前高挂囊壁立千仞寬立限期急下手脚盡此一生做教徹去若辦此心決不相賺我今為汝保任此事終不虗也永樂丁亥復奉旨於天界終老焉大鑑下第二十六世萬峯蔚禪師法嗣蘇州鄧尉寶藏普持禪師繼席聖恩為第二代萬峯付偈曰大愚肋下痛還拳三要三玄絕正偏臨濟窟中師子子燈燈續焰古今傳後示寂塔於萬峯之側瑞州九峯無念勝學禪師隨州應山人族姓陳年九歲從寶林無極受業初謁無聞示萬法歸一一歸何處話遂入嵩山苦心研究一日有省述偈有萬象全彰一鏡中之句乃奮志徧參後抵姑蘇見萬峯於喝下領旨峯付偈曰五派傳來臨濟宗入門一喝露全鋒老婆心切能容易試看泥蛇化作龍後住九峯洪武十五年孝慈皇后賓天楚王聘諸山名衲集於洪山見師驚異特留邸館請問法要高皇帝聞之召見便殿賜坐應對稱旨禮遇優渥欲留主京剎師力辭命中官送還九峯二十九年御製懷僧無念詩文一軸并松實松華復命中官賷送諭慰彌至敕曰前者僧無念戒行精於皎月定慧穩若巍山暫來一見此去常懷懷之不已遣人就見特以松實松華供之兼以詩文勞之師亦以偈進曰萬機之暇究真玄百艸頭邊佛祖禪毛孔徧含塵剎土毫端現出性中天定回坐看雲橫谷行樂閒觀石湧泉林下衲僧何以報祝延聖壽萬斯年中官回奏上大悅永樂三年一日集眾說偈曰世尊七十九無念八十年踏翻華藏海依舊水連天泊然而逝奉全身塔於師子岩海舟慈禪師居士沈貫問修多羅教如標月指若復見月了知所標畢竟非月此理如何師舉手曰指耶月耶士罔措師拍案一下士釋然有省果林首座僧參次師擲下蒲團曰汝試道看僧曰只此消息本無言說破蒲團上地迸天裂師曰且道裂箇甚麼僧擬議師便打金山濟禪師法嗣杉關福田西竺本來禪師崇仁裴氏子七歲出家於觀音寺年十三遂參一峯執侍七載忽有省復見慈舟於金山禮拜起便問某甲拏得賊來請和尚斷舟曰贓在何處師拍案一下舟便喝復舉香嚴上樹話反覆徵詰遂承印可初住劍江壽聖寧藩致書聘師三往返不赴僅答問道書授慧光普照頓悟圓通之號永樂四年眾請開法壽昌上堂拈香畢乃曰天日高明暑漸隆榴華噴火耀庭中衲僧眼裏真機露無位真人覿面逢直下知端的擬議隔千重要達己躳事黃龍最上峯便下座後往閩之杉關重開福田一日忽索筆書偈曰者箇老乞兒教化何時了顛顛倒倒任隨流是聖是凡人莫曉咄來來來去去去海湛空澄風清月皎書畢趺坐而逝世壽六十八僧臘五十五奉全身於法堂供養天界俊禪師法嗣東普無際明悟禪師蜀之安岳通賢鎮莫氏子年二十棄家初未遇人習坐禪入定工夫後往樓山訪清菩薩清舉趙州無字話師當下有省自此靠箇無字如一座須彌山相似行住坐臥常在定中一日坐次忽然光明洞照無一毫可得占偈有虗空包不住大地載不起之句西江悟首座指見無念會念謝世遂參古拙禮拜次拙謂侍者曰者僧有福德相拈拄杖靠椅坐命師供說行脚師為直敘拙曰你且去我不知你者樣工夫一日復上方丈拙震聲一喝拈拄杖作打勢師呈身就棒拙曰我棒頭有眼不打者般死漢拽拄杖便出師拱立不動拙復還坐驀劄問曰大地平沉你在甚麼處師曰全露法王身拙曰萬法歸一一歸何處速道速道師曰不道拙曰因甚不道師曰亙古亙今拙曰亙古亙今即且置你在西川什麼物恁麼來師不語良久拙曰啞子得夢向誰說一日拙為更號無際師曰恁麼則無際亦未在天下老和尚盡向者裏成道歷代祖師盡向者裏成佛即今有說佛說祖底出來盡教遣出門去不如某甲者裏打睡拙笑曰者漢此後不受人瞞去也師嘗有走馬燈偈曰團團馳走不停留無箇明人指路頭滅却心中些子火刀鎗人馬一齊休後有法嗣七人有付法偈曰我無法可付汝無心可受無付無受心何人不成就杭州虎跑性天如皎禪師四明周氏子從正菴中芟染往謁古拙一夕推簾見月有省乃曰元來恁麼翌旦趨見拙便震聲一喝拙曰如貧得寶邪師曰寶即不得得即非寶拙曰憑何如是師趨前問訊叉手而立拙曰還我向上一句來師便掩耳而出復呈偈曰午夜推簾月一灣輕輕踏破上頭關不須向外從他覓只麼怡怡展笑顏拙為助喜後住武林虎跑臨終示眾曰文章佛法空中色名相身心柳上煙唯有死生真大事殷勤了辦莫遷延大眾且道如何了辦良久曰吾今無暇為君說聽取松風㵎水聲語畢而逝何密菴居士法嗣揚州素菴田大士僧問補陀路向什麼門出士曰上座即今從什麼門入僧曰抑勒人作麼士曰看脚下僧擡頭進前三步士曰錯僧便退後三步士曰且道是你錯是我錯僧曰未舉已前早知錯了也士曰正好喫棒僧無語士曰若到諸方分明舉似示眾曰近來篤志參禪者少纔提箇話頭便被昏散二魔纏縛殊不知昏散與疑情正相對治信心重則疑情必重疑情重則昏散自無大鑑下第二十七世鄧尉持禪師法嗣杭州東明虗白慧旵禪師族王氏祖貫湖廣父為丹陽稅課司遂家焉幼穎悟不類常兒年十四往從玅覺湛然受業一日作務次然問汝在此作什麼師曰切蘿蔔然曰你只會切蘿蔔師曰也會殺人然引頸師曰降將不斬然異之會然遷撫之疎山師聞唯菴唱道松隱將往見至一小菴自誓曰此行若不徹證決不復回一定六日忽舉首睹松豁然有省遂返晝夜危坐端如銕幢諸方因號旵銕脊後抵姑蘇鄧尉謁果林指令參寶藏具述悟由藏曰佛法如大海相似轉入轉深那裏泊在者裏一日室中侍立次藏問心不是佛智不是道汝云何會師向前問訊叉手而立藏呵曰汝在此許多時猶作者般見解師遂發憤寢食俱廢至第二夜驀然徹證述偈曰一拳打破太虗空百億須彌不露踪借問箇中誰是主扶桑涌出一輪紅藏笑曰然雖如是也須善自護持時節若至其理自彰師受囑辭去於天目之平山堂結侶坐千日長期後遊安溪古道山峯巒秀拔遂有終焉之志一住三十載影不出山道風遠播宿衲爭趨座下拓基營繕成大精藍宣德乙卯敕頟東明禪寺復命度僧以奉香火檀施委積師復損餘貲重修淨慈大殿辛酉六月一日忽集眾敘謝訣別眾請偈師曰一大藏教無人看著爭用得者幾句閒言語跏趺而逝茶毗舍利無筭塔於東塢世壽七十僧臘五十有五國子祭酒胡公濙為之銘福田來禪師法嗣建寧府天界雪骨會中禪師大闡參次師問從何處來闡曰逼塞虗空都無來去師曰既無來去阿誰拕皮袋到者裏闡曰內外俱空皮袋何有師曰如何是祖師西來意曰西來豈有意邪師曰臘月三十日到來向何處安身立命曰信脚踏翻乾坤獨露師乃示以偈曰的是金毛親出窟法輪掉轉入廛來一聲驀地遙空吼野犴聞之腦裂開東普悟禪師法嗣舒州投子楚山幻叟荊璧紹琦禪師蜀之唐安雷氏子年九歲從玄極通受業首參無際一日聞板聲有省復徧叩月溪海舟諸老咸稱賞之正統六年再參無際際問數年以來在什麼處住師曰廓然無定際曰有何所得師曰本自無失何得之有際曰者是學得來底師曰一法不有學自何來際曰莫落空耶師曰我尚非我誰落誰空際曰畢竟事作麼生師曰水落石出雨霽雲收際曰莫亂道只如佛祖來也不許縱爾橫吞藏海現百千神通到者裏更是不許師曰和尚雖則把住要津其柰勞神不少際拍膝一下師便喝際曰克家須是破家兒恁麼幹蠱也省力師掩耳而出至晚復召師詰曰汝將平昔次第發明處說來看師從實具對際曰還我無字義來師呈偈曰者僧問處偏多事趙老何曾涉所思信口一言都吐露翻成特地使人疑際曰如何是汝不疑處師曰青山綠水燕語鶯啼歷歷分明更疑何事際曰未在更道師曰頭頂虗空脚踏實地際乃鳴鐘集眾𢍁以袈裟拂子後出世天柱僧問如何是天柱境師曰㵎闊雲歸晚山高日出遲曰如何是境中人師曰頟下眉遮眼腮邊耳搭肩曰如何是天柱家風師曰雲甑炊松粉冰鐺煑月團曰如何是祖師西來意師曰海神撒出夜明珠曰學人不會師曰文殊失却玻璃盞問如何是佛師曰生銕秤鎚曰如何是法師曰石頭土塊曰如何是僧師曰黑漆拄杖景泰五年遷投子上堂僧問遠離皖山來據投子海眾臨筵請師祝聖師曰鼎內長生篆峯頭不老松曰祝聖已蒙師的旨投子家風事若何師曰提瓶穿市過不是賣油翁曰只如祖師道不許夜行投明須到還端的也無師曰雖然眼裏有筋爭柰舌頭無骨曰趙州道我早猴白渠更猴黑意作麼生師曰不因弓矢盡未肯豎降旗問和尚今日陞座說法未審有何祥瑞師曰麒麟步驟丹青外優鉢華開烈焰中曰如何是祖師西來意師曰雪消山頂露風過樹頭搖問寶劍未出匣時如何師曰神號鬼哭曰出匣後如何師曰佛祖吞聲曰出與未出時如何師曰無鬚鎖子兩頭搖僧提起坐具師便喝僧擬議師便打乃曰毒蛇頭上揩痒猛虎口裏橫身也須是恁般人始得適來者僧大似一員戰將敢來者裏奪鼓攙旗惜乎龍頭蛇尾死在棒下若解轉身活路自然不犯鋒鋩所以道弄蛇須是弄蛇手不會弄蛇蛇齩殺復舉法燈示眾山僧本欲深藏岩穴隱遁過時葢為清凉老人有未了公案不免出來為渠了却時有僧問未審清凉老人有甚不了公案燈拈拄杖便打曰祖禰不了殃及兒孫僧曰過在甚麼處燈曰過在我殃及你師曰大凡宗師出世先要拈出己見然後方可定斷古今看他法燈如此作略美則美矣了則未了幻叟今日亦為蠶骨老人有未了公案出來為渠了却若有問蠶骨老人有甚不了公案應聲便喝眼目定動連棒打出大眾山僧恁麼提持且道與法燈用處還有優劣也無若緇素得出許他是箇同參上堂拈拄杖只者些子誵譌多少師僧到者裏開口不得思量不及舉揚不出即今落在山僧手裏橫也由我豎也由我提起放下卷舒殺活總由我以拄杖空中點一點曰正當恁麼時從上佛祖天下老和尚到者裏只得乞命有分眾中莫有為佛祖出氣者麼良久卓拄杖一下𭣟瞎金剛正眼靠倒空王寶座汝等諸人討什麼盌便下座上堂眾集師斂衣就座良久曰大眾分明記取便下座示眾選佛場開定祖機辨明邪正在鉗鎚禹門浪暖風雷動正是魚龍變化時眾中莫有衝波激浪者麼良久以拂子打圓相機先一著覿面全提擊禪牀一下句外一言和聲揭露不許停思顧佇那容擬議分疎眨得眼來劍去久矣縱饒佛祖到來也只攢眉有分何故葢為非言路可通非心識可測若是英俊衲僧向未舉以前便當點首一笑猶較些子近世人心不古學者不務真參實悟惟是接響承虗以學識依通為悟明穿鑿機緣為參究破壞律儀為解脫夤緣據位為出世以致祖風彫獘魔說熾然塞佛祖之坦途瞽人天之正眼使吾祖教外別傳之道於斯委地大覺世尊於二千年外早已識得眾生心病預設多方曲垂規則故曰末世眾生希望成道無令求悟惟益多聞增長我見又曰眾生未悟作何方便普令開悟所以結制安居尅期取證過三期日隨往無礙故知解結之有時也諸大德於九十日中還曾證悟也無已悟者且置勿論如或未悟則此一期又是虗喪了也若是真正道流以十方法界為圓覺期場無論百日千日結制解制但以舉起話頭為始一年不悟參一年十年不悟參十年乃至二十年三十年盡平生不悟決定不移此志直要見箇徹頭徹尾真實究竟處方是放參之日所謂一念萬年豈虗語哉豎起拂子諸大德還知落處麼幻叟今日不辭饒舌更為諸人下箇註脚猛火鑄成金彈子當機揑碎又渾圇等閒得失俱拈却風送潮音出海門師到菜園見冬瓜問園頭者箇無口因甚長得如許大頭曰某甲不曾怠惰一時師曰主人公還替你出些力氣也無頭曰全承渠力師曰請來與老僧相見頭便禮拜師曰者猶是奴兒婢子在頭轉身拈篾縛架師乃呵呵大笑回顧侍者曰菜園裏有蟲性空首座請益蒙山三關語曰蟭螟蟲吸乾滄海魚龍蝦蟹向何處安身立命師曰長安路上金毛臥曰水母飛上色究竟天入摩醯眼裏作舞因甚不見師曰五鳳樓前銕馬嘶曰蓮湖橋為一切人直指明眼人因甚落井師曰明月照見夜行人曰請師頌出師曰好與痛棒曰棒則甘領頌則乞師不吝師乃大笑頌曰當機把斷聖凡津擬議知渠屈未伸欲識蒙山端的旨垂鉤意在釣金鱗天順改元由匡廬歸蜀韓都侯於方山建雲峯寺迎師住持成化九年三月望示微疾眾請末後句師展兩手曰會麼復曰今年今日推車撞壁撞破虗空青天霹𮦷阿呵呵泥牛吞却老龍珠澄澄性海漚華息泊然而逝世壽七十僧臘六十一雲南府古庭善堅禪師本郡昆明人首參無際示萬法歸一一歸何處話苦心窮究十載方得透脫後於隆恩求際印證際曰子見處如何與老僧不同師展兩手曰者箇非別際頷之一日辭際際曰甚處去師曰十字街頭訶佛罵祖去際曰子還來否師曰不違和尚尊顏禮拜便行初遊金臺止大容山復南還住金陵天界遷皖桐浮山示眾舉汾陽無業禪師曰古德道人得意後茅茨石室向折脚鐺煑飯喫過二三十年名利不干懷財寶不為念大忘人世隱跡岩叢君王召而不來諸侯請而不赴豈同吾輩貪利愛名汩沒世途如短販人有少希求而忘大果師曰誠哉是言我等惟掠虗頭妄自尊大無明三毒潛結於心逆惡境緣知無解脫據實而論且莫管你是知識非知識除却一切施為動靜語默文字生死到來畢竟作麼生脫去不得認著箇死搭搭向良久處妄想不得執著箇轉轆轆向活脫處狂蕩但有絲毫差別見覺直饒脊梁生銕鑄就機辯懸河瀉水未免閻老子打入阿波波阿吒吒八寒八熱萬死萬生灼然灼然擊拂子昨夜蟭螟吞六合虗空撲碎落岩前復召大眾珍重後歸昆明古庭示寂古庭與盤龍南北竝峙至今二大士肉身存焉素菴田大士法嗣佛跡頤菴真禪師示眾青山疊疊綠水滔滔於斯會得獨步高超雖然也是尋常茶飯古人道欲窮千里目更上一層樓機不離位墮在毒海語不驚羣陷於流俗若向擊石火裏辨緇素掣電光中明殺活可以坐斷千差壁立萬仞諸兄弟還知有恁麼時節也無今時諸方說禪浩浩盡謂脚跟點地鼻孔撩天究竟具正眼者落落罕聞所以偏正不一各立異端堅執己解弗通實理所謂正法難扶邪說競興古人道信有十分則疑有十分疑有十分則悟有十分可將盡平生眼裏所見耳裏所聞惡知惡解奇言玅句禪道佛法貢高我慢等心徹底傾瀉莫存毫末只就未明未了公案上距定脚跟豎起脊梁無分晝夜無參處參無疑處疑直得東西不辨南北不分獃樁樁地却如箇有氣底死人相似心隨境化觸著還知打破髑髏不從他得豈不慶快平生者哉大鑑下第二十八世東明旵禪師法嗣金陵東山翼善海舟永慈禪師成都余氏子生于洪武二十七年幼孤見僧輒喜一日聞生死事大發心出家奮志訪尋知識首見太初問父母未生前那箇是汝本來面目師即從東過西叉手而立初曰不是不是師曰兩眼對兩眼宣德二年出峽遊燕京南還至武林謁東明問無相福田衣何人合得披明便掌師曰作麼明又掌師曰一掌不作一掌用又如何明復掌師曰老和尚名不虗傳大展具三拜未幾復遊金陵正統二年太監袁誠欽師道德請師開法翼善五年五月二十九日東明專僧送衣拂至有偈曰分付慈海舟訪我我無酬明年之明日西風笑點頭明年東明如期示寂水心月江覺淨禪師姑蘇沈氏子十五歲往從古拙芟染永樂壬寅參峴山宗後見東明親依最久一日問明如何是祖師西來意明曰你那裏去來師進前曲躬曰那裏去來明便喝師亦喝明便打後菴居天目天順間遷里之水心成化己亥正月十九日戒飭徒眾說偈而逝壽七十九臘五十一天界中禪師法嗣邵武府君峯大闡慧通禪師建寧邵氏子從斗峯祝髮往參雪骨中一夕有省即說偈曰手把清風斧毗盧頂豁開三千諸佛祖一串穿將來旦詣丈室見中中曰還我話頭來師復說偈曰坐斷恒沙界全心一物無浮雲都散盡獨耀一輪孤中印可之後住君峯弘治十四年二月十七日集眾說偈曰人生七十古來稀更添一歲也希奇若問老僧何處去虗空獨露笑嘻嘻沐浴更衣趺坐而逝投子琦禪師法嗣金陵高座古溪覺澄禪師蔚州人從雲中天暉昶芟染閱大藏歷五寒暑於大慧錄中無字話染指乃叩月溪復往投子見楚山親炙久之得盡其旨隱於固始之南山有年天順間住金陵高座結制小參三條椽下坐堆堆把定身心若死灰撥出爐中些子火驚天動地一聲雷還有不惜眉毛者麼良久乃曰有時三世諸佛與火爐說法覓火和煙得有時火爐說法三世諸佛諦聽擔泉帶月歸於斯會得芥子納須彌也得須彌納芥子也得正眼觀來兩箇火爐三世諸佛結住於青州布衫一粒芥子百億須彌收歸於雲門胡餅兩堂雲水穿又穿不得齩又齩不得大眾正當恁麼時畢竟作麼生還會麼眉間拶出金剛焰露柱燈籠盡放光成化癸巳八月九日沐浴更衣集眾訣別端坐而逝少頃眾泣師復開目曰不須如是復瞑目襄陽府大雲興禪師久侍楚山一日山出郡歸眾途迎山曰我不曾下山亦未嘗出郡且道甚處去來師曰大眾久立請和尚回寺山曰那裏是寺師曰鐘聲響得好山呵呵大笑師便禮拜後山付偈曰躬自西州定宗旨親從投子付袈裟他年出世提綱要不立孤危是作家𣵠州金山寶禪師參楚山楚問曰面南看北斗且道明甚麼邊事師曰和尚合取口好楚曰未在師曰瞞別人即得楚曰如何是透關眼師振聲一喝楚曰向上一機又作麼生師曰青天日卓午楚曰未夢見在師曰木童拈玉綫石女度金鍼楚曰轉身一句速道速道師曰雨添山色秀風來竹影移楚拈拄杖師便喝拂袖而出楚曰放汝三十棒師轉身作禮曰謝和尚慈悲楚曰子雖有滔天之浪且無湛水之波師俛首默然楚深肯之唐安湛淵奫禪師參楚山親依最久一日入室次山問如何是至理一言師曰有口說不得山曰松風流水為什麼却說得師曰為渠無口山曰你道他說些什麼師曰和尚適來問甚麼山曰祇如絕音響處還有說也無師曰有則灼然有只是聞不及山曰聞即且置你道他說箇甚麼師乃豎起拳頭山曰還有聞得及者麼師以手指香爐曰是渠却聞得山曰因甚渠却聞得師曰為渠有耳山曰汝亦有兩耳為甚聞不得師曰雖然聞不得瞞他一點不得山曰放汝三十棒師便禮拜石經海珠祖意禪師掩關次一日楚山到關前擊門一下曰請關中主相見師斂手鞠躬而立山曰趙州無字作麼生師曰只為婆心切肝膽向人傾山曰不涉有無時如何師曰某甲到者裏却不會山曰待汝出關與汝一頓師曰某甲即今亦不在關內山指關問曰爭柰者箇何師便喝山曰天氣炎烝善加保護師便禮拜長松大心真源禪師三池張氏子謁楚山問曰從上佛祖言不及處行不到處請師直指山拈拄杖曰聻師便喝山便打師又喝山又打師便禮拜一日室中侍立次山曰向父母未生前道一句來師曰道不得山曰因甚道不得師曰他沒口山曰又道沒口師曰謝師答話松藩大悲崇善一天智中國師彭縣人體貌奇異年十二從月光受業後居松藩一日楚山過其廬師述悟由山曰如何是無字意師曰出匣吹毛劍寒光射斗牛山曰趙州因甚道無師曰波斯嚼冰雪不覺齒牙寒山曰拈過有無如何湊泊師曰夜深誰把手同共御街遊山曰向上奇特一句作麼生師曰秋夜家家月春來處處華一雙清白眼何用撒泥沙山印可之石經豁堂祖禪師成都巨氏子久從楚山遊一日山閱經次師詣前曰和尚看底是什麼山便喝曰你道是什麼聻師亦喝山舉起經曰百千三昧無量玅義皆從者一卷經流出且道者一卷經從甚處得來師彈指一下山便休去三池月光常慧禪師簡州李氏子參楚山山曰久聞上座嘗覧大藏是否師曰和尚莫謗某甲好山曰白底是紙黑底是墨畢竟如何是經師曰和尚莫要不本分山曰作麼生是不本分底道理師曰經聻山曰似即似是即未是師便禮拜中溪隱山昌雲禪師參楚山山問汝名甚麼師曰昌雲山曰號聻師曰隱山山曰雲在山中隱如何又出山師曰只因夜來鶴帶過嶺頭關山曰或為霖雨時如何師曰徧潤寰區山曰忽被猛風吹散時如何師曰依舊青天白日山呵呵大笑珪菴祖玠侍者一日病次楚山往視值心上座來山顧師問曰如何是心師曰開口不容情山曰未在師返顧心曰何不禮拜和尚心便就禮一拜山休去後病革有痛苦聲山曰平日得力句到者時節還用得著麼師點首山曰既用得著又叫喚作麼師曰痛則叫癢則笑山曰只如三寸氣斷向何處安身立命師曰雨過天晴青山依舊山曰從今別後再得相見否師曰曠劫不違今何有間山曰恁麼則子不曾病耶師曰病與不病總不相干山復執其手曰者是甚麼師便合掌曰某當行矣振身端坐而逝翠微悟空禪師關西人久依楚山一日入室次山問踏翻大地無寸土徹底窮源事若何師曰有星皆拱北無水不朝東山曰還假履踐功用也無師曰履踐則不無功用即不可得山曰只箇不可得處亦不可得子又作麼師擬進語山震威一喝師曰恩大難酬便禮拜雲南堅禪師法嗣五臺山顯通大巍淨倫禪師雲南康氏子生於宣德丁未正統間從無極泰芟染古庭居浮山師往叩室中機契後住顯通上堂無孔銕鎚當面擲黑漆崑崙攔路坐莫有挨拶得入拈弄得出底出來道看僧問如何是臺山境師曰不是天晴便是下雨曰如何是境中人師曰金剛窟裏萬菩薩曰未審尋常所說何法師曰清風吹幽松近聽聲愈好問如何是佛法的的大意師曰今年調雨水農家好春麥問如何是祖師西來意師曰待飯僊山轉身即向汝道乃曰拈砒霜作醍醐亦曾有也撒珍珠如瓦礫誰箇不然開眼上樹特地喪全身夢昇兜率也是揚家醜未動情思轉魔女盡成菩提寶器不勞腕力指娑婆便為玅喜淨長水濬岳積而來瑯琊覺冰消而去信脚踏翻瑠璃穽等閒擊碎珊瑚枝上堂三聖震威一喝正法眼裏撒沙南泉白刃高揮古佛家風掃土何必不必探竿豈在人手湘南潭北塔樣脫體持來不萌枝上放春回烈焰堆中飛片雪有斯作略可謂其人誰家井底無天到處波心有月上堂體相用三大齊彰塵塵攝入因果智五周頓證法法圓融百城煙水不出一毫十世古今匪移當念紅蕅華開水香觸著蟭螟蟲半邊鼻青山低處天闊展開瘦蚊子一莖眉百川競注而水體不流萬竅共號而風本自寂金師子不勞踞地水牯牛隨分納些動容滿目家山依舊青天白日冬至示眾五頂瓊瑤堆千松珠玉枝盡臺山泉石煙雲飛樓涌殿總是文殊一隻智眼真光是汝諸人常在於其中經行及坐臥還知從不曾動著渠一莖眉毛麼若也與麼見得便爾攝大千於毫端廣塵沙於法界其或未然切忌東卜西卜老僧為汝諸人真實告報今朝冬至一陽生珍重示眾山高海闊月朗風清松蒼石白夏暑冬寒如是歷歷分明一一成現且道衲僧分上成得箇甚麼邊事莫有道得者麼不妨出來道看若無老僧自道去也拈拄杖便下座示眾演祖道有則奇特因緣舉似諸人欲說又被說礙不說又被不說礙大小演祖大似靈龜曳尾一言既落人耳如何諱得老僧也有一則奇特因緣索性舉似大方令他倚門傍戶者一箇箇壁立千仞便下座示眾老僧者裏也不說東村李大郎太儉也不說西社王二姊太奢也不會安角呼兔也不會添足畫蛇早起一盂白粥午後一盌清茶誰管他陳年爛葛藤冷地開華展兩手曰汝等諸人來者裏討甚麼乾木查師有山居吟無事山房門不開土堦春雨綠生苔此心將謂無人委幽鳥一聲何處來後示寂於本山大岡澄禪師法嗣杭州天真毒峯本善禪師祖貫鳳陽吳氏父宦遊廣東雷陽而生年十七出家初遇源明和尚示無字話師當下便能領解舉似明明曰我二十年看箇無字如蚊子上銕牛子纔學做工夫便有許多知見復曰觀子根器有異於人切莫途中被人哄去作長老悞汝大事師蒙誨即發願一味拍盲做工夫自誓此生以悟為期慕無際道風入川參叩會際蒙召赴京遂掩關不設臥具惟置小凳昏重并去凳一日聞鐘聲有省說偈曰沉沉寂寂絕施為觸著無端吼似雷動地一聲消息盡髑髏粉碎夢初回再往謁際適際遷化遂求證於月溪溪曰佛法不是鮮魚怕爛却那日惟東敲西擊暗垂勘驗一日侍溪園中坐次溪曰你向來無甚麼話頭師曰無字溪曰如何是無字師曰如今看來恰似口金剛王寶劍溪曰如何是金剛王寶劍師曰寒光焰焰耀古騰今溪曰還我劍來師曰擬動則犯他鋒鋩溪曰橫按當軒時如何師曰佛來也殺祖來也殺溪曰老僧來聻師曰亦不相饒溪曰殺後如何師曰且喜天下太平溪曰畢竟如何是無字意師曰贓賊分明溪曰賊即且置還我贓來師曰六六三十六溪曰未在更道師曰夜短睡不足日長饑有餘溪曰牛過櫺頭角四蹄都過了因甚尾巴過不得師曰了無一法當情瞥爾通身露地溪曰你即今向甚麼處安身立命師曰何處不稱尊後辭溪遊浙中掩關於天目之萬峯菴月溪亦蒙旨欽賜歸金陵大岡遣書召師付囑師適因事他出溪臨委息命送衣拂𢍁之師住山凡四十餘載天順間建西湖之三塔洎天目之招明吳山之寶蓮南山之甘露成化初掩關石屋後住天真僧問如何是和尚家風師曰前江潮急魚行澀後嶺峯高鳥泊難僧請益高峯和尚示眾曰海底泥牛銜月走岩前石虎抱兒眠銕蛇鑽入金剛眼崑崙騎象鷺鷥牽此四句內有一句能殺能活能縱能奪若人檢點得出一生參學事畢未審是那一句師曰待汝悟即向汝道僧曰不會師曰不見道你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子普說略曰寶劍全提日用中高揮大抹肯從容卷兮魂膽迎風喪舒也髑髏徧地橫萬死萬生渾不顧一鎗一騎便收功趙州性命分明也血刃參天不露鋒以拂子拂一拂虗空廓徹無消息萬里無雲天漢碧拶得須彌入蕅絲彌勒釋迦齊叫屈倒騎銕馬逐西風驚得泥牛從海出諸仁者若作奇特會孤負己靈不作奇特會抱贓叫屈且作麼生會解藏天下於天下始見林梢挂角羊壬寅示寂於天真塔建本山五臺山普濟孤月淨澄禪師西河張氏子首參月溪令看趙州無字話三日有省溪異之復入蜀謁廣福福問大死底人却活時如何師曰眉毛眼上橫鼻孔大頭垂曰如何是無字意師曰風行艸偃水到渠成曰大地平沉虗空粉碎汝向何處安身立命師曰雲消山嶽露日出海天清天順改元還清凉代王延詣內掖問道尊禮之令旨建寺於華嚴谷頟曰普濟命師住持師嘗有山居偈曰寰中獨許五臺高無位真人伴寂寥一任諸方風浩浩常空兩眼視雲霄甘貧林下思悠悠竹榻高眠石枕頭格外生涯隨分足都緣胷次略無求自住丹崖綠水傍了無榮辱與閒忙老僧不會還源旨一任青山青又黃深隱岩阿不記年名韁利鎖莫能牽七斤衫子重聯補日炙風吹愈轉鮮颯颯春風和鳥哀清音直到耳邊來爐燒柏子端然坐對月殘經又展開後坐脫於本山夷峯寧禪師付法偈曰祖祖無法付人人本自有汝證無授法無前亦無後廣善潭禪師法嗣鳳陽府槎山護國無用文全禪師濟南商河劉氏子年十九投靈岩祝髮初見月天蒙示法要次參別傳有省入傳問虗空粉碎大地平沉汝在甚麼處安身立命師曰昨夜泥牛吞浩月今朝木馬吐清風傳曰一歸何處聻師曰一自白牛歸雪嶺直至如今不見踪傳頷之復往金山謁無極囑師見寶月月問有艸鞋錢麼師曰青山不露頂月曰如何是應物現形師曰孤光明月普天輝萬象森羅全體現一日月入堂坐次叫曰寒寒師便搬火爐向前月曰如何是火爐邊事師敲火爐三下月微笑而出入室次月拈拄杖曰者是拄杖子且道主在甚麼處師奪拄杖擲地叉手而立月曰看者漢撞却拄杖子了也師拂袖便出後蒙印可出世槎山上堂法不孤起仗境方生道本無言因言顯道今來龍象交參諸山共處此非小緣感皇上之洪恩賢士大夫之佑護檀那喜捨僧眾清修安立禪期助斯聖化命山僧光揚宗眼令末運得種福田然雖如是猶未是衲衣下事在且道作麼生是衲衣下事僧問三乘即不問直指事如何師曰雙峯頂上鶴棲樹九龍山下鳥啼華曰西來祖意蒙師指東土相傳事若何師曰嶺上有風千古秀㵎邊流水萬年清問如何是白水境師曰一片荒田堆四野三間茅屋壯諸山曰如何是境中人師曰白虎頭邊天子廟黑龍潭上帝王基曰人境兩忘時如何師曰蘇武不知青羝意七郎常恨白鴉歸僧禮拜師拍案一下下座崇福大慧覺華禪師維揚劉氏子初見海舟有省復參寶月於繁昌遂蒙印證住後上堂舉拂子威音那畔只是者箇如今目前也只是者箇若喚作拂子瞎却人天眼目不喚作拂子瞎却人天眼目大眾畢竟喚作甚麼若也直下見得便知迦葉微笑二祖覓心了不可得紹如來傳燈續祖宗正脈良久曰千聖不能識以拂子擊香案一下菴真禪師法嗣處州白雲無量滄禪師示眾二六時中隨話頭而行隨話頭而住隨話頭而坐隨話頭而臥心如栗棘蓬相似不被一切人我無明五欲三毒之所吞噉施為動靜通身是箇疑團疑來疑去終日獃椿椿地聞聲見色管取㘞地一聲去在和菴忠禪師法嗣明州用剛宗軟禪師示眾大凡做工夫只要起大疑情不失正念千疑萬疑祇是一疑纔有間斷即落空也見汝等做工夫未曾半月一月打成一片焉得不走作果若真疑現前撼搖不動自然不怕惑亂又不得起一念歡喜心纔有絲毫異念即打作兩橛只管勇猛忿將去終日如箇死漢子相似到者般時節那怕甕中走却鼈大鑑下第二十九世金陵慈禪師法嗣金陵高峯寶峰智瑄禪師天琦參師問甚處來琦曰北京師曰只在北京為復別有去處琦曰隨方瀟灑師曰曾到四川麼琦曰曾到師曰四川境界與此間如何琦曰江山雖異雲月一般師舉起拳曰四川還有者箇麼琦曰無師曰因甚却無琦曰非我境界師曰如何是汝境界琦曰諸佛不能識誰敢強安名師曰汝豈不是著空琦曰終不向鬼窟裏作活計師曰西天九十六種外道汝是第一琦拂袖便出師以偈付曰濟山棒喝如輕觸殺活從茲手眼親聖解凡情俱坐斷曇華猶放一枝新廬山雲溪碧峯智英禪師少壯苦不識字𣆶年信口成章時多稱之囑門人智素偈曰見徹孃生親面目從今保守者天真爪牙養就崢日哮吼一聲百獸驚夷峯寧禪師法嗣杭州天目寶芳進禪師付法偈曰真性本無性真法本無法了知無法性何處不通達
