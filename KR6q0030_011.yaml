body:
  text: 明嗣祖沙門東吳通問編定笠澤居士華亭施沛彚集曹洞宗大鑑下第十六世淨慈暉禪師法嗣常州華藏明極慧祚禪師舉洞山冬夜喫果子公案頌曰洞山果子誰無分掇退臺盤妙轉機今夜為君輕點破牡丹華下睡貓兒雪竇宗禪師法嗣泰州廣福微菴道勤禪師郡之俞氏子上堂舉僧問同安如何是和尚家風安曰金雞抱子歸霄漢玉兔懷胎入紫微曰忽遇客來將何祇待安曰金果早朝猿摘去玉華晚後鳳銜來師曰廣福則不然有問如何是和尚家風只向他道翠竹叢邊歌欵乃碧巖深處臥煙蘿忽遇客來將何祇待沒底籃兒盛皓月無心碗子貯清風善權智禪師法嗣越州超化藻禪師開爐上堂雪滿寒燒盡丹霞木佛冰膠野渡凍殺陝府鐵牛直得寒灰發焰片雪不留任運縱橫現成受用諸禪德還會麼衲帔蒙頭坐冷暖了無知天童珏禪師法嗣明州雪竇足菴智鑑禪師滁州吳氏子兒時母與洗手痬因問曰是甚麼師曰我手何似佛手早失恃怙依真歇於長蘆時大休居第一座深器之後隱象山深夜開悟求證於延壽復見大休住後上堂世尊有密語迦葉不覆藏一夜落華雨滿溪流水香大鑑下第十七世華藏祚禪師法嗣東谷光禪師上堂藏身處沒蹤迹無影樹頭靈鳥宅沒蹤迹處莫藏身不萌枝上春華坼有來繇誰辨的天曉西風拂拂吹松叉一徑爭拋擲雪竇鑑禪師法嗣明州天童長翁如淨禪師生而岐嶷不類常童長學出世法參足菴於雪竇看庭前柏樹子話有省呈頌曰西來祖意庭前柏鼻孔寥寥對眼睛落地枯枝才𨁝跳松蘿亮格笑掀騰菴頷之出世閲數剎後遷淨慈復奉敕升天童捧敕黃示衆曰雲開九天呈起日看彩鳳銜出且道如何委悉急急如律令敕開爐上堂召衆打圓相曰箇是天童火爐近前則燒殺退後則凍殺忽有箇漢出來道合作麼生㘞火爐動也上堂霜風號肅殺霜葉墮蕭騷舉拂子曰看唯有玲瓏崖嵬望轉高所謂天童滯貨今朝短販一遭莫有酬價底麼下座巡寮上堂外不放入內不放出痛下一槌萬事了畢且道如何太白峯前令斬新內外紀綱俱委悉進退兩序上堂開無間地獄現閻羅大王聚夜叉一部列牛頭兩行與其進者劍樹上猛火進用與其退者刀山裏寒冰退藏且道理會甚事叵耐飯飽弄筯判斷屎急尿牀其或未然華柳春風入戲場上堂天童鐵臭老拳頭打殺江湖水牯牛夜深忽然生箇卵天明推出大日頭且道如何曬朗諸人焏溼處免教行步滑如油謝造橋上堂去那邊去來者裏來中間絶壑斷崖且道如何相接以拂子作彎橋勢曰看依稀金磴闊倣佛彩虹彎人從橋上過又作麼生松蘿影裏開天巧翰墨光中入畫看上堂靈雲見處桃華開天童見處桃華落桃華開春風催桃華落春風惡靈雲且置莫有與天童相見底麼春風惡桃華躍浪生頭角新起妙嚴慶懺升座推倒多年老鼠窠掃空平地笑呵呵從空架起生頭角蓋覆驢牛不厭多今朝成就大緣千古發揮大事且道如何斫額任他門外客到家還我箇中人復舉文殊問無著近離甚處著曰南方殊曰南方佛法如何住持著曰末法比丘少奉戒律殊曰多少衆著曰或三百或五百師曰春風勾引鷓鴣啼著問文殊此間佛法如何住持殊曰龍蛇混雜凡聖交參著曰多少衆殊曰前三三後三三師曰平地波瀾鉤鐵船者兩轉語要與諸方眉毛廝結更有兩轉語要與諸方點眼或三百或五百銅錢鐵錢省數足百前三三後三三蘿蔔芋奶淺貯滿擔諸方忽然眼開決定拍手大笑笑箇什麼不笑巴叉便笑杜撰雖然笑者還稀忽有人問天童多少衆便向他道新起妙嚴誇第一一齊都在畫圖中師六坐道場未稟師承衆有是請師曰我待涅槃堂裏拈出果臨終拈香曰如淨行腳四十餘年首到乳峯失腳墮於陷穽此香今日不免拈出鈍置我住雪竇足菴大和尚并書辭世偈曰六十六年罪犯彌天打箇𨁝跳活陷黃泉咦從來生死不相干書畢泊然而逝塔全身於本山大鑑下第十八世天童淨禪師法嗣雪菴從瑾禪師因僧請益倩女離魂話師示以頌曰南枝向暖北枝寒何事春風有兩般憑仗高樓莫吹笛大家留取倚欄看按師嗣心聞賁系濟宗誤入此襄州鹿門覺禪師參長翁值翁上堂曰一箇烏梅似本形蜘蛛結網打蜻蜓蜻蜓落了兩片翼堪笑烏梅咬鐵釘師在衆中不覺失笑曰早知燈是火飯熟幾多時後承印可出住鹿門示衆曰盡大地是學人一卷經盡乾坤是學人一隻眼以者箇眼讀如是經千萬億劫常無間斷報恩秀曰看讀不易師嘗作五位頌曰正中偏月黑雲籠午夜天佛祖無蹤凡聖盡箇中誰辨往來源偏中正金井玉盤秋水冷海天紅日已生東餘輝不照毗盧頂正中來戴角披毛知幾回應物轉身全得妙雲收終不露崔嵬偏中至覿面誰能容擬議手提妙印不當風大用繁興豈凝滯兼中到無舌兒童方會道撥塵何處得逢源撒手回途還得妙大鑑下第十九世直翁舉禪師法嗣明州天童雲外岫禪師世居昌國生而身材眇小精悍有餘往從直翁和尚受業究明曹洞宗旨徹法源底出世慈溪石門歷象山智門遷郡之天寧升住天童師機用奔軼絶塵雖鶻眼龍睛亦無窺瞰分能巧譬傍引務欲俯就學者而曲成之洞宗之傳獨賴焉上堂閙市紅塵裏有閙市紅塵裏佛法深山岩崖中有深山岩崖中佛法山僧昨日出城閙市紅塵裏佛法一時忘却了也行到二十里松雲便見深山岩崖中佛法大衆且道如何是深山岩崖中佛法良久曰白雲淡佇出沒太虗之中青蘿夤緣直上寒松之頂謝首座書記藏主上堂以拂子打圓相曰摩訶衍法離四句絶百非又打一圓相曰禮之用和為貴先王之道斯為美又打一圓相曰摩尼珠人不識如來藏裏親收得諸人還見麼所見不同互有得失天童者裏毋固毋必師後示寂無餘資禪者率錢津送後事建塔葬於本山鹿門覺禪師法嗣青州普照一辨禪師精究教相旨趣後棄去往參鹿門得言外旨出世中都萬壽室中嘗設百問勘驗諸方一曰聲前薦得落在今時句後承當迷頭認影作麼生是空劫已前自己又曰二邊純莫立中道不須安且道什麼處相見得箇端的又曰回途轉位直須戴角披毛喚作畜生得麼又曰念念釋迦出世步步彌勒下生為什麼擬心即錯動念即乖又曰有口贊不舉無言心自明是則裂破虗空不是則鬼家活計上人端的處道將一句來如是憧憧籌室契其機者鮮焉師嘗作四賓主頌賓中賓天涯奔走幾經春負學論功日轉貧行海淵深須遍涉義天空闊不容塵賓中主衣穿瘦骨露無餘獨鎮寰區暉太初三尺匣中誅劍百篇囊裏薦賢書主中賓丹墀鞭靜九宮開萬里江山絶點埃脫却襴衫戴席帽聲聲只道那邊來主中主重岩幽邃鎖煙岑古洞龍吟霧氣深石女唱歸紅焰裏木人運步覓知音又頌浮山示投子十六題一識自宗問答休將句偈酬到頭佛祖一齊收九年面壁已多事立雪神光亦強求二死中活今時及盡更何親雲鎖幽岩凍鎖津堪羡嶺頭增意氣雪中獨綻一枝春三活中死合頭相似喜人情水月空華鏡象榮荒徑客迷芳草渡擬將石火當天明四不落死活到頭採汲不虗施運水搬柴自合時燕語未歸簾幕靜曉鶯啼處緑楊垂五背捨三峯華嶽總平治雪壓寒林折凍枝一念不生全體現纖毫才動落階墀六不背捨路闊巖高碧澗流山華開遍接雲樓雨餘何處鶯聲囀不顧殘春語未休七活人劍耳聽無如眼聽親南山下雨北山雲動容舉止方圓異大賞將軍不語勳八殺人刀凜凜霜風刮地生千山冰雪路難行未萌已落威音際才擬玄微墮穽坑九平常春來幽谷水泠泠䇿杖優遊傍釣汀好箇太平無事客汨羅未必獨惺惺十利道拔生少室靈山事宛然不曾談教不安禪回光一句超今古大丈夫兒誰後先十一言無過失默時似説説時無迷悟剛令與道疏莫謂人根有利鈍粗言細語不關渠十二透脫雪後風和曉霽天鶯啼華笑柳含煙鳳樓不宿桃源客半夜穿入市廛十三透脫不透脫劈箭機鋒著眼看當陽趂妙哂傍觀雲橫谷口迷巢鳥雪擁柴門去路難十四稱揚寒潭不與月為期萬古松聲韻不移眼聽耳觀如會得方知佛祖密傳持十五降句當臺明鏡影難藏露柱燈籠自舉揚千聖不曾留半偈少林已是不相當十六方入圓攜琴玉女夜歸時鳳轉丹霄入紫微香霧噴華煙靄重汀洲漁棹月依稀又五位頌曰正中偏斗柄初橫半夜前密室不燃龍鳳燭廣寒宮殿月當天偏中正木女手提無字印失曉崑崙暗皺眉自然羞覩秦時鏡正中來劍樹刀山也自摧玉馬嘶聲離月殿九重依舊鎖蒼苔偏中至大用縱橫無巧智漁歌樵唱謁金門太平不是將軍致兼中到頭角完全無異號脫珍著斃入來縱橫踏破今時道大鑑下第二十世天童岫禪師法嗣明州雪竇無印大證禪師族番陽史氏生於大德丁酉正月二十四日自幼穎異從昌國寺智節芟染受具山遊初謁荊石琬於圓通不契時雲外唱道天童師往依之一日入室次針芥相投遂命典藏復見中峯於天目雅相器重至正間詔天下名衲善書者書金字藏經師應詔事竣上賜織金屈眴之衣泰定初南還丞相脫歡公領行宣政院事起師出世衢之南禪為雲外嗣雲外嗣直翁舉直翁嗣東谷光東谷嗣明極祚明極嗣自得暉蓋隰州古佛之六世孫也繼領光孝遷信之祥符至正七年移越之定水閲九年遷雪竇上堂千説萬説不若覿面一見昨日二十九今朝七月一報汝參玄人光陰如箭疾娘生兩隻眼箇箇黑如漆急急急回頭看取天真佛良久曰是何面目下座巡寮喫茶上堂妙不妙衲僧鼻孔多無竅玄不玄剎竿頭上無青天志士寧容袖手良馬豈待加鞭全超棒喝不落蹄筌百鳥不來春又過岩房贏得日高眠居四年退歸定水之圓明菴明年辛丑九月二十一日示寂世壽六十有五闍維牙齒數珠不壞舍利明瑩建塔菴後普照辨禪師法嗣磁州大明寶禪師嘗作五位頌曰正中偏月鎖深宮午夜前燭殘人靜丹墀冷一片虗明照碧天偏中正曉天不挂秦臺鏡金烏才擬出扶桑依稀還被輕煙映正中來深夜寒梅雪裏開馥馥幽香無間斷頭頭觸處絶纖埃偏中至大用全彰無忌諱攜手相將賀太平熙熙風物從來異兼中到妙盡功忘非善巧枯木龍吟大地春靈根秀出寒巖草慈雲覺禪師普照室中垂問曰聲前薦得落在今時句後承當迷頭認影作麼生是空劫已前自己師曰半夜石人無影象縱橫誰辨往來源問不見一法始是半提作麼生是全提底道理師曰石馬驟千山問喫飯忘其飢力充忘其飽作麼是力充底人師曰巨靈擡手無多子分破華山千萬重問直得不恁麼來者猶是兒孫邊事如何是向上人師曰半夜烏雞雪裏啼問行玄體妙落在今時究理窮源關山萬里只如未知有底人如何趨向師曰牀窄先臥問迷時千卷少悟後一言多且道悟了底人如何履踐師曰出不由戶坐不當堂問岸如欲止先停棹車若不行須打牛如今打牛也車行也未師曰下載清風付與誰大鑑下第二十一世大明寶禪師法嗣太原府王山體禪師侍大明室中十年未嘗露圭角一旦辭去或問大明侍者何往明曰禪和家諸方來諸方去何介意哉又問參學何似明曰若道有參學栽他頭角若道無參學減他威光於是一衆方疑後蒙印許久隱西山府運兩衙請住王山師嘗謂衆曰師子有三種第一超宗異目第二齊眉共躅第三影響不真若超宗異目者見過於師堪為種草若齊眉共躅者減師半德落在今時若影響不真者狐犴猥勢羊質虎皮又曰既有尊貴之位須明尊貴底人須知尊貴底人不處尊貴之位方明尊貴不落階級五位頌曰正中偏夜深古殿鎖輕煙寂寂苔封塵不立密密光輝未兆前偏中正玉人不覩臨臺鏡子夜星河霧氣濃依舊青山不露頂正中來木人攜杖火中回趂起泥牛耕練色放教石馬步蒼苔偏中至轉側相逢全意氣交輝終不犯鋒鋩大用縱橫無變異兼中到明暗盡時光不照石女有智妙難窮解栽絶頂無根草仁山恆禪師久侍大明遂臻堂奧明付以衣拂師曰某甲不是恁麼人明曰不是恁麼人自不殃及渠師以法乳恩深僶勉而受明復囑曰汝既如是第一不得容易為人若輕脫躁進必有坎坷大鑑下第二十二世王山體禪師法嗣磁州大明雪巖滿禪師初見普照寶照曰兄弟年俊正須參叩老僧當年念念常以佛法為事師乃避席曰和尚即今作麼生照曰如生冤家相似師曰若不得和尚此語幾乎枉行千里照便下禪牀握師手曰作家那報恩秀曰死灰裏一顆豆𪹼復參王山得受記莂繼踵住持上堂舉洞山示衆曰秋初夏末兄弟東去西去直須向萬里無寸草處去良久曰只如萬里無寸草處作麼生去石霜曰出門便是草大陽曰直饒不出門亦自草漫漫地師曰三箇老漢雖然異口同音未免撞頭磕額何也一人大開口了合不得一人高擡腳了放不下一人緊閉門了出不去王山即不然遍十方界非外全在一微塵在一微塵非內遍十方界只者一微塵許也須及盡不可得向那裏安門甚處入草還會麼休侵洞嶺初秋草請看疏山臘月蓮僧問高郵定和尚透網金鱗以何為食定曰乾屎橛師聞之曰謝供養五位頌曰正中偏邃洞沉沉鎖翠煙午夜碧空清似鏡一輪明月上層巔偏中正欲曉雲濃封野景雪屋靈明夢未醒冥然又若寒宵永正中來木人攜錫下崔嵬縱橫不履今時地石徑祥蓮襯足開偏中至懶提妙印無真偽碧莎叢裏恣情眠一任岩前華雨墜兼中到突兀三光曾未照夢手敲空聽者稀迥然不墮宮商調勝默光禪師舉九峯不肯首座公案頌曰元座徒亡一炷煙九峯豈是抑高賢若將一色為承紹孤負先師不借緣示衆舉麻谷振錫話曰是無可是非無可非是非無主萬善同歸梟雞晝夜徒自支離我無三寸鱉得喚龜迦葉不肯一任攢眉大鑑下第二十三世雪巖滿禪師法嗣燕京報恩萬松行秀禪師河內解人也族姓蔡往從邢州淨土寺贇公芟染受具戒首參勝默令看長沙轉自己歸山河大地話經半載無所入默曰我只願汝遲會一日忽有省復舉玄沙未徹話有疑遂往叩雪巖於大明未逾月不覺伎倆頓盡因命掌記後承付囑尋還淨土闢萬松軒以自適耆舊敦請住持次遷中都萬壽承安丁巳詔住大都棲隱禪寺晚居報恩小參舉昔有跨驢人路遇衆僧問何往僧曰道場去人曰何處不是道場僧以拳毆之曰者漢沒道理向道場裏跨驢不下其人無語師曰人人盡道者漢有頭無尾能作不能當殊不知却是者僧前言不副後語汝既知舉足下足皆是道場何不悟騎驢跨馬無非佛事萬松要斷者不平公案不免更與華判一上喫拳沒興漢茅廣杜禪和早是不克己那堪錯怪他道場唯有一佛法本無多留與闍黎道唵護薩哩嚩金章宗詔師於內庭升座説法躬自迎禮聞所未聞契悟感慨賜錦綺大僧伽衣上堂蓮宮特作梵宮修勝境還須聖駕遊雨過水澄禽泛子霞明山靜錦蒙頭成湯亦展恢天綱呂望希垂浸月鉤試問風光甚時節黃金世界桂華秋閏四月旦上堂所謂道人者不知月之大小歲之餘閏山僧即不然今年三百八十四日前月大盡此月小盡即今閏四月一日辰末巳初忽有箇出來道通疏伶俐知時按節要且無道人氣息山僧不免以手掩鼻道退後退後作什麼聻道人氣息珍重示衆機輪轉處智眼猶迷寶鏡開時纖塵不立開拳不落地應物善知時兩刃相逢時如何回互示衆去即留住住即遣去不去不住渠無國土甚處逢渠在在處處且道是甚麼物得恁麼奇特示衆動則埋身千丈不動則當地生苗直饒兩頭撒開中間放下更買草鞋行腳始得示衆踏翻滄海大地塵飛喝散白雲虗空粉碎嚴從立令猶是半提大用全彰如何施設示衆向上一機鶴沖霄漢當陽一路過新羅雖然眼似流星未免口如匾擔且道是何宗旨師室中問僧洞山和尚道龍吟枯木異響難聞如何是異響僧曰不會師曰子善解龍吟僧問明與無明其性無二如何是無二之性師曰天曉不露問諸佛不出世為甚麼却向王宮生師曰青山常舉足曰亦無有涅槃為甚麼却向雙林滅師曰白日不移輪問撒手那邊底人為甚麼不居正位師曰大功不宰曰回頭者畔底人為甚麼不墮偏方師曰至化無為問向道莫去歸來背父如何得不背父去師曰切忌回頭問心心放下難如何是放下底人師曰擔取去問是處是慈氏無門無善財為什麼道琉璃殿上無知識師曰拆却殿了相見師於百家之學無不該通三閲大藏恆課華嚴入室弟子百二十人晚年退居從容菴示寂壽八十一大鑑下第二十四世報恩秀禪師法嗣西京少室雪庭福禪師太原文水張氏子生時有異徵八九歲一目十行鄉里有聖小兒之稱遭亂父兄離散煢然無依遇一老比丘諭師學僧曰汝能誦一卷法華則一生事畢矣師曰佛法止於此乎比丘驚異遂偕往仙岩謁休林古佛曰此兒龍象種也得侍巾瓶他日必成大器林納之乃為祝髮受具戒與雙溪同服勤七載時萬松住報恩師輒腰包獨往室中機契遂蒙印可復親炙數載後住少室世祖潛邸命師設大資戒會戊申詔住和林興國世祖即祚因論辨偽經師馳驛以聞火其書賜光宗正辨之號命即故里建精舍敕額曰報恩仍給田以飯衆時萬壽虗席衆復請師主之僧問如何是祖師西來意師曰待乳峯點頭即向汝道問如何是尊貴一路師曰漁歌驚起沙汀鷺飛出蘆華不見蹤師問僧道源不遠性海非遙且道在什麼處僧擬議師便喝晚年退居嵩陽乙亥七月二十日示微疾集衆書偈而逝世壽七十三僧臘五十二塔於所居之西隅大鑑下第二十五世少室禪師法嗣西京少室靈隱文泰禪師自幼穎悟過人從雪庭遊遂默契玄旨後繼領住持上堂塵劫來事只在於今河沙妙德總在心源試教渠覿面相呈便不解當風拈出且道過在什麼處卓拄杖曰只為分明極翻令所得遲太原府報恩中林智泰禪師汾陽之魚城人族姓溫剷䰂於華嚴一日喟然嘆曰大丈夫當究明生死大事焉能區區於此耶遂往叩雪庭於萬壽服勤數載室中機契後奉敕住報恩一日示疾集衆曰吾緣止於此矣汝等善自護持當惜寸陰勿令虗度復書偈曰修起忠師無縫塔推倒自家無相身無相身無相身無相身中絶點塵書畢怡然而逝泰安州靈巖足菴淨肅禪師永平張氏子從香山壽聖受業參方二十餘年見知識數輩皆不契後參雪庭於萬壽親炙久之蒙印證初住萬壽次遷少室靈巖後退居香山一日集衆訣別右脅而逝中林禪師為之銘曰遼天鼻孔點地腳跟心明眼正行古顏溫其事愈大其志愈敦諸方老宿遍叩其門為雪庭嗣為萬松孫機輪迅速電掣雷奔高標覺樹密固靈根慧燈朗照銷鑠羣昏全機大用搖乾蕩坤掀翻渤澥踢倒崑崙三世諸佛一口渾吞二邊不滯中道寧論三居大剎四衆咸尊去來絶朕動靜無痕虗空爛壞斯道常存大鑑下第二十六世少室泰禪師法嗣西京寶應還源福遇禪師霍州靈石王氏子依邑之兜率芟染遍遊講席號稱義虎棄去謁靈隱投誠入室一日聞隱上堂舉切忌從他覓迢迢與我疏師遂穎脫即蒙印可後住天慶遷寶應僧問如何是祖師西來的的大意師曰風送泉聲來枕畔月移華影到前皇慶癸丑十月示寂世壽六十九僧臘四十九濟南府靈巖秋江潔禪師雪軒參師問何來曰青州師曰帶得青州布衫來麼曰已呈似和尚了也師領之俾參堂久之一日忽然大悟遂詣丈室不及啓口師遽曰金鎖玄關打開了也軒曰千年桃核裏覓甚舊時仁師乃囑曰是汝本有之事善自護持他日能弘吾道非汝而誰靈巖肅禪師法嗣西京寶應月岩永達禪師汾州劉氏子受業於里之天寧每以生死為激勵往見靈巖巖深器之親炙數載遂入閫奧乃曰發證由師行之在己乃往泰安掩關四衆請住寶應不得已而起後示微疾端坐而逝封龍古岩普就禪師滹陽人族姓劉年十五出家於禪慶首參靈巖巖以本分鉗鎚示之未幾開悟大德六年月菴海退席諸山具疏請師補處敕賜妙嚴弘法大禪師號次遷封龍後退居靈棲示寂世壽七十有七大鑑下第二十七世寶應遇禪師法嗣鄧州香嚴淳拙文才禪師平陽府臨汾姚氏子生有異質見僧則合掌作禮稍長往從福嚴普公受業嘗讀證道歌至幻化空身即法身欣然契悟遂謁還源呈所解源印可之復閲大藏於龍門歷三載泰定甲子主少室尋移香嚴僧問如何是理法界師曰虗空撲落地粉碎不成文曰如何是事法界師曰到來家蕩盡免作屋中愚曰如何是理事無礙法界師曰三冬枯木秀九夏雪華飛曰如何是事事無礙法界師曰清風伴明月野老笑相親至正壬辰五月十七日沐浴更衣集衆申誡飭翌旦吉祥而逝葬全身於雪庭塔右世壽八十靈巖潔禪師法嗣金陵天界雪軒道成禪師雲州趙大王之遠孫也父徙保定遂家焉年十五從郡之興國寺剃落師廣顙平頂雄偉氣象少有遠志甫受具戒即結侶密究單傳之旨後聞秋江法席之盛遂往參叩語具靈巖潔章旋還青社緇素請住普照洪武十五年詔立僧司師應選三十年秋八月敕師住持天界師奏不會佛法上御製詩賜之曰不答來辭許默然西歸隻履舊單傳鼓鐘朔望空王殿示座從前數歲年上堂白雲萬頃卷舒露劫外真機紅葉千峯燦爛顯箇中妙旨亙古今而不昧經塵劫以長存鳥道虗通運步玄關綿密獅絃錯落按指古韻鏗鏘直得石女點頭木人拍手拈起金針玉線穿過機先截來兔角龜毛發明向上正偏獨露隱顯全該所以物物頭頭塵塵剎剎未有絲毫欠少大衆還會麼夜來木馬雲中過驚起南辰北斗藏上堂陰極陽回化日長梅華處處噴清香箇中消息無多子遍界何曾有覆藏如是明明兼帶百草頭邊相逢密密宣揚萬象光中獨露利名場上薦取無位真人人我山中顯示本來面目影含宗鑑心生則種種法生身是道場心滅則種種法滅石女高提寶印文彩全彰木人暗度金梭絲毫不昧牽動劫外機輪烜爀寰中日月潛通遐邇直得枯木生華該括古今解使寒冰發焰雲籠古路依依野色還迷月滿寒岩皎皎神光遍照六門機息何須宛轉旁參一色功圓切忌當頭印破白牛運步已蒙建化之緣玉馬嘶風總是利生邊事且道如何是向上事咄兔角杖挑潭底月龜毛拂挂嶺頭雲上堂三陽交泰萬物咸新顯一真之妙用總造化之淵源塵塵合道處處通津法筵大啓覺苑弘開國運與佛運齊興皇風共宗風並扇只如道舊歲已去新歲到來未審去從何去來自何來如斯評論轉見誵訛敢問大衆衲衣下一著子還有增減去來也無良久臘盡陽和無影樹春回華發不萌枝上堂五月榴華照眼明熏風啼鳥遍岩扃機先一著無玄妙切忌當人認色聲記得夾山會禪師示衆曰目前無法意在目前不是目前法非耳目之所到天童覺曰夾山老子解開布袋將差珍異寶撒向諸人面前了也正當恁麼時又作麼生路不拾遺君子稱美師曰二老師見處一一檢點將來總成漏逗鳳山則不然若是色見聲求即非家珍了知目前無一法頭頭物物總相應其或未然更聽末後一句道泰不傳天子令時清休唱太平歌太宗踐祚師奉旨使日本宣諭聖化二年與同使官僚還備奏上大悅恩寵之隆有加六年敕就鍾山建普度大齋會命師升座説法聽者數萬人十一年入覲復奉敕於大慶壽建齋會賜賚尤加宣德三年師以老表辭還山上憫之遣內臣護送南還天界西菴養老七年臘月八日示微疾訣衆説偈趺坐而逝上聞遣中官致祭有文世壽八十一僧臘七十五茶毗煙焰五色仙鶴翔空異香縹眇官貴四衆萬人咸嘆希有舍利圓紅者無算敕賜建塔於鷲峯禪寺封龍就禪師法嗣西京天慶息菴義讓禪師真定府李氏子丱歲剃落受具遍叩諸方末後詣封龍參古巖巖一見輒稱賞之後出世天慶次遷熊耳之空相泰山之靈巖洛之嵩少庚辰夏遘疾乃謂門人曰斯疾不起矣須營塔至五月十二日塔工畢師囑後事遂書偈曰來時本淨去亦圓周虗空作舞任意優遊右脅而逝大鑑下第二十八世少室才禪師法嗣南陽府萬安松庭子嚴禪師河南緱氏縣人族姓樊幼多疾苦父母慮其不育俾從少林霽雲受業十八受具師天資奇逸通內外典首謁江月照次見息菴讓後參淳拙才拙示寶鏡三昧反覆詰辨師大豁疑礙拙曰荷擔大法盡在子躬付偈有五乳峯頭獅子子光前耀後自超羣之句時萬安虗席四衆請師主之洪武二年己酉遷少室力田給衆有偈曰亂後歸來自耨耘生涯辛苦與誰論晝拈塊石驅山鳥夜宿巢菴逐野豚腸斷秋風頻擊柝目窺夜月以銷魂年來始識農夫苦一飯仍思施主恩十三年冬周王殿下為國母慈孝皇后資修冥福命師升座説法賜僧伽黎以旌之後以老間居云天慶讓禪師法嗣熊耳嵩溪子定禪師偃師馬氏子七歲從古巖祝髮逮巖遷化往參息菴命典藏一日室中白事次言下豁然大悟住後蒞衆嚴峻凜若秋霜一日示微疾謂衆曰吾世緣已畢時節至矣汝輩勿以情識眷戀末後一句聽吾分付良久就枕泊然而逝大鑑下第二十九世萬安嚴禪師法嗣嵩山少室凝然了改禪師嵩陽金店之茂族也自齠齔繫念空宗遂依止少林年二十始納僧服初見月印於香山聞松庭唱道於天慶師遂往參一日松上堂曰一言迥脫獨當時師言下釋然尋歸隱二祖菴洪武二十三年會祖庭虗席合山敦請師力辭不獲已而起上堂莫向言中取則直須句外明宗若能如是徹古該今自繇自在知麼永樂十九年忽集衆訣別復説偈曰吾年八十七出夕復入夕撒手威音外綿綿與密密泊然而逝大鑑下第三十世少室改禪師法嗣嵩山少室俱空契斌禪師平陽府垣曲人參凝然求示心要朝夕咨叩一日覩秦封槐豁然開悟徑投丈室然一見遽曰契斌參得禪也洞上一宗密在爾躬景泰四年接踵住持僧問如何是空劫已前事師曰烏龜向火大鑑下第三十一世少室斌禪師法嗣西京定國無方可從禪師洛陽許氏子禮福先芘峯剃落初參超化宗入室請益有省入後詣少室叩俱空示以綿密閫奧師罔措一日偶檢傳燈見天衣以行者五人俱召實上座因緣遂默契五位奧旨即蒙印可住郟鄏定國後於成化十年六月示寂世壽六十四僧臘四十塔於少室祖墳大鑑下第三十二世定國從禪師法嗣嵩山少室虗白月舟文載禪師通州人世系蔚州廣寧王氏祖諱才從太宗靖內難官至武德將軍遂家通州母夢僧投宿覺面生師從萬安白菴空公芟染往武林納具還即掩關因閲萬松拈提古宿機緣若面牆者久之忽有省曰曹洞宗風大播天下有織錦回文之工非針線綿密盤旋回互不觸當頭者莫能與也遂出關參無方親依久之乃承印記正德改元住少室上堂達磨西來以一乘法直指單傳令人見性成佛至我少室如九鼎繫於單絲汝等諸人趂色力強健打辦箇事切須努力莫等間過日嘉靖三年甲申師年七十退居三十六峯之中大鑑下第三十三世少室載禪師法嗣北京宗鏡小山大章宗書禪師順德南和李氏子自幼異於常兒每嬉戲必作佛事年十餘歲淹通經史一日忽掩卷嘆曰此非出世法也遂告辭父母往投里之開元祝髮聞月舟法席之盛往謁因親炙八載方蒙印可嘉靖三十六年少室疏請師嘆曰先師化後三十餘年曹洞一宗殆將湮沒前輩有言禪林下衰弘法者多假我偷安不急撑拄之其崩潰跬可須也雖慚付囑其奈付囑乎遂主之時方亢旱河井乾涸師至泉源復漲丙寅遷宗鏡隆慶改元遊西山三學洞喜其幽深遂居焉至冬忽示微疾臘月十六日索筆書偈曰宗鏡宗鏡心法成行即日圓覺鏡破宗正書畢危坐而逝世壽六十八僧臘五十六茶毗骨分為三於宗鏡順德少室建塔焉大鑑下第三十四世宗鏡書禪師法嗣西京少室大千幻休常潤禪師南昌進賢黃氏子幼時觀演雜劇有感遂往伏牛山從坦然平祝髮居三載茫無所措質疑不決南謁萬松於徑山投誠咨叩松曰疑是何人措者何物師益加疑悶乃往聽講楞嚴至圓明了知不因心念忽有省遂叩大方蓮問曰忽現鏡中像時如何方曰直須打破師不契復參小山舉前話山曰何必打破師曰爭奈鏡像何山曰即今鏡像安在試拈出我看師當下釋然益自奮發一日室中山舉洞山我今不是渠話問師曰既不是渠畢竟是阿誰師領旨呈偈曰若要識此人有箇真消息無相滿虗空有形沒蹤迹曾為佛祖師常作人天則龜毛拂子清風生兔角杖頭明月出山曰子毋勦説更須自入悟門師曰尚不借緣從何門入山曰既不借緣汝何為至此師曰因不借緣所以至此山曰就不借緣一語其意云何師曰彩鳳翻飛身自在鐵牛奔吼意常間山曰善哉翌日辭行山付偈有定作人天主當思少室秋之句師曰某是何人敢當此言山復囑曰吾道不振久矣焉能袖手耶師唯唯逮山遷化僉議住持非師不可師遜謝再三衆乃舉山付囑語以激之師遽墮淚不復言遂領院事時萬曆二年甲戌秋也師體貌豐碩聲若洪鐘襟度坦夷荷負大法朝夕乾乾無少怠入室弟子二百七十人萬曆十三年四月二十七日訣衆書偈而逝建昌府廩山蘊空常忠禪師壽昌請問法要師曰汝能精進不肯自欺便是徹首徹尾工夫一日聞禪者論金剛經師訶之曰宗眼不明豈為究竟昌聞茫然自失便請問如何是宗眼師拂衣而起昌復請益師曰我實不知汝自看取昌後於大好山得悟詣丈室呈所得師曰悟則不無却須受用得著始得恐只是藥汞銀禪也大鑑下第三十五世小室潤禪師法嗣北京大覺清涼慈舟方念禪師唐縣楊氏子年十歲從金臺廣德大慈義公芟染受具遊講席探性相宗旨一旦棄去遂往少林參幻休休問甚處來師曰北方休曰北方法道與此間如何師曰水分千派流出一源休見其言異命充維那一日遊初祖面壁處忽然契悟乃曰五乳峯前好箇消息大小石頭塊塊著地詣丈室呈似休印可之囑曰從上佛佛祖祖以自己所證相承襲欲令一切衆生知有余得之小山先師今以授汝宜體佛祖之心為心以續慧命然雖如是須晦迹林泉待時而出付以偈曰無上涅槃心佛祖相傳付吾今授受時雲淨峯頭露時年二十八矣遂往五臺掩關日惟一食不設臥具後赴東臺請偶雙目失明師曰幻身非有病從何來習定七日雙目復明南遊補陀還次越之大善寺衆請止風塗説法湛然澄參師問止風塗向青山近越王城畔滄海遙時如何然曰月穿滄海破波斯不展眉師復問洞上宗旨然呈偈曰五位君臣切要知箇中何必待思惟石女慣弄無針線木偶能提化外機井底紅塵騰靄靄山頭白浪涌飛飛誕生本是無功用不覺天然得帝基師曰語句綿密不落終始真當家種草也汝後截斷天下人舌頭有分在乃付以偈曰曹溪一滴水佛祖相分付至今授受時大地為甘露咄五乳峯頭無鏃箭射得南方半箇兒壬辰嘉興緇素請住東塔尋赴雲居之請萬曆二十二年甲午秋五臺古清涼專使請師開法緇素懇留未幾示寂門人湛然迎遺骨塔於顯聖之南山嵩山少室無言正道禪師豫章胡氏子投上藍芟染年十五遇老宿知休開示法要遂從休遊憩南嶽淨瓶岩一日休謂師曰欲究明此事須將宗教葛藤穿過始得乃命往見遜菴菴語休曰無言足稱法器切不可以一知半見障渠胸臆第令南詢自參自悟休拈張拙頌驗師師曰真如尚不可為何頌之有休見其穎利復命參少室幻休一日幻上堂師出問如何是洞上家風幻曰月下三華樹峯前雙桂枝師曰和尚還別有否幻曰惟此一事實無二亦無三師言下大悟即呈偈曰雲攢絶頂月鎖幽岩石人撫掌木女舒顏幻即印以偈曰無言的旨不離言玄唱玄提妙絶傳今日單傳親印授他年雙桂利人天萬曆十八年庚寅師主少室僧問不問有言不問無言世尊良久意旨如何師曰動容揚古路不墮悄然機問如何是新年頭佛法師豎拂子曰會麼曰不會師曰來年更有新條在不假重重為指陳一老宿問如何是無言師曰四時行焉他日又一老宿問如何是無言師曰百物生焉師機用敏捷襟懷平實後示寂塔於祖塋廩山忠禪師法嗣建昌府壽昌無明慧經禪師撫州崇仁裴氏子生而穎異淡然無所嗜好九歲入鄉墩便問浩然之氣是箇什麼墩師異之及長誦金剛經若獲故物往依廩山常疑四句偈一日見傅大士頌曰若論四句偈應當不離身不覺釋然述偈曰金剛四句偈無影亦無形本來無一字遍界放光明時年二十四矣偶閲大藏一覽至宗眼品始知有教外別傳之旨遂辭廩山結茅於峩峯絶頂作偈曰踏上雲頭第一峯眼中寬博小虗空當時欲見無由見今日相逢處處同又一日檢傳燈見僧問興善如何是道善曰大好山師疑不決晝夜提撕寢食俱廢因搬石次堅不可舉極力推之豁然大悟述偈曰欲參無上菩提道急急疏通大好山知道始知山不好翻身跳出祖師關往呈廩山山印為法器至是始剃髮受具影不出山者又二十四載至萬曆甲午年五十一始出住寶方有禪者問師曾見何人便住此山師曰總未行腳禪者曰豈以一隅而小天下乎師善其言遂過杭訪蓮池大師復北遊謁無言達觀瑞峯諸老皆器異之返錫住壽昌上堂拈香示衆曰會麼此是三世諸佛用不盡底一齊撒向娑婆世界釋迦牟尼佛猶用不盡西天東土歷代祖師亦用不盡山僧今日信手拈來與大衆商量還是教外別傳經中玄旨不函蓋乾坤隨波逐浪不截斷衆流擡薦商量不大用現前探竿影草不當陽撒出金剛寶劍不據實而論窮劫不盡要且具眼者揀辨得出白是白黑是黑即不囫圇打作一塊始可定叢林之是非驗學者之邪正然後應聖應凡自然不被詐明頭之所欺舉措應緣無不合轍然此道離微疏之久矣衆中有大智者當拌身命盡力匡扶以悟為期自他兼利一生不足再拌一生盡其三生自然合得古人云不入生死大海難得無價寶珠此猶是鈍機伶俐漢一聞便知妙然雖如是不得春風華不開且謾道及至華開又吹落上堂諸佛時常説法不須擬議猜詳是什麼法天地玄黃宇宙洪荒不論通宗透教只貴直下承當承當箇什麼雲騰致雨露結為霜蛟龍不宿死水猛虎豈行路傍透得者些關棙何須願往西方不問先佛後祖鼻孔一樣放光作麼生放光化被草木賴及萬方釋迦不肯泄破達磨九年覆藏峩峯不惜口業一下為衆宣揚且道作麼生宣揚揮尺一下曰罔談彼短靡恃己長上堂臘八逢辰叢林設粥所為何緣無非順俗衲僧門下不必如斯豈不聞三世諸佛不知有狸奴白牯却知有若恁麼則三世諸佛已立下風況迦文佛乎且道狸奴白牯有甚長於諸佛首座曰為他金烹大冶玉出藍田師曰然雖如是寶坊不免連狸奴白牯一齊趂出三門外何也秉綱立紀振叢林海晏河清正令行好漢盡收歸寶所化城推倒不留人首座曰和尚道化城推倒不留人在和尚分上即得某甲則不然師曰汝又作麼生座曰間挑布袋渾無事笑等街頭一箇人師曰也是間弦子下座上堂長空無路禪者偏行白浪滔天智人能攫萬丈玄門過去猶落那邊千尺井中出來終居此岸伏藏純金不顧補囊破何留行平地驚心步險崖放膽本色分上智眼鑑諸只如不涉此因緣又是什麼去就首座曰翻翻㩆㩆真奇怪直勝三千夜不收師曰珍重觀音聖誕上堂五分真香預已然光明雲起遍三千普熏三世真如際以祝當今萬萬年更冀滿朝宰輔合國軍民共樂堯天觀音大士且喜來也某甲有句話請問大士實是今日聖誕耶只如天無蓋地無底一切世界有情無情從何而起道得即共大士七十三八十四道不得未免拄杖道道良久曰先已告過當仁不讓念大士記正法明王且放三十棒上堂揮尺一下曰宗乘中事難以措辭大道門庭爭容擬議等間垂一機如太阿鋒離匣逢之者死不移時似塗毒鼓受槌聞之者喪不旋踵所謂妙峯峻仞野獸難藏寶樹晶光靈禽莫泊其用也單趂金毛歸野窟直追鐵額入深山掃天下之攙搶拂世間之孽屑提墮坑落塹之類揭迷封滯殼之流其功也使法界世界虗空界一體同觀俾佛道人道地獄道萬法融會雖然如是猶未為向上事且道出格限量外一句作麼生道咦正令不行先斬首大機一發聖賢悲久立珍重師中興寶坊峩峯壽昌三剎別建菴院二十餘所不扳外援不發化主嘗曰萬般存此道一味信前緣晚年益勤逮七旬尚混勞侶耕鑿不息丈室蕭然惟作具而已益王嚮師道德深加褒美每嘆曰去聖時遙幸遺此老萬曆丁巳臘月七日師自田中歸謂衆曰老僧自此不復砌石矣衆皆愕然除夕上堂曰今年只有茲時在試問諸人知也無那事未曾親磕著切須綿密做工夫復曰此是老僧最後分付一著大衆切宜珍重新正十三日示微疾遂不食曰老僧非病會當行矣十四日手書辭道舊十七晨興集衆索筆大書曰今日分明指示擲筆端坐而逝茶毗火光五色頂骨諸牙不壞建塔於方丈世壽七十一僧臘四十四大鑑下第三十六世大覺念禪師法嗣紹興府雲門顯聖湛然圓澄禪師本郡夏氏子母顧夢僧入室而娠親沒窶甚充郵卒因誤投公牒懼辱走投隱峯峯示念佛底是誰三晝夜輒有省時年二十乃往從天荒山妙峯芟染偶聞禪客論傅大士法身偈師默契便能記持經書解一切義理尋詣雲棲受具返即掩關寶林因憶乾峯舉一不得舉二話豁然大悟述頌曰舉一舉二別端倪箇裏元無是與非雪曲調高人會少獨許韶陽和得齊二老何曾動舌諸方浪自攢眉擬議過新羅刻舟求劍元迷再詣雲棲棲舉高峯海底泥牛話師乃推出傍僧曰大衆證明又一日火浴僧回棲曰亡僧遷化向什麼處去師曰謝和尚挂念棲休去慈舟念禪師自北京來寓止風塗師往謁求證遂定師資之禮語具慈舟章萬曆甲寅開法雲門廣孝次遷徑山東塔顯聖上堂雲門扇子𨁝跳今日拈來好笑云何露柱懷胎生箇兒子高叫大衆且道是何音響還有人知得消息麼若無人知山僧代通去也作哇哇聲曰諸人若還解笑一切不曾欠少若也更問如何驢年去也未了衆中莫有問話底麼有則出來只要打草驚蛇一僧才出師曰真是一場業地拽拄杖便下座上堂朔風凜凜正隆冬葉落園林露本容雕盡繁柯真實在何必殷勤問主翁物理循復枯必然榮目下雖然窮徹骨來年依舊笑春風上堂師才就座忽聞雞鳴乃曰呀赤頭上座已為諸人轉第一義諦根本法輪了也更要討甚麼消息若也不會重新再舉擊拂子曰者箇是聲有耳皆聞定非聾漢舉拂子曰者箇是色有眼皆見定非瞎漢更無絲毫瞞昧不見道頻呼小玉元無事只要檀郎認得聲上堂老儂不識元字腳強出人前要説法錯讀曾參作魯三合堂大衆皆笑殺者一笑中有妙若還悟得其中意點破當頭者一竅良久曰動容揚古路不墮悄然機乙卯住徑山上堂香已拈了佛法則不敢舉揚何也汝諸人一段光明亙古不昧不可平地撒屎雖然如是既為衆兄弟所邀不可杜口略舉題目以為影響且道如何是題目今日豈不為結制上堂耶然諸方結制皆四月十五為定規新徑山者裏以五月十一為準的雖然遲早不同且要得旨為準譬如行船早發遲發不同到岸同也大衆要知到岸消息麼不見經云一念普觀無量劫非去非來亦非住如是了知三世事超諸方便成十力若向者裏會得以大圓覺為伽藍身心安居平等性智十方微塵剎土總是一箇道場過去無量劫不曾結未來無量劫不曾解生死也在裏許涅槃也在裏許乃至是非得失邪正聖凡解脫不解脫輪回不輪回總在裏許於中還有你用心處麼還有你計較處麼咄衆中忽有箇漢出來道新長老今日請你舉揚宗乘緣何引經據論廣布葛藤是何心行耶山僧到者裏無言可對只得聊借古人行徑以圖塞口只如先徑山舉竹篦子曰者箇不得喚作竹篦子不得不喚作竹篦子喚作竹篦則觸不喚作竹篦則背山僧不免效顰舉拂子曰者箇不得喚作拂子不得不喚作拂子喚作拂子則觸不喚作拂子則背不得有言不得無言不得轉機不得著語中間有一句是山僧底有一句是諸人底有一句山僧底即是諸人底有一句諸人底即是山僧底也有主也有賓也有照也有用衆中還有緇素得出底麼一僧拂袖而出師曰適來自起而今自倒便下座小參煙雨盜將山色去溪風送得水聲來本來法法皆如是莫教心識強安排衆中若作境會許你具一隻眼若作佛法會打破你頭何故我王庫內無如是刀示衆天得一以清地得一以寧君王得一天下平只是衲僧分上用不著何也不見道萬法歸一一歸何處初師到北京寓嘉熙寺一日同達大師月川法師陶石簣黃慎軒兩太史玩月次慎軒臥次問馬祖玩月因緣師曰你睡我立不得為汝説法慎軒亟起謝過月川曰內翰蹉過了也達大師曰吾下語不及此老師過杭聞谷慧聞等數員知識洎衆護法各具柬迎師慧聞柬內曰今日大衆要與和尚作家相見和尚若來已墮情識和尚不來猶缺慈悲師閲畢即將柬扯破曰者客作漢到老僧面前納敗闕師至即升堂南面而立慧聞曰和尚莫要般門弄斧師便與一掌曰速道速道聞面赤無語師曰死漢聞谷即率衆禮拜師同無念禪師司成陶石簣圍爐次陶曰無念師在此阿師得力句乞為舉似師曰向火背猶寒巡漕蘇雲浦問鴛鴦繡出從君看不把金針度與人如何是金針師曰山僧京都走一轉不曾遇著一箇人蘇擬進語師曰古佛過去久矣師訪無念禪師問曰古人道如紅爐上飛片雪相似且道古人還具透關眼也未念曰我不見有什麼古人師遽指曰背後底聻念便休去師生平脫略遇人無貴賤一味本色五坐道場凡利濟有情無不從事天啓六年臘月於顯聖作付囑語四日過天華上堂其徒明智白往九華師曰汝去老僧即今起程復與衆語至夜分右脅而逝奉全身塔於盂山之陰世壽六十六僧臘三十八少室道禪師法嗣嵩山少室心悅慧喜禪師保定滿城劉氏子出家於普濟偶閲傳燈至僧問玄沙如何是無縫塔沙曰者一縫大小豁然有省往見無言久而徹證言付偈曰密法無法付當傳何以傳無傳無付處明暗妙同參後無言遷化師接踵住持壽昌經禪師法嗣廣信府博山無異元來禪師舒城沙氏生有白衣重包葷酒自絶年十六遊金陵聽講遂不事文句往五臺從靜菴通公芟染初參壽昌於峨峰不契乃去復謁於寶方昌問蟻子解尋腥處走蒼蠅偏向臭邊飛是君邊事臣邊事師曰臣邊事昌呵之曰大有人笑你在師曰先所論皆是到者裏因甚不是昌曰此一不是彼一切都不是師乃發憤因見伽藍像倒地有省別居宗乘堂二載一日如廁見人上樹豁然大悟趨見昌昌曰婆子具什麼眼目便燒却菴師曰黃金增色昌復舉玄則禪師龍吟霧起虎嘯風生公案師立呈頌曰殺活爭雄各有奇模糊肉眼曷能知吐光不遂時流意依舊春風逐馬啼昌首肯之住博山上堂諸佛出世為一大事因緣幾幅素縑描不就博山出世亦為一大事因緣一條白練驀頭穿破顏老漢曾相委多少人天被熱瞞博山今日信手拈來分明舉似要使人人鼻孔撩天箇箇腳跟點地如赤珠寶鏡照萬象以無遺若玉鑰金匙啓千門而洞達諸昆仲此事不從功行得不從修證得不從思議得不從學問得不從禪定得有等將自己身心煉得如枯木寒灰百年在定終是一箇死人於本分事全無交涉所以玄沙道直饒得似澄潭月影靜夜鐘聲隨扣擊以無虧觸波瀾而不散猶是生死岸頭事道人行處如火銷冰箭既離弦無返回勢諸昆仲須就明中取則莫於暗裏偷光向華柳街頭逴得九衢春色於芙蓉岸畔帶來八面秋光應用無虧隨緣自在諸昆仲且道作麼生是博山行履處良久曰自有一雙窮相手不輕祇揖等間人僧問銀碗盛雪明月藏鷺意旨如何師曰露骨瘦山環紫霧塞流小澗長青苔問如何是功師曰三人同一春曰如何是共功師曰力士舁杖鼓曰如何是功功師曰胡猻上露柱曰不得敲唱雙舉請示正中妙叶師曰高低雲繞樹曰謝師答話去也師曰遠近鳥銜華上堂博山今日不説有法不説無法不説亦有亦無法不説非有非無法離四句絶百非石人點頭青山皺眉深寒博得三春暖破霧披雲入翠微上堂如何是佛十方世界最靈物如何是法古路迢迢苔蘚滑仍將佛法問根源雲散長空鶴唳天纖塵不立清如洗三個猢猻夜簸錢諸昆仲宗門中事豈同容易一言一句一大藏教注不破歷代祖師機深智廣潛興密運須彌倒卓拄杖橫趨繪彩色於空中擲大千於方外且道向甚麼處捫摸所以云羅籠不肯住呼喚不回頭古聖不安排至今無處所玄沙大師恁麼老婆心切也只要諸人知個落處始得諸昆仲青黯黯處樵子不借路以還家綿密密時機婦罷金針而夜織香銷錦帳露浥芙蓉發清嘯於深閨吐微言於連枕情濃意洽試問諸昆仲還知得也無良久曰分明一段風流事不與諸人較短長僧問如何是不斷聲色墮師曰斷橋分野水曰如何是類墮師曰孤棹舉平原曰如何是尊貴墮師曰裂破幾重清世界倒騎玉象趂麒麟師初住博山遷閩之董岩大仰鼓山洎金陵之天界仍還博山於崇禎三年秋示寂首座問和尚尊體如何師曰儘有些子受用座曰還有不病者也無師曰熱大作麼座曰來去自由請道一句師為書歷歷分明四字投筆坐化塔全身於本山壽五十六東苑湛靈元鏡禪師建陽馮氏子父天載母吳生於萬曆丁丑幼從虎嘯岩一心受業後參無明一日偶閲維摩經至此室何以空無侍者維摩詰言諸佛國土亦復皆空豁然悟入述偈曰識破不值半文錢可憐摸索許多年宗流盡是欺心漢説甚西來別有傳投丈室呈似明明曰趙州勘破婆子你道那裏是勘破處師厲聲曰老和尚休作怪明為助喜後開法一枝菴上堂佛法本無多南辰貫北河都來三七字降盡鬼神魔尋歸隱武夷示寂世壽五十四僧臘三十六建昌府壽昌閴然元謐禪師南昌王氏子參無明於峩峯示以父母未生前面目話一日推磨失手撞磨盤有省占偈有本來面目不須尋一點靈明亙古今之句後聞蛙鳴徹證一日告無明曰某根器下劣幸遇和尚得離苦海猶恐宿習難以屏除昨對護法神前祝願某此生福薄智短不敢妄生節目使我終身居學地生生不離善知識福慧具足報佛祖恩是所願也無明曰欲興利濟非兩足莫能為也子深知源委矣福州鼓山永覺元賢禪師建陽人族蔡氏弱冠補郡庠讀書山舍聞僧誦經至我爾時為現清淨光明身得箇歡喜處後見壽昌呈所解昌勉看乾屎橛話年四十棄家昌為祝髮一日昌自田間歸師逆而問曰如何是清淨光明身昌振衣而立師曰只此別更有麼昌拂衣便行師隨入丈室不及啓口昌拈拄杖連打三下曰向後不得草草明年昌遷化師還閩舟次延津聞僧誦諸佛謦咳俱共彈指乃徹見壽昌用處有偈曰金雞破碧琉璃萬歇千休只自知穩臥片帆天正朗前山無復雨鳩啼上堂今年五月又過五鳴起法鐘敲法鼓不用如何若何拈今舉古展兩手曰佛法當堂兩手交露柱燈籠齊作舞諸仁者還承當得麼拈拄杖晴乾不肯走直待雨淋頭卓一卓下座
