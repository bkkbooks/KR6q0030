body:
  text: 明嗣祖沙門東吳通問編定笠澤居士華亭施沛彚集大鑑下第二十一世之下育王照禪師法嗣湖州道場龍源介清禪師福州長溪王氏子得度于義興法藏齊禪師往育王謁寂入室契旨俾為侍者復掌藏鑰出世四明壽國遷開壽道場上堂三春云暮緑暗紅稀動為境轉靜為法迷不以色蓋不以聲騎風前閒聽杜䳌啼上堂終日忙忙那事無妨顯而不露隱而不藏大衆且道如何是隱而不藏底道理玉梅結子浮青樹石筍抽條上緑徑山端禪師法嗣杭州靈隱性原慧朗禪師別號幻隱台州黃岩人姓項氏母陳依樂清寶冠寺魯山出家首參竺元道於仙居繼詣徑山謁元叟叟問東嶺來西嶺來師指腳下草鞋曰者是三文錢買得叟曰未在更道師曰某甲只恁麼未審和尚作麼生叟曰念汝遠來放汝三十棒師乃悟旨久之盡其底蘊曰才涉思惟皆為剩法出世鄞之五峯遷金峨洪武五年召天下高僧建會于鍾山師與季潭泐公與焉季奉旨住天界師居第一座提綱舉要表率叢林時稱得體明年舉師主金山十一年升靈隱浴佛上堂舉藥山儼禪師因遵布衲作殿主浴佛次山問汝祇浴得者箇還浴得那箇麼遵曰把將那箇來山便休去師曰者一箇那一箇一一從頭都浴過藥山布衲謾商量仔細看來成話墮成話墮轉誵訛拍禪牀武林春已老臺榭緑陰多佛誕上堂舉世尊才生下一手指天一手指地周行六步目顧四方曰天上天下唯吾獨尊真成大人相不是小兒嬉雲門曰我當時若見一棒打殺與狗子喫貴圖天下太平要作老胡種族直須恁麼始得法昌曰好一棒太遲生未離兜率腳跟下好與一錐豈到今日雖然如是大似賊過後張弓將謂胡鬚赤更有赤胡鬚黃面老子固是末上賣俏似乎旁若無人雲門法昌雖則見義勇為爭奈劍去久矣爾方刻舟以拄杖畫一畫召衆曰還會麼一把柳絲收不得和烟搭在玉闌干上堂今朝閏五月初一依舊日從東畔出衲僧箇箇解知音短咏長吟皆中律梅雨晴樹陰密林下優游何得失無位真人赤肉團等閒靠倒維摩詰佛涅槃日上堂涅槃生死等是空華佛及衆生皆為剩語諸人到者裏作麼生會良久拍禪牀但見落華隨水去不知流出洞中春浴佛上堂舉香嚴和尚曰去年貧未是貧今年貧始是貧去年貧有卓錐之地今年貧錐也無衆中若有箇漢出來道長老錯了也今朝四月八是佛生日如何舉此公案山僧只對他道住持事繁下座碧峯和尚闍維奠茶五臺山拾得來誠非凡種關西子沒頭腦却是靈根惟茲一盞清茶蕩滌衆生熱惱只如則川拋下茶籃仰山撼動茶樹畢竟明甚麼邊事度盞曰踏翻生死海靠倒涅槃城師以學者泥於知解嘗室中垂語曰昨夜蓮華峯被蜉蝣食却半邊你因甚麼不知又曰冷泉亭吞却壑雷亭即不問南高峯與北高峯鬬額是第幾機衆莫有契者無何遭誣罔之災被逮或勸師早自為計師不顧怡然詣所司未鞫即廡下說偈端坐而逝時洪武十九年六月草三日也壽六十九坐夏五十八嘉興府天寧楚石梵琦禪師明州象山人姓朱氏元貞二年丙申六月丁巳母夢日墮懷而生方襁褓有神僧摩師頂曰此兒佛日也他日必當振揚佛法燭照昏衢因以曇曜字之早失怙恃鞠於祖母七歲能屬句遠近號為奇童九歲入永祚寺受業於訥翁尋依從族祖晉翁洵于湖之崇恩趙魏公見而器之為鬻僧牒得度年十六即受具戒晉翁遷道場師為侍者繼典藏鑰一日閲楞嚴至緣見因明暗成無見不明自發則諸暗相永不能昏因有省入歷覽羣籍恍如宿契時元叟唱道雙徑師往參叩問如何是言發非聲色前不物叟遽曰言發非聲色前不物速道速道師擬進語叟震威一喝師愕然會英宗召高僧金書大藏師應詔入京一夕睡起聞鼓聲豁然大悟汗下如雨拊几笑曰徑山鼻孔今日入吾手矣因成偈曰祟天門外鼓騰騰驀劄虗空就地崩拾得紅爐一點雪却是黃河六月冰後歸徑山叟為助喜處以第二座參叩者多令就師決擇未幾行宣政院稔師名命出世海鹽福臻大曆戊辰遷州之天寧至元乙亥遷杭報國開堂日僧問天垂寶蓋地湧金蓮一句無私如何祝贊師曰吾嘗於此切曰常將日月為天眼指出須彌作壽山師曰三千年黃河一度清曰我本無心有所希求今此法王大寶自然而至且如何是法王大寶師曰有眼者見有耳者聞曰莫祇者便是麼師曰擊碎髑髏拽脫鼻孔曰如何受用師曰直待雨淋頭僧禮拜問不愁念起惟恐覺遲如何是覺師曰牛角馬角曰如何是念師曰四五二十也不識問一大藏教是箇切腳未審切箇什麼字師曰切箇不字曰只如不字又切箇什麼字師曰莫錯舉似人曰謝師指示師曰石羊頭子向東看問佛祖因緣即不問君臣慶會事如何師曰瑞草生嘉運靈華結早春曰如何是君師曰莫觸龍顏曰如何是臣師曰量材補職曰如何是臣向君師曰赤心片片曰如何是君視臣師曰如月入水曰如何是君臣道合師曰俱問萬丈寒潭徹底冰時如何師曰陽氣發來無硬地問運推移日南長至阿那箇是常住法師曰冬不寒臘後看曰教學人如何履踐師曰獨木橋子問西天以蠟人為驗未審此間以何為驗師曰驗什麼碗曰和尚豈無方便師曰子過新羅問一年將盡夜萬里未歸人還許歸去也無師曰十里長亭五里短亭曰與麼則不歸去也師曰直須歸去曰作麼生是到家一句師曰天寒日短兩人共一碗問觀山玩水訪道尋師離此二途請師指示師曰亂走作麼曰和尚恐某甲不實師曰草賊大敗曰漢地不收秦不管夜來明月上高峯師曰引不著曰四月十五日結為什麼人結師曰癩馬繫枯樁曰七月十五日解又為什麼人解師曰達磨來也曰還有不在裏許者麼師曰漫天網子百千重曰本來無罣礙隨處任方圓師曰放過一著問日從東上月向西沒作麼生是不遷義師曰柳絮隨風自西自東曰年年是好年日日是好日師曰瞎老婆吹火問護明大士未降王宮釋迦老子在什麼處師曰眨上眉毛曰謝師答話師曰恰值拄杖不在問盡大地是箇佛身向什麼處安居禁足師曰錦上鋪華又一重曰竹密不妨流水過山高豈礙白雲飛師曰隨語生解問如何是先照後用師曰劈開太華連天色放出黃河到海聲曰如何是先用後照師曰劍為不平離寶匣藥因救病出金瓶曰如何是照用同時師曰定光金地遙招手智者江陵暗點頭曰如何是照用不同時師曰三月懶游華下路一家愁閉雨中門僧禮拜師曰更問一轉豈不好問大悲菩薩用許多手眼作什麼師曰春風不裹頭問如何是在窟師子師曰頭頂天曰如何是出窟師子師曰腳踏地曰如何是哮吼師子師曰還聞麼曰即今聞也作麼生師曰伏惟尚饗師一日出門迎接次僧問開門待知識知識不來過不來過者是什麼知識師便不審曰和尚見箇什麼師曰好心不得好報修佛殿次師問掌事僧者殿是什麼年中蓋造僧摑露柱曰何不祇對和尚師曰克繇叵耐倒來者裏捋虎鬚三十棒一棒也不恕僧曰容某甲申說便禮拜師曰且放過一著師一日芟草次僧問有根草任和尚芟無根草作麼生芟師鋤地一下僧便放身倒師曰諸方火葬我者裏活埋僧起走師呵呵大笑師在鳳山一日入省次高右丞問禪分五派教列三乘教則不問如何是禪師曰正值歲朝公宴丞曰達磨西來不立文字直指人心見性成佛佛在什麼處師曰管絃雜遝朱紫熒煌丞曰莫便是和尚見處麼師曰不敢丞曰容在別日說話師諾諾一日座主參師問講甚麼經主曰法華師曰經中道是真精進是名真法供養如來是否曰是師曰供養即不無如何是真法曰具在藥王品師曰將謂是金毛師子元來是野犴眷屬主却問如何是真法師曰汝豈不從天台來主曰是師曰天台山高一萬八千丈頂上著得幾人主無語師曰喫茶去師一日入園問園頭瓜熟也未頭曰熟來久矣師曰甜瓜摘一顆來頭取瓜呈曰大刀三十口師曰飽叢林上堂未離兜率已降皇宮未出母胎度人已畢三世諸佛歷代祖師天下老和尚說心說性舉古舉今總是無風匝匝之波實情好與二十拄杖新福臻今日不是盡法無民打頭不遇作家到底翻成骨董若相委悉拈却炙脂帽子脫却鶻臭布衫其或未然明朝後日大有事在上堂巖頭道須是一一從自己𮌎中流出與我蓋天蓋地去恁麼道被他掘窖深埋了也茫茫宇宙人無數那箇男兒是丈夫男兒丈夫相去多少待你出窖來却向你道上堂彌勒真彌勒分身千百億時時示時人時人自不識拈拄杖衝開碧落松千尺截斷紅塵水一溪上堂米裏有蟲麥裏有廚庫僧堂山門佛殿盞子撲落地楪子成七片上堂若論生佛未具以前一段大事只在諸人腳跟下動便踏著只是不知起處你道從甚麼處起掀翻四大海踢倒五須彌正覓起處不得豈不見東山演祖曰山僧昨日入城見一棚傀儡不免近前看或見端嚴奇特或見醜陋不堪動轉行坐青黃赤白一一見了仔細看來元來青布幕裏有人山僧忍俊不禁乃問長史高姓他道老和尚看便了問什麼姓師曰誰家別館池塘裏一對鴛鴦畫不成上堂眉毛雖長不礙眼鼻孔雖高不礙面諸佛雖悟無二心衆生雖迷無二見見不見倒騎牛兮入佛殿上堂兔角不用無牛角不用有兩兩不成雙三三亦非九夜來空手把鋤頭天明面南看北斗上堂大樹大皮裹小樹小皮纏若不同牀睡焉知被底穿上堂驢事未去馬事到來貓兒上露柱鐵鋸舞三臺大唐天子呵呵笑移取眉毛眼上栽上堂舉祖師道在胎名身處世名人在眼曰見在耳曰聞在鼻嗅香在舌談論在手執捉在足運奔遍現俱該法界收攝在一微塵識者知是佛性不識喚作精魂師曰書頭教娘勤作息書尾教娘莫瞌睡還識娘面𭪿麼玉容寂寞淚闌干黎華一枝春帶雨喝一喝上堂一道圓光阿誰無分貓兒若無分為甚麼捉老鼠若有分為什麼做貓兒千年田八百主浴佛上堂清淨法身簸土揚塵圓滿報身倚富欺貧千百億化身弄假像真三身中浴那一身謝三娘稱銀上堂頭上是天腳下是地青山是青山白雲是白雲你會也有馬騎馬無馬步行你若不會夜行莫踏白不是水便是石上堂無手人行拳無舌人解語忽若無手人打無舌人無舌人連忙道箇不必復曰只箇不必天下衲僧跳不出上堂箇箇抱荊山之璧人人懷滄海之珠幹旋佛祖樞機提掇衲僧巴鼻盡謂頂門眼正咸言肘後符靈殊不知靈龜負圖自取喪身之兆出格一句作麼生朝霞不出市暮霞行千里上堂黃檗手中棒剜肉作瘡大愚肋下拳喫鹽救渴速則易改久則難追選佛若無如是眼假饒千載亦奚為喝一喝上堂拈却𥁊盂匙箸喫飯不得屏却咽喉唇吻出氣不得色身安法身不可不安法身色身是一是二華須連夜發莫待曉風吹上堂俱胝豎一箇指頭雪峯輥三箇木毬石鞏張弓架箭華亭短棹孤舟鳳山無法可說不妨坐斷杭州就中却有箇好處好在什麼處四五百條華柳巷二三千所管絃樓上堂大事未明如喪考妣大事已明如喪考妣你道有成褫無成褫常因送客處憶得別家時上堂聞聲悟道塞却你耳根見色明心換却你眼睛蒲團上端坐針眼裏穿線西風一陳來落葉兩三片師自至正甲申遷禾之本覺丁亥帝師錫號佛日普照慧辨禪師適符昔日神僧之言會光孝虗席衆復勉師就焉尋退歸天寧上堂曰一毫吞却山河大地則易山河大地吞却一毫則難也不難也不易鋪箇破席日裏睡料想上方兜率宮也無如此日炙背築西齊為終老計自號西齊老人洪武元年秋九月詔江南大浮屠十餘人于蔣山建大法會命師升座說法上大悅二年春復用元年故事召師說法賜齊文樓下親承顧問暨行出內府白金以賜三年秋上以鬼神情狀幽微難測意遺經當有明文召僧中博通三藏者問焉於是師與夢堂噩行中仁等應詔至京館於大天界寺上命禮部勞之又命膳部頒賜薪米旋命以所問條晣入告師援據經論成書將進忽示微疾越四日趣左右具浴更衣索筆書偈曰真性圓明本無生滅木馬夜鳴西方日出書畢謂夢堂曰我去矣堂曰何處去師曰西方去堂曰西方有佛東方無佛耶師乃震聲一喝而逝時辛亥七月二十六日也上聞嗟悼久之時禁火葬以師故特從闍維例火餘齒舌數珠不壞舍利五色紛綴遺骼弟子文晟奉骼及諸不壞者歸西齊塔焉師世壽七十五僧臘六十三行中仁公狀其行文憲宋公濂為之銘所著有六會語淨土詩慈氏上生偈北游集鳳山集西齊集和三聖詩永明山居詩陶潛詩林逋詩總若干卷竝行于世杭州徑山愚菴以中智及禪師蘇之吳縣顧氏子父茂卿母周氏自幼出家穹窿海雲院祝髮受具聽賢首法師講法界觀未終篇輒笑曰一真法界圓同太虗但涉言詞即成賸法縱獲天雨寶華于我奚益哉遂謁笑隱于建業隱文章道德傾動一世師微露文彩一時交相延譽有同袍嶼公見師訶曰子才若此不思擔荷正法乃甘作騷壇奴隸乎無盡燈偈所謂黃葉飄飄者不知作何見解師舌噤不能答旋歸海雲𮌎襟礙塞目不交睫者踰月一日忽見秋葉墜庭豁然有省走雙徑謁寂照呈所證照可之命居侍司未幾遷主藏室至正壬午江南行宣政院舉師出世昌國之隆教尋領普慈戊戌遷淨慈江浙行省丞相達識帖穆兒復請住持徑山僧問不與萬法為侶者是什麼人師曰十字街頭石敢當僧擬再問師曰更要第二杓惡水在問馬祖升堂百丈捲席意旨如何師曰不是苦心人不知曰龍袖拂開全體現象王行處絶狐蹤還得相應也未師曰萬里望崖州問如何是賓中賓師曰君向瀟湘我向秦曰如何是賓中主師曰常在途中不離家舍曰如何是主中賓師曰常在家舍不離途中曰如何是主中主師曰橫按鏌鋣全正令太平寰宇斬癡頑曰賓主已蒙師指示向上宗乘事若何師曰三年一閏九月重陽問衆生為解礙菩薩未離覺和尚作麼生師曰天寒日短兩人共一碗問如何是清淨法身師曰月色和雲白松聲帶雨寒問釋迦已滅彌勒未生正當今日佛法委付何人師曰老僧打退鼓曰前無釋迦後無彌勒還有參學分也無師曰風不來樹不動問佛法禪道相去多少師舉手曰展則成掌握則成拳僧禮拜師曰狂狗趂塊問竺土大仙心東西密相付如何是密付底心師曰九秋黃葉亂飄金曰和尚莫將境示人師曰老僧罪過問擬心即差動念即乖不擬不動還有過也無師曰有曰畢竟如何則是師曰莫認自己清淨法身問如何是毗盧師師曰斷跟草鞋曰如何是法身主師曰尖簷席帽曰學人不會師曰現成行貨有什麼不會僧擬議師便喝問至道無難唯嫌揀擇不揀擇時如何師曰遇飯即飯遇茶即茶僧禮拜師曰放汝三十棒問蓮華未出水時如何師曰寒則普天普地寒曰出水後如何師曰熱則普天普地熱曰如何是佛法大意師曰門前一湖水問淨法界身本無出沒因甚釋迦老子今日降生師曰知而故犯曰遵布衲浴佛次藥山問你只浴得者箇還浴得那箇麼遵曰把將那箇來如何是那箇師曰擔枷過狀問心佛及衆生是三無差別還端的也無師曰的曰不是心不是佛不是物是箇甚麼師曰不識問佛身無為不墮諸數因甚有千百億化身師豎拂子曰你道者箇是第幾身僧擬進語師便喝問元正啓祚萬物咸新如何是新年頭佛法師曰日日香華夜夜燈曰蒲團靜倚無餘事永日寥寥謝太平師曰知恩方解報恩問如何是本身盧舍那師曰不離闍黎所問曰如何保任師曰彼自無瘡勿傷之也問不起一念時如何師曰道者合如是曰與麼則依而行之師曰虗生浪死漢問臨濟大師道一句中具三玄一玄中具三要如何是一句中具三玄師曰萬仞峯頭駕鐵船曰如何是一玄中具三要師曰眼裏瞳人吹木叫曰如何是和尚家風師曰吹折門前一株松曰學人不問者箇風師曰汝問什麼風曰家風師曰我者裏大功不豎賞問牛頭未見四祖時如何師曰深山藏毒虎曰見後如何師曰淺草露羣蛇曰見與未見時如何師曰日出東方夜落西問三世諸佛不知有狸奴白牯却知有未審知有箇什麼師曰師姑元是女人做問聲聞見性如夜見月菩薩見性如晝見日和尚見性時如何師曰黃河九曲水出崑崙曰直指人心見性成佛還端的也無師曰問取達磨大師僧擬議師曰子過新羅問達磨未來時如何師曰眼在鼻上曰來後如何師曰腳在肚下問如何是學人自己師曰腳板大如手掌曰如何是衲僧行腳事師曰緊捎草鞋問如何是先照後用師曰拈起少林無孔笛等閒吹出萬年歡曰如何是先用後照師曰雕弓已挂狼烟息萬里歌謠賀太平曰如何是照用同時師曰泥牛吼處天關轉木馬嘶時地軸搖曰如何是照用不同時師曰猶握金鞭問歸客夜深誰共御街行一日觀海次師問魚以水為命因甚死在海中師自代曰怕爛却那又曰性海無風金波自湧忽遇旋嵐偃嶽時如何師自代曰湛湛地一日供羅漢達識帖穆兒丞相到問師曰今日供羅漢五百尊者俱來應供也無師曰活佛降臨羅漢安得不到相曰施主設齊得何果報師曰種穀不生豆相曰恁麼則功不浪施也師曰賴遇丞相證明相曰三輪空寂畢竟如何師曰空相曰功歸何所師不答相曰何不答話師曰且請方丈喫茶到方丈相問淨名丈室容受三萬二千師子座淨慈丈室容多少師曰一塵不立相曰得與麼覿體相違師揭起簾曰請丞相鑑相呵呵大笑曰作家宗師師便揖茶上堂冬至月頭賣被買牛冬至月尾賣牛買被一年三十六旬有六日以閏月定四時成歲移易一絲毫不得東頭買貴西頭賣賤三十年後破草鞋向甚處著上堂時維三月節屆清明不寒不暖半陰半晴落華啼鳥一聲聲驀拈拄杖穿却解空鼻孔𭣟瞎達磨眼睛踏破草鞋赤腳走好山猶在最高層佛成道日上堂舉趙州問南泉如何是道泉曰平常心是道州曰還假趨向否泉曰擬向即乖州曰不擬爭知是道泉曰道不屬知不屬不知知是妄覺不知是無記若真達不疑之地廓如太虗豈可強是非耶師曰王老師過犯彌天將釋迦世尊六年雪山千苦萬辛所得無上大道等閒華劈殆盡合與二十拄杖當時趙州眼光爍破四天下面被熱瞞則且置今日衆中莫有為世尊拔本底麼如無隆教不是為他閒事長無明忝為遺教遠孫未免出隻手去也拽拄杖下座一時打散上堂拈拄杖十地驚心二乘罔測卓拄杖子承父業賺殺多少人靠拄杖下座上堂趙州道箇洗去其僧豁爾知歸鳥窠吹起布毛侍者當下領旨阿呵呵囉囉哩達磨老臊胡打落當門齒上堂世尊三昧迦葉不知迦葉三昧阿難不知阿難三昧商那和修不知普慈三昧諸人不知諸人三昧各各不知所以道譬如河中水川流競奔逝各各不相知諸法亦如是又如大火聚猛焰同時發各各不相知諸法亦如是喝一喝將謂合有與麼說話上堂舉德山和尚因雪峯問從上諸聖以何法示人山曰我宗無語句亦無一法與人雪峯從此有省後有僧問雪峯和尚見德山得箇甚麼便休去峯曰我當時空手去空手回東山演祖拈曰白雲今日說向透未過者有兩箇人從東京來問他甚處來他却道蘇州來問伊蘇州事如何他道一切尋常雖然如是瞞白雲不過何故只為語音不同畢竟如何蘇州菱邵白藕師曰老東山可謂長於譬喻詞不迫切雖然如是要且只說得德山雪峯影子邊事若是齊眉共躅竝駕齊驅未敢相許何故閩蜀同風肚裏有蟲佛涅槃上堂湖光瀲灔晴偏好山色空濛雨亦奇淨法界身無出沒不須惆悵怨芳時上堂舉東山演祖曰祖師說不著諸佛看不見四面老婆心為君通一線師曰若教頻下淚滄海也須乾上堂今朝又是八月一萬壑千巖儼秋色牛帶寒鴉過別村善財何處尋彌勒師住後有亡賴男子瞿範者日餮盤餐執事者譏之致忿誣師以暗昧之事詣部使者不滿意文致其罪師竟不與之辨亦毫無慍色踰年省憲白師冤復劄請再住徑山師入院拈劄曰前佛性命後佛紀綱總在者裏凜然如朽索之馭六馬危乎猶一髮之引千鈞若非大丞相赤手提持全肩擔荷何處更有今日諸人還委悉麼車不橫推理無曲斷升座酬唱畢復曰去日應須償宿債回時宿債本來空山上鯉魚打𨁝跳一國之師展笑容帝師錫號明辨正宗廣慧禪師洪武癸丑詔有道浮屠十人集大天界寺師居首以病不及召對賜還穹窿戊午九月索筆書偈而逝茶毗火焰五色香氣襲人齒牙數珠皆不壞遺骨紺澤如青琉璃舍利交綴塔于所居之陰復分爪髮歸徑山葬於無等才公之塔右世壽六十八僧臘五十一杭州靈隱朴隱天鏡元瀞禪師越之會稽人姓倪氏生而狀貌魁偉性度坦夷世間機穽不識為何物初從弘教大師立公祝髮於昭慶濡律師受具戒嶷然有遠志又從天岸濟法師習台衡止觀台宗諸老競以書聘師奮志參方謁無見于華頂復遊玉几叩石室室令參元叟師遂見叟于不動軒甫入門叟厲聲一喝聲若雷霆師黏縛盡脫遽稽首作禮遂命居侍司尋掌記室追隨久之至正十六年出世里之長慶升天衣洪武元年詔天下名桑門建會鍾阜師應召入內從容問道賜食而退九年會靈隱虗席諸山交致堅請師不得已應焉上堂聲不是聲觀音三昧色不是色文殊法門聲色無礙普賢境界拈拄杖畫一畫大鵬展翅蓋十洲籬邊燕空啾啾上堂即心即佛嘉州牛喫禾非心非佛益州馬腹脹不是心不是佛天下覓醫人灸豬左膊上良久曰啼得血流無用處不如緘口過殘春未浹旬左右請理崇德莊田舉都寺德現掌職寺僧有聞者以私忿列現過失詣縣嚴行訊鞫以師為寺長失于檢舉法當緣坐或謂此三年前事師實不知且素不識聞何不自辨師笑曰此定業也其可逃乎逮師至部大小司寇覽狀大驚咸謂師當今名德不宜有是洎審師初無異詞遂謫隸陝西聞大悔泣告師曰初意若此雖萬死不為也師弗顧行至寶應謂從者曰吾報身頗異常時殆將盡乎夜宿寧國寺其住持總虗了公與師有舊相見甚歡師曰我骨有所託矣是夜聚談飲食如常翌旦忽合爪端坐泊然而逝時洪武十一年正月十九日也法孫梵譯𢹂骨以還骨間舍利叢布如珠於浴佛日結竁於祖隴之側瘞焉蘇州萬壽行中至仁禪師自號淡居子又號熙怡叟族姓吳番陽人父仲華為江州廣文師生五歲俾從州之報恩寺真牧純公受業七歲得度自幼識見超穎迥異常兒西土指空赴英宗召憩報恩見師異之授以毗尼屬令參元叟叟視師軒渠一笑師罔措遂失展尼師壇叟叱曰參堂去一日叟見師問何處人師曰番陽叟曰番陽湖闊多少師展手作量勢叟曰不是不是師曰合取臭口遂命侍香尋掌記室叟嘗謂衆曰仁書記虎而翼者也後出世蘄之德章遷越之雲頂崇報吳之萬壽師嘗室中拈木枕子問僧曰者箇是什麼僧曰也知和尚老婆心切師擲枕于地僧擬議師便喝出示衆幻軀將逼從心年松下經行石上眠珍重北山龍象衆普通年話幾時圓上堂疊疊遠山青迢迢江水緑盡日小吳軒倚闌看不足驀喚侍者收取拂子便下座上堂禪性無生離生禪想禪性無住離住禪寂五臺山上雲蒸飯佛殿階前狗尿天剎竿頭上煎䭔子三箇猢猻夜簸錢洪武初上以鬼神之事召師師以佛旨撰書而對上大悅癸丑蒲圻魏公觀為蘇郡守見萬壽廢址戚然有意興復聞師寓虎丘遣使致書幣凡三往返而應𣆶歲養閒于松林蘭若儕輩不敢名咸稱松林和尚云十五年三月望示疾十九日同參如愚仲訊候曰師行矣諸子在旁盍賜一言為末後訓乎師曰十方薄伽梵一路涅槃門曰與師締交五十秋矣此別直詣淨土相見師厲聲曰盡大千界是箇淨土何處不相見良久索筆書偈泊然而逝世壽七十四僧臘六十七明州瑞龍夢堂曇噩禪師慈溪王氏子祖父皆名宦母周氏師自幼有遠志稍長博通經史藻思濬發年二十三白母出家往從雪庭于長蘆遂剃髮受具戒于昭慶教相諸宗靡不研究久之雪庭遷住靈隱師復往依侍踰年雪庭示寂寂照端禪師來補其處一見吻契即命掌內記後出世慶元之保聖遷慈溪之開壽天台之國清最後住象山之瑞龍上堂豎拂子只者箇在臨濟則大機大用卷舒擒縱殺活自由在雲門則孤危聳峻格外提持言前定奪在曹洞則家風綿密金針玉線明投暗合在溈仰則父慈子孝用劍刃事施陷虎機在法眼則箭鋒相拄心空法了情盡見除五家提唱雖則金聲玉振邁古超今然而總是門庭施設直截一句不曾道著且道作麼生是直截一句高聲曰看腳下上堂一二三四五六七七六五四三二一黃河九曲出崑崙摩訶般若波羅蜜師每誡諸徒曰研究空宗當外形骸忘寢食以消纍劫宿習然後心地光明耳自是日惟一食終夜凝坐達旦一日忽戒浴易衣出器物分遺交友集衆說偈曰吾有一物無背無面要得分明涅槃後看言畢危坐而逝世壽八十有九門人智巖等茶毗之塔于國清杭州徑山復原福報禪師台之寧海人族姓方母張氏出家杭之梁渚崇福時石湖美公主淨慈師往見湖器之遂為祝髮受具戒參徑山元叟叟問近離甚處師曰淨慈叟曰來作什麼師曰久慕道風特來禮拜叟曰趙州見南泉作麼生師曰頭頂天腳踏地叟曰見後如何師曰饑來喫飯困來打眠叟曰何處學得者虗頭來師曰今日親見和尚叟頷之出世慈溪蘆山次遷東山再遷四明智門洪武初驛召道行沙門師赴京館天界寺屢入內庭應對稱旨留三年仍賜還智門後兩主徑山上堂舉一不得舉二放過一著落在第二古人恁麼說話正是抱贓叫屈東山即不然舉二不得舉一放過一著落在第七到者裏更須知有向上一路始得如何是向上一路良久曰莫戀寒巖異草青坐却白雲宗不妙上堂一葉落天下秋一塵起大地收誰謂北鬱單越不是南贍部洲剛自騎牛更覓牛上堂語是謗默是誑還有二俱不涉者麼拍禪牀洎合停囚長智上堂一語一默一作一止何似水銀落地僧問趙州曰乞師指示州曰喫粥也未僧曰喫粥了也州曰洗盂去上堂終日著衣未嘗挂一縷絲終日喫飯未嘗咬一粒米似地擎山不知山之孤峻如石含玉不知玉之無瑕不著佛求不著法求不著僧求拈拄杖有時乘好月特地過滄洲一日得疾甚革侍者請偈師叱曰吾世壽尚有三年已而果然及化之日忽拍手曰阿呵呵大衆是什麼看取竟寂世壽八十四僧夏六十四門人奉全身瘞寂照之右岡杭州靈隱竹泉了幻法林禪師族姓黃台之寧海人依法安太虗禪師出家因看睦州語有省白虗曰從生至死只是者箇不繇別人也往參元叟於中竺叟問何處來師曰天台叟曰曾見寒山拾得麼師叉手向前曰今日親見和尚叟曰脫空謾語漢參堂去尋俾侍香復掌藏鑰一日看經次叟曰看經那師曰是叟曰將甚麼看師曰將眼看叟豎起拳曰何不道將者箇看師曰放下拳頭將什麼看叟微笑東嶼住淨慈招師分座時竺原居浮山得師提唱語稱譽不置尋美以偈有五百衆中居上首妙解堪作人天師之句師居淨慈蒙堂不出戶者九年行省左丞相脫歡公請主萬壽遷中竺至佛殿曰撥塵見佛誰知佛亦是塵罕逢穿耳客多見刻舟人上堂法是常法道是常道拶破面門點即不到雪峯一千七百人善知識朝夕只輥三箇木毬趙州七百甲子老禪和見人只道喫茶去中峯居常見兄弟相訪只是敘通寒溫燒香叉手若是金毛師子子三千里外定誵訛至元四年遷靈隱上堂舉僧問趙州萬法歸一一歸何處州曰我在青州做一領布衫重七斤師曰趙州雖則善用太阿截斷者僧舌頭未免自揚家醜靈隱則不然忽有僧問萬法歸一一歸何處只向他道今日熱如昨日上堂古杭管內靈隱名山肇建于東晉咸和年間慧理法師為第一祖今日上元令節諸處放燈知事直歲各各照管風燭便下座為亡僧森監寺火森羅及萬象一法之所印即今為汝拈却金剛圈栗棘蓬了也喚什麼作一法二由一有一亦莫守火裏烏龜作師子吼大龍翔虗席星吉大夫遣幣聘師辭不赴使者三往返師避于會稽山中行院知不可強具疏請師仍領靈隱又三年退處了幻菴至正十五年春感微疾二月二日集衆敘平生行腳本末且誡之曰佛法下衰無甚于今宜各努力吾世緣止于斯矣索筆書偈曰七十二年虗空釘橛末後一句不說不說遂奄然而化留龕十日顏色不變葬全身於松源塔西其時塔前古桂當春吐華清香滿路見者歎異學士晉卿黃公銘其塔杭州徑山古鼎祖銘禪師四明奉化應氏子受業金峩元叟住靈隱師往參謁一日入室叩黃龍見慈明因緣叟詰曰只如趙州道臺山婆子被我勘破慈明笑曰是罵耶你道二老漢用處是同是別師曰一對無孔鐵鎚叟曰黃龍直下悟去又如何師曰也是病眼見空華叟曰不是不是師擬進語叟便喝師當下廓然命居記室師愈自謙抑年五十四始出世主隆教次寶陀次中天竺至正七年遷徑山元帝錫號慧性文敏宏覺普濟禪師僧問祖意教意是同是別師曰破畚箕生苕帚僧禮拜曰謝師指示師曰昨夜三更失却牛天明起來失却火問如何是佛師曰稱鎚蘸酢曰如何是向上事師曰仰面不見天曰記得僧問雲門如何是佛門曰乾屎橛又作麼生師曰雲門不是好心僧曰乾屎橛與稱鎚蘸酢相去多少師曰鑊湯無冷處僧擬進語師便喝上堂將十方世界安向諸人眼睫上絲毫不動把四大海水傾向諸人腳跟底涓滴不流會醫還少病知分不多愁上堂舉大愚芝和尚示衆曰大家相聚喫莖虀若喚作一莖虀入地獄如箭射師曰宗師為人如蠱毒之家置毒於飲食之中與人未嘗不欲斷其命根雖然是冤對者能有幾人丞相康里公每詣師叩宗門玄旨一日看經次問師何不看經師曰尋行數墨為看經耶相無語師翻經曰老僧看經去也相以手掩經曰請師為說破師曰伊尹周公是阿誰做至正戊戌將遷寂遺書囑丞相外護復書偈曰生死純真太虗純滿七十九年搖籃繩斷擲筆而逝茶毗舌根數珠皆不壞舍利無算於徑山隆教寶陀分而塔焉世壽七十九僧臘五十五有四會語録暨外集行世明州天寧歸菴仲猷祖闡禪師族陳氏鄞人也從佛智匡禪師剃染參寂照于徑山得旨出世蘆山遷香山升郡之天寧上堂若論第一句三世諸佛道不得六代祖師道不得天下老和尚道不得山僧道不得大衆道不得拈拄杖拄杖子道得麼道得也是第二句上堂即心即佛非心非佛不是心不是佛五臺山上雲蒸飯佛殿階前狗尿天剎竿頭上煎鎚子三箇猢猻夜簸錢元宵上堂十五日已前腳頭腳尾黃金蓮十五日已後白牯狸奴成隊走正當十五日樓臺上下火照火車馬往來人看人好大衆且道好在什麼處衆眼難謾便下座蘇州開元愚仲善如禪師吳江人上堂佛身充滿于法界普現一切羣生前為甚麼滬瀆居民黃老之流迎之而風濤駭吐像即沉沒吳縣朱膺東靈帛尼請之而靈相峩峩雙泛試就提捧忽爾升舟今山中所奉維衛迦葉二石相是也豈非隨緣赴感靡不周而恆處此菩提座然雖如是若作恁麼會大蟲看水磨不作恁麼會真州望長蘆恁麼不恁麼總拈却又作麼生清平世界不用訛言師言不妄發或求偈語信筆而書示草菴僧偈曰國師萬代善知識鴈宕草菴天下聞得在其中居住者生難遭想報深恩度牒親從天上降得來何翅萬黃金時中若不修僧行孤負皇王一片心師𣆶年因法門從子瓛瑩中住萬壽闢一室延之養老及相本空繼席待之尤至故得優游以樂其道嘗居葑門直指菴人因稱之曰直指和尚將終呼諸子訣別泊然而逝杭州上竺我菴本無法師黃嵒人從淨慈方山落髮依寂照於中竺掌綱維有舅氏教庠老成挽之更宗於是見湛堂于演福研精教部寂照惜其去作偈寄之曰從教入禪今古有從禪入教古今無一心三觀門雖別水滿千江月自孤後出世既為湛堂嗣仍爇一香報寂照不以跡異而二其心寂照示寂時師住四明延慶遺書囑其力弘教乘宗趣餘無他言師於祭筵拈香曰妙喜五傳最光焰寂照一代甘露門等閒觸著肝腦裂冰霜忽作陽春溫我思打失鼻孔日是何氣息今猶存天風北來歲云暮掣電討甚空中痕臨終無疾坐蛻蘇州萬壽佛初智淳禪師送忠侍者偈曰鳥窠吹起布毛侍者當下悟去一對無孔鐵鎚賣弄鬼家活計若是靈利阿師別有天然氣宇恢張本地風光顯出衲僧巴鼻以大千攝入毫端將須彌納向芥子直踏毗盧頂上行千手大悲攔不住江心萬禪師法嗣報恩無方智普禪師桂陽人族姓龍住後上堂六月行人口吐烟區區只為利名牽爭如林下無心客一覺和衣到曉眠拍禪牀乾明不惜口業為你說破臘月三十日閻老子要問你索飯錢在上堂春色濃春日融園林暖野桃紅昔日靈雲一見透脫色空而今諸人總見因甚不悟若也不悟眼被色籠擊拂子錯教人恨五更風南康府雲居小隱師大禪師嘗有示信禪人偈曰信是道元功德母藥如有驗不消多上人直下承當得佛祖安能奈爾何徑山熙禪師法嗣金陵集慶笑隱大欣禪師九江義門陳氏子從郡之水陸院芟染自幼開爽絶倫初見一山萬既而遣詣百丈參晦機機一見器重命掌記室一日問曰黃龍既得旨於泐潭領徒游方及見慈明氣索汗下過在什麼處師抗聲曰千年桃核裏覓甚舊時仁又一日室中侍立次機舉百丈野狐話詰曰不落因果便墮野狐身不昧因果便脫野狐身且道利害在什麼處師擬答機遽震威一喝師當下渙然冰釋因同參苦問師答頌曰百丈野狐野狐百丈埋作一坑伏惟尚享後出世湖之烏回遷杭之報國中竺天曆元年文宗以潛邸為大龍翔集慶寺妙簡名德開山師首膺其選賜號廣智全悟大禪師復驛召赴闕見上奎章閣賜坐咨問法要及順帝御極待遇益隆後以老病求退優詔不許敕外臺護視使安居終老上堂安養國中水鳥樹林悉皆念佛知足天上樹相撐觸演說苦空豎拂子山僧拂子穿却汝諸人鼻孔諸人向甚處出氣入新寺升座第一義諦明如杲日寬若太虗萬彚森然纖塵不立明今舉古無非節外生枝立主立賓何異虗空釘橛然聖旨建寺諸官臨筵不可只恁麼休去還有共相激揚底麼問答不録乃曰釋迦世尊捨金輪而登佛位今上皇帝從佛位而御金輪收攝三千剎海於一印中具足八萬法門於一毫上如華嚴會上菩薩得無盡福德藏解脫門於一器中出生種種美味飲食又於衆會仰觀空中而雨種種珍寶隨衆生心悉令滿足然後得其寶者盡證法門食其味者咸成妙道無一塵而不具足佛事無一法而不圓滿正宗即今崇建寶坊闡揚法施諸天音樂不鼓自鳴梵唄詠歌自然敷奏十方菩薩咸集道場八部天龍同伸慶讚還有不歷化城徑登寶所者麼擊拂子四海已歸皇化裏時清休唱太平歌上堂孤峯頂上目視雲霄無乃埋沒己靈十字街頭和泥合水且貴流通正眼拈拄杖釋迦已滅彌勒未生正當今日千聖命脈列祖鉗鎚總在新報國手裏拈起也七穿八穴頭頭現無邊妙身放下也鑑地輝天處處彰寶王剎海說甚麼溪山各異雲月是同至化無為功不宰蕩然一片古皇風復舉志公令人傳語思大和尚曰何不下山教化衆生去一向目視雲漢作什麼思大曰三世諸佛被我一口吞盡何處更有衆生可度師曰思大和尚被志公一拶直得倒退三千進退兩序上堂心空及第選佛何必選官荷負叢林為衆一似為己報國為法擇人量材授職如樂奏九成左右進退無不合度只如一喝分賓主照用一時行諸人作麼生甄別喝一喝九萬里鵬才奮迅三千年鶴便翱翔上堂言發非聲色前不物著甚來由聲色裏睡眠聲色裏坐臥却較些子所以道即此見聞非見聞無餘聲色可呈君箇中若了全無事體用何妨分不分驀拈拄杖水流黃葉來何處牛帶寒鴉過別村卓拄杖上堂舉黃龍南禪師室中垂語曰我手何似佛手我腳何似驢腳人人有箇生緣那箇是上座生緣師曰黃龍三關如商君立法法雖立而廢先王之道故當時出其門者甚多得其傳者益寡使其恪守慈明家法子孫未致斷絶僧侍立次師展兩手曰八字打開了也為什麼不肯承當僧曰休來鈍置師曰許多時沒一點氣息便打一日謂衆曰青州布衫重七斤古人已道過了也畢竟萬法歸一一歸何處一僧出曰東廊頭西廊下師曰什麼處見趙州僧擬議師曰棒上不成龍僧參師曰豎拂拈槌古人榜樣擎叉舞劍列祖條章衲僧門下合作麼生僧珍重便行師曰不消一劄師一日問僧甚處來僧曰遊山來師曰笠子下拶破洛浦遍參底作麼生僧曰未入門時已呈似和尚了也師曰即今為什麼不拈出僧擬議師便打至正四年甲申五月示微疾作手書別交游囑其徒以兩朝所賜金幣作萬佛閣上報國恩二十二日書偈趺坐而寂其年秋八月十有六日葬于石頭城塔院之後岡壽六十一臘四十六黃文獻公溍撰銘虞文靖公集著行道紀洪武甲寅遷葬于撥雲山與康僧會古塔相鄰所著有禪林清規及四會語録蒲室集行世嘉興府祥符梅屋念常禪師俗姓黃華亭人父文祐母楊氏乞嗣大悲像一夕夢老僧託宿因而有娠至元壬午三月十二日誕生是夜神光燭室異香襲人師幼喜孤坐年十二依平江圓明院體志出家十四剃髮受具至大戊申佛智晦機自江西百丈遷杭之淨慈師往參承值佛智上堂舉太原孚上座聞角聲悟道因緣頌曰琴生入滄海太史遊名山從此楊州城外路令嚴不許早開關師於言下豁然有省投丈室呈所解佛智頷之俾掌記室逮智遷徑山師職後版表率一衆丙辰奉朝廷遴選出世祥符所著有佛祖通載二十二卷明州雪竇石室祖瑛禪師吳江陳氏子髫年出家於普向寺年十五祝髮受具戒即䇿杖遊方初從虗谷陵于仰山聞徑山晦機道望亟往投之一見契合遂留掌記後出世明之隆教遷杭之萬壽明之雪竇育王有謝天童平石砥問疾偈曰是身無我病根深慚愧文殊遠訪臨自有巖華談不二青燈相對笑吟吟法身遍在一切處噇飯噇空得自由太白鄮峯煙雨裏笋與來往亦風流𣆶年得痿痺疾造一龕曰木裰日坐其中不涉世事至正癸未三月見一衰衣婦人扣頭請師應身為國王師曰吾不願生天王家逾十七日趺坐而化臨終偈曰五十三年弄巧成拙踏破虗空赤腳行萬象森羅笑不輟杭州中竺一關正逵禪師番陽人族方氏參晦機于淨慈機問甚處人師曰番陽機曰番陽湖水深多少師曰瞪目不見底機曰恁麼則浸爛衲僧鼻孔也師曰終不借和尚鼻孔出氣機曰畢竟借誰鼻孔出氣師曰恭惟和尚萬福機肯之命充侍者逾二年參中峯于天目復謁徑山元叟命掌記笑隱主中竺俾師分座出世金陵崇因帝師授以佛日普照之號遷鳳山資福升主報國再遷中竺示衆曰心不是佛智不是道一念涉思惟全身入荒草所以道目前無法意在目前不是目前法非耳目之所到古今天地古今日月古今山河古今人倫頭頭顯露物物全彰不從千聖借不向萬機求內外絶承當古今無處所恁麼解會猶是錯認驢鞍轎作阿爺下頷雖然既是泗洲大聖因甚在揚州出現良久曰參後示寂世壽五十七僧臘四十四明州佛巖仲方天倫禪師象山張氏子幼而岐嶷投廣德天寧竺源剃落源曰汝志宏遠堪任大法無為我滯遂往見虎丘東州永偶過旃檀林同一僧看傳燈録謂師曰千七百則公案渾如生鐵鎖子一般只要鎖匙入手師言下點首默契乃參晦機於淨慈才人門機曰湖山靄靄湖水漾漾浸爛你鼻孔塞破你眼睛因甚不知師曰通身無影象步步絶形蹤機曰未在更道師拂袖便出機俾居侍司復掌藏鑰師憚其繁嘆曰世降道衰人根浮薄宿師碩德具大知見猶不為學者信服無他蓋表裏不純故也自是必欲剷蹤削蹟聞吳興桃華塢僻邃乃往縛茆一日灌園次忽四山雲暝驟雨疾風摧折林木霹靂一聲胸中疑礙頓釋乃曰大奇大奇也大奇掇轉虗空顛倒騎蟭螟吞却五須彌曩於南屏室中屢叩老和尚終不肯為我說使當時說破安有今日耶泰定丁卯出主廣德東泉遷明之佛巖笑隱居龍翔招師分座說法南臺治書吐魯公數來問道與師泛論契合舉師主保寧僧參師曰好箇師僧恁麼行腳僧曰撥草瞻風豈圖別事師曰喫得棒也未僧擬議師便喝問如何是和尚家風師曰誰人看不見問如何是一相三昧師曰青黃赤白問如何是鳳臺境師曰鳳臺有什麼境上堂初三十一中九下七七九六十三九九八十一朝往西天暮歸唐土一馬生三寅石牛欄古路臘八上堂昨夜覩明星悟道後園風打籬笆倒曉來無蹟可追尋雪山依舊生青草上堂言無展事語不投機承言者喪滯句者迷與麼也不得不與麼也不得與麼不與麼總不得你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子上堂舉雲門因僧問久雨不晴時如何門曰劄師曰雲門一劄猿啼巴峽熊耳峯高石頭路滑師𣆶年卜築於鳳臺之西曰新菴將終謂淨覺曇曰欲以後事相浼今日何日覺曰二十九日師曰月窮日不宜去明日五月一吾行矣至期召門人付囑舉手作別端坐而逝壽六十六臘五十一越州天衣業海子清禪師上堂三歲孩兒抱華鼓八十翁翁輥繡毬嬌羞老醜都呈露直得諸人笑不休山僧昔在南屏山下糞掃堆頭拾得一領破襴衫子抖擻將呈天目不為顧采又過崇德撞著惡辣漢被渠扯破七孔八穿收拾歸南屏深藏四十餘年不將輕與外人無端今日來天衣比看破舊相似顏色一般著來嫌袖大起舞覺天寬直得十峯齊起舞雙㵎共鳴湍盡看當場鮑老不知笑倒傍觀遂大笑拈拄杖畫一畫更把一枝無孔笛等閒吹出萬年歡復舉三聖逢人則出話師曰二大老竊得臨濟些子家私各自賣弄檢點將來好與一坑埋却同參至上堂颯颯凉風景同人訪寂寥煮茶山下水燒鼎洞中樵慈祖將常住物作自己人情天衣則不然供佛懶拈華延賓不煮茶莫嫌無禮數冷淡是僧家師之出世天衣年已八十六矣有季潭泐公疏曰大鵬舉翮便高蟠桃開華何晚又曰宜兜率見素翁而下拜如西伯得呂望而載歸大抵不苟時名亦神鼎諲公之流亞也徑山高禪師法嗣杭州中竺一溪自如禪師閩人元兵下南江師年少遭遊卒挾至臨安遺之而去富民胡氏收養之令伴子讀師隅立默識無所失胡氏因子之既長俾師隸里中無相寺為僧參雲峯于徑山得旨初住萬壽天曆初中竺笑隱欣奉詔開山龍翔因舉代住者三人御筆點師名宣政院具疏請師居焉有大家黃氏者重師道行嘗供伊蒲塞饌一日請歸其家進供愈勤乃開私帑所藏金玉示師師怫然歸語徒衆曰彼黃氏以帑中寶示我將欲誘我死去為其子耶出家兒視金玉當如瓦礫古來墮此轍者頗多非但為其子為其牛馬者有之遂與黃氏絶後遷化茶毗靈異頗多江州東林古智禪師都昌人族巢氏初住興國興聖遷東林上堂過去諸佛已說未來諸佛當說現在諸佛今說且道畢竟說箇甚麼卓拄杖下座上堂明來暗謝智起惑亡黑牛臥死水癩馬繫枯樁何似東村黑王老黃昏伸腳睡一覺到天光山僧與麼道切忌錯承當上堂盡令提綱聖凡罔測放開線道普請同參熏風自南來殿閣生微凉上堂諸禪德祖師道圓同太虗無缺無餘三條椽下七尺單前切忌依他作解莫有向天外出頭底麼乃曰巡堂喫茶禮暹道者塔偈曰髑髏元自有靈光雪竇何曾抖尿腸截斷婆婆三寸舌至今雙劍倚天長送萬禪人參徑山虗谷和尚偈曰萬轍千途同一車參方眼正不曾差一千七百人中主元是仰山小釋迦明州天童怪石奇禪師普說其略曰參禪本無難易只要具大信根有決烈志萬機休罷千聖不𢹂坐斷諸緣不存一法如太虗空了無朕迹如須彌盧屹然不動無上真乘方可希冀又曰此事如人饑渴相似說飲說食豈能救療直須自飲水自喫飯方有實效處又曰因舉從上先德痛切為人語要開示倘能向者裏虗却心不即法相不離法相一聞頓悟便是涅槃會上廣額屠兒放下屠刀立地成佛底時節是即是不得恁麼會言多去道轉遠且截斷葛藤喝一喝下座杭州徑山本源善達禪師仙居柴氏子早年同及菴信行腳誓不歷職初見雪巖於仰山尋還浙西參徑山雲峯入室有省峯印可之適慧雲虗席命師補處後遷保寧淨慈徑山皆有成績可紀師居常不設臥榻夜則焚香然燭端坐達旦率以為常又體所稟與人異遇嚴寒則衣絺綌大熱則衣繒絮嘗以資建大圓院於東路半山接待雲侶一日自知時至會衆敘平生行腳事畢須臾端坐而寂龍巖真首座諸方屢聘高臥不起嘗作樂閒歌曰即心是佛無心是道萬事但隨緣自覺身心好院子從來不要住便是佛也不要做律亦不曾持戒亦不曾破放行把住總由人執法修行驢拽磨要行便行要坐便坐也不精進也不懶惰一卷三字經逐日為工課有時深深海底行有時高高山頂臥幾生修得做閒人肯為虗名被羈鎖我不輕汝等從他當面唾百年能得幾光陰何必強分人與我貧也不須憂富也休莊大閻王相請無親疏盡付一堆紅焰火自家作得主宰終不隨風倒柁補破遮寒暖即休淡飯粗茶隨分過我作樂閒歌自歌還自和不是閒人不肯閒世上閒人能幾箇何山明禪師法嗣明州恭都寺者廉介自持日誦法華因聆鐵鏡上堂語遂得心要嘗夜坐有偈曰點盡山一盞油地爐無火冷啾啾話頭留向明朝舉道者敲鐘又上樓鐵鏡因升堂特稱賞之臨終無疾更衣坐逝闍維舌根不壞天童鑒禪師法嗣明州雪竇竺田汝霖禪師昌國王氏子從梅㵎福公祝髮受具聞天童止泓道化往參命為侍者一日室中舉趙州狗子無佛性話師豁然有省已而見悅堂誾於靈隱堂器之命典記室會其受業師祖方巖會禪師赴隆興上藍師侍行因游百丈謁晦機遂命分座出世明之雪竇𣆶主萬壽僅一載示微疾更衣書偈訣衆而逝時至元五年五月草五日也茶毗設利五色如菽粟者不可勝數壽六十六臘五十湖州道場玉溪思珉禪師象山張氏子首參雲峯于徑山次謁止泓于天童泓問近自何來師曰徑山泓曰未離徑山一句作麼生道師曰平如鏡面險似懸崖泓曰昨夜山前因甚虎咬大蟲師擬進語泓即掌之師忽有省一日侍次泓舉世尊因外道問不問有言不問無言世尊良久意旨如何師叉手進前泓曰外道讚歎曰世尊大慈開我迷雲令我得入又作麼生師曰君子愛財取之有道泓喜其類己令典藏大德四年出世郡之吉祥遷金文大梅保福帝師賜佛心明妙之號至順三年廣教府聘主雙林元統二年行省選住道場示衆此事如鐵壁銀山如大火聚湊泊不得回避不得你輩合作麼生直饒腳不點地別有通霄活路也是不快漆桶上堂依經解義三世佛冤離經一字即同魔說拈拄杖卓一下六月不熱五穀不結至元三年四月示微疾至二十八日書偈而逝靈隱誾禪師法嗣杭州徑山月江宗淨禪師金華倪氏子自幼聰慧絶倫年十七從正覺院文譯受業因誦楞嚴如人以手指月是人因指應當見月豁然開悟遂謁悅堂問黃檗打臨濟你作麼生會師曰按牛頭喫草堂奇之命維那職後出世徑山玄風遠播𣆶歲退居東堂示衆曰坐斷陵霄已十年匡宗論道只隨緣於今休去便休去嘯月吟風樂自然元統壬戌十月三日示微疾當午集衆說偈曰祖師門下客開口論無生老我百不會日午打三更語畢端坐而逝壽六十七全身塔於圓照菴江州東林無外宗廓禪師南昌人魏姓久依悅堂一日室中舉溪聲盡是廣長舌因緣機契遂授記莂出世雲居𣆶遷東林送僧之東吳偈曰佛是西天老比丘何緣臥倒在蘇州憑君此去輕扶起問取二千年話頭臨終集衆說偈曰吾年七十一世緣今已畢挨倒五須彌夜半日頭出語畢而逝中竺有禪師法嗣嘉興府石門真覺元翁信禪師真覺開山上堂向上一機末後一訣佛祖不傳千聖結舌莫有轉身吐氣者麼出來通箇消息看僧問鈯斧開山從古有師今新啓石門關借路經過不妨一問師曰公驗快將來僧曰如何是關中主師曰鏌鎁橫在手未肯斬癡頑僧擬議師便喝僧禮拜師曰癡頑漢乃曰滿目溪山絶點埃無邊剎海自周圍毗盧樓閣重重現誰覩門門有善財卓拄杖石門關啓真覺場開一任南來與北來小參建法幢立宗旨明明佛敕曹溪是大衆建法幢則固然如何是立宗旨莫是三轉五轉豎拳下喝麼莫是默然據座拂袖便行麼莫是語言文字確古論今麼莫是灰頭土面長坐不臥麼切須仔細若是正眼不明盡墮偏邪執滯所以道醍醐上味為世所珍遇斯等人翻成毒藥據我祖師門下盡十方世界是箇無縫鐵壁達磨不識盡十方世界是箇無孔鐵鎚迦葉不知無汝擬議處無汝承當處旋天轉地換斗移星雙放雙收透頂透底還會麼龍袖拂開全體現象王行處絶狐蹤風幡中禪師法嗣呂鐵船居士母秦國夫人夢公安二聖住持福嵒佑禪師至舍而生弱冠時參空山一日山問曰曾見趙州麼士厲聲曰無山休去每稱於人曰再來人也士嘗任江淮都總管於蘇之嘉定建永壽寺以延雲水賡和永明壽禪師山居詩及他偈言皆超倫邁俗達磨忌拈香曰西來不稱梁王旨西去空𢹂一隻履若言妙用與神通真正衲僧誰數你九年面壁尋出場接得一人又無臂衣盂連纍到盧能從此葛藤生不已罪過有彌天源流無滴水今朝七百八十六年逢忌辰那箇兒孫不痛徹骨髓一爐香篆一甌茶報恩却是孤恩底欲把拳頭舉似伊憐渠已沒當門齒華藏見禪師法嗣蘇州陽山金芝嶺鐵𭪿念菴主示衆靈山付囑天下葛藤樁少室單傳諸方是非窟安心懺罪破漆桶又要重光付法傳衣滯行貨徒勞索價臨濟棒頭開正眼拳下示生涯曹洞錦帳繡鴛鴦行人難得見雲門三句可辨一鏃遼空法眼大地山河俱為妙用溈仰團圝無縫罅壁立絶中邊看來世界清平何用強生節目金芝今日為諸人斷者公案去也看看以拄杖畫一畫四海浪平龍睡穩九天雲淨鶴飛高復舉三聖道我逢人則出出則不為人興化道我逢人則不出出則便為人頌曰誰謂家風分兩邊一條拄杖兩人牽休觀千嶂陵雲勢好看銀河落九天頌舍利弗入城月上女出城話曰出城入郭兩相逢來去誰云路不同回首涅槃臺上望九州四海一家風皖山凝禪師法嗣松江府澱山蒙山德異禪師高安盧氏子初參承天孤蟾命看趙州無字話一日蟾問亡僧遷化向甚處去師罔措悱發參究因首座入堂墜香盒作聲豁然有省述偈曰沒興路途窮踏翻波是水超羣老趙州面目只如此尋謁雪巖退耕虗舟諸大老舟問不是心不是佛不是物是什麼師曰所供竝是詣實又問南泉斬貓意旨如何師曰剖腹傾心舟曰趙州戴草鞋出去又作麼生師曰手腳俱露一日室中舟問雪覆千山為甚麼孤峯不白師曰別是一乾坤舟大稱賞勸謁皖山山問光明寂照遍河沙豈不是張拙秀才語師擬答山震威一喝師當下釋然一日山舉臥雲深處不朝天因甚到者裏師曰有道則見山深肯之承天覺菴處以第一座後隱居蓮湖橋休休菴出世澱山僧問保壽開堂三聖推出一僧意旨如何師曰兩彩一賽曰保壽便打又作麼生師曰為人須為徹曰三聖道恁麼為人非但瞎却者僧眼瞎却鎮州一城人眼去在是肯他不肯他師曰兜率陀天一晝夜人間四百年上堂昨日十四今日十五靈利衲僧吞却佛祖從教謝三郎月下自搖櫓阿呵呵莫莽鹵甜瓜徹蒂甜苦瓠連根苦示衆蘇州有常州有八角磨盤空裏走日面佛月面佛覿面和盤都托出便與麼掀倒禪牀拂袖散去法門幸甚或有猶豫之者只得把手牽汝歸家聞聲悟道見色明心豎拂子曰見麼見底是色那箇是心喝一喝曰聞麼聞底是聲那箇是道直下正眼豁開方得入門猶是脫白沙彌要與衲僧齊驅竝駕更進竿頭一步金牛真禪師法嗣舒州太湖普明無用寬禪師結夏上堂諸方結制有甚巴鼻太湖梁山冷冰冰地二百箇鐵額銅頭無用分作兩處提起放下吞聲飲氣擬議之間頂門著地卓拄杖下座佛成道日上堂六年雪山錯忽見明星錯走下山來錯錯錯假使九州之鐵也難鑄此一錯卓拄杖大地含靈同成正覺中峯和尚至上堂明明百草頭明明祖師意天目山古佛輝天并鑒地虎咬大蟲蛇吞鱉鼻擲拄杖曰直下來也急著眼覷大衆懷香拜請幻住大和尚慈悲開示便下座真翁圓禪師法嗣無為州天寧無能教禪師於門首懸一牌云謹防惡犬竺源盛參才跨門便曰老和尚為我趕狗師便入去智首座出迎同坐須臾師從面前過智起白曰此上人得得來見和尚師曰已相見了也已而師訶蒙山不合引兄弟禮懺施食源曰實際理地不受一塵佛事門中不捨一法師曰不然我宗門中合提何事如何是佛麻三斤如何是佛乾屎橛當提此事始得源曰蒙山和尚嘗問學者曰栽松道者不具二緣而生達磨大師葬熊耳後隻履西歸為復是神通妙用是法爾如然師曰為是他不會我道莫作禪會得麼源當下如夢忽醒慶壽璋禪師法嗣北京大慶壽海雲印簡禪師寧遠宋氏子生而神悟七歲父授以孝經開宗明義章師曰開者何宗明者何義父驚異於是俾從中觀沼禪師受業年十一納具戒十二沼聽參問一日侍沼行沼曰法燈禪師道看他家事忙且道承誰力汝作麼生會師將沼手一掣沼曰者野狐精師喏喏沼曰更須別參始得年十八元兵破寧遠四衆逃散師侍沼如故沼曰吾迫桑榆汝方富有春秋何當玉石俱焚宜自遠遁師泣曰因果無差死生有命安可離師苟免乎沼察其誠囑曰子向去朔漠有大因緣吾將與子北渡後遇元帥史天澤載于黃犢車經年至赤城庚辰五月沼將遷寂書偈曰七十三年如掣電臨行為君通一線泥牛飛過海東來天上人間尋不見無疾而逝闍維收頂骨舍利供養師為乞食造塔一夕聞空中呼師名師瞥然有省復聞人告曰大事將成毋滯于此黎明遂䇿杖之燕過松鋪值雨宿崖下因擊火大悟曰今日始知眉橫鼻直信道天下老和尚不寐語明日至景州見本無玄玄問從何所來師曰雲收幽谷玄曰何處去師曰月照長松玄曰孟八郎漢便恁麼去也師諾諾趨出初沼臨終師問某甲當依何人了此大事沼曰賀八十去逮入燕至大慶壽寺乃省前讖於是謁璋璋先一夕夢異僧䇿杖徑趨方丈踞座天明璋謂知客曰今日但有旦過當令來見老僧及𣆶師至璋笑曰此夜來所夢者師問不來而來作麼生相見璋曰參須實參悟須實悟莫打野榸師曰某甲因擊火迸散乃知眉橫鼻直璋曰吾此處別師曰如何表信璋曰牙是一口骨耳是兩片皮師曰將謂別有璋曰錯師喝曰草賊大敗璋休去次日璋舉臨濟兩堂首座齊下喝僧問還有賓主也無濟曰賓主歷然汝作麼生會師曰打破秦時鏡磨尖上古錐龍飛霄漢外何勞更下槌璋曰途路之樂終未到家師曰精靈千載野狐魅看破如今不值錢璋曰如是如是師拂袖便出遂命掌記一日璋謂師曰汝今已到大安樂田地宜善護持吾有如來正法眼藏涅槃妙心密付於汝毋令湮沒師掩耳而出師住後孔子之後元措者渡河謁師請復曲阜廟祀師為言于忽都護曰孔子以大中至正之道三綱五常之禮正心誠意之本教人自孔子至今襲封五十一代繼承祀事未嘗有缺忽都護遂奏命復襲封爵師兩主慶壽年五十六忽患風痺丁巳閏四月一日集衆說偈畢遂泊然而逝茶毗獲舍利無算諡佛日圓明大師
