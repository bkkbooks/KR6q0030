body:
  text: 明嗣祖沙門東吳通問編定笠澤居士華亭施沛彚集臨濟宗大鑑下第二十世臥龍先禪師法嗣杭州徑山無準師範禪師生於蜀之梓潼雍氏九歲依陰平山道欽出家經書過目成誦紹熙五年冬登具戒明年次成都坐夏正法遇瞎堂高弟堯首座師請益坐禪之法堯曰禪是何物坐底是誰師蒙示誨晝夜體究一日如廁有省明年往謁佛照于育王照問何處人師曰劍州照曰帶得劍來麼師隨聲便喝照笑曰者烏頭子也亂做久之復至靈隱時破菴居第一座同游石筍菴菴之道者請益胡孫子捉不住願埀開示菴曰用捉他作麼如風吹水自然成紋師侍傍有省未幾破菴過天童掃塔師偕往復拉月石溪同遊台鴈至瑞巖雲巢留師分座夜夢偉衣冠者持把茅見授翌日明州清涼專使至師受請入院見所謂伽藍神茅其姓衣冠與疇昔所夢無異升堂開法一香供破菴三年遷焦山期年遷雪竇又三年被敕移育王又三年嵩少林散席徑山朝命以師補處明年寺師逆知其數不動容經意是年冬十月有旨召入內廷上御修政殿引見師奏對詳明上為色動賜金襴僧伽黎復宣詣慈明殿升座說法上埀簾而聽賜佛鑑禪師號三年寺成閲六年復而多助雲至不數年復還舊觀去寺四十里築室百楹接待雲水額曰萬年正續正續西數百步結菴一區為歸藏所上建重閣祕藏後先所賜御翰敞室東西偏奉祖師與先世香火遇始生日為飯僧佛事以贊冥福蓋蜀亂師之先祀遂絶祠奉以旌孝慕上聞嘉歎僧問趙州和尚道三十年前在南方行腳火爐頭有箇無賓主話直至如今無人舉著此意如何師曰舌頭拖地僧曰畢竟如何是無賓主話師曰言滿天下僧曰祇如玄沙聞得乃曰者老漢腳跟未點地在又作麼生師曰一坑埋却僧曰可謂焦磚打著連底凍赤眼撞著火柴頭師以拄杖劃一劃上堂五峯門下百種全無禪牀迫窄堂供蕭疏腳下踏著底破磚頭碎瓦片面前撞見底王獦獠李麻胡恁麼薄福住山真箇孤負老胡良久雖然如是更點分明上堂一夏已滿無事不辦遂府盂卭州磁碗上堂靈山指月曹溪話月代相傳證龜成鱉範上座尋常一張口挂在壁上今日無端入者行戶未免拈出多年曆日說似諸人且要郭大李二鄧四張三知得江南兩浙春寒秋熱示衆若論箇事直是省要奈何諸人自作艱難自作障礙所以尋常東廊西廊見諸人和南問訊山僧便乃低頭相接其實無他只要諸人識得長老是西川隆慶府人氏若也識得便與諸人打些鄉談說些鄉談如今且未說你識得長老且各自知得自家鄉貫也得淳祐戊申秋師築室明月池上榜曰退耕乞老于朝而舊疾適作三月旦升堂示衆曰山僧既老且病無力得與諸人東語西話今日勉強出來將從前所說不到底盡情向諸人面前抖擻去也遂起身抖衣曰是多少十五日集兩序區畫後事親書遺表及遺書十數言笑如平時其徒以遺偈為請乃執筆疾書曰來時空索索去也赤條條更要問端的天台有石橋移頃而逝停龕二七日上遣中使降香賜幣奉全身葬于正續之側塔曰圓照江州雲居即菴慈覺禪師上堂舉雪峰因閩王問擬欲蓋一所佛殿去時如何峰曰大王何不蓋取一所空王殿王曰請師樣子峰展兩手雲門曰一舉四十九師頌曰空王殿樣子雪峰展兩手添得老韶陽一舉四十九總是面南看北斗讚船子和尚偈曰三十餘年在藥山鬼家活計豈能傳當時不得夾山老你且奈煩撐破船舉葉縣省禪師因僧問如何是密用心處縣曰閙市裏輥毬子曰意旨如何縣曰普請大家看頌曰輥毬閙市大家看一陳清風吹面寒定亂不須雙刃劍活人何必九還丹師嘗遊雲居夜宿瑤田莊夢安樂神告曰師於此山只有一粥之緣明日午後到山𣆶參罷會旦過有二僧相毆新到例遭擯逐師竊訝之後數年雲居虗席州符起師補處師欣然承命且徵前夢至瑤田莊而寂明州大慈獨菴道儔禪師贈製鞋匠偈曰透底工夫做已圓須知密處自心傳腳跟著地隨他轉踏到驢年也未穿杭州靈隱石田法薰禪師眉山彭氏子生而慧敏三四歲時見佛僧即知禮敬年十六往從丹稜石龍山法寶院智明出家二十二剃髮受具戒遂游方至石霜禮雷遷塔述偈曰一念慈容元不隔何須特地肆乖張平高就下婆心切惱得雷公一夜忙師名由是大著聞穹窿破菴先禪師道望遂往叩菴一見知為法器室中舉世尊拈華迦葉微笑話師曰焦磚打著連底凍赤眼撞著火柴頭菴異之每於日用語默不少假借師於是決志依棲與無準範日相激礪久乃辭去復遍遊諸老門庭靈隱松源嶽淨慈肯堂充華藏遁菴演咸稱賞之後出世蘇之高峯次遷寒山鍾山虗席廟堂奏師補處寶慶初遷淨慈端平二年復遷靈隱上堂一徑直二周遮衲僧會得萬別千差庭前閒縱目春盡尚餘華老胡不合過流沙拍膝一下便下座上堂大道體寬無易無難相頭買帽此土西天上堂識得心山嶽沉握金成土握土成金腳前腳後現成行貨少室峯前交點不過上堂石中有玉沙裏無油德山臨濟未出常流却憶寒山子時臨古渡頭上堂見聞覺知行住坐臥眨上眉毛早已蹉過赤腳唱山歌路上無人和上堂把定重關諸人性命在山僧手裏放開一線山僧性命在諸人手裏而今也不把定也不放開山僧即是諸人諸人即是山僧三十年後莫道蔣山和泥合水示衆劍刃翻身猶是鈍屋頭問路太無端楚雞不是丹山鳳何必臨風刷羽翰淳祐甲辰三月望示徒曰但得本莫愁末喚什麼作本喚什麼作末松柏千年青不入時人意牡丹一日紅滿城公子醉山僧恁麼道若有不肯底是我同參弟子師俊繪師像求贊有曰末後一句分付廚山衆訝之先是師嘗建接待院於西溪曰寶壽明日忽示疾又明日退歸寶壽趣辦終焉計訣衆而逝窆全身于院後壽七十五臘五十三師五遷望剎閲三十有二年撙節而足用審量而計功雖有大興建一毫不以干人而土木金碧在處成就云靈隱嶽禪師法嗣明州天童滅翁天目文禮禪師杭之臨安人姓阮氏家天目山之麓又號天目云師生六歲携籃隨母採桑俄念携之者誰邪遂有出家志年十六依真相寺智月剃落往淨慈參混源源舉現成公案放汝三十棒話不契復謁育王佛照問恁麼來者那箇是汝主人公師豁然領旨一日照問是風動是幡動者僧如何師曰物見主眼卓豎照曰不是風動不是幡動甚處見祖師師曰揭却腦蓋照喜其俊邁命典書記久之返浙西聽一心三觀于上天竺時松源嶽唱道饒之薦福室中問僧不是風動不是幡動擬議即棒出師聞之頓忘知解遂往見之蒙印可得盡其旨辭去巡禮江淮間祖塔時浙翁琰主蔣山挽師充立僧首座嘉定五年約齊張公鎡請師開法臨安慧雲一香為松源嗣次遷溫之能仁未幾退歸西丘節齊趙公慕師高行微服過訪師亦不問其姓名與語終日而去翌日奏請師住持淨慈室中每舉南山筀筍東海烏鱡話學者擬議師便打莫有湊泊之者後遷福泉升住天童上堂法不孤起仗境方生境既不生法從何立龍湫瀉千尺瀑布且不是境鴈峯聳萬丈高寒且不是法明眼衲僧到者裏合作麼生直饒倜儻分明山僧棒折也未放在何故殺人刀活人劍上堂事事無礙青山掩映斜陽外法法無差櫩前古木閙羣鴉君不見太原孚上座走天涯揚州五更聞畫角吹斷落梅華直至如今未到家上堂舉楞嚴經諸可還者自然非汝不汝還者非汝而誰頌曰不汝還兮復是誰殘紅流在釣魚磯日斜風定無人掃燕子銜將水際飛冬至上堂黃鍾才起時九數從頭數相將幽谷鶯啼次第雕梁燕語田父祭勾芒叢祠敲社鼓農父狎牛郎村姑教蠶婦光陰老盡世間人冬至寒食一百五宏智禪師忌上堂夜明簾外寶鑑堂前元無兼帶豈有偏圓正恁麼時畢竟誰居正位古渡無人霜月冷蘆華風靜鷺鷥眠上堂長頸鳥喬林不棲橫飛天外穴鼻牛山田耕了直上峯頭天下衲僧仰望不及何故嘉州打大象上堂投子和尚道迎之不見其首隨之罔眺其後大似徐六擔板天童則不然仰之彌高俯察非遙橫塘宿鷺斜飛起幾隻銀瓶挂樹腰上堂衆生本不曾迷夜闌雞向五更啼諸佛本不曾悟秋清鴈度長空去拍膝一下西昨夜月華明淳颷已到梧桐樹元宵上堂昨夜摩騰法師遍點蓮燈助佛光明直得善信真人失却光彩太白龍王出來道我從龍種上尊王佛時住此山未聞有者箇消息於是空中打箇閃電變作滿天黑風暴雨還委悉麼我見燈明佛本光瑞如此僧問牛頭未見四祖時如何師曰牛頭曰見後如何師曰牛頭牛頭僧問和尚見佛照時如何師曰石中有玉曰見松源後如何師曰沙裏無油有來上座入方丈曰某甲有狀告投和尚師曰對頭在那裏來曰和尚便是師曰老僧與汝有甚麼冤讐來無語師捉住曰冤家冤家新到相看師問汝名甚麼僧曰智虎師退身作怕勢僧擬議師便歸方丈僧問觀方知彼去去者不至方意旨如何師曰前不搆村後不迭店佛光法照首依師於梁渚師令往下竺參北峯印公示偈曰送子參尋有鷲山諸方多是落前三自從開異歸同後圓旨於今亦倦談揀境分明妙藥方餘之分別更須忘𣆶風吹落殘紅片休向枝頭覓舊香叢林至今傳誦師尤邃于易乾淳諸儒大闡道學師與之遊直示心法朱晦庵問毋不敬師叉手示之楊慈湖問不欺之力師答以偈曰此力分明在不欺不欺能有幾人知要明象兔全提句看取升階正笏時其曉人類如此師所閲五剎通不過八九年而得閒之歲月多逍遙於梁渚之西丘羣衲參叩無異領衆時也將入寂謂侍者曰誰與我造箇無縫塔者曰請師塔樣師良久曰盡力畫不出遂怡然脫去闍維弟子收舍利并遺骨祔葬于應菴塔左壽八十四臘六十八溫州江心石巖希璉禪師潮陽馬氏子上堂舉廣慧璉禪師與祕監楊公大年夜話次慧曰祕監曾與甚人道話來公曰某曾問雲巖諒監寺兩箇大蟲相咬時如何諒曰一合相某曰我祇管看未審恁麼道還得麼慧曰者裏則不然公曰請和尚別一轉語慧以手作拽鼻勢曰者畜生更𨁝跳在公於言下脫然無疑述偈曰八角磨盤空裏走金毛師子變作狗擬欲將身北斗藏應須合掌南辰後師曰內翰攀南辰倚北斗廣慧轉天關翻地軸寥寥千古許誰知斷絃須是鸞膠續僧問昔日佛照光禪師因宋孝宗宣問釋迦佛入山六年所成何事光曰將謂陛下忘却此意如何師答以頌曰大根大器大熏修瞥轉機輪向上頭萬億斯年惟一佛雪山元不隔龍樓台州瑞嵒雲巢岩禪師作經題字偈曰以字不成八字非當陽拈起大家知釋迦老子舌無骨黃葉將來嚇小兒頌靈雲見桃華話曰三月桃華爛熳紅靈雲打失主人翁隨邪逐惡玄沙老半是真情半脫空華藏無礙覺通禪師青苗會上堂破一微塵出大經鳶飛魚躍更分明不將眼看將心看已是重敲火裏冰淹黑豆昧平生直須劫外話豐登繅成白雪桑重緑割盡黃雲稻正青杭州淨慈谷源道禪師舉丹霞然初參石頭剗佛殿前草公案頌曰石頭剗草驗英豪懵懂丹霞眼不高若解轉身行活路至今應不纍兒曹湖州道場北海悟心禪師舉黃檗在鹽官殿上禮佛次時唐宣宗為沙彌問曰不著佛求不著法求不著僧求長老禮拜當何所求檗曰不著佛求不著法求不著僧求常禮如是事彌曰用禮何為檗便掌彌曰太粗生檗曰者裏是什麼所在說粗說細隨後又掌頌曰曾施三掌觸君王佛法何曾有寸長粗行沙門封斷際至今無地著慚惶舉唐文宗蛤蜊因緣頌曰合水和泥底事忙被渠點破大乖張雖然契得君王意爭奈全身入鑊湯明州雪竇大歇仲謙禪師義烏應氏子幼見傅大士心王銘矢志出家初參息菴菴器而抑之曰汝儒者習氣不除焉能學道要到大休大歇田地如木偶人去師蒙激發益自奮勵朝夕孳孳不懈一日忽然有省遂以大歇自名後依松源嶽一日室中舉祕魔擎叉話師豁然大悟上堂舉應菴和尚問密菴如何是正法眼密曰破沙盆頌曰白玉琢成泥彈子黃金鑄就鐵崑崙千年滯貨無人買未免如今纍子孫送維那偈曰興化當年打克賓叢林千載話猶存雲黃有棒且高閣只麼煎茶送出門諾菴肇禪師舉松源示衆曰明眼衲僧因甚打失鼻孔有賊無贓頌曰殺人一萬損三千獨弄單提機不全萬頃滄波明月夜一聲短笛釣魚船題二祖贊曰覓心無處自欺謾甘受齊腰深雪寒三拜起來依位立誰知遍界是波瀾華亭懷古偈曰活計都盧一釣舟錦鱗入手便抽頭我來不覩師親訓柳岸依依蘸碧流湖州道場運菴普岩禪師題趙州像贊曰無端提起七斤衫多少禪人著意參盡向青州做窠窟不知春色在江南舉洞山冬夜喫果子公案頌曰洞山玷辱家風首座埋沒自己雙雙繡出鴛鴦千古扶持不起蘇州虎丘蒺藜曇禪師初住四明延慶遷蘇之穹窿震澤普濟鎮江甘露真州長蘆後至虎丘上堂舉僧問香林如何是衲衣下事林曰臘月火燒山師曰兔子何曾離得窟若有人問延慶如何是衲衣下事只對他道就船買得魚偏美踏雪沽來酒倍香上堂念念釋迦出世時時彌勒下生頓超天地未分之前不歷階梯掀翻寶所便恁麼去可以開無量法門可以演百千妙義驀拈拄杖卓一下無量法門百千妙義盡向者裏百雜碎了也還知虎丘落處麼靠拄杖祖禰不了殃及兒孫頌靈雲見桃華話曰三月桃華是處開靈雲雙眼盡塵埃謝郎重整釣鼇手未免將身一處埋台州瑞岩少室光睦禪師上堂舉曹山霞禪師因僧侍立次山曰道者可煞熱曰是山曰祇如熱向甚麼處回避曰向鑊湯爐炭裏回避山曰祇如鑊湯爐炭裏又作麼生回避曰衆苦不能到師頌曰瞎却頂門三隻眼鑊湯爐炭裏優遊若言衆苦不能到端的何曾有地頭題四祖像贊曰破頭峰頂紫雲飛三却天書老翠微滯貨雖然無用處不應分付小孩兒鎮江府金山掩室善開禪師上堂舉密菴破沙盆話頌曰法眼拈來早自謾無端錯對破沙盆而今遍界難遮掩殃害叢林及子孫明州雪竇無相範禪師上堂舉趙州和尚曰才有是非紛然失心還有答話分也無僧舉似洛浦浦扣齒又舉似雲居居曰何必僧回舉似趙州州曰南方大有人喪身失命僧曰請和尚舉趙州方舉前話僧指旁僧曰者箇師僧喫却飯了作恁麼語話師頌曰坐底見立底立底見坐底咄哉老趙州白日眼見鬼祕監陸游居士字務觀號放翁山陰人嘗謁松源和尚於靈隱從容問曰心傳之學可得聞乎源曰既是心傳豈從聞得士點首默契呈偈曰幾度驅車入帝京逢僧一例眼雙青今朝始見宗門別說有言無要眼聽薦福生禪師法嗣杭州徑山癡絶道沖禪師武信長江荀氏子母郭生而豐上短下資性絶人稍長以進士業應詔不利遂於梓州妙音院從修證受業遊成都講肆習經論紹熙壬子出峽回翔荊楚間時松源嶽唱道于饒之薦福師往謁以歲饑不受會曹源生出世妙果師造見聆入門語有省參堂俾侍香朝夕老拳痛棒不少貸平生知見至是多無影響曹源徙龜峯師侍行又三年以偈辭游浙其言曰尚餘窮相一雙手要向諸方癢處爬至京值松源主靈隱師復依之嘉定己卯由徑山第一座應嘉禾光孝請法嗣曹源是時此菴元覺菴即逢菴原無相範石溪月等皆在會中道聞于朝忠獻衛王以堂帖除蔣山蔣山諸莊皆瀕江易潦下田多無秋師忍饑鳴道行乞養士居十有三載無倦色嘉熙己亥侍郎東畎曹公豳帥閩聞師道望以鼓山來聘未行雪峯牒至領事半年而天童詔下衆集如海育王虗席攝住持事往來兩山上堂天童用底來育王用不著育王用底歸天童用不著雖然如是用不著處用有餘一箭雙鵰隨手落結夏上堂圓覺伽藍塵塵有路坐斷去來頓空今古那裏十三者邊十五後先不差毫髮許堪笑黃面瞿曇至今不知落處上堂有一人一念頓證墮在佛數有一人纍劫闡提不願成佛且道那箇合受人天供養良久曰蝶穿芳徑雙眉溼蜂掠殘華兩股肥上堂盡乾坤大地無絲毫許大是汝諸人橫擔拄杖繞四天下行腳道我無處不到無事不知且道西天那爛陀寺戒賢論師今日說甚麼法便下座上堂僧問心佛及衆生是三無差別如何是過去心師曰放待冷來看曰如何是現在心師曰你問我答曰如何是未來心師曰後次上堂向你道曰如何是過去佛師曰去年梅曰如何是現在佛師曰今歲柳曰如何是未來佛師曰顏色馨香依舊曰如何是過去差別智師以拂子擊禪牀左邊曰如何是現在差別智師以拂子擊禪牀右邊曰如何是未來差別智師以拂子中間點一點僧曰心佛衆生無向背十方剎海一毫收便禮拜師曰過去心不可得現在心不可得未來心不可得三世既不可得喚甚麼作差別智若人見得徹去三世諸佛無一時不在諸人頂𩕳上轉大法輪更來者裏挨肩竝足討什麼碗下座以拄杖一時打散未幾被旨遷徑山一日忽升座辭衆舉世尊臨入涅槃告衆曰汝等善觀吾紫磨金色之身瞻仰取足毋令後悔今日即有明日即無師曰世尊四十九年作盡伎倆及至臨行之際求生不得求死不得山僧今日要行便行要去便去八臂那吒攔不住至夜分起坐移頃而逝壽八十二臘六十一茶毗舍利五色者無數遵遺命奉骨歸葬金陵玉山菴學者分其半塔於菖蒲田天童鏡禪師法嗣杭州淨慈清溪沅禪師上堂達磨西來一坐具地被他神光禮了三拜一時占了致令後代兒孫各自分疆列界衲僧家撥草瞻風朝吳暮越南天台北五臺拄杖頭草鞋底還曾踏著也未良久曰切忌踏著荊州公安虎溪錫禪師上堂心心淺處實甚深道道幽遠無人到急行踏不著緩行成錯過少林幾坐華木春却憶西來胡達磨福州西禪月潭圓禪師開爐上堂人人盡守甕中天地覆天翻我不然直下一槌星火迸螺江燒却謝郎船讚豬頭和尚曰血淋淋古佛心幾回提起誰是知音明州育王寂有照禪師福之閩縣鄧氏子從九峯榕菴慧公得度時枯禪唱道怡山師往見之一日禪問曰自從一見桃華後直至如今更不疑那裏是他不疑處師大笑趨出禪深肯之禪遷靈隱師掌內記已而復見大梅石嵒虎丘蒺藜鄮峯無準徑山大歇諸老皆深器重以母老歸省雪峯癡絶留掌記室閩帥趙公汝愚飫師名請開法東山大乘移福之黃檗時左史竹溪林公希逸從師論心法拳拳服膺有詩曰老來得友如師少別去伊誰伴我閒朝命補江心後遷玉几適災變竭力興建謁平章賈魏公聞奏朝廷降金帛鼎建舍利寶塔僧問如何是佛師曰八吉祥曰如何是法師曰六殊勝曰如何是僧師曰面目現在上堂六塵不惡還同正覺鴉鳴鴉鴉鵲噪鵲鵲江北江南潮生潮落春風三月華草香善財何處尋樓閣喝上堂如何是道木頭如何是禪碌磚古德與麼垂示十箇五雙恬不為事殊不知正抓著鄮峯癢處何故建造殿宇恰用得著泉州法石愚谷智禪師山居偈曰栗色伽黎千百結倚松捫腹看雲飛有人問我居山趣向道春深筍蕨肥報恩太古先禪師上堂若論此事不涉心思意想非干默照忘懷要得洞然明白須是汗下一回且道汗下後如何驀喚侍者將扇子來上堂夜冷清霜重風來寒更多因循時節過自己事如何拍禪牀不是知音者如何舉向他上堂衲僧家游方行腳撥草瞻風第一須識路徑始得路徑不錯東西南北到處為家稍涉迂回五里單牌十里雙堠那裏更在那裏擲下拄杖看腳下岊翁淳禪師佛誕偈曰毗嵐毒種毒華開添得雲門醉後杯今日柯橋風色惡淡烟疏雨洗黃梅雜毒海載此偈是西嵒作誤也隱靜柔禪師法嗣蘇州虎丘雙杉元禪師舉宋太宗夢神人勸發菩提心次日問廷臣菩提心作麼生發羣臣無對雪竇代曰實為今古罕聞別峯印代曰王言如絲其出如綸師頌曰萬里謳歌聖化成條風塊雨樂樵耕不因嵩嶽三呼後無象誰知真太平冷泉兩廊畫壁頌曰一一塵中堅密身改頭換面轉精神誰知東壁打西壁總是靈山會上人徑山珍禪師法嗣杭州徑山元叟行端禪師族臨海何氏世業儒母陳氏師生而秀拔幼不茹葷年十二從族叔父茂上人得度于餘杭化城院十八受具戒一切文字不由師授初參藏叟於徑山叟問甚處人師曰台州叟便喝師展坐具叟又喝師收坐具叟曰放汝三十棒參堂去師於言下豁然頓悟一日侍立次叟曰吾泉南無僧師曰和尚聻叟便棒師接住曰莫道無僧好叟頷之命入侍司洎叟告寂師至淨慈依石林鞏處以記室師嘗自稱寒拾里人橫川珙居育王以偈招曰寥寥天地間獨有寒山子師竟不渡江謁覺菴真於承天後參雪巖欽於仰山巖問何處來師曰兩浙巖曰因甚語音不同師曰合取臭口巖曰獺徑橋高集雲峯峻未識書記在師拍手曰鴨吞螺螄眼睛突出巖笑顧侍者點好茶來師曰也不消得居三歲而巖逝乃還浙右徑山請居第一座大德庚子出世湖之資福特旨賜號慧文正辨禪師中書平章事張閭公任行宣政院使首舉師主中天竺開堂日公率僚屬躬詣座下皇慶壬子遷靈隱有旨設水陸大會于金山命師升座說法事竣入覲加賜佛日普照陛辭南歸養高于梁渚之西丘至治壬戌徑山虗席請師補處師三被金襴之賜二十年間足不越閫而慕其道者鱗萃至無所容僧問如何是正法眼師曰十字街頭石敢當曰只者便是麼師曰月似彎弓少雨多風上堂舉僧問趙州狗子還有佛性也無州曰無又僧問狗子還有佛性也無州曰有師曰若以無為究竟後來因甚道有若以有為諦當前面因甚道無者裏捉敗趙州許你天上天下上堂心不是佛兔馬有角智不是道牛羊無角驀拈拄杖畫一畫一夜落華雨滿溪流水香上堂秋風涼秋夜長未歸客思故鄉拍禪牀自是不歸歸便得五湖煙景有誰爭上堂邊戍朝鳴角空山夜答鐘人人皆共聽何處不圓通元宵上堂并謝監收浴主維那千粒萬粒從一粒生只者一粒從甚麼處生千燈萬燈從一燈起只者一燈從甚麼處起識得一燈千燈萬燈燈燈不疑識得一粒千粒萬粒粒粒無礙三腳驢子弄蹄行踏破無邊香水海拈拄杖卓一下頂門也少者一下不得師嘗勘一新到曰何方聖者甚處靈祗僧曰臨朕砧師曰杜撰禪和如麻似粟參堂去又勘一僧曰棋盤石斫破你腦門盂池浸爛你腳板僧擬答師便喝又勘一僧曰擘開華嶽連天秀放出黃河徹底清即且置平實地上道將一句來僧擬開口師便打師以呵叱怒罵為慈誘之誨以不近人情行大公之道師之利他皆陰為之沒齒不言師生於宋寶祐乙卯以至正辛巳八月四日示微疾沐浴更衣書偈訣衆曰本無生滅焉有去來冰河發焰鐵樹華開投筆垂一足而化留龕七日顏色如生世壽八十八僧臘七十六以是月十一日奉全身葬于寂照塔院淨慈穎禪師法嗣溫州江心一山了萬禪師族臨川金氏貌瘠而弱年十五業程文有聲然素志出家弱冠從金溪常樂院思仁者祝髮俄有靈芝産戶樞及游方謁偃溪聞荊叟珏簡翁敬諸老皆相吻合東叟領南屏命師掌記偶經神祠見紙灰旋起脫然忘所證亟以白叟叟詰之遂蒙印可遊天台衆請開法寒岩瓣香嗣東叟踰三年遷仙居紫籜又十年遷疏山當道議不合即撾退未幾江淮總統會諸山以開先迎師師涖事叢林鼎新又十年升住江心少不適意又輒棄去寺衆數百懇留隨至馮公嶺各涕泣而去會廬山月㵎明公遣舟迎師歸東溪明公示寂開先之衆復以請師方却之衆哀懇不以寺事纍師惟乞訓徒上堂靜悄悄閙浩浩渾不涉階梯已踏向上道萬里無寸草出門便是草撞著賣柴翁便是栽松老琉璃殿上月團團珊瑚枝頭日杲杲上堂逢堯舜則陳典謨要立生涯遇桀紂則用殺伐盡掃窠臼吾輩人乾嚗嚗硬糾糾淨裸裸赤灑灑何曾有許多事可怪睦州老漢見僧入門便道現成公案放汝三十棒子細看來也是窮急計生上堂拈拄杖此拄杖子西天四七東土二三天下老和尚拈弄不出今日落在開先手裏無頭無尾能放能收離相離名能縱能奪雖然如是也只為中下之機忽遇上上人來時如何以拄杖畫一畫放過一著皇慶元年十一月二十六日遘疾危坐不近藥閲七日命具浴更衣書訣衆語泊然而逝闍維收五色舍利如菽不可數計目睛不燼鎔以烈焰益晶瑩齒牙頂骨錚然有聲時改作豫章烏遮塔江西行省丞相幹赤命以舊藏世尊舍利奉于中而遣使分師之目睛舍利貯之銀盒陪葬焉餘骼舍利分葬東溪明州奉化嶽林栯堂益禪師溫州人開法婺之天寧遷薦福後主明之太平復升彰聖𣆶住嶽林上堂古者道我者裏無法與人只是據款結案彰聖者裏亦無法與人亦不據款結案拈拄杖如何是佛赤腳踏蓮華如何是佛向上事雕梁畫棟擲下拄杖便歸方丈二月十五日上堂擊拂子一下彰聖今日將三十年前冷灰裏𪹼出底烏豆換老胡眼睛去也喝一喝設有一法過於涅槃我此一喝不作一喝用上堂魯祖面壁麻谷閉門二大老雖與天寧相去數百年今日不免各與二十拄杖何故譬如油蠟作燈燭不以火點終不明示衆諸上座出息不保入息二六時中切莫將身心別處雜用饒你掉臂也是祖師西來意腳尖頭也踢出一尊古佛來不如無事好上堂舉黃龍三關話師曰黃龍老漢頭匾所以說漳泉福建話逼真謾得天下人過謾漳泉福建人不過上堂以手指左邊者是香爐指右邊者是華瓶能以一義作無量義以無量義為一義陳尊宿織蒲鞋鄧師伯打瓦鼓上堂步步是諸人證明處須是自肯方可歸家穩坐若不然者𧑀蛣腹蟹水母目蝦上堂五千四十八卷只作一句道却遂起身曰立地待諸人搆取便下座臨終偈曰八十三年什麼巴鼻拍樹成佛虗空落地茶毗舍利瑩然齒牙數珠不壞婺州雙林雲屋自閒禪師括蒼葉氏子烏巨行禪師之九世孫也初參荊叟珏於靈隱次謁東叟穎於淨慈掌記室一日因撰佛成道疏曰發見精於午夜叟曰何不道泯見精於午夜師不覺股栗汗下如發蒙蔀徹見叟垂手為人處後出世雙林遷智者皇慶壬子十月二十五日與客語笑次忽命侍僧取筆書偈而逝無方安禪師法嗣枯木榮禪師讚三祖偈曰風恙纏身世莫醫家貧遭劫更堪悲誰知覓罪了無處正是賊歸空屋時育王觀禪師法嗣杭州徑山佛智晦機元熙禪師族豫章唐氏師與兄元齡俱習進士業元齡既登第師從西山明公祝髮將遊方其母具白金為裝師謂財足喪志即善言辭之聞物初闡化玉几往依之初與語驚異留侍左右後謁東叟穎於南屏命掌記至元間總統楊璉真加奉旨取育王舍利躬詣師求記述舍利始末因招與俱師曰我有老母兵後存亡不可知遂辭歸江西元齡先以臨江通判從文丞相起兵死難獨母在堂師奉之以孝聞元貞二年出世百丈居十有二載至大初應淨慈請入院日行中書省行宣政院官屬悉迎請發揚宗旨四方英衲一時輻輳上堂雲門道箇普字盡大地人不奈何殊不知雲門四稜踏地當時若與振威一喝待他惡發徐徐打箇問訊道莫怪觸忤好非但扶起此老管取話行天下上堂舉太原孚上座聞角聲悟道話頌曰琴生入滄海太史遊名山從此揚州城外路令嚴不許早開關上堂三界無法何處求心白雲為蓋流水作琴古今無間誰是知音擊拂子一曲兩曲無人會雨過夜塘秋水深上堂獨坐大雄峯寒灰撥不紅一星螢火出孤鶴過遼東結制上堂以手作結布袋勢曰南山今日結却布袋口了也汝等諸人各各于其中身心安居平等性智忽有箇衝開碧落撞倒須彌底莫道結子不堅密良久曰漫天網子百千重居七載復遷徑山已而杖䇿歸南屏山下百丈大仰之徒聞師退閒爭來迎請師不獲已遂返仰山居三年將示寂手書辭所與遊者復書偈訣衆擲筆而化時延祐六年閏八月十有七日也世壽八十二奉全身瘞於金雞石下弟子在杭者分爪髮塔於淨慈西隱淨慈聞禪師法嗣杭州徑山雲峯妙高禪師福之長溪人世業儒母阮夢池上嬰兒合爪坐蓮華心手捧得之覺而生師因名夢池神彩秀徹嗜書力學尤耽釋典固請學出世法依雲夢澤公剃染受具戒首參癡絶次見無準準尤器愛復之育王見偃溪命掌藏鑰一日溪舉譬如牛過櫺頭角四蹄都過了因甚尾巴過不得師劃然有省乃曰鯨吞海水盡露出珊瑚枝溪許可之會溪遷南屏師與俱後出世住宜興大蘆繼遷江陰勸忠霅川何山蔣山虗席奉朝命居歷十有三載衆踰五千指德祐乙亥寺被兵軍士以刃擬師師延頸曰欲殺即殺吾頭非汝礪刃石辭色了無怖畏軍士感化棄刀而去至元庚辰遷徑山寺罹回祿草創才什一不數年遂還舊觀示衆前念是凡後念是聖一刀兩段更莫遲疑是以涅槃會上廣額屠兒放下屠刀便言我是千佛一數然雖如是若無舉鼎拔山力千里烏騅不易騎示衆言前辨旨句下明宗東計山熾然說法湛瀆水專為流通者裏搆得未免相鈍置若或尚存觀聽擾擾匆匆晨雞暮鐘上堂聲色為無生之鴆毒受想乃至人之坑穽者般說話何誰不知然粗餐易飽細嚼難饑上堂世界未形乾坤泰定生佛未具覿體全真無端鏡容大士向鷹巢躍出擘破面皮早是遭人描邈那更缺齒老胡不依本分遙望東震旦國有大乘根器迢迢十萬里來意在攙行奪市直得鳳樓鼓響阿閣鐘鳴轉喉觸諱插足無門合國難追重遭揭露新蔣山迫不得已跨他船舷入他界分新官不理舊事畢竟如何拍禪牀一下戍樓靜貯千峯月塞草閒鋪萬里秋上堂五峯峭峙到者須是其人一鏡當空無物不蒙其照祖師基業依然猶在衲僧活計何曾變遷著手不得處正好提撕措足無門時方堪履踐直得山雲淡濘㵎水潺湲一曲無私萬樂業正恁麼時功歸何所車書自古同文軌四海如今共一家戊子春魔事忽作有𧮂毀禪宗者師曰此法門大事吾當忍死爭之遂趨京有旨集諸宗徒廷辨上問禪以何為宗師奏淨智妙圓體本空寂非見聞覺知思慮分別所能到宣問再三師歷舉西天東土諸祖以至德山臨濟棒喝因緣餘二千言又宣進榻前與𧮂者反復論難𧮂者辭屈上大悅賜食而退師陛辭南歸示衆曰我本深藏巖竇隱遁過時不謂日照天臨難逃至化又曰衲破蒙頭萬事休此時山僧都不會徑山復災師謂衆曰吾宿負此山債耳復竭力營建匯殿坡為池他屋以次落成癸巳六月十七日書偈而逝師生於嘉定己卯二月十七日世壽七十五僧臘五十九塔于寺之西麓湖州何山鐵鏡至明禪師福唐長溪王氏子首謁堯叟蓂于嘉禾天寧雖蒙䇿勵未有省發復見偃溪于淨慈朝參暮叩久之始獲印證又謁清溪沅藏叟珍至元辛巳出世何山移大梅大德庚子復請歸何山上堂著意馳求驢年見面盡情放下瞥爾現前香嚴聞擊竹聲徹見本來面目即不問且道恁麼熱向甚麼處回避歸堂喫茶去上堂原野秋陰寒螿悉吟楓林落葉片片赤心達磨頂門無骨兒孫海底摸針忽然摸著時如何誰道龍王宮殿深上堂達磨不來東土官路少人行二祖不往西天私酒多人喫何山門前一條大路南來北往知是幾多只是中間一塊石頭未曾有人踏著衆中莫有踏著者麼擲下拄杖曰看腳下上堂今朝八月二十五記得洞山離查渡落在雲門網子中有屈至今無處訴豎起拂子雲門大師來也合喫何山手中棒且道過在什麼處不合鼓弄人家男女延祐乙卯十一月初五日呼其徒囑後事索紙大書曰絶羅籠沒回互大海波澄虗空獨露擲筆翛然而逝壽八十六明州天童止泓鑒禪師初住信州真如移天童上堂諸佛不真實說法度羣生菩薩有智慧見性不分明白雲無心意灑為世間雨大地不含情能長諸草木古德與麼提唱於四諦法中開鑿人天不妨善巧若據衲僧分上何啻白雲萬里上堂拈拄杖一有多種二無兩般枯桑知天風海水知天寒拄杖子聞與麼道不覺欣欣笑曰出身猶可易脫體道應難擲下拄杖下座上堂舉大陽玄禪師問梁山如何是無相道場山指大士㡧子曰者是吳處士畫底玄擬進語山急索曰者是有相底那箇是無相底玄遂有省便作禮山曰何不道取一句玄曰道即不辭恐上紙筆山笑曰此語上去在頌曰真空無相絶名模空底精兮畫底粗道即不辭難上紙西天胡子沒髭鬚靈隱濟禪師法嗣明州天童石門來禪師嘗作剪刀頌曰渾鋼打就冷光浮兩刃交鋒未肯休直截當機為人處何曾動著一絲頭明州雪竇野翁炳同禪師新昌張氏子參大川一日入室次川舉臘月火燒山話師擬開口川遽拈竹篦拄之師豁然悟旨後縛茅仗錫峯日扃戶書法華嘗有老來非厭客靜裏欲書經之句值雪竇虗席輿議請師師遜辭堅請乃赴送僧之華頂見溪西和尚偈曰高高峯頂屹雲中八十溪翁也眼空相見莫言行腳事纍他雙耳又添聾壬寅中秋日升座辭衆而逝雙林朋禪師法嗣杭州靈隱悅堂祖誾禪師南康周氏子端平元年八月一日生年十三告辭父母依郡之嘉瑞寺偃上人為師剃髮受具一日閲華嚴經至惟一堅密身一切塵中現忽有省即往見別山智於蔣山問近離何處師曰江西山曰馬大師安樂否師叉手進前曰起居和尚山俾入侍司未幾至杭見斷橋倫於淨慈問臨濟三遭黃檗痛棒是否師曰是橋曰因甚大愚肋下築三拳師曰得人一牛還人一馬橋頷之橋逝而柏山介石補其處一日室中舉庭前柏樹子話師擬議石抗聲曰何不道黃鶴樓前鸚鵡洲師言下頓悟即命侍香久之歸廬山東岩日住圓通延師分座九江守錢真孫聘師出世西林至元二十五年遷開先又遷東林元貞初奉詔赴闕入對稱旨賜璽書通慧禪師號并金襴法衣大德九年升住靈隱嘗勘一僧曰微塵諸佛在你舌頭上三藏聖教在你腳跟底何不瞥地僧罔措師便喝又勘一僧曰釋迦彌勒是他奴他是阿誰僧擬對師便打一僧新到師問何處來僧曰閩中師曰彼處如何住持僧曰饑即喫飯困即打眠師曰錯僧曰未審和尚此間如何住持師拂袖歸方丈居四載而逝訣衆偈曰緣會而來緣散而去撞倒須彌虗空獨露世壽七十五僧臘五十二辨山阡禪師法嗣盧山圓通雪溪逸禪師讚興化和尚偈曰中原一寶有來由拶得君王引幞頭到此若無青白眼當機誰敢謾輕酬無鏡徹禪師法嗣嶽州灌溪昌禪師山居偈曰閒來石上玩長松百衲禪衣破又縫今日不憂明日事生涯只在盂中薦福燦禪師法嗣支提愚叟澄鑒禪師寧德張氏子參無文於薦福遂許入室出世白雲至元二十年世祖敕住支提賜號通悟明印大師後將示寂沐浴更衣書偈曰八十二年落賺世緣躍翻筋斗應跡西乾擲筆危坐而逝雪峯信禪師法嗣紹興府大慶尼了菴智悟禪師生於福州王氏幼孤年十一白母願出家禮祥山寺普升得度誦維摩經至諸佛國土亦復皆空豁然頓悟每自歎曰不求明師決擇恐成差別虗棄光陰時北山退漳之南院閒居鼓山西菴師往參叩山問曰上座什麼處住師曰不住南臺江邊山曰畢竟住在什麼處師不審便行山叱曰走作什麼合喫山僧手中棒師面熱汗下次日復往請益曰某甲昨日祇對和尚有什麼過山厲聲曰更來者裏覓過在師釋然曰月明照見夜行人山顧旁僧曰看渠根器不凡遂印以偈有相逢若問其中事風攪螺江浪拍天之句後出世蘇之西竺一日癡絶來訪問曰子悟處如末山見大愚忽然撞著灌溪來時如何師曰大海不讓細流癡絶一笑而已寶祐六年住大慶僧問灌溪道我在臨濟爺爺處得半杓末山娘娘處得半杓畢竟是有是無師曰百華毬子上何用繡紅旗上堂拈拄杖天垂十二闌干角風滿三千世界中熱惱變成清淨境禪心頓覺悟真空靠拄杖有甚共語處上堂大陽門下日日三秋明月堂前時時九夏古人恁麼道未免坐在者裏大慶即不然山轉疑無路溪回別有村上堂柳絮飄風杏華沐雨好箇生機快須薦取以拂子擊禪牀曰咄三十年後不得錯舉華藏淨禪師法嗣明州天童西江謀禪師被敕住天童歷四十年貌枯瘁涖衆孤峻機語峭拔音如洪鐘理宗朝三被寵錫其示衆曰春日晴黃鸝鳴最親切誰解聽癡絶主玉几嘗寄偈曰千丈飛流氣象新岩前一吼淨無塵將入滅顧侍僧曰一笑翻身日面月面閣筆而逝福州雪峯石翁玉禪師禮雪峯塔偈曰入閩早是四旬餘象骨崖前縛屋居誰道開平年代後春疇煙雨幾鋤犁徑山珏禪師法嗣杭州中竺空巖有禪師室中嘗垂語曰黃金鑄就鐵真人東海湧頌曰錦衣公子醉田家熟睡柴牀日未斜熱渴呼漿無所得便將玉帶換甌茶杭州淨慈千瀨善慶禪師嚴陵彭氏子丱歲而孤萍蹤無寄就舅氏業儒往見懷楚楚知為法器問能出家否師曰固本願耳楚遂度之爰具戒品律身甚嚴遍歷諸方咸無所證後聞佛心珏主淨慈遂往親依一日聞舉洞山麻三斤話悟旨出世宜興之保安遷嘉禾之天寧後升淨慈嘗著扶宗顯正論進仁宗覽而嘉之賜金襴袈裟徽號慧光普照文明通辨及謝事築室曰歸休宴息其間泊如也至元戊寅八月三日化去壽七十九靈隱泉禪師法嗣婺州寶林無機和尚上堂舉教中道居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實大慧頌曰荷葉團團團似鏡菱角尖尖尖似錐風吹柳絮毛毬走雨打梨華蛺蝶飛師曰大慧和尚可謂桃華李華總成一家雙林則不然客舍并州已十霜歸心日夜憶咸陽無端更度桑乾水却望并州是故鄉上堂蘆華對蓼紅木落山露骨倣佛揚州依希越國拈拄杖卓一下為君卓破精靈窟無位真人赤骨律黃龍開禪師法嗣華藏瞎驢無見和尚上堂舉興化打克賓話頌曰興化打克賓言親語不親棒頭如雨點敲出玉麒麟杭州慧雲無傳祖禪師上堂佛佛廣說大智莫能知祖祖相傳凡情詎能測先天後地成壞長存入死出生去來不變於斯薦得已涉支離其或未然山僧更為下箇注腳以拂子擊禪牀曰啼得血流無用處不如緘口過殘春杭州護國臭菴宗禪師上堂舉豐干謂寒山拾得曰你與我去遊五臺便是我同流寒山曰你去遊五臺作麼干曰禮拜文殊山曰你不是我同流師曰豐干開口不在舌頭上寒山同坑無異土檢點將來兩箇駝子廝撞著世上應無直底人上堂舉嶽林振禪師示衆曰布袋口開還有買底麼僧曰有林曰不作賤不作貴作麼生買僧無語林曰老僧失利師曰嶽林設箇問端也甚奇特及至被人道箇有字直得東遮西掩囊藏不迭護國今日布袋開口還有買底麼良久曰闌干雖共倚山色不同觀孤峯秀禪師法嗣福州鼓山皖山正凝禪師龍舒太湖人年十七二親俱喪投黃州雙泉道瑛剃落鄂渚開元受具即游方遍參三祖環菴璉鍾山癡絶沖長蘆南山哲皆不契後參雙塔無明性明問達磨九年面壁時如何師曰有理難伸被明劈𮌎一拳師忽然有省歎曰我生平用底遭者老漢一拳瓦解冰消了也復入閩禮孤峯和尚峯舉狗子無佛性話師不能答踰半載得臻閫奧乃頌曰趙州道無箭不虗發築著磕著全活全殺峯曰你也得只是未在一日峯舉德山見龍潭話問那裏是德山親到處師以手掩峯口即說頌曰潭不見龍不現全身已在空王殿夢回忽聽曉鶯啼春風落盡桃華片峯曰汝今日方知泗洲大聖不在揚州出現善自護持遂俾侍香洎峯遷西禪囊山師皆隨侍峯歸寂往依雪峯霜林果請居板首寶祐丁巳出世福州釣臺遷萬歲久之太傅賈平章魏國公劄請住鼓山槌拂之下衆盈四千指士大夫摳衣問道恨識師之𣆶上堂入院方三日追陪人事忙燈籠與露柱密密細商量且道商量箇什麼拍禪牀昨夜碧天風浪靜一輪明月映螺江上堂六月旦夏巳中荷華開水面荔子映山紅無位真人處處相逢擬議雲山千萬重鼓山入院上堂拈拄杖揚下住山鈯斧拈起國師聖箭卓拄杖一鏃破三關機鋒如掣電左右逢原全機殺活直得大頂峯小頂峯望空斫額白雲亭湧泉亭笑裏點頭正與麼時且道功歸何所靠拄杖雕弓已挂狼煙息萬國來朝賀太平示衆萬機不到千聖攢眉正令當行阿誰敢擬便恁麼會已落第二義諦大似望梅林止渴有甚快活處衲僧家將黑豆子換人眼睛把斷貫索穿人鼻孔未為分外且道衲僧見箇甚麼道理卓拄杖一下選佛若無如是眼宗風那得到于今舉雪峯示衆曰此事不從唇吻得不從黃卷上得不從諸方老宿得合從什麼處得也須子細頌曰一滴真珠紅潑醅殷勤相勸兩三回到頭欲盡東君意吞却臨行上馬杯將終集兩序示遺誡索筆書偈曰八十四年一夢相似夢破還空也無些事端坐而逝婺州雙林一衲介禪師讚傅大士偈曰非儒非道亦非禪杜撰修行忒可憐擔閣一身三不了至今八百有餘年容菴海禪師法嗣葛廬覃禪師舉僧問石溪和尚如何是佛溪曰矮子看戲頌曰巍巍丈六紫金容百戲場中有變通矮子看來眉卓豎鐵鎚無孔舞春風
