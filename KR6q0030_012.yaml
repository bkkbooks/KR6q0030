body:
  text: 明嗣祖沙門東吳通問編定笠澤居士華亭施沛彚集未詳法嗣青州佛覺禪師系雲門宗頌仰山師子曰一色無過指示人白銀世界裏嚬呻超然推倒還扶起爭似東風照日新圓通善國師系雲門宗嗣佛覺佛日自江右至燕寓大聖安一夕與佛覺晦堂夜話次時師年方十二座右侍立日曰山僧自南方來拄杖頭不曾撥著一箇會佛法者師叉手進前曰自是和尚拄杖短日大驚曰可乞此子續吾臨濟一宗師曰雲門臨濟豈有二邪日稱賞不已金世宗幸聖安瑞像殿問師曰禮即是不禮即是師曰禮則相敬相重不禮則各自稱尊帝大悅後住延聖示衆舉洞山曰秋初夏末兄弟或東去西去直須向萬里無寸草處去又曰只如萬里無寸草作麼生去石霜曰出門便是草大陽曰直饒不出門亦是草漫漫地師曰且道諸人即今腳跟下一句作麼生道若道萬里無寸草許你參見洞山若道出門便是草許你參見石霜若道不出門亦是草漫漫地許你參見大陽若總道不得許你參見延聖何故唯有好風來席上更無閒話落人間示衆舉雲門大師觀音糊餅話師曰韶陽老人可謂唱彌高和彌寡如今却向延聖拂子頭上入方網三昧東方入定西方起乃至男身入定女身起還會麼野色更無山隔斷月光直與水相連燕京慶壽玄悟玉禪師系雲門宗嗣圓通金顯宗遣中使持紙一張書心佛二字問師者是甚麼字師曰不是心不是佛稱旨次日賜長短句曰但能了淨萬法因緣何足問日用無為十二時中更勿疑常須自在識取從來無罣礙佛佛心心心若依佛也是塵師答曰無為無作認作無為還是縛照用同時電卷星流已是遲非心非佛喚作非心猶是物人境俱空萬象森羅一鏡中黃山趙文孺居士系雲門宗嗣圓通嘗有偈曰妄想元來本自真除時又起一重塵言思動靜承誰力仔細看來無二人高郵州定禪師系雲門宗嗣玄悟初參玄悟室中舉僧問玄沙如何是清淨法身沙曰膿滴滴地師于是有省僧問透網金鱗以何為食師曰乾屎橛杭州徑山雲菴慶禪師建陽人舉僧問楊岐如何是佛岐曰三腳驢子弄蹄行曰莫只者便是麼岐曰湖南長老頌曰楊岐一頭驢眼光如電爍踏殺天下人說甚三隻腳竹林巨川海禪師頌風鈴曰銅唇鐵舌太尖新樓角懸來不記春言外百千三昧法因風說與箇中人燕京大慶壽寺虗明教亨禪師濟州任城王氏子先有汴京慈濟寺僧福安山居有年一日于芒山村倚樹而化是夕母夢此僧求宿覺而生師七歲出家十五遊方聞鄭州普照寶公法席之盛遂往謁朝夕參叩未有所入他日以事往睢陽忽於馬上憶擊板因緣當下動相不生將抵河津同行者警曰師兄此河津也師下馬悲喜交集至于隕涕歸以語寶寶曰此僵仆人似欲轉動示以日面佛月面佛公案後聞板聲豁然親證呈頌曰日面月面星流掣電若更遲疑面門著箭咄寶曰今而後吾瞞汝不得也後住濟州普照復奉章廟旨遷慶壽興定己卯秋七月十日索筆書偈其末句曰咦一二三四五六七危坐而逝鎮州嘉山來禪師僧問鐵牛和尚塔何在師以手指之忽然省發乃示頌曰鐵牛鐵牛更莫別求有人問我豎起指頭玉溪通玄菴圓通禪師嘗著百問激勵學徒一曰沒底船子為甚麼無漏堅固豎起拂子曰為你說禪了也作麼生會又拈起拄杖曰還有向拄杖頭上下得一轉語底麼又畫一圓相曰三世諸佛六代祖師總在裏許作麼生會復以手空中點一點曰且道者一點明甚麼邊事又豎起一指曰俱胝和尚向者裏放大光明轉大法輪諸人還見麼又曰折腳鐺兒為活計穿心碗子作生涯通玄菴內安然坐不管山前事似麻且道安然坐底是甚麼人五臺鐵勒院子範慧洪大師因閲楞嚴至一人發真歸元十方虗空悉皆消殞忽大悟遂造河朔見汶禪師陳所見汶印可之臨終說偈曰六十春光又八年浮雲收盡露青天臨行踢倒須彌去後夜山頭月正圓更衣坐脫建寧府蔣山慧空元模禪師古田蘇氏子大德庚子定中遊蔣山玄獎禪師道場有老人迎謁曰吾為師守此山五百年矣言畢化黑龍而去既寤乃曰吾當還此山也遂往卓菴一日謂衆曰吾昔於佛所號慧空菩薩今化緣既畢即當入滅因為衆說四諦法復說偈曰四十餘年寄俗塵如今却顯箇中尊巖頭一夜東風起吹得華開滿樹春鐵船無柁亦無蓬撐入金蓮性海中末後一機今說破白雲元不離長空大地山河覓無跡虗空撞破見端的縱使鐵輪頂上旋本性圓明常不失復曰西天第三代商那和修尊者隱象白山現龍奮迅三昧說法調伏諸外道然後化火自焚吾今象鼻巖前亦當如是言畢雲霧四起雷雨大作化火自焚塔于菴之西鄭州普照寺佛先道悟禪師臨洮蘭州冠氏子偶宿灣子店聞馬嘶豁然大悟歸告母曰某於途中拾得一物母曰何物師曰無始來不見了底母掌曰何喜之有遂辭母參方母曰將何之師曰水流須到海鶴出白雲頭遂往參白雲海禪師乃承印記泰定二十四年出主普照身著白衫跨黃犢吹短笛遊於洛中嘗曰道我凡耶曾向聖位中來道我聖耶又向凡位中去道我非凡非聖耶却向毗盧頂上別有行處泰和五年入滅杭州靈隱普覺淳朋禪師嘉祐五年奉旨斷還九里松集慶占路上堂山前一片閒田地曠大劫來無界至今朝恢復又歸來坐斷腳頭并腳尾東也是西也是南北縱橫無不是畢竟酬恩作麼生十里荷華九里松直指堂前香一炷明州雪竇常藏主橫山之高弟也不諳文字專習禪定儕輩呼為常達磨云所作偈頌事理圓融音律調暢其頌鐵牛曰百煉爐中輥出來頭角崢嶸體絶埃打又不行牽不動者回端不入胞胎海門偈曰業風吹起浪如山多少漁翁著腳難拌命捨身挨得入方知玉戶不曾關苦筍偈曰紫衣脫盡白如銀百沸鍋中轉得身自是苦心人不信等閒嚼著味全真息菴偈曰百尺竿頭罷問津孤峯絶頂養閒身雖然破屋無遮蓋難把家私說向人台州黃岩濠頭丁安人諱覺真號竺心初見絶田耕於委羽山有省入遂棄家築室自居復參湧泉古愚泉曰良家子女東奔西走作麼安曰特來禮拜和尚泉曰者裏容你不得安乃拍手一下曰三十年用底今朝捉敗泉便休去又往鴈山春雨菴謁無際才入門便曰春雨如膏行人惡其泥濘際曰不是不是安擬進語被際喝出𣆶年就邑中明因寺側開接待一僧提包笠直入臥內安問是什麼僧曰行腳僧安遽指其足曰草鞋斷為甚不知僧無語安便將包笠擲出曰者裏無汝措足處一日明因奎禪師相看安曰聞說長老夜來生得兒子是否明曰且道是男是女安曰雞銜燈盞走鱉咬釣魚竿明州育王勉侍者空室之族姪也少年有志不幸短命而死嘗有送同事僧遊台鴈偈曰鳥窠吹布毛侍者便悟去雖不涉言詮早已成露布天台嶺上雲鴈宕山中樹此去好商量莫觸當頭諱臨終偈曰生本不生死亦非死祕魔擎杈俱胝豎指鑷工張生諱德鄞之下水人世為大慈供堂隨衆聽法有省一日大雪沙彌團雪作佛像衆皆述偈詠之生亦隨後占偈曰一華擎出一如來六出團團笑臉開識得髑髏元是水摩耶宮裏不投胎永福靈江浩首座依古林於饒州永福居第一座結夏秉拂僧問進一步時如何座曰撞牆撞壁曰退一步時如何座曰墮坑落塹曰不進不退時如何座曰立地死漢按師嗣保寧茂老素首座生平一關深隱罕有識之者天曆間有僧得其山居述懷三偈手蹟詣紫籜求竺元和尚著語竺元曰諸方皆以其不出世不說法為恨今讀此三偈如金鐘大鏞一擊衆響俱廢謂之不說法可乎偈曰傳燈讀罷𩯭先華功業猶爭幾洛叉午睡起來塵滿案半簷斜日落庭華尖頭屋子不教低上有長林下有池夜久驚猋掠黃葉却如蓬底雨來時浮世光陰自不多題詩聊復答年華今朝我在長松下背立西風數亂鴉鴈山羅漢寺證首座目瞽見道明白晨朝躬自汛掃或問者片田地掃得乾淨也未座豎起苕帚示之又問真淨界中本無一塵掃箇甚麼座亦豎起苕帚示之嘗題九牛山偈曰四五成羣知幾年春來秋去飽風煙清溪有水何曾飲緑野不耕長自眠箇箇腳跟皆點地頭頭鼻孔盡撩天尋常只在千峯頂大地人來作麼牽淨慈元菴會藏主臨安人參晦機於淨慈居蒙堂因修涅槃堂有偈曰涅槃一路盡掀翻觸處工夫見不難洗面驀然摸著鼻繡針眼裏好藏山晦機稱賞之杭州天目一山魁菴主蘇州人也天資敏捷通內外典與平石砥友善棲遲岩谷不與世接僅有山麓洪氏子弟往來送供一夕洪氏婦夢主乘肩輿至其舍覺而産一子翌旦登山候之果化去矣因名應魁字士元幼讀書補邑庠娶妻生子年三十一旦忽自猛省遂棄家縛茅於東峯絶頂晝夜精勤行道一日空室和尚因避寇自徑山過其廬見其舉止閒雅應對從容叩其所以乃知其為一山後身也因謂之曰公前身與平石翁為莫逆交翁今年埀九十尚耳目聰明何不通箇信息亦見一夢兩覺而夢覺一如乎主欣然揮毫作偈寄之曰寄語天童老平石一念非今亦非昔欲聽寒山夜半鐘吳江依舊連天碧溫州壽昌絶照輝禪師嘗坐夏於淨慈東圊寮壁間有水墨大士像師朝夕禮拜懇禱甚切一日忽見淨瓶水從壁湧出通身慶快從此智鑑日明嘗有偈曰工夫未到方圓地幾度憑闌獨自愁今日是三明日四雪霜容易上人頭有志者聞之莫不興起蓋其致誠感人如此溫州靈雲省菴思禪師性方介台之寧海人兄弟四人師居長同時發心出家祖父遺業悉散與宗親遍叩諸方後出世靈雲次遷靈岩結夏上堂以大圓覺牛角馬角為我伽藍瓜籃菜籃上堂舉趙州狗子無佛性話頌曰狗子佛性無狗子佛性有猴愁摟搜頭狗走抖擻口𣆶年退居靈雲之前山至正甲申空室偕數衲往謁時師年踰九十矣龐眉皓髮頎然清聳拽履而出且行且問曰何處來空室曰江心師曰深幾百丈室曰謾老和尚不得師曰且坐喫茶徐觀其壁間題有詈僧詩格調頗肖寒山其辭曰五瘟不打頭自髠黃布遮身便是僧佛法世法都不會噇豬噇狗十分能空室須臾拜辭不敢再犯其鋒文獻黃溍居士字晉卿婺之義烏人天曆初詔天下僧儒善書者會集杭州淨慈泥金書大藏尊經士亦預焉每食必與衆僧共處若別為治具則不樂甚至詬罵不食而去嘗題懸崖墨蘭曰嫋嫋春風一樣吹託身高處擬何為從他自作顛倒想要見懸崖撒手時又題東坡像贊曰五祖禪師世外人娑婆久已斷生因誰將描邈虗空手去覓他年身外身題山谷像曰笑殺當年老晦堂相逢剛道桂華香披圖面目渾依舊鼻孔何曾有短長士以文章名世蔚為一代儒宗以其造詣入微不覺冥符聖意況與吾輩雜處不肯自異亦可尚矣明州育王虗菴實首座寄臥雲菴主偈曰黃金園裏馬交馳徑寸多成按劍疑月曬梅華千樹雪臥雲一枕夢回時明州天童幻菴住首座禮應菴祖塔偈曰耽耽睡虎管窺斑便把中峯作靠山不得破沙盆一箇兒孫乞活也應難明州天童默中唯西堂詠蠶偈曰桑空拓盡始心休綿密工夫一繭收爐炭鑊湯拌得入為人只在一絲頭佛隴宜興可上座聽雨偈曰簷頭滴瀝甚分明迷己衆生喚作聲我亦年來多逐物春宵一枕夢難成瑞州九峯壽首座臨終偈曰七十二年者邊那邊喫十方飯參達磨禪今朝一擲翻身去笑破傍觀𭪿半邊天台山上雲峯無盡祖燈禪師四明王氏子初見日溪詠於天寧復參方山洎諸大老尋卓錫上雲峯影不出山者五十載洪武二年二月八日示微疾夜將半顧左右曰天向明乎曰未也或曰和尚正當此際何如師破顏笑曰昔德山坐疾僧問還有不病者麼德曰有僧曰如何是不病者德曰阿㖿阿㖿恁麼喚作病得麼衆無語師曰色身無常早求證悟時至吾去矣侍者執紙乞偈師曰終不無偈便未可死耶侍者請益堅乃書曰生滅與去來本是如來藏拶倒五須彌廓然無背向投筆端坐而逝杭州仙林寺雪庭禪師仁和桂氏子毀齒喪父患痘風雙目短視數求出家謁休休于仙林一見契合因閲楞嚴至於一毫端現寶王剎有疑後詣江陰乾明寺覩萬佛閣金碧崢嶸于眉宇間忽有省弘治改元除夕聞鐘聲數年行履不覺瓦解述偈曰圓響心非聞大千同一照抹過上頭關更不存玄妙乙卯休休應淨慈請師復依侍乃蒙印可師自號幻寄嘗曰夫幻即寄之踪寄乃幻之跡幻起寄亡全寄是幻幻逐寄生全幻是寄翳日生華山河大地華翳不生真空實際幻之寄之誠哉兒戲休休嗣雪峯峯嗣無際金陵永寧古淵清禪師聞雞鳴有省占偈曰喔喔金雞報曉時不因渠響詎能知三千世界渾如雪井底泥蛇舞柘枝伏牛無礙明理禪師汾州和氏子參松竹大方和尚隨衆打七有一聲虗空碎獨露法中王之句後同月菴大圓入終南一日菴舉高峯銀山鐵壁話師頓悟述偈一覺心空疑便消拈來放去自逍遙過方求證方曰伏牛打七即不問終南靜室意如何師曰伏牛打七泥團土塊終南靜室放大光明方喝曰即今光明何在師向前一掌方大笑曰如是如是方臨濟二十六代孫嘉興聖壽宜翁可觀禪師出家於南屏從車溪得省建炎初主聖壽遷當湖德藏退隱竹菴每自怡曰松風山月我無盡衣鉢也乾道七年丞相魏𣏌請主吳之北禪入院適重九指座曰胸中一寸灰已冷頭上千莖雪未消老步只宜平步去不知何事又登高吉州武功山白雲明星禪師閩之長汀張氏子投龍歸通公落髮受具專修止觀忽歎曰大丈夫道業未就如生死何遂遍叩名宿機緣或契師不自少肯見盤龍陽禪師頓釋凝滯陽以衣拂付之隱瀟峯二十餘年太守汪公勉師出世師復移茅深入學侶嚮至漸成精藍一日辭衆曰吾去矣衆問何往師示偈曰明月落波心白雲橫嶺上欲識本來機鐵牛吞大象語畢端坐而逝全身塔於本山世壽八十有四佛妙禪師昆明人也出家於天華寺洪武十六年赴京賜衣鉢錫杖遊兩浙宣德四年十二月沐浴更衣書偈曰去年七十九今年滿八十萬里為參尋世緣今已畢擲筆端坐而化嘉興府資聖克新仲銘禪師番易盧里人族姓余宋始興襄公九世孫也久依笑隱於大龍翔掌內記至正間住嘉禾資聖時了菴和尚退居南堂與師雅相契合洎菴示寂師為文祭之略曰哲人云亡宗教陵替豫來醉李惟師宿契或往或來于今五歲論核道真窮根極底又曰矧彼妄庸傲然高位利粥豪爭善類喪氣老成復萎弛焉何恃師嘗却宣讓王之命有偈曰數椽茅屋萬株松蒲榻高眠海日紅不是賢王招不起山人只合住山中所著有雪廬稿待詔沈士榮居士建安人洪武中為翰林院待詔嘗著續原教論辨解一十四篇其論略曰人之為類不同故聖人之教不一此教之迹所以異也然為善不同同歸於治窮其至妙不出一心此教之理所以同也此心也此理也天下未嘗有異也迹之雖異若推而極之必當致其同也又曰若得本忘末不為迹之所惑研窮心性之原直趨至善之地則殊途同歸無有彼此之間矣又曰是心也變而不動死而不滅斯理之明昭如皎日且安得而自蔽歟若人識此心悟此理在儒為真儒在僧為聖僧矣心昏理迷莫知所往本之既失諍論復何益哉又曰儒者志在排佛故作人死斷滅之說以破生死輪回之論不知反違周孔聖人之意甚則撥無因果廢滅天理以造物歸於無知善惡皆無果報至仁夭暴壽敬慎蒙禍淫佚獲福小人僥幸君子無辜不明前因曲為之說理則不通障正知見惑亦甚焉又曰自漢以來經書迭至究其指歸誠所謂窮心性之原入至善之地者也又非但文字而已至如日月雲霞飛潛動植色聲香味而咸臻妙理此教之體也得失違順生死苦樂事物遷流而常住真性此教之相也文音語默食作動息威儀典章而隨機普應此教之用也具是三者其道大行矣孰能排而毀之拒而絶之乎智者體吾佛之理觀孔聖之道性理之學益加詳焉而勸善戒惡之文尤為緊切大有功於名教豈可自生違背蔽吾心之良知也哉其觀心解略曰心該萬法法徹心源至理難知觀心斯得故世尊初成正覺嘆曰奇哉我今普見一切衆生具有如來智慧德相但以妄想執著而不能證得蓋人由迷此心體不知反求外為六塵所惑內生沉掉二病是以局促無知偏僻異見唯佛如來返觀此心頓悟本性成等正覺故於世間無量百千法門出世間無量百千法門莫不洞明無礙廓徹無違故號三界大師十方慈父今儒者尚不自識本心豈能以心觀物哉又曰蓋不識自心則其本已失安能觀物明理哉又曰虞書曰人心惟危道心惟微惟精惟一允執厥中者此心學之源也人心妄想也由執著顛倒故危道心天理也非思議之所能及故微精者不昧一者不雜由無思故不昧無為故不雜乃能盡其至誠固守此中道也中者即中庸之中在心而不在物在內而不在外子思所謂喜怒哀樂未發者是也子思但以情識未動即是中義與吾佛一念無生之理相近止缺悟耳儒者釋中曰不偏不倚無過不及乃已發中節之和也便違子思之意矣蓋喜怒哀樂未發之時無有形相可見豈有偏倚過與不及之事乎又曰彼既不知觀心之妙徒欲以偏計之妄心觀物以窮理譬如塵鏡未磨水漩未止擬求鑒物未之有也自不知此理在內惟務外求故學解益多去道愈遠矣又曰一日觀心證理則天下萬物萬事之理皆貫通焉夫子亦曰一日克己復禮天下歸仁焉則亦求其在內者矣其內教外教辨略曰教有內外不同故造理有淺深之異求之於內心性是也求之於外學解是也故心通則萬法俱融著相則目前自昧嗚呼外求之失斯為甚矣今儒學之斃浮華者固以辭章為事純實者亦不過以文義為宗其視心學則皆罔然也宋之大儒深知其病又知吾心上工夫為有本是當敦本抑末以斥其言語文字之非可也何自為矛盾歟又曰昔者聖人皆以內學為本而推其用於外後世文儒務外遂不知有心學之源乃以學解為事惟宋河南之學始言性理而有實踐之跡然但知心之用而不究心之體遂不知養未發之中又昧太極之理在兩儀未判之先或以物理為性理故本末體用於是乎不明而堯舜周孔之道微矣又曰悟則謂之內解則謂之外此內教外教所以不同也儒者專用力於外凡知解所不能及者不復窮究故不知𠃔執厥中之道天理流行之處皆在思慮不起物欲淨盡之時履踐雖專終不入聖人之域矣其作用是性解略曰人覺無思乃遍知於法界識情有著徒妄起於塵勞佛與衆生本同一體但因迷悟見有殊途佛性只在眼耳鼻舌之間妙用不離見聞覺知之際直是一塵不受一法不舍名為直至道場頓見本來面目又曰經云如我按指海印發光汝暫舉心塵勞先起若無心體會則森羅萬象一鑑昭然此按指發光所謂一念不生全體現也若說是性即是認著影子使毫釐繫念瞥爾情生業相宛然仍前迷倒此舉心塵起所謂六根才動被雲遮也到此著力不得又曰三代而上未有佛可名惟聖帝繼天立極推本於天言人得此明覺之理於天故曰天命之謂性性者言人皆以此明覺為體也率依此覺性而常不昧謂之道修者即養其喜怒哀樂未發之中也中者私欲未起之時純乎天理者也私欲未起則無思無為寂然不動寂者誠也至誠無息故曰道不可須臾離也繼之以戒謹恐懼不覩不聞之際不使隱微之或動皆是養此未發之中常覺不昧故發為中節之和則仁義禮智不待思而中矣斯所以為教後章言誠者寂也明者覺也寂而覺曰天之道覺而寂曰人之道皆修道之義也又曰聖人得此理乃立世間治教之法吾佛得此理乃立世間出世間解脫之法儒門但明天人之道吾佛則明四聖六凡之道若盡天人之道則可以趨佛道矣其於性理不明則天人之理有所不明又安能究佛氏之理乎士識遠材全深達法相議論縱橫放肆剖發幽翳直明心宗而辭旨猶善巧精妙其曰續原教亦可謂克纘鐔津之緒者哉杭州雲棲蓮池袾宏大師郡之仁和沈氏子年十七補邑庠每書生死事大四字於案頭一日失手碎茶甌有省作七筆勾見志投西山性天祝髮北遊參遍融復謁笑巖於柳巷求開示巖曰阿你三千里外求開示我我有甚麼開示你師恍然辭歸過東昌道中聞樵樓鼓聲忽大悟述偈曰三十年前事可疑三千里外遇何奇焚香擲戟渾閒事魔佛空爭是與非後住雲棲侍郎王公宗沐問夜來老鼠唧唧說盡一部華嚴經師曰貓兒突出時如何王無語師自代曰走却法師留下講案遂頌曰老鼠唧唧華嚴歷歷奇哉王侍郎却被畜生惑貓兒突出畫堂前牀頭說法無消息無消息大方廣佛華嚴經世主妙嚴品第一時因饑荒疫癘盛行餓莩載道當道發儲賑濟命醫救療舉師董其事銓部虞公淳熙問慧日點五百病僧因緣師曰慧日自甘窮子捨己從人西院屈陷平民將生就死可惜五百僧只解點著便行曾無一箇高臥不起致令慧日顯異惑衆禍及兒孫郡主深切民瘼我山僧急趨時難倉卒中失帶了竹杖子不免奮空拳向居士癰腫上劈地一下敢保沉疴潰散毒血淋漓萬脈流通百骸舒暢雖然如是云何一人能令衆起不見道陽回片葉春滿千林者事且止只如終日把竹杖子東指西揮不如一直在木頭上朝持暮守守來守去忽然枯木重華便是死人再活說甚麼竹木管取盡大地草木叢林悉皆成佛去也何以故青青物外虗空體即是如來堅實心問參禪念佛可融通否師曰若然是兩物用得融通著問世尊默然良久外道謂開我迷雲空生宴坐不言帝釋曰善說般若意旨如何師曰良久處欲望開迷陰霾萬里宴坐邊擬聞般若說竟多時雖然如是鞭頭得旨空裏飛華者畢竟見箇甚麼示採蕨者曰心訣教我如何談蹉過山前好時節蕨蕨豎起拳頭向君說新春日示衆今日賀新春歲時重換却昨日作麼生十二月草八嘗自贊曰十畫九不像惱殺丹青匠庶幾此近之權留作供養若道者便是依然成兩樣不兩樣三十棒臨終時預於半月前別衆曰吾將他往矣人皆莫測至期示微疾面西端坐而逝紫柏達觀真可大師句曲沈氏子性慷慨激烈弱不好弄不喜見婦人年十七剃髮遊方聞誦張拙偈斷除妄想重增病趨向真如亦是邪大疑之一日齊次忽大悟乃曰使我在臨濟德山座下一掌便醒安用如何若何北遊京師參遍融萬曆癸卯秋忽妖書發師罹難先是神宗手書般若經偶汗下漬紙疑當易函遣近侍質于師師以偈進曰御汗一滴萬世津梁無窮法藏從此放光上大悅由是注意焉適見章奏意甚憐之在法不能免因逮及旨下著審而已拷訊時師神色自若持議甚正以衰老殘軀備嘗笞楚抵死不屈十二月五日入獄法司定罪欲死師師說偈曰一笑繇來別有因那知大塊不容塵從茲收拾娘生足鐵橛華開不待春又曰世法若此久住何為乃索浴罷囑侍者曰吾去矣幸謝江南諸護法復說偈曰事來方見英雄骨達老吳生豈宿緣我自西歸君自北多生晤語更泠然語畢端坐而逝所著有紫柏集瑞州黃檗無念深有禪師黃州麻城熊氏子偶遊蕩山有宿衲謂師曰十方一粒米重如須彌山若還不了道披毛戴角還師悚然又聞僧舉僧問大休如何是西來意休曰黃瓜茄子師大疑遂往五臺伏牛遍叩知識一夕聞哭笑二聲相觸有省又一日失手匱蓋打頭渾身汗流撫掌笑曰遍大地是箇無念何疑之有往龍湖同卓吾居士到駟馬山會有講主至士問主曰清淨本然云何忽生山河大地主依文講罷士顧謂師曰你試說看師擬開口士將師膝上一推曰者箇聻師忽大悟有偈曰四十餘年不住功窮來窮去轉無踪而今窮到無依倚始悔從前錯用功住後僧問道果有耶果無耶師曰說有說無二俱成謗曰如何即得師曰無求即得曰如何是道之體師曰滿口道不著曰四大離散時如何師豎起拳曰者箇不屬四大問古人迸却咽喉唇吻道將一句來者一句如何道師曰我不迸却咽喉唇吻你且道一句看僧無對師曰你被音聲塞却口問見性成佛是否師曰是曰性是無形底如何得見師曰性是有形底只你不見曰請和尚指出我看師曰我說汝不見問如何出離生死師召僧僧應諾師曰從者裏出曰和尚說底話某甲不曉得師曰等你曉得堪作甚麼復友人書曰山中兀坐不聞動息學道要趂初心猛利就要討箇分曉日用對境逢緣才得出脫不然日久月深漸忘精進依舊流於世情耳近時學道人只圖口舌利便見識聰明忘却本命元辰直待病臨身手腳忙亂時一些也用不著又不恨自己念頭不切立志差錯反說先聖佛祖也只如此便是毀謗如來正法輪自夢未醒且莫錯會古聖一言半句如吹毛劍鐵釘飯木札羹塗毒鼓無你側耳處無你下口處無你著意處無你近傍處狹路相逢眨眼蹉過到者裏情枯想絶思盡神窮寒暑兩忘寢食俱廢于無可捉摸處驀地猛省馳求心一時頓息慶快平生更不隨逐聲色知見全消是非泯跡到此田地但是聰明解會能所神通脫手讓與他人終日如癡似訥虗腹間心世人莫能識鬼神覷不見閻老子何處著眼才是真自在也信而不修狂增我見說時似悟對境還迷苦修不信轉增癡福悟修兼備狂消言息陋巷簞瓢有何得失夔州白馬寺儀峯方彖禪師達州羅氏子參金佛山雲菴和尚令看如何是鬼神覷不破之機三年有省出峽遍謁知識結茅雙溪一日午炊聞甑中作聲忽大悟作頌有白雲青峯齊點頭之句嘗嘗浙中菴居杭之清平真寂印公蚤年嘗依之一日師舉青峯丙丁童子來求火話詰之曰青峯恁麼道法眼亦恁麼道為甚麼有悟不悟印曰初以識心湊泊所以不悟後乃直下承當故能大悟師遽舉拳揮案一下厲聲曰恁麼則汝今大悟耶印擬議師便痛罵趂出印直得汗流浹背繇茲憤志力參萬曆壬辰師歸白馬僧問如何是西來意師曰兩頭燒火一頭烟師手中常執一鼗鼓一面書矗字一面書奔字凡應機多舉而搖之示寂塔于龍神山廣信府鵝湖養菴心禪師郡之上饒朱氏子偶過戚屬會道者談四生之義師於言下洞了物我平等大意往洛之太平落髮南還焦山度臘聞江中推船聲有省述偈曰夜靜江空闊推船㘞㘞聲不知何所往擔子半邊輕謁華山聞山拈一段生涯六不收話有疑猛提七日身心脫然尋歸里住靈山嘗畫大圓相於壁間曰內寫莫教塗黑外寫勿使傷白有人向圈裏圈外下得注腳者許汝學道無疑不然總是懡㦬後遷鵝湖十年不立座元無異來參以趙州無字話相契請居厥職贈以偈曰鵝湖十載虗元位一旦緣何立少年兩道眉毛八箇繓須知佛祖不容前又嘗置無門鎖室中以驗方來偈曰上古留傳鎖憑君智鑰開若無開鎖法相見不須來萬曆丁卯二月晦日上堂說法置齊作別復示偈曰八十餘年幻夢中鐵牛耕破太虗空臨行一句相分付半夜金烏帶日紅端坐而逝韶州曹溪憨山德清大師全椒蔡氏子幼習儒業年十二禮報恩林公為師十九芟染受具與妙峯為友偶閲肇論至梵志出家白首而歸鄰人見之曰昔人猶在耶梵志曰吾猶昔人非昔人也忽有省曰今日始知鼻孔向下妙峯曰何所得耶師曰夜來兩箇泥牛鬬入水中去至今絶消息峯笑曰且喜有住山本錢尋往燕都參笑巖和尚巖問何處來師曰南方巖曰記得來時路麼師曰一過便休巖曰子却來處分明師便禮拜後為黃冠所誣坐以私創寺院遣戌雷州至韶陽禮祖偈曰曹溪滴水自靈源流入滄溟浪拍天多少魚龍爭變化源頭一脈尚泠然越十有一年免戌留曹溪又九年始還僧服乃歸匡廬結菴五乳峯作逸老計數載復請還曹溪未幾忽告衆曰緣與時違化將焉託一期事畢吾將歸矣索浴更衣端坐而化壽七十有八臘五十有九塔全身于天子岡師嘗過德山禮祖塔偈曰堂前閒拓鉢獅子漫調兒覿面難回處低頭不語時未明末後句翻使至今疑為問三年事因何得早知山居生平蹤蹟任東西投老那能擇木栖縱使脊梁剛似鐵奈何脛骨軟如泥閒從絶壑看雲起坐對孤峯聽鳥啼不必更拈言外句現前聲色是全提
