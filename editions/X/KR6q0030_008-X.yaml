body:
  text: 明嗣祖沙門東吳通問編定笠澤居士華亭施沛彚集臨濟宗大鑑下第二十四世天目本禪師法嗣婺州烏傷伏龍無明千巖元長禪師越之蕭山人族姓董年七歲從諸父比丘曇芳于富陽法門院十九薙髮受具戒學律于靈芝會行丞相府飯僧師隨眾入中峯和尚適在座遙見師呼而問曰汝日用如何師曰念佛峯曰佛今何在師擬議峯厲聲叱之師作禮求示法要峯以狗子無佛性話授之縛茅靈隱脅不沾席者三年一日往望亭聞聲有省亟往見峯具陳悟由峯復叱之師憤然歸夜寂忽鼠翻食貓器墮地作聲恍然開悟復往質峰峰曰趙州何故云無師曰鼠餐貓飯峰曰未也師曰飯器破矣峰曰破後如何師曰築碎方甓峰乃微笑囑曰善自護持時節若至其理自彰師受囑隱天龍之東菴笑隱主中竺力薦起之江浙行省丞相脫歡公領宣政院事亦遣使迫師出世師皆不諾居亡何諸山爭相勸請師度不為時所容遂杖錫踰濤江而東至烏傷之伏龍山如青蓮華乃卓錫巖際誓曰山有水吾將止焉俄山泉溢出作白乳色師遂依大樹以居時泰定丁卯十月也初山有禪寺名聖壽荒廢已久當師入山鄉民咸夢異僧來遂相率披𫎇茸以訪見師晏坐不動各持食飲之物獻之大姓樓君如浚樓君一得共為伐木構精廬尋因舊號成大伽藍朝廷三遣重臣降香錫號佛慧圓鑒普濟大禪師并賜金襴法衣僧問如何是祖師西來意師曰野馬入牛欄問達磨未來時如何師曰在西天曰來後如何師曰在東土問如何是佛師曰今日好雨曰如何是道師曰此去義烏不遠問如何是賓中賓師曰當胷叉手問他人曰如何是賓中主師曰堂上坐來日正午曰如何是主中賓師曰有時歡喜有時瞋曰如何是主中主師曰橫按鏌鎁無佛祖問如何是露地白牛師曰艸裏臥曰甚麼人騎得師曰無髭鬚胡子曰三身中那身說法師曰賣油婆子水梳頭曰德山棒臨濟喝意旨如何師曰惡人先做大問如何是和尚家風師曰無力豎拳頭問達磨面壁意旨如何師曰有口開不得曰人天交接兩得相見如何是相見底事師曰烟熏黑漆桶問浩浩塵中如何辨主師舉拳示之曰辨後如何師曰你主在甚麼處師因官人見貓兒問貓兒喫肉否師曰不喫肉只喫老鼠曰善知識如何容得他師曰教官人莫來不得僧問釋迦彌勒猶是他奴未審他是阿誰師曰糞掃堆頭生苕帚曰學人不會師曰問取淨頭上堂僧問如何是第一句師曰有口如啞曰如何是第二句師曰有眼如盲曰如何是第三句師曰棒折也未放你在乃擲下拂子曰此是老僧第二句如何是第一句便下座上堂僧問如何是奪人不奪境師曰日照山河影動搖曰如何是奪境不奪人師曰背水陣圓增勇健曰如何是人境俱奪師曰任是鋒刀常坦坦假饒毒藥也閒閒曰如何是人境俱不奪師曰野老不知堯舜力鼕鼕打鼓祭江神僧禮拜師曰有麝自然香何用當風立上堂轉山河國土歸自己則易轉自己歸山河國土則難拈了也父母未生前道將一句來示眾今朝初一上殿已畢喝囉怛那西方日出示眾舉德山拓因緣拈曰末後句子德山巖頭雪峯總跳不出乃喝一喝大丈夫當為真王何以假為示眾良久曰大眾會麼會則事同一家不會則萬別千差臨濟和尚道我在黃檗喫六十痛棒如蒿枝拂相似如今更思量一頓喫不知誰為下手時有僧出曰某甲下手濟度杖與僧僧擬接濟便打看他的的顯示者些子無你諸人近傍處豈常情之所能測老僧尋常痛口罵你痛棒打你你不作無明會便作佛法會又何曾夢見我先祖門風所以古人云臨濟之道將墜于地痛哉正與麼時合作麼生超羣須是英靈漢敵勝還他師子兒示眾舉傅大士曰夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止分毫不相離如形影相似欲識佛去處只者語聲是玄沙曰大小傅大士祇認得箇昭昭靈靈洞山聰曰且道衲僧家日裏還曾睡也無保寧勇曰要眠時即眠要起時即起水洗面皮光啜茶溼却𭪿大海紅塵生平地波濤起呵呵阿呵呵哩哩哩囉哩師曰三尊宿大似徐六擔板傅大士又俗氣不除若論向上宗乘總欠悟在且道無明具甚麼眼目不見道直須揮劍若不揮劍漁父棲巢示眾今朝臘月二十五雲門一曲曾無譜爭似無明調轉高等閒唱出千山舞大地為琴虗空為鼓拍拍相隨聲聲相助汝諸人須聽取白雪陽春何足數箇中端的孰知音寥寥永夜松風度示眾舉瑯琊覺禪師曰有句無句如藤倚樹樹倒藤枯好一堆爛柴大慧和尚拈曰作賊人心虗雖然如是恩太難酬師曰一人作佛法商量一人作世諦流布簡點將來總欠悟在無明見處也要諸人共知有句無句如藤倚樹樹倒藤枯響示眾舉文殊普賢起佛見法見世尊威神貶向二銕圍山師曰大眾不起佛見法見還免得貶向二銕圍山麼世尊也是憐兒不覺醜示眾江月照松風吹面面青山展笑眉經有經師論有論師莫怪老僧無法說勞汝諸人立片時示眾一喝分賓主照用一時行要會箇中意日午打三更諸禪德臨濟大師四稜塌地了也乃喝一喝且道那箇是賓那箇是主那箇是照那箇是用又喝只者是賓只者是主只者是照只者是用又喝且不是賓且不是主且不是照且不是用是箇甚麼又喝進前求解會特地斬精靈示眾龍門水急一句截流茅屋風高千山起浪三世諸佛望風結舌六代祖師斫頟有分天下老和尚仰羨仰羨是汝諸人既到者裏作麼生與無明相見驀拈拄杖與麼與麼人境俱奪不與麼不與麼照用同時卓一下龍生金鳳子衝破碧瑠璃喝一喝示眾舉調達謗佛生身陷入地獄佛令阿難傳旨汝在獄中安否達曰我雖在獄中如受三禪天樂阿難曰汝還求出否達曰我待世尊來便出阿難曰世尊是三界大師豈有入地獄分達曰我豈有出地獄分師曰臨危不悚真大丈夫示眾世尊拈華眼裏撒沙迦葉微笑全身落艸達磨面壁皇天苦屈二祖安心老鼠居金德山行棒莽莽蕩蕩臨濟下喝喫鹽止渴溈山水牯泥裏洗土仰山插鍬性命難逃俱胝豎指是何道理雪峯輥毬老不知羞石鞏張弓誑謼盲聾趙州勘婆大有誵譌玄沙未徹話作兩橛者一隊不唧𠺕老凍儂生前鹵莽死後顢頇罪犯彌天髑髏徧野無明忍俊不禁與渠一坑埋却拈拄杖卓一下直得十方世界風凜凜地法堂前何止艸深一丈汝諸人且道向甚麼處出氣良久曰擬心湊泊二銕圍山放之自然七穿八穴復卓一下客至上堂披衣登法座道者是高僧將謂多奇特元來百不能西風吹細雨落葉滿空庭有客來相訪青山自送迎日本國請法衣上堂舉石門聰曰西天二十八祖盡得傳衣付法東土六祖之後得道者多只傳其法不傳其衣無明則不然衣以表法故謂之法衣人能弘道故謂之法身無處不徧無處不明故謂之法眼高峯老祖法衣一頂今春對眾請與高麗國金剛山供養去也幻住先師法衣一頂我得來三十年矣如今大拙首座又要請歸供養雖然如是從上諸祖各各有三十棒分無明亦有三十棒分眾中莫有下得者般毒手者麼有則出來下手看如無他時後日不得向背地裏叫苦叫屈擊拂子下座至正丁酉六月十四日示微疾沐浴更衣集眾說偈曰平生饒舌今日敗闕一句轟天正法眼滅投筆而逝世壽七十四僧臘五十六弟子用陶龕奉全身瘞于青松菴蘇州師子林天如惟則禪師吉安府廬陵人族譚氏受業禾山得法中峯僧問佛佛授手祖祖相傳畢竟傳箇甚麼師曰脚未跨門與你三十棒了也問達磨不來東土二祖不往西天還有為人處也無師曰有曰如何是和尚為人處師曰浴院裏燈籠笑破半邊口曰莫便是學人轉身處麼師曰上天無路入地無門曰今日多幸得聞師子吼也師便喝僧禮拜師曰拜則任你拜者一喝不曾倒地在問如來一音說法眾生隨類各解未審和尚如何為人師曰蝦蟆𨁝跳上天蚯蚓驀過東海曰恁麼則超佛越祖去也師曰你向那裏見得曰今古應無墜分明在目前師曰杜撰禪和華嚴會僧問無邊剎境自他不隔于毫端既有自他如何不隔師曰懷州牛喫禾益州馬腹脹曰十世古今始終不離于當念既有始終如何不離師曰天下覓醫人灸豬左膊上曰此會翻宣教典毋勞說禪且望和尚直譚教文師曰山僧無兩箇舌頭曰一真法界十種玄門還有自他終始也無師喝曰那得許多骨董來曰既無許多骨董畢竟華嚴所說何義師曰說華嚴曰離却法界玄門華嚴經在甚處師曰在你諸人手裏曰與麼則信受奉行去也師曰贈你三文買艸鞋問德山小參不答話問話者三十棒意作麼生師曰我者裏不打有問即答曰無法可說是名說法又作麼生師拈棒僧便走師曰作賊人心虗問禪門一派分為五宗其間還有優劣也無師曰五五二十五曰臨濟一宗兒孫徧地他有何長處師曰細魚齩斷鸕脚白鷺驚飛上樹梢曰涅槃心易曉差別智難明五宗異同請師開示師曰退身三步示眾趙州道箇無字開口見心肝因甚諸人自生障礙有僧請益曰蠢動含靈皆有佛性為甚狗子獨無師曰莫說狗子直饒你問他釋迦彌勒還有佛性也無他也道無僧曰趙州禪在口唇邊因甚只會道箇無字師曰趙州見處只到者裏僧曰和尚不肯趙州那師曰是僧曰趙州古佛和尚因甚不肯他師曰趙州在那裏隨後便喝示眾諸方有海蠡禪海蚌禪銕剗禪老僧者裏却是水上葫蘆禪觸著便動捺著便轉活鱍鱍地無你柰何處昨日一陽來復見說生根了也諸人為我提起看示眾有時伸出佛手有時放出驢脚錯有時拍禪牀有時擊香桌錯有時舌生毛唇生醭拄杖長年靠壁角臨濟德山鼻孔一時穿却錯諸禪德向者三箇錯處認得老僧請你喫無䬪飥示眾佛祖行不到處行取一步佛祖說不到處說取一句召眾曰一舖是九里三舖廿七里者箇是佛祖行不到處老僧行到今日初三明日初四後日初五者箇是佛祖說不到處老僧說到喝一喝寧與有智人廝罵莫與無智人說話示眾臨濟大師道我者裏是活祖師西來意一切臨時要用便用師拈拂子搖曳曰我者裏也是活底要用便用一切臨時且道與臨濟底是同是別擊一擊擲下曰臨濟大師猶欠者一著在示眾舉譬如牛過櫺頭角四蹄都過了惟有尾巴過不得師曰者箇是東山演祖不了事處老漢參方三十年也有兩件不了底事是甚麼兩件事饑來要喫飯困來要打眠示眾跛者命在杖濟者命在舟有來由沒來由一身還有一身愁衲僧門下奪食驅牛擬著眼看便與閉却戶牖擬開口道便與塞却咽喉夜廊無月不點火露柱從教撞破頭示眾慈悲不是佛忿怒不是魔明州布袋橫拕豎拕人人自屎不覺臭淨潔地上正好放屙金窠艸窠相去幾何歲寒落葉無人掃一任門前堆積多示眾天如老漢一箇獃僧爭柰諸人認他不著道他卓卓巍巍他却藞藞䕢䕢道他藞藞䕢䕢他又卓卓巍巍或時做善知識模樣談玄說玅或時現三頭六臂發瞋發惡如是等處一一認他不著殊不知老漢不在諸人眼睛裏却在諸人鼻孔裏諸人不信伸手摸看總饒摸他不著也摸著自家鼻孔示眾舉臨濟大師道我在黃檗先師處喫六十痛棒如蒿枝拂相似師曰好箇頑皮癩骨不知痛癢底麤漢何似近代兒孫箇箇皮下有血動著他絲毫不得也奇哉示眾舉百丈野狐因緣師曰前云不落後云不昧引得野狐隨羣逐隊喝當時若下得者一喝前後五百生一時粉碎示眾釋迦老子推不開達磨大師趕不出引得一畮之田三蛇九鼠盡道呼蛇易遣蛇難拍膝曰有甚麼難家有白𤢟之圖必無如是妖怪示眾女子臨出嫁時治家作活之法一一請教父母惟有生子養子不待教而自能所以俗書曰未有學養子而後嫁者也誠哉近代宗門衲子則不然先學說法然後學做佛寧可不做得佛不可不會說法怪哉師不住山居恒隨機開導行省平章咸稽顙執弟子禮屢起江浙諸名山堅却不赴遁跡吳淞間弟子就吳中構地結屋如叢林規制名師子林居十有三年道價日振至正十四年帝師錫以佛心普濟文慧大辯禪師號兼賜金襴法衣示寂後塔于水西原日本國建長古先印原禪師本國相州人姓藤氏藤為國中貴族師生有異徵年十三父母頓捨出家剃染受具戒慨然航海南詢初謁無見于天台見指往天目參中峯峯命給侍師屢呈見解峯呵之曰根塵不斷如纏縛何師退而悲泣食寢俱廢峯憐其誠因語之曰此心包羅萬象迷則生死悟則涅槃生死之迷固是未易驅斥涅槃之悟猶是入眼金塵當知般若如大火聚近之則焦首爛頟惟存不退轉一念生與同生死與同死自然與道相符脫使未悟之際千釋迦萬慈氏傾出四大海水入汝耳根總是虗妄塵勞皆非究竟師聞不覺悚然汗下一日有省趨告峯曰印原撞入銀山銕壁去也峯曰既入銀山銕壁來此何為師釋然領解峯因囑曰善自護持復參虗谷陵古林茂東嶼海月江印諸老咸以師子兒稱之會清拙澄公歸國載師同返遐邇欽敬初出主甲州之慧林歷遷八剎後住相州之建長一日示疾謂侍者曰時至矣可持觚翰來乃曰吾塔已成未書頟耳大書心印二字端坐而逝初門人欲畫師像預索讚語師作一圓相題其上曰玅相圓明如如不動觸處相逢是何面孔世壽八十僧臘六十七般若誠禪師法嗣建寧府高仰山古梅正友禪師貴溪丁氏子依末山本公受業後參絕學發明宗旨流寓江淮垂三十年思得佳山水結茅歸隱慕武夷幽勝遂入閩初主南浦之天心泰定元年建陽簿蔣德懋洎長者陳益宗捨園作菴迎師開山勅頟大覺玅智室中每舉狗子無佛性話鉗錘勘驗不少假借結制上堂仰山結制尋常活計眼裏放光鼻孔斢氣遇饑而餐遇困即睡諸方撒土揚沙高仰心空及第上堂九旬禁足又過一半心地未明如牽火鑽光陰莫虗度了却閒公案平地無端捉得賊老僧出來為汝斷解夏上堂九旬禁足特地成錯三月安居無繩自縛布袋解開乾坤寥廓放去若龜毛收來懸兔角試將兩眼挂虗空一陣凉風生殿角小參月落山頭慘雲橫谷口陰欲明生死事直見本來人還有會得本來人底麼良久曰夜靜不勞重借月玉蟾常挂太虗中師生于至元乙酉寂于至正壬辰說法二十九夏住世六十八秋全身塔于本山智者義禪師法嗣杭州淨慈德隱普仁禪師婺之蘭谿趙氏子年十歲依寶石演法院秋潭受業十四祝髮二十參方時了然義禪師弘大辨之道于智者寺師往叩機鋒觸發旋命侍香東陽主道場招師掌記復見南楚於雙徑分座說法至正乙未出世西峯淨土戊戌高帝親帥六師至婺州幸智者寺詔師主之甲寅遷淨慈一日示微疾屈指計曰今夏五月矣左右曰然師曰八月八日最良吾將逝矣至期整衣端坐而逝世壽六十有四僧臘五十有三會語錄淨慈林禪師法嗣杭州止菴德祥禪師本郡人與同菴俱為平山嗣德業風雅為時賢所重一日將涅槃眾請說偈師忽倚座曰者一隊噇酒糟漢我爭如你何竟趨寂徑山莊公有師半身像贊曰一提鈯斧六坐道場道傳正續名動諸方駕慈航暫遊笠澤懸慧日久駐錢塘龍淵之龍奮迅鳳臺之鳳翱翔既攄誠而闡大教益埀手以整頹綱全身雖不露徧界莫能藏百千三昧毫端現四海叢林話轉長金陵天界同菴易道夷簡禪師洪武十一年主南屏淨慈兵燹之餘殿堂鐘鼓為之一新父子繼席傳為盛事二十五年奉旨陞主大天界寺海門則禪師法嗣湖州弁山白蓮南極懶雲智安禪師嘉興沈氏子住海昌淨玅寺謁天真發明別傳之旨韜光晦迹交聘不赴𣆶居弁山之白蓮示眾萬法歸一無孔銕鎚當面擲一歸何處抹過西天并此土青州布衫重七斤寒巖古木璚華春仁者殷勤問端的孃生鼻孔從來直倘然言下解知歸九九方明八十一後退歸淨玅示寂塔于弁山之南阡所著有南極語要華頂睹禪師法嗣處州福林白雲智度禪師郡之麗水人族吳氏年十五從禪智寺空中假薙髮越數夏出遊七閩徧歷諸方無可其意者旋還里之白雲因澄禪師故基築室以居名曰福林後詣浙西參靈石芝于淨慈復謁斷崖義於西峯俱不契聞無見說法華頂往叩之曰西來密意未審何如見曰待娑羅峯點頭却與汝道師擬進語見便喝師曰娑羅峯頂白浪滔天華開芒種後葉落立秋前見曰我者裏無殘羹餿飯師曰此非殘羹餿飯而何見頷之遂服勤數載辭去見囑曰昔南嶽受大鑑記莂後得馬祖授以心法鍼芥相契不在多言勿掉三寸舌誑人須真正見解著于行履方為報佛深恩耳師佩服久之復往長沙見無方普雲居謁小隱大至正甲午還福林尋主龍泉普慈遷武峯國朝洪武己酉詔徵天下高僧建法會于蔣山師應詔會事戒嚴還至杭杭人奉居虎跑秋趨華頂明年春示微疾仍回福林沐浴更衣索筆書偈曰無世可辭有眾可別大虗空中何必釘橛擲筆而逝壽六十七臘五十三闍維舍利五色齒牙數珠皆不壞建塔瘞于院西天童一禪師法嗣杭州徑山呆菴敬中普莊禪師台之仙居袁氏子依天童左菴芟染久之不契出遊參了堂于天寧堂問何來師曰天童堂曰冒雨衝寒著甚死急師曰正為生死事急堂曰如何是生死事師以坐具作摵勢堂曰敢來者裏捋虎鬚參堂去一日室中舉庭前柏樹子話師擬開口堂劈口便掌從此悟入初出世撫州北禪後遷雲居洪武二十六年詔徵天下高行沙門師應詔對揚稱旨是年秋銜命祀廬山禮成詔主徑山僧問如何是雲居境師曰路轉溪迴空院靜曰如何是境中人師曰太平時代自由身曰人境已蒙師指示願聞一句接初機師曰無毛子貼天飛問路逢達道人不將語默對時如何師曰達道者方知僧曰和尚何得干戈相待師曰捉賊不如嚇賊僧曰明眼人瞞他一點不得師曰情知你不是好心師嘗勘僧曰近奉公文務要打點上座僧曰某甲不是奸細師曰也須勘過始得僧曰和尚莫倚勢欺人師展手曰把將公驗來僧擬議師便掌一僧曰久聞和尚有此機要師曰山僧失利一僧問承聞和尚有打點之機是否師熟視曰汝來自首那僧曰學人掀倒禪牀去也師曰汝是甚處人僧曰高著眼師曰者依草附木底精靈師一日問新到曰我者裏虎狼塞路荊棘參天上人到來有何忙事僧曰特來禮拜和尚師曰入門一句則不問脚跟下艸鞋甚處得來僧擬議師便喝又問昨離何處僧曰廬山師曰不勞再勘師鏟艸次僧問者片田地幾時剗得乾淨師舉起鋤頭曰未審上座喚作甚麼僧無語師拋下鋤頭曰者片田地幾時剗得乾淨問騎虎頭收虎尾中間事作麼生師曰渠儂得自由僧曰只如古人道我也弄不出意旨如何師曰入水見長人問九重天上承恩澤五髻峯頭據祖關四海禪流齊側耳願聞一曲萬年歡學人上來請師舉唱師曰須彌頂上擊金鐘曰與麼則過量人明過量事太平時唱太平歌師曰毫𨤲有差天地懸隔曰和尚遠辭京國近到徑山如何是不動尊師曰待盂峯𨁝跳即向汝道曰適聞疏中道千年枯木逢春一代曇華現瑞可謂誠實之言師曰汝用許多心識計較作麼曰龍象筵開當此日等閒掣取錦標歸師曰不是龍門客切忌遭點頟僧請益師曰汝自己分上少箇甚麼却來請益僧擬對師曰只知貪程不覺蹉路問如何是祖師西來意師曰盂口向天曰此是古人底師曰老僧用得恰好曰如何是奇特事師曰千年田八百主曰學人不會師曰至今將不去留與老農耕問如何是道師曰木落崖石出曰只如先德云山上有鯉魚井底有蓬塵意作麼生師曰見之不取思之千里上堂舉雲門大師曰平地上死人無數出得荊棘林是好手時有僧曰恁麼則堂中上座有長處門曰蘇嚧蘇嚧師曰雲門與麼道雲居則不然平地上活人無數入得荊棘林是好手忽有人出來說長說短拈拄杖劈脊便打何故水流溼火就燥禍福無門惟人自召示眾夫為宗師者不得已垂示一言半句無非為學者抽釘拔楔解粘去縛譬如善舞太阿自然不傷其手近代據師位訓學徒記持文字崇飾語言誇耀後來增長惡習不知有自己出身之路如衣壞絮行棘林中不能自由少林直指之宗於此墜地良可痛傷汝輩行脚各須帶眼莫教墮他網中出頭不得只如古人道入此門來莫存知解若約山僧見處直饒知解頓忘猶是門外漢到者裏須辨緇素始得珍重上堂觸目不會道運足安知路古人與麼道大似勞而無功山僧見處也要諸人共知驀拈拄杖卓一下但得雪消去自然春到來下座浴佛上堂真佛無形浴箇甚麼毗藍園裏妄見空華雲門令行不到今日驀拈拄杖召大眾曰今日事作麼生昆明池裏失却劍曲江江上撈得鋸卓拄杖上堂老僧開荒時於法堂基上掘得一箇鈯斧子久聚兄弟若有用得著者兩手分付若是荷負不去老僧收得來著甚死急不如颺向擸𢶍堆頭從他日炙風吹去也驀拈拄杖卓一下鞭起銕牛耕大地誰能井底種林檎上堂舉盤山和尚曰心月孤圓光吞萬象光非照境境亦非存光境俱忘復是何物洞山曰光境未忘復是何物師曰二尊宿弄物不知名各與二十拄杖不見道見義不為何勇之有冬至上堂舉洞山冬夜與泰首座喫果子次問曰有一物明如日黑如漆常在動用中動用中收不得過在甚麼處座曰過在動用中洞山令侍者掇退果桌師曰當斷不斷反招其亂若是徑山見他道過在甚麼處便與掀翻果卓亦使洞山知有宗門向上爪牙今日兒孫不致寂寥雖然也須脚踏實地始得拈拄杖不向藍田射石虎何人知是李將軍卓拄杖下座上堂一迷一切迷一悟一切悟一暗一切暗一明一切明所以道具足凡夫法凡夫不知具足聖人法聖人不會聖人若會即同凡夫凡夫若知即同聖人到者裏塵勞煩惱菩提解脫縛作一塊且道非非想天即今有幾人修因證果拈拄杖一年三百六十日一日日從今日始拄杖子亦從今日始卓拄杖擊碎三玄三要門普天匝地清風起上堂舉玄沙因鼓山至畫一圓相山曰人人出者箇不得沙曰情知你向驢胎馬腹裏作活計山曰和尚又作麼生沙曰人人出者箇不得山曰和尚為甚恁麼道得某甲恁麼道不得沙曰我得你不得師曰玄沙與鼓山難兄亦難弟若要出得者箇總欠悟在雪竇曰只知貪觀白浪不知失却手橈緇素眼何在驀拈拄杖畫一畫一把柳絲收不得和煙搭在玉闌干浴佛上堂舉藥山因遵布衲作殿主浴佛次乃問曰汝只浴得者箇還浴得那箇麼遵曰把將那箇來山休去師曰藥山能縱不能奪布衲能奪不能縱總未具超宗眼在黃龍南禪師曰二尊宿一出一入未見輸贏三十年後不得錯舉早是錯下名言徑山見處也要諸人共知今日殿中普請浴佛者箇那箇不得動著杓柄到手更莫顢頇擊拂子將此深心奉塵剎是則名為報佛恩永樂元年十月二十三日示寂于不動軒世壽五十八僧臘四十五闍維煙焰所至舍利如貫珠塔于凌霄之陽壽昌源禪師法嗣明州天童元明原良禪師寧海周氏子初住瑞巖後遷天童有侑宏聖禪師辭曰嗚呼山不讓塵故能成其高海不讓流故能成其深師非宿備六度萬行之願輪則曷由樹斯大法之功于古今聖人出興作百世師千載一時惟師得之巍巍窣堵鎮茲東谷洞上一宗真規復復昭告菲訶深勒崖谷願師再來為法作則天界信禪師法嗣溫州江心覺初慧恩禪師久依孚中信中居護龍河上師甞分座說法後中示寂師出世建業之聖泉次遷永嘉雅山未幾江心虗席牧守疏請師主之所著有三會語錄徑山悅禪師法嗣越州悲谿定水見心來復禪師南昌豐城人姓王氏生而穎異自幼有脫塵志至正二年于邑之西方寺祝髮走雙徑謁南楚久之乃得證入命掌內記無何避兵會稽遂主慈谿定水煥然起廢以干戈間阻不能省母作室于㵎東名蒲菴取陳尊宿義遷鄞之天寧杭之靈隱示眾舉城東老姥不欲見佛因緣頌曰佛身光現紫磨金大地羣靈悉共欽兩眼生來不願見老婆真有丈夫心舉文殊維摩各說不二法門頌曰妙喜天中問疾過機先勘破老維摩剎塵常說虗空聽一默相酬早是多舉文殊令善財採藥頌曰是藥拈來會得麼神方不必問耆婆若言殺活全工巧大地羣生病轉多舉馬祖遣人送圓相上徑山頌曰緘回特地謝殷勤海月山雲見處親莫怪南陽太饒舌乾坤誰是不疑人舉僧問馬祖離四句絕百非頌曰一幅冰綃五色新玉梭巧織鳳池春鴛鴦繡出從君看不把金鍼度與人舉百丈侍馬祖遊山野鴨子飛過頌曰野鴨羣飛過去忙馬師見處只尋常直饒扭得鼻頭破也是喪車後藥囊舉石鞏張弓接三平頌曰石鞏何曾解挽弓還他有力獲全功蒿枝不用施金鏃射透須彌百萬重一弓兩箭了平生未發機先毒已萌殺活要須親破的扣弦三下是虗聲舉靈雲見桃華玄沙未徹頌曰盡向長安踏早春紫騮隨處逐芳塵年年歌管東風裏解識桃華有幾人洪武元年以高僧徵召至京賜食內庭慰勞優渥適建鍾山大會勅師陞座說法復命蜀王椿從師問道師答蜀王問參禪法要曰禪宗正脈以心傳心單提徑示直接上根不涉言詮不存知解如擊石火似閃電光見即便見了即便了得即永得一聞千悟獲大總持用而無盡體不可窮若乃展轉思量取捨分別悉屬邪禪邪道非菩提智生死到來總用不著是則參須實參悟須實悟良由自證匪假他求所以達磨西來不立文字直指人心見性成佛謂之教外別傳其接二祖可大師祇是點示心體使之自悟及徵所得乃曰了了常知言不可及達磨方與印證曰即此是自性清淨心更勿疑也當時二祖所言知字正是親證心體蓋心是名以知為體此知乃靈知之知具含眾妙性自神解不藉緣生不因境起不是作意運想思慮而知直是真淨明妙虗徹靈通徧應無窮了然常知眾生由迷此知即起我相若了此知剎那成佛大抵亙古亙今通凡徹聖別無異法惟是一心此心即法法外無心此法即心心外無法豈不見文殊師利告妙德菩薩言三界之中以心為主能觀心者究竟解脫不能觀者究竟沉淪首楞嚴經亦曰眾生迷悶背覺合塵故發塵勞有世間相我以玅明不生不滅合如來藏而如來藏惟玅覺明圓照法界是故於中一為無量無量為一小中現大大中現小不動道場徧十方界身含十方無盡虗空於一毫端現寶王剎坐微塵裏轉大法輪是知欲證菩提即心而已離心無佛離佛無心了了識心惺惺見佛此實玅明真覺圓照無礙非智可測惟證乃知大凡參學日用心體不明為境所轉妄生顛倒心體若明如晝見色分明無惑故先德曰若心馳散即當攝來令住正念其正念者當知惟心無外境界即復此心亦無自相念念不可得故又曰迷時人逐法悟了法由人蓋迷時是執心為境被境所奪法有千差悟時是了境即心塵塵合道法法全真出沒卷舒一切由我為是從上已來禪門相傳單提直指總無許多言解但了即心是佛頓紹祖位便坐覺場如迦陵鳥在㲉而聲壓羣禽似好堅樹出地而高升眾木且如大乘頓教頓修之人一念不生即名為佛豈論積功累德劫號次第而後為證果哉蓋一切眾生心本是佛以妄念起故乃為眾生若一念妄心不生何為不得佛又如華嚴經云佛子無一眾生不具如來智慧但以妄想執著而不證得若離妄想則一切智自然智無礙智即得現前此吾祖所謂圓解圓修一超直入而功高累劫者豈誑語耶但今時人多信不及見不親行不到若信得及見得親行得到晝夜心無間斷寤寐一如返照靈源真性顯現無法不達無理不融自然應用普周縱橫任運到者田地不愁佛不解語雖在生死常入涅槃雖處塵勞常居淨剎念念釋迦出世步步彌勒下生菩提不修而自成煩惱不斷而自除境智雙泯情謂俱忘當體即真一心不動今殿下宿具正信佛法緣熟識詣見超心體已明有大力量不用堆堆兀兀竟日窮年但只圓解圓修於出入起居語默動靜乃至應事接物發號施令一切處一切時念起即覺常覺不昧澄慮忘情久而自契此三祖所謂虗明自照不勞心力又曰不離當處常湛然覓即知君不可見於此直下薦得徹去則是無為而為無修而修無得之得無功之功無證之證最為切當最為省要昔閩王請羅山閑禪師開堂演法山陞座方收斂僧伽黎乃曰珍重便下座閩王近前執山手曰靈山一會何異今日看他羅山作家不假言說而閩王天鑒自出常情後來洞山聰曰羅山忍俊不能禁大展家風吼一音紙墨如山書莫盡衲僧休向義中尋此古人直捷指示處宗眼明白與眾不同正所謂相逢不拈出舉意便知有豈在揚眉瞬目鼓唇動舌耶貧僧恁麼忉怛早是畫蛇添足冒凟睿聽然蒙賜問不容緘默冀國政之暇大圓照中少加垂覽亦見靈山宿願不忘祖道不勝至幸也復答晉王問禪要曰二月二十日敬奉令旨示諭佛法自心所得者敢不披露愚衷僭陳萬一殿下以菩薩應身乘願再來弘護佛法善世利生於統理國務之暇常切究竟佛祖一大事因緣此實不忘本願故也但於日用放捨諸緣休息萬念念起即覺常覺不昧行住坐臥飲食起居應事接物看得力不得力勿隨事物轉涉他機境葢世間萬事萬理皆出於心心若了時無法不了所以曰心生則種種法生心滅則種種法滅故知心無自性緣起即空不用多工最為省要法華經曰治世語言資生業等皆與實相不相違背華嚴經曰不壞世間相而成出世間法先德曰一切善惡都莫思量自然得入清淨心體此乃佛祖直指示人處若日用工夫目前事物莫管他是善是惡是逆是順是淨是穢譬如寶鑑當臺洞照妍醜物來即應物去不留不要起一念分別揀擇心亦不要問他靜時鬧時苦時樂時儘與盡力真實做去若到無理會處却是好消息便與一時放下忽然知解兩忘人法雙泯即是大休歇大自在大安樂時節也昔有國王問波羅提尊者曰何者是佛尊者曰見性是佛王曰師見性否尊者曰我見佛性王曰性在何所尊者曰性在作用王曰若當用時幾處出現尊者曰若出現時當有其八王曰其八出現當為我說尊者即曰在胎曰身處世名人在眼曰見在耳曰聞在鼻齅香在舌談論在手執捉在足運奔徧現俱該沙界收攝在一微塵識者知是佛性不識喚作精魂此便是究明自性底榜樣殿下宿具般若種智必能照了奚俟鄙言惟大圓鏡中以心印心羣生幸甚佛法幸甚後坐胡黨被逮受極刑時年七十餘矣物論哀其無辜嗚呼其定業若是耶所著有蒲菴集及蒲菴外集靈隱明禪師法嗣杭州淨慈休菴無旨可授禪師台之臨海李氏子年十二從季父沙門仲智于石門寺十九得度為大僧參普覺于靈隱問答之頃疑情頓釋至元六年出世台州安聖閱五年遷隆恩又二年補真如明年行宣政院選主龍華一坐十三夏洪武六年杭之中竺以府侯之命請師主之至則淨慈諸勤舊相與力爭屢却不聽不得已強居二載撾鼓告退一日示疾召左右曰吾逝矣左右進觚翰師麾去曰吾宗本無言說泊然而寂世壽六十九僧臘五十火浴齒牙貫珠不壞設利光瑩色如金晶其徒斂諸不壞并遺骼歸龍華塔而藏焉祖芳聯禪師法嗣杭州普明立中成禪師郡之錢塘人姓孫氏年十三投慈光若山出家首謁祖芳一日室中舉臘月火燒山話師呈頌曰白雲迷却舊行蹤臘月燒山火正紅忽地慈風來扇發冷冰冰處煖烘烘聯器之後於北郭建普明寺以接方來未幾請歸慈光正統辛未六月十三日上堂說偈曰今年八十一老病隨緣且遣日今年記著後年事後年記著今朝日至癸酉如期坐化壽八十三茶毗舍剎無算建塔于普明杭州淨慈照菴宗靜禪師號恬軒叟郡之高氏子自幼薙落本山適祖芳聯領院事師依之久乃得旨旋典藏鑰永樂辛卯應選出主護國尋遷雪竇無何僧錄以淨慈虗席舉師補之丁卯朝廷頒賜大藏師詣闕謝恩止于彌陀寺示微疾謂左右曰吾緣止矣沐浴更衣危坐而寂世壽七十六僧臘六十塔于藕華之祖丘有三會語錄烏石愚禪師法嗣溫州瑞安護龍太初啟原禪師日本國人姓源氏父官方宰九歲送入建長寺出家十八請旨南詢歷三年抵福州時吳元之丙午二月進京貢上表物受齋䞋畢勅見季潭泐公指令徧參後謁烏石傑峯一日峯上堂曰雪覆千山因甚麼孤峯不白師出眾曰雷聲隱隱雨點全無峯曰艸菴上葢瑠璃瓦石室中藏瑪瑙瓶師曰大蟲騎却南山虎峯曰虎生七子阿那箇無尾巴師曰第七箇峯曰且放汝三十棒由是許師入室後辭出山結茅廬阜復移石龍出世廣度遷羅陽三峯再遷護龍甞垂三關語舜若多神因甚麼向平地上拕泥帶水金翅鳥王劈海取龍吞因甚麼被泥鰍吞却三世諸佛說不得因甚麼狸奴白牯念摩訶一日集眾說偈曰生也銕面皮死也銕面皮一擊百襍碎白日繞銕圍擲筆坐逝金陵靈谷非幻無涯永禪師衢之西安人年十二投烏石山傑峯和尚出家峯問何處來師應聲曰虗空無向背峯指鐘示師師信口成頌曰百鍊爐中滾出來虗空元不惹塵埃如今挂在人頭上觸著洪音徧九垓峯大奇之旋為祝髮居下版服勤積久疑滯盡釋得無礙辯峯為印可永樂間擢為僧錄右闡教敕住靈谷會朝廷建大齋會禮官董事甚嚴師若不經意者左右怪問之師曰自家有一大事甚緊無暇他及沐浴更衣趺坐書偈曰生死悠悠絕世緣蒙恩永樂太平年者回撒手歸空去雪霽雲消月正圓投筆而逝上聞遣中官致祭茶毗舍利徧布
