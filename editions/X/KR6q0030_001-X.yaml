body:
  text: 明嗣祖沙門東吳通問編定笠澤居士華亭施沛彚集臨濟宗大鑑下第十八世天童華禪師法嗣慶元府天童密菴咸傑禪師福州鄭氏子母夢廬山老僧入舍而生自幼穎悟出家為僧不憚遊行徧參知識後謁應菴于衢之明果菴孤硬難入屢遭呵一日入室次菴問如何是正法眼師遽曰破沙盆菴頷之踰季辭回省親菴送以偈曰大徹投機句當陽廓頂門相從今四載徵詰洞無痕雖未付袋氣宇吞乾坤却把正法眼喚作破沙盆此行將省覲切忌便躲跟吾有末後句待歸要汝遵後出世衢之烏巨次遷祥符蔣山華藏未幾詔住徑山復遷靈隱𣆶居太白僧問虗空消殞時如何師曰罪不重科上堂牛頭橫說豎說不知有向上關棙子有般漆桶輩東西不辨南北不分便問如何是向上關棙子何異開眼尿牀華藏有一轉語不在向上向下千手大悲摸索不著雨寒無處曬㫰今日普請布施大眾良久曰達磨大師無當門齒上堂世尊不說說拗曲作直迦葉不聞聞望空啟告馬祖即心即佛懸羊頭賣狗肉趙州勘菴主貴買賤賣分文不值祇如文殊是七佛之師因甚出女子定不得河天月暈魚分子槲葉風微鹿養茸上堂卓拄杖迷時祇迷者箇復卓一下悟時祇悟者箇直饒迷悟雙忘糞掃堆頭重添擸𢶍莫有向東涌西沒全機獨脫處道得一句底麼若道不得華藏自道去也擲拄杖三十秊後上堂舉金峯和尚示眾曰老僧二十秊前有老婆心二十秊後無老婆心時有僧問如何是二十秊前有老婆心峯曰問凡答凡問聖答聖曰如何是二十秊後無老婆心峯曰問凡不答凡問聖不答聖師曰烏巨當時若見但冷笑兩聲者老漢忽若瞥地自然不墮凡聖窠臼上堂舉婆子燒菴話師曰者箇公案叢林中少有拈提者今日傑上座裂破面皮不免納敗一上也要諸方簡點乃召大眾者婆子洞房深穩水洩不通偏向枯木上糝華寒灰中發焰箇僧孤身迥迥慣入洪濤等閒坐斷潑天潮到底身無涓滴水子細簡點將來敲枷打鎖則不無二人若是佛法未夢見在烏巨與麼提持畢竟意歸何處良久一把柳絲收不得和烟搭在玉欄干上堂動弦別曲葉落知秋舉一明三目機銖兩如王秉劍殺活臨時猶是無風匝匝之波向上一路千聖把手共行合入泥犂地獄正當與麼時合作麼生江南兩浙春寒秋熱上堂盡乾坤大地喚作一句子擔枷帶鎖不喚作一句子業識茫茫兩頭俱透脫淨倮倮赤灑灑沒可把達磨一宗掃土而盡所以雲門大師道盡乾坤大地無纖毫過患猶是轉句不見一法始是半提更須知有全提底時節大小雲門劍去久矣方乃刻舟後示寂塔于寺之中峯衢州光孝百拙善登禪師和州烏江閔氏子僧問世尊生下一手指天一手指地曰天上天下唯吾獨尊意旨如何師曰一人傳虗萬人傳實僧曰有意氣時添意氣不風流處也風流師曰讚歎也讚歎不及僧曰只如雲門大師道我當時若見一棒打殺與狗子喫貴圖天下太平畢竟具什麼眼目師曰腦後薦取上堂白日閙浩浩夜後靜悄悄長廊走波波步步無欠少不識主人翁全身入荒艸撞著傅大士問訊維摩老臥疾毗耶城幾箇知天曉若是過量人不向那邊討為什麼如此喝一喝下坡不走快便難逢南書記者福州人久依應菴於趙州狗子無佛性話豁然契悟有偈曰狗子無佛性羅睺星入命不是打殺人被人打殺定菴稱其脫略紹興末示寂于歸宗侍郎李浩居士字德遠號正信幼閱首楞嚴如遊舊國志而不忘後造明果投誠入室應菴揕其𮌎曰侍郎死後向甚麼處去士駭然汗下菴喝出士退參不旬日徑躋堂奧以偈寄同參嚴康朝曰門有孫臏舖家存甘贄妻夜眠還早起誰悟復誰迷有鬻胭脂者亦久參應菴頗自負士贈之偈曰不塗紅粉自風流往往禪徒到此休透過古今圈䙡後却來者裏喫拳頭教授嚴康朝居士湖州長興人甞問道於薦福雪堂及見應菴於報恩得旨甞有頌曰趙州狗子無佛性我道狗子佛性有驀然言下自知歸從茲不信趙州口著精神自抖擻隨人背後無好手騎牛覓牛笑殺人如今始覺從前謬教忠光禪師法嗣泉州法石中菴慧空禪師贛州蔡氏子春日上堂拈拄杖卓一下先打春牛頭又卓一下後打春牛尾驚起虗空入藕絲裏釋迦無路潛蹤彌勒急走千里文殊却知落處拊掌大笑歡喜且道歡喜箇甚麼春風昨夜入門來便見千華生碓𭪿上堂千家樓閣一霎秋風祇知襟袖凉生不覺園林葉落於斯薦得觸處全真其或未然且作寒溫相見上堂舉金剛經佛告須菩提爾所國土中所有眾生若干種心如來悉知何以故如來說諸心皆為非心是名為心要會麼春風得意馬蹄疾一日看盡長安華僧問先佛埀範禁足安居未審是何宗旨師曰瑠璃內拓須彌僧便喝師便打臨安府淨慈混源曇密禪師天台盧氏子依資福道榮出家十六圓具習台教棄去參大慧於徑山次謁雪巢一此菴元入閩留東西禪俱不契復叩泉南教忠俾悅眾解職歸前資一日忠舉香嚴擊竹因緣豁然契悟述偈呈忠忠舉玄沙未徹話詰之無滯忠乃囑曰子今可見妙喜矣師秉命即往梅陽服勤四載住後上堂諸佛出世打劫殺人祖師西來吹風放火古今善知識佛口蛇心天下衲僧自投籠檻莫有天然氣槩特達丈夫為宗門出一隻手主張佛法者麼良久曰設有也須斬為三段上堂德山小參不答話千古叢林成話霸問話者三十棒慣能說訶說夯時有僧出的能破的德山便打風流儒雅某甲話也未問頭上著枷脚下著柙你是那裏人一回相見一傷神新羅人把手笑欣欣未跨船舷好與三十棒依前相廝誑混源今日恁麼批判責情好與三十棒且道是賞是罰具參學眼者試辨看上堂舉雲門問僧光明寂照徧河沙因緣師曰平地撈魚蝦遼天射飛鶚跛脚老雲門千錯與萬錯後示寂塔于本山吉州青原信菴唯禋禪師福之長樂李氏子秊十有一歲出閩依盰江禪悅廣公為童子閱五白始獲僧服一日廣以佛國白公五十三知識頌授諸維那師侍其傍聞止住林有時要見十方佛無事閒觀一片心之句便得要領廣異其根利俾還閩謁鼓山佛心才及東禪月菴果西禪嬾菴需諸老時晦菴住龜山師往叩一日夜半摸索淨巾次恍然大徹黎明趨方丈通其所證呈偈曰業識茫茫本無所據昨夜三更回頭一覰一段靈光本來獨露菴不覺解顏頷之復出嶺見顏萬菴於番陽薦福入室次應對敏捷顏厲聲曰者福州子被人教壞了也一眾駭愕未幾復往梅陽見大慧慧曰如何是佛師曰覿面相逢更無別法慧曰如何保任師曰饑來喫飯困來打眠既而隨大慧北還慧一日問曰許多人入室幾人道得著幾人道不著師曰唯禋只管看慧忽展手曰我手何似佛手師曰天寒且請和尚通袖慧遽打一竹篦曰且道是賞你罰你師遂以頌發揮佛祖機緣十數則呈慧其世尊初生曰撞出頭來早自錯那堪開口更稱尊當時若解深藏舌免得閒愁到子孫慧為之擊節後開法天台真如遷報恩豫章上藍吉州青原所至山川改觀僧問三聖道我逢人則出出則不為人意旨如何師曰移華兼蝶至曰興化道我逢人則不出出則便為人又作麼生師曰買石得雲饒上堂舉僧問雲門樹彫葉落時如何門曰體露金風師曰雲門袖頭打領腋下剜襟不妨好手子細看來未免牽絲帶綫或問報恩樹彫葉落時如何只向他道來秊更有新條在惱亂春風卒未休上堂拈拄杖十方國土中唯有一乘法者箇是橫泉拄杖子那箇是一乘法卓一下千峯勢倒嶽邊止萬派聲歸海上消紹熈三秊壬子五月十九日示疾書偈曰末後一句覿面分付擬議思量世諦流布遂跏趺而逝羅湖瑩仲溫狀其行東林顏禪師法嗣荊州公安遯菴祖珠禪師南平人也上堂不是心不是佛不是物瀝盡野狐涎趯翻山鬼窟平田淺艸裏露出焦尾大蟲太虗寥廓中放出遼天俊鶻阿呵呵露風骨等閒拈出眾人前分明是何物咄咄上堂玉露垂青艸金風動白蘋一聲寒鴈叫喚起未惺人汀州報恩法演禪師果州人上堂舉俱胝豎指因緣師曰佳人睡起懶梳頭把得金釵插便休大抵還他肌骨好不塗紅粉也風流臨安府淨慈肯堂彥充禪師於潛盛氏子幼依明空院義堪為師首參大愚宏智正堂大圓諸老後聞東林謂眾曰我此間別無玄妙祇有木札羹銕釘飯任汝齩嚼師竊喜之造謁陳所見林曰據汝見處正坐在鑒覺中師於是憤然將從前所得底一時颺下一日聞僧舉南泉時人見此一株華如夢相似默有所契乃曰打艸祇要蛇驚耳次日入室林問那裏是巖頭密啟其意處師曰今日捉敗者老賊林曰達磨大師性命在汝手裏師擬開口驀被攔胷一拳忽大悟直得汗流浹背點首自謂曰臨濟道黃檗佛法無多子豈虗語耶遂述頌曰為人須為徹殺人須見血德山與巖頭萬里一條銕林然之住後上堂世尊不說說迦葉不聞聞卓拄杖水流黃葉來何處牛帶寒鴉過遠村上堂舉雪峯示眾曰盡大地是箇解脫門把手拽不入師曰大小雪峯話作兩橛盡大地是箇解脫門用拽作麼上堂一向與麼去法堂前艸深一丈一向與麼來脚跟下泥深三尺且道如何即是三秊逢一閏鷄向五更啼上堂舉卍菴先師道坐佛牀斫佛脚不敬東家孔夫子却向他鄉習禮樂師曰入水入泥即不無先師爭柰寒蟬抱枯木泣盡不回頭卓拄杖灼然有不回頭底淨慈向升子裏禮汝三拜上堂三世諸佛無中說有䕞𦿆拾華鍼六代祖師有裏尋無猿猴探水月去此二途如何話會儂家不管興亡事盡日和雲占洞庭元菴受智者請引座南山有箇老魔王炯炯雙眸放電光口似血盆呵佛祖牙如劍樹罵諸方幾度業風吹不動吹得動雲黃山畔與嵩頭陀傅大士一夥破落戶依舊孟八郎賺他無限癡男女開眼堂堂入鑊湯忽有箇衲僧出來道既是善知識為甚麼賺人入鑊湯只向他道非公境界後示寂塔于寺之南菴婺州智者元菴真慈禪師潼川人姓李氏幼依成都正法出家具戒後遊講肆聽講圓覺至四大各離今者妄身當在何處畢竟無體實同幻化因而有省作頌曰一顆明珠在我者裏撥著動著放光動地以呈諸講師無能曉之者歸以呈其師遂舉狗子無佛性話詰之師曰雖百千萬億公案不出此頌也其師乃叱出師因南游至廬山圓通挂搭時萬菴為西堂為眾入室舉僧問雲門撥塵見佛時如何門曰佛亦是塵師隨聲便喝以手指胷曰佛亦是塵復頌曰撥塵見佛佛亦是塵問了答了直下翻身勸君更盡一杯酒西出陽關無故人又頌塵塵三昧曰裏飯桶裏水別寶崑崙坐潭底一塵塵上走須彌明眼波斯笑彈指笑彈指珊瑚枝上清風起卍菴深肯之成都府昭覺紹淵禪師上堂鎔瓶盤釵釧作一金攪酥酪醍醐成一味如是主賓道合內外安和五位君臣齊透四種料揀一串放行則細雨濛濛秋風颯颯把住則空空如也誰敢正眼覰著且道放行為人好把住為人好等閒一似秋風至無意凉人人自凉上堂舉僧問雲門樹彫葉落時如何門曰體露金風師曰要明陷虎之機須是本色衲僧始得雲門大師具逸羣三昧擊節扣關於閃電光中出一隻手與人解粘去縛拔楔抽釘不妨好手子細點簡將來大似與賊過梯昭覺即不然忽有人問樹彫葉落時如何只向他道落霞與孤騖齊飛秋水共長天一色上堂舉趙州初見南泉問如何是道泉曰平常心是道州曰還假趨向也無泉曰擬向即乖州曰不擬爭知是道泉曰道不屬知不屬不知知是妄覺不知是無記若真達不疑之地廓然如太虗空豈可強是非耶師曰奇怪諸禪德雖是沙彌初入道一撥便轉豈不是伶俐人南泉如善射者發箭箭箭中紅心若不是趙州大難承當便向平常心是道處動著關棙子去却胷中物喪却目前機頭頭上明物物上顯便能信脚行信口道等閒拈出著著有出身之路且道以何為驗豈不見僧問如何是祖師西來意答曰庭前柏樹子問萬法歸一一歸何處答曰我在青州作一領布衫重七斤問如何是趙州答曰東門西門南門北門與人解粘去縛抽釘拔楔坐斷天下人舌頭穿過天下人鼻孔豈不是平常心是道底關棙子且不是飣餖底言語排疊底章句推人在死水裏者箇便是沙彌底樣子應當學欲行千里一步為初白日青天快著精彩徽州簡上座參大慧于徑山時卍菴為首座一日為眾入室問師曰一二三四五六七明眼衲僧數不出你試數看師便喝菴曰七六五四三二一你又作麼生師擬對菴便打出曰你且莫亂道師于言下有省遽說偈曰你且莫亂道皮毛卓豎寒只知梅子熟不覺鼻頭酸又甞頌狗子無佛性話曰趙州老漢渾無面目言下乖宗神號鬼哭西禪需禪師法嗣福州鼓山木菴安永禪師閩縣吳氏子弱冠為僧未幾謁懶菴于雲門一日入室次菴曰不問有言不問無言世尊良久不得向良久處會隨後便喝師當下契悟作禮曰不因今日問爭喪目前機菴許可之住後上堂要明箇事須是具擊石火閃電光底手段方能嶮峻巖頭全身放捨白雲深處得大安居如其覰地覓金鍼直下腦門須迸裂到者裏假饒見機而作不犯鋒鋩全身獨脫猶涉泥水祇如本分全提一句又作麼生道擊拂子淬出七星光燦爛解拈天下任橫行上堂舉睦州示眾曰諸人未得箇入處須得箇入處既得箇入處不得忘却老僧師曰恁麼說話面皮厚多少木菴則不然諸人未得箇入處須得箇入處既得箇入處直須颺下入處始得上堂拈拄杖臨濟小廝兒未曾當頭道著木菴今日全身放憨也要諸人知有擲拄杖下座僧問須彌頂上翻身倒卓時如何師曰未曾見毛頭星現曰恁麼則傾湫倒嶽去也師曰莫亂做僧便喝師曰雷聲浩大雨點全無溫州龍翔柏堂南雅禪師上堂瑞峯頂上棲鳳亭邊一杯淡粥相依百衲蒙頭打坐二祖禮三拜依位而立已是周遮達磨老臊胡分盡髓皮一場狼藉其餘之輩何足道哉柏堂恁麼道還免諸方簡責也無拍繩牀洎合停囚長智上堂大機貴直截大用貴頓發縱有囓鏃機一鎚須打殺何故我王庫內無如是刀上堂紫蕨伸拳笋破梢楊華飛盡綠陰交分明西祖單傳句黃栗留鳴燕語巢者裏見得諦信得及若約諸方決定明牕下安排龍翔門下直是一槌槌殺何故不是與人難共住大都緇素要分明福州天王志清禪師上堂豎起拂子只者箇天不能葢地不能載徧界徧空成團成塊到者裏三世諸佛向甚麼處摸索六代祖師向甚麼處提持天下衲僧向甚麼處名邈除非自得自證便乃敲唱雙行雖然如是未是衲僧行履處作麼生是衲僧行履處是非海裏橫身入豺虎叢中縱步行南劍州劍門安分菴主幼與木菴同肄業於安國後依懶菴未有所證辭謁徑山大慧行次江干仰瞻宮闕聞街司喝侍郎來釋然大悟作偈曰幾秊箇事挂𮌎懷問盡諸方眼不開肝膽此時俱裂破一聲江上侍郎來遂仍返西禪懶菴迎之付以伽黎後菴居劍門化被嶺表示眾者片田地汝等諸人且道天地未分已前在甚麼處直下徹去已是鈍置你自己分上不少了也更若擬議思量何啻白雲萬里驀拈拄杖打散示眾上至諸佛下及眾生性命總在山僧手裏簡點將來有沒量罪過還有簡點得出者麼卓拄杖一下冤有頭債有主遂顧視左右曰自出洞來無敵手得饒人處且饒人示眾十五日已前天上有星皆拱北十五日已後人間無水不朝東已前已後總拈却到處鄉談各不同乃屈指曰一二三四五六七八九十十一十二十三十四諸兄弟今日是幾良久曰本店買賣分文不賒育王光禪師法嗣杭州靈隱妙峯之善禪師吳興劉氏先居彭城高曾大父父皆登膴仕師生紈綺中資性高潔秊十三即辭家受業于德清齊政院經論一見輒了大意乃徧謁諸大老時佛照光唱道鄮山師往參禮以風幡話契旨蒙印可贈以偈曰今日與君通一綫斬釘截銕起吾宗復遊衡湘還入匡廬卓錫妙高峯下面壁十秊一時學者尊之曰妙峯禪師後分座於鴈山能仁出世慧因遷洪福萬秊諸剎退居皐亭劉寺十餘秊復領明之瑞巖蘇之萬壽常之華藏𣆶居靈隱靈隱密邇行闕輪蹄湊集師掩戶無所將迎公卿貴人或見之寒溫而已會天童虗席時鄭清之秉鈞軸具疏勸請勉師必赴師曰老僧秊踰耄矣尚夜行不休乎辭弗就上堂應物現形如水中月信手拈來一時漏洩以拂子擊禪牀左邊者裏是鑊湯爐炭復擊右邊者裏是劍樹刀山前面是觀音勢至後面是文殊普賢中間一著還知落處麼又擊一擊毗婆尸佛早留心直至而今不得妙上堂談玄說妙事如麻添得時人眼裏沙赤骨律窮挨得入潑狼潑賴是生涯懸羊頭賣狗肉喫官酒臥官街笑倒籬根破艸鞋上堂舉雲門普請搬柴次乃拋下柴片曰一大藏教祇說者箇師曰大小雲門只見錐頭利不見鑿頭方示眾久參高士眼空四海鼻孔撩天見也見得親說也說得親行也行得親用也用得親只是未識老僧拄杖子在何故將成九仞之山不進一簣之土師生平善誘其徒未甞厲聲色自然神融意消心悅誠服將示寂澡身趺坐書偈曰來也如是去也如是來去一如清風萬里書畢而逝實端平二秊九月二十八日也壽八十四臘七十一火浴獲舍利不可數計瘞于靈隱之西岡鄭公銘其塔退谷義雲禪師福州黃氏子幼業儒從山堂淳公祝髮僧問三聖道我逢人則出出則不為人意旨如何師曰東斗西移曰興化道我逢人則不出出則便為人又作麼生師曰南斗北轉上堂奔流度刃疾焰過風啐同時崖州萬里有底道如人學射久習則巧殊不知未彀已前中的早涉迂回了也趙州到茱萸靠却拄杖即且置只如孚上座道聖箭折也意作麼生喝一喝若不同牀睡焉知被底穿上堂舉首山拈竹篦示眾曰喚作竹篦則觸不喚作竹篦則背汝等諸人喚作甚麼葉縣省近前掣竹篦拗作兩橛拋向階下却曰是甚麼山曰瞎縣便禮拜師曰臨濟一宗掃土而盡開禧二秊五月示寂明州育王孤雲權禪師上堂舉僧問雪峯古㵎寒泉時如何峯曰瞪目不見底曰飲者如何峯曰不從口入又問趙州古㵎寒泉時如何州曰苦曰飲者如何州曰死師曰一人隨波逐浪一人截斷眾流檢點將來總欠會在今日有人問育王古㵎寒泉時如何只對他道須是親見雪峯飲者如何問取趙州送僧歸鳳山偈曰鳳凰山下鳳凰兒文彩纔彰羽翼齊銕網漫天攔不得歸心已在碧梧枝杭州淨慈北磵禪師諱居簡字敬叟潼川王氏子也以其寓北磵之日久人不敢名字之故稱北磵云世業儒依邑之廣福院得度閱卍菴語有省後參佛照機契追隨甚久出世天台報恩光孝退居飛來峯之陰大參真西山時為江東部使者以東林雲居力致之師高臥不起後奉旨遷淨慈上堂識得一萬事畢了事衲僧一字不識直饒恁麼未稱全提禹力不到處河聲流向西上堂舉密師伯與洞山在餅店坐次密於地上畫一圓相謂洞山曰把將去山曰拈將來保寧勇和尚拈曰非但二人提不起盡大地人亦提不起師曰北磵敢道保寧計窮力盡上堂以大圓覺為我伽藍身心安居平等性智喫官酒臥官街當處死當處埋本來無位次何用強安排上堂雲巖二十秊在藥山只明此事澄潭不許蒼龍蟠趙州四十秊不雜用心除二時粥飯是雜用心處兔子何曾離得窟上堂先佛照道棒頭撥著活衲僧正法眼藏增高價北磵則不然棒頭撥著活衲僧正法眼藏瓦解冰消且道與先佛照是同是別上堂舉趙州一日入僧堂曰有賊有賊見一僧便捉住曰賊在者裏僧曰不是某甲州托開曰是即是祇是汝不肯承當師曰趙州收處太危放去太急淨慈則不然家賊難防家財必喪卓拄杖只可錯捉不可錯放師頌世尊初生話曰一聲哇地便吒哩突出如斯大闡提此土西天起殃害堂堂洗土不成泥又頌楞嚴經六解一亡曰六用無功信不通一時分付與春風篆煙一縷閒清晝百鳥不來華自紅淳祐丙午春示疾索筆書偈於紙尾復書四月一日珍重六字至期假寐而逝壽八十三臘六十二葬全身於月堂昌禪師塔側遵遺命也有北磵集十九卷行世杭州徑山浙翁如琰禪師台州周氏子上堂舉乾峯因僧問十方薄伽梵一路涅槃門未審路頭在甚麼處峯以拄杖畫一畫曰在者裏僧又請益雲門門拈起扇子曰扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾會麼師曰唱愈高和愈峻還他二老若是十方薄伽梵一路涅槃門總未踏著在上堂拈拄杖蔣山喚者箇作拄杖子諸人亦喚者箇作拄杖子還有緇素也無闌干雖共倚山色不同觀作維摩贊曰毗耶示疾放憨癡添得時人滿肚疑不是文殊親勘破者些毛病有誰知福州東禪性空智觀禪師上堂舉鹽官國師因僧問如何是本身盧舍那國曰與老僧過淨瓶來僧將淨瓶至國曰却安舊處著僧再問國曰古佛過去久矣師曰盲者難以與乎文彩聵者難以與乎音聲者僧既不薦來機國師只成虗設雲門道無朕迹扶國師不起雪竇曰直得一手指天一手指地爭得無也扶國師不起以拂子畫一畫前來葛藤一時畫斷且道如何是本身盧舍那擲拂子下座上堂舉保壽和尚開堂日三聖推出一僧公案師曰眾中商量道三聖有奔流度刃之作向平地湧波瀾保壽用疾焰過風之機向虗空裏轟霹靂二大老各出一隻手扶豎臨濟正法眼藏與麼說話要作臨濟兒孫且緩緩東禪道蚊子如何擎大柱藕絲焉可挂須彌若是臨濟正法眼藏端的向二人邊滅却湖州上方朴翁銛禪師天資奇逸辯博無礙上堂舉趙州因僧問狗子還有佛性也無州曰無師頌曰狗子佛性無還他大丈夫是非雖入耳壁上挂葫蘆甞贊達磨像曰一言已出駟難追賴得君王放過伊楊子江心航折葦浪頭何似問頭危杭州靈隱銕牛印禪師上堂舉南泉示眾曰王老師自小養一頭水牯牛擬向溪東放不免食他國王水艸向溪西放亦不免食他國王水艸不如隨分納些些總不見得頌曰不如隨分納些些喚作平常事已差綠艸溪邊頭角露一蓑烟雨屬誰家明州育王空叟宗印禪師西蜀人初住湖州崇光保壽僧問如何是本來身師曰風吹日炙僧曰意旨如何師曰釘釘膠粘上堂據虎頭收虎尾第一句下明宗旨直饒句下宗旨明拈來猶較十萬里何故大慧師祖於此懸羊頭賣狗肉佛照老人於此冒姓名佃官田小比丘來坐斷芳塵畢竟如何施設拈拄杖平生無所有只此一枝藤上堂大道坦然離名離相剗除則失旨建立則乖宗從上佛祖古今知識顯大機彰大用盡是關空鎖夢過犯彌天印上座裂破面皮還免得麼良久拍禪牀不入驚人浪難逢稱意魚上堂二由一有一亦莫守平地上死人無數一心不生萬法無咎屎窖裏頭出頭沒孤迥迥峭巍巍華須連夜發莫待曉風吹上堂銕崑崙兒喫一攧南海波斯舞不輟夜半失却攔腰帛笑倒東村王大伯拍禪牀一下下座上堂舉僧問長沙如何是上上人行履處沙曰如死人眼僧曰上上人相見時如何沙曰如死人手師曰死人眼死人手金烏飛玉兔走直截根源取之左右張翁醉倒臥官街元是李翁喫私酒明州育王秀嵒師瑞禪師上堂舉道吾和尚曰高不在絕頂富不在福嚴樂不在天堂苦不在地獄相識滿天下知心能幾人大慧和尚曰高在絕頂富在福嚴樂在天堂苦在地獄誰知蓆帽下元是舊時人大眾二大老隨機應用即不無若是衲僧門下未夢見在且道衲僧門下作麼生良久不是知音者徒勞話歲寒上堂舉灌溪參臨濟濟搊住灌溪溪曰領領濟乃托開師頌曰雨散雲收後崔嵬數十峯倚闌頻顧望回首與誰同上堂舉演化大師問報慈如何是真如佛性慈曰誰無化不契復請益護國國曰誰有師曰誰無誰有全機道言下翻身不唧𠺕直饒未舉已先行錯認簸箕作熨斗阿呵呵若人自解倒騎驢一生不著隨人後明州天童無際了派禪師上堂三五十五月圓當戶然雖匝地普天要且秋毫不露對景憑誰話此心令人翻憶寒山子上堂諸人十二時中上來下去折旋俯仰起居問訊瞞崇恩一點不得只今坐立儼然賓主交參面面相覩崇恩亦瞞諸人一點不得既然彼此不相瞞為什麼自作障礙喝一喝因風吹火用力不多上堂昨夜安排一段禪天明起來都忘却而今打鼓眾雲臻對面臨時旋揑合乃回顧侍者曰記取者一著佛涅槃上堂釋迦老子昔向今辰入大寂定堪笑天下叢林刻舟求劍二千餘秊區區不已崇恩今日不動神機捩轉瞿曇鼻孔不圖打艸驚蛇只要大家相見汝等諸人各宜子細觀瞻莫教錯過遂合掌曰不審不審上堂佛法在你日用處在你著衣喫飯處在你語言酬醋處在你行住坐臥處在你屙屎送尿處擬心思量便不是了也咄啼得血流無用處不如緘口過殘春題郁山主像贊曰䇿蹇溪橋蹉跌時悞將豌豆作真珠兒曹不解藏家醜笑倒楊岐老古錐石菴正玸禪師歸湖上偈曰鳥不驚飛水不流碧潭空濶冷涵秋一絲頭上無香餌風輥蘆花落釣舟明州天童海門師齊禪師甞口誦華嚴詣各殿堂行香及回方丈已畢全部行者告眾眾皆不信師乃令八十一人各執經一卷師陞座誦一卷畢其八十一人各聞誦自所執經始知師為華嚴菩薩應世云江州雲居率菴梵琮禪師上堂舉百丈野狐話頌曰百丈野狐石女無夫一回淚出滄海乾枯浴佛上堂且喜今朝降獨尊率菴無物慶生辰只將一霎薔薇露洗出湖山淨法身東禪嶽禪師法嗣福州鼓山宗逮禪師上堂世尊道應如是知如是見如是信解不生法相喝一喝玉本無瑕却有瑕舉鎮州蘿蔔話頌曰些兒活計口皮邊點著風馳與電旋謾說鎮州蘿蔔大何曾親見老南泉杭州徑山寓菴德灊禪師興化人初住徑山至山門彈指一下便入福州鼓山石菴知玿禪師僧問坐斷雲山事已彰可憐雲水自茫茫今日石門通一綫端然衣錦便還鄉還鄉一曲作麼生唱師曰罕遇知音曰祇如未跨石門一句作麼生道師曰百雜碎曰已跨石門又作麼生師曰依舊却囫圇曰直得大頂峯點頭鼓山屴崱震動師曰未為分外曰祇今晏國師撫掌呵呵大笑曰幸得與老師相見去也師曰不是冤家不聚頭僧禮拜師曰放汝三十棒上堂謝李深卿陳仲齡昔在東溪日華開葉落時幾擬以黃金鑄作鍾子期師曰古人恁麼道大似焦桐挂壁罕遇知音白雲今日幸遇二居士到來正值六合風清萬籟俱息不免再理朱絃試彈一曲橫按拄杖諸人還聞麼聞即不無且道是何曲調卓拄杖太古希聲無限意知音知後更誰知上堂語是謗默是誑不語不默轉增虗妄喝一喝春風吹落桃李華淡烟疎雨籠青嶂天童全禪師法嗣明州育王笑翁妙堪禪師慈谿毛氏子廣顙平頂骨氣清豪從野菴受業依息菴觀于金山參松源嶽於靈隱皆不契時無用全公居天童徑造其室用問曰行脚僧游山僧師曰行脚僧用曰如何是行脚事師以坐具便摵用曰此僧敢來者裏捋虎鬚俾參堂室中每示狗子無佛性話一日師擬開口用以竹篦劈口便𭣟師應聲呈偈曰大塗毒鼓轟天震地轉腦回頭橫屍萬里用頷之即命侍香已而報恩約公至請師分座太守程公請出世妙勝次遷金文光孝忠獻史衛王以堂牒除台之報恩天台舊無律宗師與大卿齊公議合十寺為大剎築壇場命負毗尼學者倡開遮持犯之法風勵新學閩帥王公復請居雪峯未幾詔住靈隱衛王以大慈完美請師開山及王薨師菴居上柏台州使君陳公以瑞巖邀師無何江心牒至監丞史公強之乃起淨慈詔下丐辭不允大參余公書來不可重違君命明秊荊湖總臣奏令僧道買紫衣師號俾以師號住持師謂若是則千金之子皆可主法我道殆矣奏疏殿陛上書廟堂其議遂寢詔徙天童力辭東歸翠巖築室奉先世香火育王虗席復有旨起師再辭不許乃奉詔上堂膏雨及時江山如洗幽鳥語喬林殘紅隨遠水可憐盲聾瘖瘂人不識此方真教體上堂舉保壽開堂三聖推出僧話頌曰一人客路如天遠一箇歸心似箭輕彼此征途雖有異須知同日到天庭上堂舉汾陽示眾曰識得拄杖子行脚事畢頌曰平地無因立話端揭天聲撼怒濤寒直饒識得拄杖子也是封皮作信看天童除書再至大參趙公復請主淨慈悉謝之示疾書遺表作寺丞張公書請主後事通守永嘉曹公來問疾從容敘世契移頃書偈曰業鏡高懸七十二秊一槌擊碎大道坦然置筆泊然而逝杭州靈隱石皷希夷禪師上堂舉瑯琊覺法華舉相見公案頌曰聞名不如見面見面不如聞名此地無金二兩俗人沽酒三升上堂舉南泉曰文殊普賢昨夜三更起佛見法見每人與二十棒趂出院也趙州曰和尚棒教誰喫南泉曰且道王老師過在甚麼處趙州禮拜而出頌曰春風吹落碧桃華一片流經十萬家誰在畫樓沽酒處相邀來喫趙州茶和梁山遠禪師十牛圖頌句法與梁山相埒理趣超卓似有過焉一尋牛只管區區向外尋不知脚底已泥深幾回芳艸斜陽裏一曲新豐空自吟二見跡枯木崖前差路多艸窠裏輥覺非麼脚跟若也隨他去未免當頭蹉過他三見牛識得形容認得聲戴嵩從此妙丹青徹頭徹尾渾相似子細看來未十成四得牛牢把繩頭莫放渠幾多毛病未曾除徐徐驀鼻牽將去且要回頭識舊居五牧牛甘分山林寄此身有時亦踏馬蹄塵不曾犯著人苗稼來往空勞背上人六騎牛還家指點前坡即是家旋吹筒角出烟霞忽然變作還鄉曲未必知音是伯牙七忘牛存人闌內無牛趂出山煙蓑雨笠亦空閒行歌坐樂無拘繫贏得一身天地間八人牛俱忘慚愧眾生界已空箇中消息若為通後無來者前無去未審憑誰繼此宗九返本還源靈機不墮有無功見色聞聲不用聾昨夜金烏飛入海曉來依舊一輪紅十入垂手者漢親從異類來分明馬頷與驢腮一揮銕棒如風疾萬戶千門盡豁開明州雪竇野雲處南禪師上堂百計推尋永不見面一時休去在處逢渠長連牀上喫粥喫飯取飽為期我且問你常住一粒米是幾番過手上堂斬釘截銕特地乖張就下平高衲僧笑具皇覺到此有理難伸未審諸公如何理論上堂摩醯正眼熈然赫然一處該通萬機頓赴縛虎擒龍驚天動地且平常一句又作麼生莫把是非來辨我浮生穿鑿不相關福州雪峯滅堂了宗禪師上堂空索索冷冰冰清虗之理畢竟無身為什麼却有許多烟雨會得麼若會得七種供養諸人若會不得滴水難消幽州盤山思卓禪師上堂拈拄杖登山渡水全藉者人擲拄杖相見易得好共住難為人上堂寂寂惺惺有氣死人惺惺寂寂無用頑石嘻下載清風付與誰丞相錢象祖居士初守金陵甞遊保寧問道於無用全公有所契入後於鄉里建接待十所皆以淨土極樂名之創止菴為棲息之所自左相辭歸精修淨業於嘉定二秊閏二月得微疾有問起居者則曰不貪生不怖死不生天上不生人中惟當往生淨土耳言訖趺坐而化西禪淨禪師法嗣福州乾元宗穎禪師上堂卓拄杖性燥漢祇在一槌靠拄杖伶俐人不勞再舉而今莫有伶俐底麼良久曰比擬張麟兔亦不遇興化府華嚴別峯雲禪師初住福州支提遷福泉華嚴上堂千種言萬般解只要教君長不昧且道不昧箇什麼喚作竹篦則觸不喚作竹篦則背上堂彌勒大士朝入伽藍暮成正覺總似者般鈍漢有甚用處直饒隔山望見支提雙童峯便回去脚跟下好與三十上堂舉真淨和尚道也無禪也無道也無玄也無妙快活須明者一竅師曰既無禪道又無玄玅甚處得者一竅若有一竅可明如何得快活去諸人即今要得快活麼便下座上堂過去諸如來斯門已成就是甚語話現在諸菩薩今各入圓明誣人之罪未來修學人當依如是法莫鈍置他好其柰茫茫宇宙人無數幾箇男兒是丈夫福州中濟無禪立才禪師上堂舉雪竇和尚頌曰三分光陰二早過靈臺一點不揩磨貪生逐日區區去喚不回頭爭柰何師曰雪竇老漢顢顢頇頇儱儱侗侗更參三十秊也未會禪在然雖如是土曠人稀試聽下箇註脚瞎却摩醯三隻眼南北東西路不分上堂舉趙州和尚喫茶去話頌曰趙州逢人喫茶誰知事出急家翻手作雲作雨順風撒土撒沙引得洞山無意智問佛也道三斤麻讀此菴語錄偈曰南海波斯持密呪千言萬語少人知春風一陣來何處吹落桃華三四枝華藏演禪師法嗣湖州何山月窟慧清禪師上堂舉天台韶國師初參法眼因僧問法眼如何是曹源一滴水眼曰是曹源一滴水韶聞豁然開悟師頌曰曹源一滴水相罵饒接𭪿鷃空啾啾驊騮已千里開善謙禪師法嗣建寧府仙州山吳十三道人每以己事叩諸禪伯及開善歸結茅於其左遂往給侍紹興庚申三月八日夜釋然啟悟占偈呈善曰元來無縫罅觸著便光輝既是千金寶何須彈兒善答曰啐地折時真慶快死生凡聖盡平沉仙州山下呵呵笑不負相期宿昔心雪峯然禪師法嗣如如居士顏丙有僧舉趙州見南泉有主沙彌話問居士以頌答之曰解把一莖茅艸喚作丈六金身會得頭頭皆是道眼中瞳子面前人又頌子湖狗話曰貧家無所有只養一隻狗便是佛出來也須遭一口淨慈一禪師法嗣明州天童息菴達觀禪師義烏趙氏子也初參應菴次見無庵於道場後於淨慈水菴室中明得二老埀手處一語破的而返至龍翔柏堂分第一座後閱四剎被旨陞靈隱上堂舉二祖問達磨安心公案頌曰長安深夜雪漫漫欲覓心安轉不安總使言前開活眼那知已被老胡謾袁州仰山簡菴嗣清禪師上堂舉達磨大師一日謂門人曰時將至矣汝等盍各言所得乎最後慧可出禮三拜依位而立磨曰汝得吾髓師頌曰揑目生華立問端得他皮髓被他謾者般瞎漢能多事六月無霜也道寒道場全禪師法嗣常州華藏伊菴有權禪師臨安昌化祁氏子秊十四得度十八歲參禮佛智于靈隱時無菴居第一座室中以從無住本建一切法問之師久而有省答曰暗裏穿鍼耳中出氣菴可之遂密付心印嘗夜坐達旦行粥者至忘展鄰僧以手觸之師感悟說偈曰黑漆崑崙把釣竿古帆高挂下驚湍蘆華影裏弄明月引得盲龜上釣船佛智嘗問心包太虗量廓沙界時如何師曰大海不宿死屍智撫其座曰此子他日當據此座呵佛罵祖去在師益自韜晦復見應菴於歸宗參大慧於徑山洎無菴住道場命師分座住後上堂今朝結却布袋口明眼衲僧莫亂走心行滅處解翻身噴嚏也成獅子吼旃檀林任馳驟剔起眉毛頂上生剜肉成瘡露家醜上堂禪禪無黨無偏迷時千里隔悟在口唇邊所以僧問石霜如何是禪霜曰㼾甎又僧問睦州如何是禪州曰猛火著油煎又僧問首山如何是禪山曰猢猻上樹尾連巔大眾道無橫徑立處孤危此三大老行聲前活路用劫外靈機若以衲僧正眼簡點將來不無優劣一人如張良入陣一人如項羽用兵一人如孔明料敵若人辨白得可與佛祖齊肩忽有箇衲僧出來道長老話作兩橛適來道道無橫徑無黨無偏而今又却分許多優劣作麼生祇對還委悉麼把手上山齊著力咽喉出氣自家知淳熈庚子秋示微疾書偈趺坐而逝茶毗齒舌不壞獲五色舍利無數葬于橫山餘骼塔萬秊寺左焦山體禪師法嗣明州天童癡鈍智穎禪師舉達磨見武帝因緣頌曰提起須彌第一鎚玉關金鎖擊難開重施背踏空勞力應悔迢迢萬里來徑山印禪師法嗣潤州金山退菴道奇禪師僧問雪峯道望州亭與汝相見了也意旨如何師曰左眼半斤曰烏石嶺與汝相見了也作麼生師曰右眼八兩曰僧堂前與汝相見了也又且如何師曰鼻孔大頭向下曰只如鵝湖驟步入方丈保福入僧堂此意又作麼生師曰水向竹邊流出冷風從華裏過來香上堂此段大事無處不周新焦山未離東霞時已與諸人相見了也且道相見底事作麼生幾多頭角成龍去蝦蟹依前努眼睛上堂至道本乎一心心法本乎無住無住心體靈知不昧性相寂然所以道吾打鼓四大部洲同參拄杖橫也挑榦乾坤大地盂展也覆却恒河沙界到者裏象王行處狐兔絕蹤水月現時風雲自異古今收不得歷劫不知名千聖立下風誰敢當頭道咄我王庫內無如是刀雙林用禪師法嗣婺州三峯印禪師上堂舉百丈野狐話頌曰不落不昧誣人之罪不昧不落無繩自縛可憐柳絮隨春風有時自西還自東龜峯光禪師法嗣杭州徑山蒙菴元聰禪師福州朱氏子於晦菴會中得心要眾推為高弟慶元三秊自福之雪峯被旨遷徑山上堂舉藥山首造石頭之室便問三乘十二分教某甲粗知甞聞南方直指人心見性成佛實未明了伏望指示頭曰恁麼也不得不恁麼也不得恁麼不恁麼總不得子作麼生山罔措頭曰子因緣不在此且往馬大師處去山稟命禮馬祖仍伸前問祖曰我有時教伊揚眉瞚目有時不教伊揚眉瞚目有時揚眉瞚目者是有時揚眉瞚目者不是汝作麼生山于言下契悟便禮拜祖曰汝見甚麼道理便禮拜山曰某甲在石頭如蚊子上銕牛祖曰汝既如是善自護持師頌曰倒腹傾腸說向伊不知何故尚遲疑只今便好猛提取莫待天明失却鷄上堂舉玄沙見僧禮拜次乃曰因我得禮你頌曰因我得禮你莫放屁撒屎帶累天下人錯認自家底上堂舉趙州一日在東司上見文遠過驀召文遠遠應諾州曰東司上不可與汝說佛法頌曰明明道不說此理憑誰識春風一陣來滿地華狼藉送行者求僧偈曰山前麥熟雨初晴桑柘青連柳色新毫髮不存風骨露頭頭總是比丘身十月十四日示寂大洪證禪師法嗣蘇州萬壽月林師觀禪師俗姓黃福州侯官人僧問三聖道逢人則出出則不為人意作麼生師曰錯曰興化道逢人則不出出則便為人又作麼生師曰錯僧曰興化旗鎗倒卓三聖肝膽齊傾師曰引不著曰只如今日和尚作麼生為人師曰一棒一條痕頌玄沙三種病話盲聾瘖啞捉敗了也更問如何盲聾瘖啞大溈行禪師法嗣常德府德山子涓禪師潼川人也上堂見見之時見非是見見猶離見見不能及喝一喝鯨吞海水盡露出珊瑚枝眾中忽有箇衲僧出來道長老休寐語却許伊具一隻眼上堂橫按拄杖一二三四五六七七六五四三二一循環逆順數將來數到未來無盡日因七見一見一亡七踏破太虗空銕牛也汗出絕氣息無踪跡擲拄杖更須放下者箇始是參學事畢上堂拈拄杖有時奪人不奪境拄杖子七縱八橫有時奪境不奪人山僧七顛八倒有時人境兩俱奪拄杖子與山僧削迹吞聲有時人境俱不奪卓拄杖伴我行千里𢹂君過萬山忽然撞著臨濟大師時又如何喝一喝未明心地印難透祖師關萬秊賁禪師法嗣溫州龍鳴在菴賢禪師上堂舉崇壽示眾曰識得凳子周匝有餘雲門道識得凳子天地懸殊師曰崇壽老漢坐殺天下人雲門大師走殺天下人龍鳴則不然識得凳子四脚著地要坐便坐要起便起上堂舉趙州勘婆話頌曰冰雪佳人貌最奇常將玉笛向人吹曲中無限華心動獨許東君第一枝潭州大溈咦菴鑑禪師會稽人也上堂木落霜空天寒水冷釋迦老子無處藏身拆東籬補西壁撞著不空見菩薩請示念佛三昧也甚奇怪却向道金色光明雲參退喫茶去上堂老胡開一條路甚生徑直只云歇即菩提勝淨明心不從人得後人不得其門一向奔馳南北往復東西極歲窮秊無箇歇處諸人還歇得麼休休上堂舉晦堂和尚一日問僧甚處來曰南雄州堂曰出來作甚麼曰尋訪尊宿堂曰不如歸鄉好曰未審和尚令某歸鄉意旨如何堂曰鄉里三錢買一片魚如手掌大師曰寧可碎身如微塵終不瞎箇師僧眼晦堂較些子有般漢便道熟處難忘有甚共語處上堂舉罽賓國王問師子尊者蘊空公案師頌曰尊者何曾得蘊空罽賓徒自斬春風桃華雨後已零落染得一谿流水紅明州天童雪菴從瑾禪師永嘉楠溪人俗姓鄭禮普安院子回落髮謁心聞於瑞巖一日入室聞舉紅爐片雪問師擬答忽領旨留侍三秊入閩見佛智于西禪問甚處來師曰四明智曰曾見憨布袋麼師便喝智便打師接住拳曰和尚不得艸艸智曰瞎漢過者邊立時心聞主江心師歸省命允維那一日問師一喝分賓主照用一時行如何是一喝分賓主師便喝聞曰者一喝是賓是主師曰賓則始終賓主則始終主聞笑曰汝又眼華了師即呈偈曰一喝分賓主依然又眼華倒翻筋斗去踏殺死蝦蟇初住儀真靈巖遷天童僧問如何是靈巖境師曰鹿跑泉冷浸明月龍鬬港深藏白雲僧問如何是祖師西來意師曰夜半須彌安鼻孔曰如何是禪師曰仰面不見天曰如何是道師曰全身入荒艸上堂金槌運動三世諸佛不敢當頭法令施行外道天魔悉皆拱手峭巍巍本無攀仰淨躶躶不用安排行住坐臥不用猜疑好惡是非一時放下然後和泥合水拽杷牽犂任運縱橫總無妨礙正恁麼時且道太平一曲作麼生唱良久銕船橫古渡重整舊家風上堂金剛圈裏翻身築著帝釋鼻孔懸崖頭上撒手突出達磨眼睛往復三回興猶未盡機輪一轉勢不可停倒拈蝎尾婢使聲聞順捋虎鬚奴呼菩薩釋迦已滅彌勒未生佛法祖令總屬新天童手裏且把住放行如何施設良久無孔銕槌當面擲普天匝地起清風慶元六秊七月廿三日索浴更衣書偈投筆而寂壽八十四臘七十全身葬心聞塔右雲居會禪師法嗣萬松壞衲大璉禪師讚出山相偈曰行滿功圓徹骨窮不勝羸瘦髮髼鬆彌天罪過今無數毗舍耶中一款供
