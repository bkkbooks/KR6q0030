body:
  text: 明嗣祖沙門東吳通問編定笠澤居士華亭施沛彚集臨濟宗大鑑下第二十二世仰山欽禪師法嗣杭州西天目山高峯原玅禪師吳江人族徐氏母夢僧乘舟投宿而孕嘉熈戊戌三月二十三日申時生纔離襁褓即喜趺坐遇僧入門輒愛戀欲從之秊十五懇請父母投嘉禾密印寺法住為師十六薙髮十七受具十八習天台教二十更衣入淨慈立三年死限二十二請益斷橋倫令參生從何來死從何去話於是脅不至席口體俱忘雪巖寓北磵師懷香往謁方問訊即被打出閉却門一再往始得親近令看趙州無字自此參叩無虗日巖忽問阿誰與你拕箇死屍來聲未絕便打如是者不知其幾後值巖赴南明師上雙徑參堂方半月偶夢中忽憶斷橋室中所舉萬法歸一一歸何處話疑情頓發三晝夜日不交睫值少林忌隨眾詣三塔諷經次擡頭忽覩正祖和尚真讚曰百秊三萬六千朝返覆元來是者漢驀然打破拕死屍之疑時秊二十四矣解夏詣南明巖一見便問阿誰與你拕箇死屍到者裏師便喝巖拈棒師把住曰今日打某甲不得巖曰為甚打不得師拂袖便出翌日巖問萬法歸一一歸何處師曰狗䑛熱油鐺巖曰你那裏學者虗頭來師曰正要和尚疑著巖休去自是機鋒不讓次年江心度夏過雪竇見希叟曇寓旦過曇問那裏來師拋下蒲團曇曰狗子無佛性上座作麼生師曰拋出大家看曇乃自送歸堂暨巖挂牌於道場開法於天寧師皆隨侍一日巖問日間浩浩時還作得主麼師曰作得主又問睡夢中作得主麼師曰作得主復問正睡著時無夢無想無見無聞主在甚麼處師無語巖囑曰從今日去也不要你學佛學法也不要你窮古窮今但只饑來喫飯困來打眠纔眠覺來却抖擻精神我者一覺主人公畢竟在甚麼處安身立命師遂奮志入龍𩯭自誓曰拌一生做箇癡獃漢決要者一著子明白越五載因同宿道友推枕墮地作聲廓然大徹自謂如泗州見大聖遠客還故鄉元來只是舊時人不改舊時行履處住龍鬚九年縛柴為龕風穿日炙冬夏一衲不扇不爐日搗松和糜延息而已咸淳甲戌遷武康雙髻德祐丙子春大兵至師掩關危坐自若事定戶履紛至師腰包宵遁直入西天目之師子巖巖拔地千仞崖石林立師即洞營小室丈許榜曰死關悉屏給侍服用破甕為鐺併日一食洞梯山以升雖弟子亦罕得見共築師子院請師開堂適雪巖於大仰寄師竹篦拂子至元丁亥懷中瓣香遂為拈出開堂僧問十方同聚會箇箇學無為此是選佛場心空及第歸龐居士恁麼道還有為人處也無師曰有曰畢竟在那一句師曰從頭問將來曰如何是十方同聚會師曰龍蛇混雜凡聖交參曰如何是箇箇學無為師曰口吞佛祖眼葢乾坤曰如何是選佛場師曰東西十萬南北八千曰如何是心空及第歸師曰動容揚古路不墮悄然機曰恁麼則言言見諦句句朝宗師曰你甚處見得僧喝師曰也是掉棒打月曰此事且止只如西峯今日十方聚會選佛場開畢竟有何祥瑞師曰山河大地萬象森羅情與無情悉皆成佛曰既皆成佛因甚學人不成佛師曰你若成佛爭教大地成佛曰畢竟學人過在甚麼處師曰湘之南潭之北曰還許學人懺悔也無師曰禮拜著僧禮拜師曰師子齩人韓獹逐塊示眾百千諸佛歷代祖師乃至天下老和尚以拂子擊禪牀一下總向者裏墮坑落塹還有跳得出底麼又擊一下三生六十劫上堂無邊剎境自他不隔於毫端十世古今始終不離於當念只如山僧每日在張公洞裏橫眠豎眠或歌或咏諸人還知麼諸人每日在選佛場中東行西行或瞋或喜山僧還知麼若也彼此知得不免分身碓搗拔舌犂耕若也彼此不知管取釋迦拱手彌勒歸依因甚如此不見道知之一字眾禍之門上堂萬法歸一一歸何處乃顧視左右下座上堂盡十方世界是箇盂汝等諸人喫粥喫飯也在裏許屙屎放尿也在裏許行住坐臥乃至一動一靜總在裏許若也識得達磨大師只與你做得箇洗脚奴子若也不識二時粥飯將甚麼喫參結制上堂大限九旬小限七日麤中有細細中有密密密無間纖塵不立正恁麼時銀山銕壁進則無門退之則失如墮萬丈深坑四面懸崖荊棘切須猛烈英雄直下翻身跳出若還一念遲疑佛亦救你不得此是最上玄門普請大家著力山僧雖則不管閒非越例與諸人通箇消息雪巖和尚忌拈香昔年瞎却我眼今朝穿却你鼻冤冤相報無休莫若克己復禮遂插香以袖掩面作哭聲復以坐具搭左肩上作女人拜曰非惟和光同塵免得相鈍置師嘗室中垂語曰大徹底人本脫生死因甚命根不斷佛祖公案只是一箇道理因甚有明與不明大修行人當遵佛行因甚不守毗尼杲日當空無所不照因甚被片雲遮却人人有箇影子寸步不離因甚踏不著盡大地是火坑得何三昧不被燒却倘下語不契閉門弗接自非具透關眼者鮮不望崖而退辛卯鶴沙瞿提舉到山瞻禮施巨莊贍眾師固辭不受瞿請于官乃於蓮華峯別營禪剎曰大覺議以歲入給常住請嗣法祖雍領寺事師患胃疾久適雍來省師囑以後事於十二月初一日黎明陞座辭眾曰西峯三十年妄談般若罪犯彌天末後有一句子不敢累及諸人自領去也眾中還有知落處者麼良久曰毫釐有差天地懸隔辰巳間復說偈曰來不入死關去不出死關銕蛇鑽入海撞倒須彌山泊然而寂遺命塔全身於死關壽五十八臘四十三衡州靈雲銕牛持定禪師太和磻溪王氏子故宋尚書贄九世孫也自幼清苦剛介有塵外志秊三十謁西峯肯菴剪髮得聞別傳之旨尋往依雪巖居槽廠服杜多行一日巖示眾曰兄弟家做工夫若也七晝夜一念無間無箇入處斫取老僧頭做舀屎杓師默領勵精奮發因患痢藥石漿飲皆禁絕單持正念目不交睫者七日至夜半忽覺山河大地徧界如雪堂堂一身乾坤包不得有頃聞擊木聲豁然開悟徧體汗流其疾亦愈旦詣方丈舉似巖反覆詰之遂命為僧一日巖上堂舉亡僧死了燒了向甚麼處去自代曰山河及大地全露法王身師於言下疑情蕩盡即出眾作禮曰適來和尚舉揚般若驚得法堂前石獅子笑舞不已巖曰試道看師曰劫外春回萬物枯山河大地一塵無法身超出如何舉笑倒西天碧眼胡巖敲卓子曰山河大地一塵無者箇是什麼師作掀倒勢巖笑曰一彩兩賽一日入室次巖曰親切處道將一句來師曰不道巖曰為什麼不道師拈起香盒曰者箇不值半文錢巖曰多口漢巖巡堂次師以楮被裹身而臥巖召至方丈勵聲曰我巡堂汝打睡若道得即放過道不得即趂下山師隨口答曰銕牛無力懶耕田帶索和犂就雪眠大地白銀都葢覆德山無處下金鞭巖曰好箇銕牛也因以為號一時行輩靡不推服至元廿五年至酃縣桃源山愛其幽深乃有棲遯意未幾縣尹陳公及僚屬等入山問道相率執弟子禮遂大唱雪巖之宗大德七年正月十五日示寂壽六十四臘二十六全身塔於寺北三十里沙潭其徒別流涇走浙江謁虞文靖公集求師塔銘虞問先有銕耶先有牛耶涇曰先師親見仰山來虞點首笑曰吾試為汝模畫之天如和尚頌曰銕牛誰後復誰先口未開時欠一拳好本弄成模畫去牽犂拽耙錯流傳杭州徑山西白虗谷希陵禪師婺之義烏人何姓秊十九薙髮於東陽資壽院受具戒即謁虗舟遠於雙林又依東叟穎於淨慈掌內記石林補處師職侍者一日往叩雪巖于北磵巖舉黃龍見慈明因緣問之稱師穎利及巖遷大仰遣書招師居第一座一日巖問曰臨濟在黃檗三度喫六十拄杖因甚向大愚肋下築拳師曰鈍置殺人巖便打師拂袖而出至元丙戌巖將示寂撫師肩曰吾以此擔累汝師曰終不向者裏活埋却未幾巖化去眾遂請師繼席嘗垂三語以驗來學曰三乘十二分教拈向一遊蝦蟇口裏道將一句來狗子聞哇聲因甚齩破庫堂前露柱獺徑橋吞却集雲峯是第幾機答者罕契一坐三十夏規範森嚴毫不假借銕關樞行脚時嘗叩師值冬至小參師舉雲門餬餅因緣關呈四偈以進師問你是誰關曰樞上座師曰從那裏來關曰雲門師曰你是顛是狂關曰和尚眼在甚麼處師便喝關亦喝師揮一拳關進前迎住曰打即且置雲門餬餅意作麼生師奮手掠去關帽關曰錯師連揮數拳關曰拳頭無眼向後遭人簡點在師不顧去關七條踏翻在地攔腰九棒曰教你知我手段關曰此手段勝似臨濟德山底師喚直庸鎖關手送庫司至夜不釋次日上堂師令侍者謂關曰今日和尚上堂對人天眾前勘辨你關曰侍者與我傳語和尚少間人天眾前將古人公眾一一問將來我當一一答去須臾皷響關伺久而侍者不至歲饑師每食必與眾共一日與客語過夜半饑不自勝侍者請取勺粟為飲師曰不可常住豈住持人得私延祐丙辰行省稟旨迎師主徑山僧問過去心不可得現在心不可得未來心不可得此意如何師曰親不相贈師早秊嘗夢遊淨慈羅漢堂至東南隅忽見一尊者指楣梁間有詩曰一室寥寥絕頂開數峯如畫碧于苔等閒翻罷貝多葉百衲袈裟自剪裁師初不解及自仰山遷雙徑始驗仰山有貝多葉經徑山有楊岐衣師之出處已前定之矣世祖召對說法稱旨賜號佛鑑禪師大德中加賜大圓迨主徑山仁宗加號慧照大辯至治壬戌四月十二日手書囑外護戒飭弟子說偈訣眾示寂於不動軒全身瘞菖蒲田世壽七十六僧臘五十七有瀑巖集及語錄若干卷袁州慈化銕山瓊禪師十八歲出家首參雪巖於大仰一日室中舉那吒太子析骨還父析肉還母因緣有省述偈曰一莖艸上現瓊樓識破古今閒話頭拈起集雲峯頂月人前拋作百華毬值巖示寂尋謁東巖東問心不是佛智不是道上座作麼生會師曰抱贓叫屈東曰不是心不是佛不是物是甚麼師曰眉間迸出遼天鶻復謁蒙山山請分座上堂冬在月頭賣被買牛冬在月尾賣牛買被卓拄杖者裏無尾無頭中道齊休行也休休坐也休休住也休休臥也休休睡眼豁開五雲現瑞光風齊月無處不週梅綻枯枝古渡頭風前時復暗香浮雖然到此向上一路萬里崖州何以見得靠拄杖休休後示寂塔于觀音閣後建昌府能仁天隱牧潛圓至禪師高安人姚姓父兄皆名進士師志慕空宗年十九投仰山慧朗禪師芟染服勤數載元貞間出世能仁與高峯同秉欽祖所著牧潛集有送妙智上人入浙序其略曰昔龍安悅公既首眾於洞山猶以己道為未至更匿其名潛出求之於食飲笑談之間聞素公一言之異則虗己自降踽踽為咨詢禮不以貶名為嫌卒能於立談之頃獲其終身之所欲豈獨雲菴之道恃以不墜使素公不賴悅以見於世世亦不識其為何類人矣葢名者道之表也古之人有其表則求其實以應之而今之士反以表害實一居其名則崇高之勢傲然不可復屈雖內揆其不慊亦安肯降心以求其所未至耶噫此古今所以異道之所以衰歟云云大德三年戊戌示寂於廬山世壽四十有二淨慈倫禪師法嗣竹屋簡禪師舉孚上座聖箭因緣頌曰青絲雙勒玉驄嘶淡白春衫綠帶圍夜半歸來華底月金鞭敲落亂紅飛又曰九重城裏本非遙射折重重箭倍饒忽遇三軍圍繞處分明有路直通霄舉臨濟訪平田公案頌曰目前條路平如砥何不堂堂掉臂行撩撥老婆牛性發赤身挨棒可憐生絕象鑒禪師示眾舉洞山不安令沙彌到雲居處傳語乃囑曰他或問和尚安樂否汝但道雲巖路相次絕也汝下此語須遠避立恐他打汝沙彌領旨去傳語聲未絕早被雲居打一棒頌曰洞山有路透雲巖絕處教通到者難拄杖頭邊開活眼方知不隔一毫端示眾舉投子和尚問僧連日好雨且道雨從何處來僧無對後閱華嚴經有省頌曰陌路遊人競採芳不知眼底度春光夜來一陣落花雨一百十城流水香台州瑞巖方山寶禪師一日為眾挂牌入室垂語曰南泉斬却猫兒時如何眾下語皆不契適有一僕在旁曰老鼠做大師笑曰好一轉語只是不合從你口裏出有鍼工丁生者久依座下冀明本分一日剔琉璃有省述偈呈師曰提起提起放下放下者點光明照天照地師喜其行業淳素乃印許之示無見偈曰道人得得出山來盡把胸襟對我開坦坦平平如鏡面澄澄湛湛絕纖埃忽然得箇轉身句衲捲寒雲便歸去萬八千丈華頂峯一笑裂開鐵面具家山到後絕思惟抝析枯藤拄竹扉糞火埋中消息好芋香便是道香時永中本禪師上堂舉夾山參船子和尚公案頌曰笑中棄却竹林寺將謂華亭有許多窮性命於橈下喪看來成敗自蕭何無學元禪師法嗣金陵蔣山月庭忠禪師舉僧問白雲舊歲已去新歲到來如何是不遷義雲曰眉毛在眼上頌曰罷釣歸來不繫船江村月落正堪眠縱饒一夜風吹去只在蘆華淺水邊落葉已隨流水去春風未放百華開青山面目依然在盡日橫陳對落暉又舉文殊三處度夏迦葉白椎欲擯文殊見百千萬億文殊世尊曰汝擯那箇文殊頌曰錦衣公子遊春慣白首佳人懊恨多彼富尚嫌千口少自貧無柰一身何舉慈明冬日揭榜示眾頌曰畫上畫下畫短畫長明明揭露浩浩商量何似京師出大黃育王珙禪師法嗣蘇州崑山薦嚴竺元妙道禪師寧海陳氏子幼患右目母𢹂以禱于觀音像師仰見像之右目有小蛛窠乃為揭去目患遂愈父母以為於佛有緣俾投杭之六和正嚴得度嚴令學百法論師曰一法不學學百法乎遂謁育王橫川珙禪師一日聞舉乾屎橛話豁然大悟即說偈曰雲門乾屎橛光明照十方鄮峯纔發足五日到錢塘琪驚異顧謂眾曰此子再來人也至元乙丑出主邑之慈源遷崑山薦嚴一𣆶與眾會茶舉東坡居士訪蔣山泉禪師山問大儒高姓士曰姓秤山曰是甚麼秤士曰稱天下長老舌頭底秤泉便喝一喝曰且道者一喝重多少士無語師命眾代語時別源源遽起剪燭了堂一咳嗽一聲師笑曰源藏主剪燭一侍者咳嗽一僧請師自代師曰洎不過此又一𣆶新古帆上方丈請益趙州無字話師厲聲曰夜深下去古帆歸堂惡發曰不與我說便休何用見瞋或以告師師曰他向後自悟去在古帆聞之當下廓然仁宗詔陞黃巖鴻福賜號定慧圓明延祐丙辰淨慈靈隱兩剎爭欲致之俱不就年逾七十懷紫籜之幽絕乃往終焉金陵保寧古林清茂禪師年十三為大僧聆老宿舉高菴和尚勵僧語不覺洟淚交下乃知有出生死超聖凡一著子淬志參訪徧歷門庭橫川居育王師往叩鎚拂之子始知觸淨出世吳之開元遷鄱陽永福後主金陵保寧上堂僧問毛吞巨海芥納須彌是衲僧分上事不是衲僧分上事師曰拈却門前大案山曰鯨吞海水盡露出珊瑚枝師曰金剛腦後銕蒺蔾曰只如教中道我得無諍三昧人中最為第一如何是無諍三昧師曰放你三十棒僧曰仁義盡從貧處斷世情偏向有錢家師曰知恩者少負恩者多問記得昔日舉上座到瑯琊問近離甚處舉曰兩浙琊曰船來陸來舉曰船來琊曰船在甚處舉曰埠下意旨如何師曰開口見膽曰瑯琊云不涉程途一句作麼生道如何是不涉程途底句師曰前不構村後不迭店曰只如舉上座以坐具摵云杜撰長老如麻似粟又作麼生師曰焦甎打著連底凍曰後來瑯琊問侍者此是什麼人者曰舉上座瑯琊遂親下旦過問曰莫是舉師叔麼莫怪適來相觸忤作麼生是觸忤處師曰爛泥裏有刺曰舉喝云長老何年到汾陽我在浙中早聞你名見解如此何得名喧宇宙瑯琊遂作禮曰某甲罪過那裏是他罪過處師曰若不登樓望焉知滄海深曰後來大慧禪師道二大老相見如日月麗天龍象蹴踏未審還端的也無師曰土上加泥又一重曰瑯琊後遇慈明和尚舉此話明曰舉見處纔能自了而汝負墮如何為人為復肯伊不肯伊師曰一點水墨兩處成龍曰可謂龍得水時添意氣虎逢山勢長威獰師曰無人處斫頟望汝僧禮拜問如何是佛師曰釘釘膠黏曰如何是祖師西來意師曰蟻子不食銕曰如何是偏中正師曰苔封古殿曰如何是正中偏師曰艸滿法堂曰如何是偏中至師曰日上月下曰如何是兼中到師曰截水停輪曰如何是正中來師曰獼猴帶席帽曰五位君臣蒙指示夜明簾外事如何師曰趂曉不歸家黃昏候日出上堂若說佛法供養大眾未免鬚眉墮落若說世法供養大眾入地獄如箭射去此二途畢竟說箇什麼三寸舌頭無用處一雙空手不成拳小參舉僧問靈雲如何是佛法大意靈曰臨鴆砧井底種林檎僧曰學人不會靈曰今秊桃李貴一顆值千金大慧和尚曰者箇公案從古至今無人拈出山僧不惜口業更為諸人註破臨鴆砧臨鴆砧井底種林檎今秊桃李貴一顆值千金師曰大眾靈雲答者僧話且道與臨濟在黃檗問佛法的的大意三度喫六十拄杖是同是別若道是同法無同相若道是別佛法豈有兩般常愛大慧和尚道我者裏說蚌蛤子禪開著口便見心肝五臟只者便是雖然也是大都城裏撮馬糞漢小參古人道九旬禁足魚遊網三月安居鳥入籠生殺盡時蠶作繭如何透得者三重卓拄杖將成九仞之山不進一簣之土開元入寺小參舉雪峯和尚問德山從上諸聖以何法示人山曰我宗無語句亦無一法為人後有僧問雪峯和尚見德山得箇甚麼便休去峯曰我當時空手去空手歸五祖和尚拈曰如今說向透未過者有兩人從東京來問伊近離何處却曰蘇州便問蘇州事如何伊曰一切尋常雖然謾山僧不過何故只為語音不同畢竟如何蘇州菱邵伯蕅師曰從門入者不是家珍自己流來還同瓦礫老東山依模脫墼殊不知二大老正是食飽傷心雖然既是東京來因甚却說蘇州話上堂舉洞山冬夜喫菓子次問泰首座曰有一物上拄天下拄地黑似漆常在動用中動用中收不得過在什麼處泰曰過在動用中山遂喚侍者掇退菓桌師曰者箇說話在今諸方每至冬夜未嘗不拈出註解一上然於正文未曾道著一句有底道洞山只見錐頭利不見鑿頭方抑屈人作麼有底道泰首座不得菓子喫要且盡大地人皆不得喫成人者少敗人者多殊不知洞山有偏正回互不犯底手脚直饒泰首座道不在動用中也不得他菓子喫在良久水流黃葉來何處牛帶寒鴉過別村除夕小參今夜秊盡月盡日盡世事悠悠何時是盡明朝年新月新日新千變萬化又見重新所以道窮則變變則通垂鉤四海只釣獰龍三千威儀八萬細行諸人固是不知若得聲和響順各守祖父田園知道飯是米做免向瞎驢邊滅却吾宗卓拄杖從前汗馬無人識只要重論葢代功永福入寺小參紅塵閙市十字街頭百艸頭邊孤峯頂上若作佛法商量入地獄如箭射直得萬機休罷千聖不𢹂聲前非聲色後非色簡點將來正是髑髏前妄想借使打破髑髏揭却腦葢踢倒須彌踏翻大海脚跟下推勘得出也是落七落八通方上士出格高人除非自作生涯終不守他窠窟現前大眾冀善參詳山僧二千里水陸間關來此聚頭不為別事冬至重建寢堂小參豁開戶牖重新舊日規模當軒者誰坐斷聖凡途轍碧眼胡僧罔措釋迦彌勒猶是他奴燈籠露柱掀眉文殊普賢權作走使描不成畫不就撲落非他物華簇簇錦簇簇縱橫不是塵逴得便去山河并大地踏著便瞋全露法王身自古自今說玄說妙緇素不分者如稻麻竹葦就理就事變通逸格者能有幾人伶俐漢沒窠臼知是般事便休且道知底是甚麼事寒來暑往陰極陽生庭前玉樹華開早也勝東山水上行卓拄杖喝一喝上堂舉育王夜參曰少室無門戶如何便得通夜深寧耐立聽我話西東師召大眾也有權也有實也有照也有用只是不得恁麼會珍重除夕小參一秊三百六十日今夜方始到頭是汝諸人於自己分上事亦須知有到頭時節若未得到頭直須向前決擇豈不見大隨和尚參七十餘員善知識具大眼目者只有一二且如何是具大眼目者五祖老人海上參尋數十員尊宿洎至浮山圜鑑會中直是開口不得後到白雲齩破一箇銕酸餡方得百味具足遂云華發鷄冠媚早秋誰人解染紫絲頭有時風動頻相倚似向堦前鬬不休喝一喝修心未到無心地萬種千般逐水流保寧入院小參當軒大坐百帀千重一句全提該天括地佛眼覰不見海口難宣今古不同途凡聖罔測直得麒麟現瑞鳳凰來儀山色呈祥人烟雜遝其柰梁寶公蹉過達磨雖曰觀音大士傳佛心印畢竟不識者箇消息是汝諸人還猛省麼卓拄杖若不同牀睡焉知被底穿小參舉死心和尚示眾曰行脚高人解開囊卸却包笠去却藥忌一人所在也須到半人所在也須到無人所在也須親到師曰者般說話如黑石蜜中邊皆甜雖然不因夜來鴈爭見海門秋除夕小參今宵歲盡何曾盡明日秊來實不來三十六旬如轉轂幾番潮去又潮回機輪轉處掣電猶迷大用現前誰當辨的廓情塵於未兆忘至理於言詮人人鼻孔撩天箇箇安家樂業文殊普賢起佛見法見貶向二銕圍山燈籠露柱突出金剛眼睛呵呵大笑麻三斤乾屎橛諸人若作佛法商量入地獄如箭射到者裏言思道斷心行處滅一種平懷泯然自盡正與麼時如何東風昨夜消殘雪枯樹枝頭又著華結制小參明日結夏來臨只管悠悠過日及乎打鼓陞堂直是思量不出諸人簇簇上來未免將南作北七佛以前初無者箇消息七佛以後雖有者箇消息終是不能圓悟如來無上菩提不能證入圓覺伽藍身心安居平等性智以致諸人九十日內惟務口體不務修持背覺合塵虛延歲月五祖和尚曰達磨大師信脚來信口道後代兒孫翻成計較計較得成天清地寧雲門扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾楚鷄不是丹山鳳愛向梧桐樹上鳴師嘗埀示向上更有事在露出獅子爪牙其間別有商量未免當門按劍只者靈鋒阿誰敢擬辭鋒峻拔手眼卓越應菴而後師殆第一人矣嘗續宗門統要後示寂於保寧越州天衣斷江覺恩禪師形儀脩瘠清操剛立族慈溪顧氏幼依雲門廣孝祝髮從明之延慶聞法師習四教儀七日通之聞驚訝嘆異往參育王橫川室中機契掌內記德業日彰一時賢士大夫皆樂與之遊出世蘇之天平後遷開元及明之保福越之天衣一日室中眾侍立次忽扶杖而言曰老僧嵌空倚杖藜分明畫出須菩提顧左右曰會麼良久擲下拄杖倚蒲團而逝月江印禪師題師肖像八十禪翁四海眼空面帶匡廬古色身同卓筆奇峯聞其提唱浮佛應為點首觀其出處大梅夫豈同風鴈過長空影沉寒水繼乃祖烹金爐鞴之綱宗秋天之月霜夜之鐘吾將見此菴之道光明盛大綿亙于無窮者也淨慈鞏禪師法嗣杭州靈隱東嶼德海禪師台州臨海陳氏子年十四從蜀僧安石出家參石林鞏於承天林問如何是汝自己師擬議林便推出師即懷疑一日入室次林問盡大地是金剛正體何處著上座師擬對林便打從此徹證林遷淨慈命居侍司一日室中舉國師三喚侍者話師曰不是失却貓兒定是失却狗子林曰是孤負是不孤負師曰瞞人自瞞林以竹篦擊之曰亢吾宗者海子也至元二十七年出世天台寒巖大德乙巳遷姑蘇寒山至大己酉再遷崑山東禪辛亥敕賜金襴法衣皇慶二年復遷中竺延祐二秊詔主淨慈至山門曰清淨慈門一湖秋水入得入不得虎齩大蟲蛇吞鼈鼻眾盈萬指室中垂語曰手握利刃劍因甚胡猻子不死嚙破銕酸餡因甚路上有饑人波期去帽蔗齩甜頭魚以水為命因甚死在水中眾荅皆不契泰定二年復遷靈隱四年丁卯九月示微疾召弟子付囑訖跏趺而化世壽七十二僧臘五十七賜號明宗慧忍禪師有六會語錄塔於育王後山之麓嘉興府天寧竺雲景曇禪師浦江嚴氏子久依石林後住婺之治平蘇之北禪禾之天寧上堂金烏東上玉兔西沉伶俐衲子東討西尋忽然撞破虛空曠劫只在如今卓拄杖下座僧問三賢未達十聖難知如何是此宗師曰無孔笛氈拍板蘇州虎丘東州壽永禪師送僧偈曰動靜何曾涉葢纏何須更透未生前故園千里今歸去陸有征途水有船舉約齋居士張鎡入道話頌曰一棒鐘聲到耳根三千剎海一時昏賊從赤肉團邊去明日依然不離門徑山度禪師法嗣杭州徑山虎岩淨伏禪師淮安人至元間嘗召見有偈進上其略曰過去諸如來安住祕密藏現在十方佛成道轉法輪未來諸世尊一切眾生是由妄想執著結煩惱葢纏迷成六道身枉受三塗苦惟念過現佛不敬未來尊與佛結冤讎或烹宰殺害不了眾生相全是法性身昔有常不輕禮拜于一切言我不輕汝汝等當作佛若能念自他同是未來佛現世增福壽生生生佛國上覽畢大悅問從上帝皇有戒殺者否師曰昔宋仁宗一日語羣臣曰朕夜來饑甚思欲燒羊因慮後來遂為常例寧耐一時之饑不忍啟無窮之殺羣臣皆呼萬歲上嘉納即受帝師戒明州天童竺西坦禪師僧參師問從何方來曰金鵞師曰金鵞山高多少僧曰不見頂師呵斥之一日陞座舉世尊拈華公案其僧言下有省月江印禪師題師像贊河目海口錦心繡腸汪汪吞大湖之器量煌煌粲太白之光芒怒罵時海涵春育慈悲處烈日秋霜舉玄沙未徹語如真淨驗寂音黃金百煉之色拈洞山三頓棒類慈明發積翠丹沙九轉之香橫機莫莫有陣堂堂夫是之謂中峯五世大樹之廕凉者也徑山愚禪師法嗣越州定水寶葉源禪師舉世尊五通仙人因緣頌曰那一通你問我口是禍門招因帶果慚愧慈悲大法王丙丁離壬不屬火上堂舉張拙秀才參石霜霜問秀才高姓曰弟子姓張名拙霜曰者裏覓巧了不可得拙自何來拙言下大悟頌曰進前峭壁三千丈退後懸崖十萬重珍重大唐張拙老銕鎚無縫舞春風蘇州虎丘閒極雲禪師久依虗堂於徑山居第一座一日寶葉源請益虗堂德山末後句若謂之有德山焉得不會若謂之無巖頭又道德山未會乞和尚慈悲指示堂曰我不會汝去問首座源詣師值師遊山歸索水濯足源亟進水復委身為師摩捋因仰面舉前話叩之師乃掇水澆潑曰有甚麼末後句源不契復上見堂堂曰首座如何向汝道源舉似前話堂曰那那我向你道他會得源於是釋然領旨舉興化和尚與唐莊宗酬價因緣頌曰君王寶自難酬價興化何曾敢借看天地既無私葢載至今留得鎮中原舉陸亙大夫問南泉弟子家中一片石也曾坐也曾臥擬鐫作佛得麼泉曰得大夫曰莫不得麼泉曰不得頌曰坐臥曾經幾度春半封苔蘚半籠雲無稜無縫難提掇空把肝腸說向人徑山月禪師法嗣南叟茂禪師舉巖頭和尚於鄂渚湖邊作渡子兩岸各挂一板有人過渡打板一下巖問誰或曰要過那邊巖便舞棹迎之一日有婆子抱一孩兒來乃曰呈橈舞棹即不問且道婆手中兒甚處得來巖便打婆曰婆生七子六箇不遇知音只者一箇也不消得便拋向水中頌曰鄂渚渡邊窮鬼子全機錯在扣舷時何如別下一轉語救取婆婆第七兒舉夾山參船子和尚話頌曰無相無瑕便倒戈只因輕信智頭陀若還不到華亭上銕鑄船橈柰汝何舉龐居士賣摝籬下橋喫撲靈照見亦去爺邊倒士曰作甚麼女曰見爺倒地某甲相扶士曰賴是無人見頌曰孝順藏忤逆人前醜莫遮今生親骨肉宿世惡冤家育王彌禪師法嗣明州育王東生德明禪師甬東劉氏子年十六依仗錫月潭澄公祝髮受具戒首謁希叟曇於雪竇復參頑極彌彌舉文殊是七佛之師因甚出女子定不得罔明因甚出得師曰春色無高下華枝自短長彌器之命掌藏鑰出世育王錫號佛日普光師頌船子覆舟公案曰清世悠悠據要津一橈活計童千鈞朱涇路上行人少滄海難同方寸深後示寂瘞洞雲塔壽八十四臘六十七翰林學士袁桷撰銘徑山及禪師法嗣杭州靈隱空叟忻悟禪師蘇之吳縣鈕氏子九歲入郡城龍興寺依白雲閒祝髮至正戊戌參愚菴於淨慈菴詰曰如何是永明旨師曰某甲新到只見一湖水菴可之遂容入室壬寅命居第二座癸卯中竺懶菴請分座說法帝師錫圓慈正濟號洪武庚戌住浙江崇寧閱八年遷中竺會靈隱虗席僧錄以師名預中選一時學者咸裹糧相從居無何以前住持舊事逮至京病卒於途臨終書偈曰我秊五十五踏斷死生關夜半日卓午門人道淨等依法茶毗舌根數珠不壞奉骨歸瘞靈隱東岡復分餘骼葬于西溪九曲之原時洪武二十四年辛未五月三日也有三會語錄少師姚廣孝長洲人自號逃虗子年十四出家於妙智菴法名道衍字斯道元季兵亂遨遊江湖深自韜晦參徑山愚菴及咨叩禪要盡得心髓掌內記三年出世普慶遷天龍甞自題肖像曰看破芭蕉拄杖子等閒徹骨露風流有時搖動龜毛拂直得虗空笑點頭洪武中以高僧應選侍文皇於燕邸永樂中以佐命功上欲官之不可一日召見上潛令人以冠服被體進爵太子少師亟命宣謝不得已拜命終不蓄髮賜妻妾弗受也有閒居詩曰春燕雛成辭舊壘午鷄啼罷陰階庶可以見少師矣後病篤上幸其第問後事對曰出家人復何所戀強之終無言泊然而化世壽八十有五贈榮國公諡恭靖所著有道餘錄一卷萬壽仁禪師法嗣杭州徑山南石文琇禪師崑山李氏子出家於紹隆菴禮智興為師行中仁住雲頂師往從之鍼芥相契初住蘇州普門次遷靈巖三主萬壽永樂初詔天下儒釋道流之精通文義者纂修永樂大典師應詔書成陛辭南還值徑山虗席僧錄舉師補處普門上堂僧問法筵已啟法皷已鳴四眾雲臨請師祝聖師曰日月為天眼須彌作壽山曰世尊出世天雨四華和尚世出有何祥瑞師曰一牛飲水五馬不嘶曰恁麼則熈怡的旨傳千古寂照宗風播四方師曰好事不如無迺曰如來出世是擔屎漢祖師西來是賣卜人自餘德山臨濟雲門溈山雪峯玄沙南泉趙州各逞機鋒互分照用盡是販私鹽賊新普門者裏一時與他掃蕩何故幸逢堯舜世自合樂無為復舉楊岐和尚因僧問如何是佛岐曰三脚驢子弄蹄行僧曰莫只者便是麼岐曰湖南長老師曰大小楊岐被者僧一問未免手脚俱露上堂十方無異路為甚麼南尋天台北尋五臺目前無異艸為甚麼桃華紅李華白良久打破祖師關都是自家底靈巖上堂盡大地是自己森羅萬象從何而有會不得底三十拄杖會得底亦與三十拄杖諸方盡是粥罷上堂靈巖寺裏參退喫茶上堂今朝七月初一門前金風淅淅特地打皷陞堂一字也道不出露柱禮拜釋迦燈籠問訊智積獨有無事衲僧依然眼橫鼻直敢問大眾那箇是無事衲僧良久曰長三尺萬壽謝頭首兼祈雨上堂伶俐衲僧轉轆轆地對賓客側身而立結眾緣化炭化糧聽闌鷄鼓翅而鳴看茶瓢從地𨁝跳卓拄杖夜來江上雨分作萬家流解夏上堂圓覺能出一切法一切法未甞離圓覺螻蟻知雨而封穴石𧉧應節而揚葩粘手粘脚底有甚數十字縱橫底有甚數解制上堂舉翠巖參禪師夏末示眾曰一夏已來為眾兄弟東語西話看翠巖眉毛在也無師曰和麩糶上堂舉古德曰日出心光耀天陰性地昏不知天地者剛道有乾坤與麼說話古今徹悟者如稻麻竹葦錯會者如稻麻竹葦以拂子畫一畫阿耨達池深四十丈闊四十丈除夜小參龍猛滿盛鉢水迦提擲下繡鍼德山隔江招手高亭橫趨而去朝鳴鐘暮擊皷風動塵起鵲噪鴉鳴無一處不是者箇時節今當臘月三十夜敢問諸人還會得麼有際天之雲濤方可容吞舟之魚有九萬里風迺可負垂天之翼佛涅槃上堂釋迦老子從兜率天託生大術胎中早是染却生死重病及乎降生便迺一手指天一手指地可見是攢簇不得底迨見明星出現豁然悟道正是病眼見空華四十九年三百餘會廣說略說直說曲說顯說密說豈非熟睡饒譫語至於臨末稍頭摩胸告眾曰汝等善觀吾紫磨金色之身瞻仰取足毋令後悔若謂吾滅度非吾弟子若謂吾不滅度亦非吾弟子病入膏肓莫能療治非但世醫拱手便是耆婆神醫只得倒退三舍北山遠孫今日却要為他療治若療治不得後代兒孫永失恃怗若療治得便見紫磨金色之身巍巍堂堂煒煒煌煌觸處顯現擊拂子柳色黃金嫩棃華白雪香上堂但參活句莫參死句頭頭上顯物物上明是死句舉步踏著南辰轉身觸翻北斗是死句作麼生是活句蘇州街雨過著繡鞵眾擬議擲拂子下座徑山上堂森羅及萬象一法之所印前面是盂峯後面是陵霄峯中間是佛殿喚甚麼作一法良久曰國一祖師元是崑山人上堂馬大師道自從胡亂後三十年不少鹽醬此地無金二兩俗人沽酒三升上堂目前無法意在目前不是目前法非耳目之所到洗硯池頭雲冉冉埋雞塚上艸離離師甞室中垂語曰道源不遠在甚麼處祖師西來為甚麼事菩提無樹誰為立名僧問如何是賓中賓師曰扶杖傍人門曰如何是賓中主師曰堂前倚露柱曰如何是主中賓師曰性命屬他人曰如何是主中主師曰手握金剛杵居士問如何是衲僧門下事師曰你俗人如何曉得衲僧門下事又問如何是宗門下事師曰今日忙無暇與汝說宗門下事士擬議師喝出一日見僧庭中過師厲聲曰屋簷㘱下來也僧仰望師曰子過新羅師纔見僧入門便曰你者踏州縣漢脚跟下好與三十棒僧曰某甲話也未問便蒙賜棒師曰待你開口堪作甚麼僧擬議師便喝出僧參展坐具師曰我者裏無殘羹餿飯不用使破炊巾僧曰和尚慈悲師曰笑倒門前青石幢凡四坐道場皆有成績可觀𣆶年引退卜地寂照塔左結廬以居壽七十餘示寂徑山銘禪師法嗣嘉興府天寧西白力金禪師蘇之姚氏子幼依寶積院出家見古鼎銘舉德山見龍潭因緣示師久而有契至正丁酉出世瑞光值天寧災師復為起廢帝師授圓通普濟號師幼孤老母無依築室城東奉養焉洪武初遷淨慈四秊春詔住天界五年冬敕建無遮大會命師陞座闡揚第一義諦車駕幸臨自公侯以下聽者萬眾人人得其歡心一日忽謂侍僧曰我有宿因未了當償之遂示微疾委順而逝塔於嘉興城西杭州徑山象源仁淑禪師台州人一日趨入門大叫曰殺來了殺來了作麼生迴避遂坐脫龍翔訢禪師法嗣金陵天界覺原慧曇禪師天台人族楊氏母夢明月墮懷取而吞之遂有娠生而狀貌嶷如稍長不與羣兒狎依越之法果大均出家秊十六為大僧受具戒聞笑隱主中竺師往參叩備陳求道之切隱斥曰從門入者即非家珍道在自己奚向人求耶師退而有省一日聞舉百丈野狐話豁然大悟曰佛法落吾手矣只為分明極翻令所得遲隱曰汝見何道理師展兩手曰不值半文錢隱頷之一日師入門隱問何處來師曰遊山來隱曰笠子下拶破洛浦遍參底作麼生師曰未入門時呈似和尚了也隱曰即今因甚不拈出師擬議隱便喝師從此脫然又一日隱展兩手示師曰八字打開了也因甚不肯承當師曰休來鈍置隱曰近前來為汝說師掩耳而出後隱主龍翔俾師分座至順二十年出世牛首祖堂三年遷清涼廣慧上堂一句子墨漆黑無把柄有準則良久曰會麼碓搗東南磨推西北上堂經有經師論有論師龍河今日放一綫道分科列段去也拈拄杖卓一下且道是何章句上堂者箇現成公案眾中領解者極多錯會者亦不少所以金鍮不辨玉石不分龍河者裏直下分辨去也張上座李上座一箇手臂長一箇眼睛大總似今日達磨一宗教甚麼人擔荷良久噓一聲下座示眾春風浩浩春日遲遲黃鶯啼在百華枝箇中無限意消息許誰知語未竟遽有僧問曰心意識遏捺不住時如何師厲聲喝曰是誰遏捺室中謂僧曰二六時中無你啗分無你趣向分會麼僧罔措師曰未明三八九難免自沉吟帝師授淨覺玅辨禪師號十五年遷保寧十六年王師定建業師謁於轅門上一見嘆曰真福德僧也命主蔣山踰年改龍翔為大天界寺詔師主之設廣薦法會命師陞座說法車駕幸臨恩數優洽御書天下第一禪林洪武元年賜紫衣及金襴方袍御制誥命授演梵善世利國崇教大禪師住持大天界寺統諸山釋教事當是時遴選有序詮衡至公宗社有志之流山林抱道之士聯鑣而起三年夏六月廷議西域未臣伏上以彼國敦尚佛乘特詔師往師承命即日登途自閩之洋凡歷國邑莫不聞風來歸四年秋七月至合剌國布宣天子威德館於佛山寺其王待以師禮寅夜參承闔國士民悉皆瞻仰九月師示微疾王臣咸來相慰須臾沐浴更衣謂左右曰某幻緣已盡不能復命矣跏趺端坐夜參半師問曰日將出否曰未也已而復問至再四曰日出矣怡然而逝世壽六十八僧臘五十三踰五日顏色如生王大敬嘆斵香為龕築壇而茶毗之王與百僚親送壇下薪火滅盡舍利無算舌根齒牙不壞收舍利靈骨及不壞者祔葬其國世尊舍利塔中七秊九月同行還朝奏陳其事上嗟悼之敕天界蔣山二寺住持宗泐等以師之遺衣藏於雨華臺之左有五會法語金陵天界善世全室宗泐禪師台之臨海周氏子延祐戊午七月十七日生八歲從中竺笑隱受業經典寓目成誦十四薙髮二十具戒一日竺問國師三喚侍者侍者三應汝意如何師曰何得剜肉作瘡竺曰將謂汝奇特元來無所得師喝一喝竺擬拈棒師拂袖便出尋復出遊諸方遍參尊宿元叟居徑山留掌記室後出世宣之水西洪武元秊遷中竺四月十五日入寺上堂金剛王劍橫揮千妖屏跡爍迦羅眼洞照萬物潛形到者裏卷舒在我殺活臨時直得千歲巖中天𨁝跳錢塘水東海逆流諸人還知有也無舉拂子庭前石筍抽條也會見高枝宿鳳凰復舉南泉初入院大眾送進方丈僧問端居丈室將何指示於人泉曰昨夜三更失却牛天明起來失却火師曰大小南泉不唯瞞人亦且自瞞新天竺用處也要大家知忽有人問端居丈室將何指示於人劈脊便棒且道與古人是同是別卓拄杖下座四秊辛亥遷雙徑是秊冬詔徵江南有道浮屠十人詣京就太平興國寺建廣薦法會列師居首上齋戒御製章疏車駕親臨服皮弁服搢玉珪北面禮佛羣臣各衣法服以從先是上命師撰獻佛樂曲進呈御署曲凡八章曰善世昭信延慈法喜禪悅徧應玅濟善成敕太常歌舞以節奏之復命師陞座說法窮理盡性徹果該因顯密淺深無機不被上大悅未幾總持西白金公以母老告退舉師自代上命師遂主天界甞欲命師蓄鬚髮以官之師再懇得免後以胡黨坐罪著至鳳陽槎峯建寺三秊召還上賜詩有泐翁去此問誰禪朝夕常思在目前之句高皇后薨臨葬忽風雨雷電暴作帝不樂召師至曰今太后將就壙為朕宣偈送之師應聲曰雨落天垂淚雷鳴地舉哀西天諸佛子同送馬如來上意稍解賜白金百兩上以天界混襍民居不戒於火欲另選幽勝師啟奏今地凡營度規制悉出師意指畫仍命師領寺事後以老求退賜歸槎峰渡江示寂于江浦石佛寺謂左右曰人之生滅如水一漚漚生漚滅復歸於水何處非寂滅之地耶言訖復顧侍者曰者箇聻者茫然師曰苦遂寂時洪武二十三秊九月十四日也春秋七十四闍維舍利無算塔于笑隱訢窣堵波之右文皇帝御製像贊曰皇明啟運多士如雲戡亂以武制治以文矧知方外亦有偉人傳衣蒲室輔教鐔津談經金馬獻賦紫宸帝心簡在榮邁等倫兩為善世宗工鼎臣以翼王度以淑吾民載賡雲漢爰刻翠岷不驚寵辱乃離根塵淮水湯湯槎峯嶙嶙我作贊辭孰為寫真杭州中竺用彰嬾翁廷俊禪師久依笑隱出世明之龍峯次遷瑞巖後主中竺據室拈拄杖室中若無棒頭取證底我拄杖子誓不喚作拄杖子有麼敕點飛龍馬跛鼈出頭來佛涅槃日上堂古德道涅槃後有大人相釋迦老子涅槃了也大人相在什麼處以拂子打圓相曰還見麼容顏甚奇妙光明照十方我適曾供養今復還親覲上堂近來眾中兄弟聰敏者多徹到者亦不少莫不自謂得之於心應之於手臨機見境踢將出來活鱍鱍地不費纖毫氣力到龍峰門下正好從頭按過拈拄杖卓一下譬如油蠟作燈燭不以火點終不明上堂真淨和尚道天心得自在盛夏復清涼衲僧如薦得珍重法中王即今孟秋改旦盛夏已退清涼復生且問諸人天心還得自在也未直饒自在更須識取法中王始得其或未然吽吽前頭大有熱在謝首座知客侍者直歲上堂索犀牛扇子無風起浪問眉間挂劍平地干戈二俱莫涉別有條章撲碎玻璃盞子拈起無柄钁頭淺鋤明月深種白雲時時歌堯舜之風日日樂羲皇之化且知恩報恩一句作麼生道九萬里鵬纔展翼十千秊鶴便翱翔上堂函葢乾坤天光迴照截斷眾流伏惟尚饗隨波逐浪放汝一綫道如此著語還契得雲門大師意麼拈拄杖一即三三即一火向水中焚石從空裏立以拄杖卓一下喝一喝上堂釋迦世尊未離兜率已自七錯八錯何況達磨航海東來其錯猶甚俊上座既是他家兒孫只得將錯就錯拈拄杖提向上機指其中事只要諸人明自本心證自本法驀忽一箇半箇心法雙忘解道穿山渡口虎齩大蟲剪月亭前蛇吞鼈鼻如是則三世諸佛歷代祖師總在新瑞巖拄杖頭上乞命雖然祇如廣頟屠兒放下屠刀道我是千佛一數且道是從本心中發現耶從本法中發現耶以拄杖畫一畫天上有星皆拱北人間無水不朝東臘八上堂晝見日夜見星大地眾生阿誰不曉釋迦老子揑目生華剛道於中有箇悟處二十一日杜口不言幸自可憐生四十九載脫空謾語著甚死急噓一聲下座上堂拈拄杖卓一下大眾會麼良久欲得不招無間業莫謗如來正法輪便下座上堂春山疊亂青春水漾虗碧寥寥天地間獨立望何極好諸禪德不經一事不長一智結夏小參結却布袋口三世諸佛六代祖師天下老和尚眼不得妄視耳不得妄聽口不得妄言足不得妄舉一禁禁住無絲毫走作謂之圓覺伽藍九旬禁制酢甕中蟲子有什麼出頭分殊不知此道如淨日輪昇太虗空無幽不燭如塗毒皷輕輕一撾聞者皆喪雖然只如道居有破有居空破空二幻既空中亦不立畢竟喚什麼作塗毒皷喚什麼作淨日輪喝一喝大丈夫兒合自由信脚踏翻知見窟解夏小參秋江清淺時白露和烟裊本無迷悟人只要今日了既是本無迷悟又要了箇什麼好諸禪德頂門正眼照古照今腦後神光無內無外雖則人人本具各各現成其柰妄想執著不能了此茲值聖制將圓僧欲自恣便從今日了將去不妨七穿八穴十字縱橫若了不去三十秊後換手搥胷莫言不道除夕小參一秊將盡夜萬里未歸人咄寐語作麼即今簇簇上來兀兀立地面面相看眼眼相對阿那箇是未歸人樓上已吹新歲角聽不出聲底分明聽取前猶點舊年燈見不超色底端的見來是箇皮下有血誰家竈裏無烟說什麼到與未到歸與未歸雖然否極泰來結交頭一句子也要諸人其委拈拄杖卓一下梅萼香傳春谷暖松風聲度夜堂寒舉五通仙人問佛公案拈曰那一通既不識者五通敢保未徹不見道射人先射馬擒賊須擒王舉外道問佛不問有言不問無言話拈曰外道饑求王饍世尊和盤托出阿難索短不搆深泉却向鞭影裏著倒舉傅大士講經公案拈曰大士講經揮尺一下百千三昧無量玅義已自昭彰誌公道講經竟言多去道轉遠舉盤山作街坊公案拈曰歌聲哭聲在在有之因甚盤山聽得便解悟去開池不待月池成月自來舉洞山喫果子話頌曰尋常款客禮宜恭況是分冬又不同果桌掇來還掇退洞山大欠主人翁洪武建元寓鍾山端坐而逝茶毗舍利無數塔于杭之南屏杭州靈隱介菴用真輔良禪師蘇之吳縣人范文正公十葉孫也自幼聰穎經書若素習秊十五從迎福院壽彌薙髮受具戒慨然參方天平白雲杓公指見笑隱師遂詣龍翔問答之頃情解頓喪石室英主育王師掌藏鑰極推譽之至正壬午出世嘉禾資聖歷十有三載遷明之天童尋移杭之中竺最後補靈隱甞示眾曰達磨一宗陵夷殆盡汝等努力如救頭然百千法門無量玅義於一毫端可以周知如知之變大地為黃金受之當無所讓否則素餐之愧咎將誰歸歲月流電向上事請各急著眼洪武四秊正月十五日親理後事謂左右曰翌日巳時吾逝矣及期澡浴端坐書偈而寂世壽五十五僧臘四十闍維齒牙舌根不壞設利無算瘞歸雲塔中廬山圓通約之崇禪師毗陵陳氏子參笑隱舉無位真人話詰之師不覺釋然下拜隱曰汝何所見而作禮師曰更無第二人隱曰從門入者不是家珍師曰和尚慎毋壓良為賤後住南禪次遷圓通育王洪武五年秋召高僧建大會於鍾山師應詔至便殿上問佛法大意師以偈酬之上大悅賜食上前師或假寐鼻息作聲鄰坐引裾覺之上笑曰此老人無機心真善知識也後示寂塔於石耳峯雪竇霖禪師法嗣杭州淨慈孤峯明德禪師族朱氏家世明之昌國母夢僧玠託宿覺而有娠幼不好嬉戲每跏趺端坐諸父明上座奇之挾至金鵞俾侍灑掃秊十七得度為大僧杖錫遊方首謁竺西坦聆上堂語有省復造淨慈見晦機機問什麼物恁麼來師曰胡張三黑李四機拈棒師拂袖徑出復抵雙林見明極俊會日本遣使迎俊師送至海濵適晤竺田於明州由挽師歸雪竇處以第一座一日田上堂舉隱山泥牛入海公案音聲如雷師不覺羣疑頓釋述偈呈田田歎曰人天眼目儼然猶在自是提唱宗乘稱性而說甞與仲方倫公結菴桃華塢相與激揚足不踰戶者五年名稱日聞行宣政院請住松江東禪再遷集慶保寧湖之道場杭之淨慈帝師授圓明定慧之號洪武五年退居道場竹林菴一日示微疾戒飭其徒曰汝等一真圓性與如來等世相起滅無異石火電光晝夜勤行毋生退轉吾沒後當遵佛制依法茶毗勿令衣麻而哭也言畢書偈泊然而逝世壽七十九僧臘六十二茶毗頂骨不壞舍利叢布灰燼中建塔瘞于東岡天池信禪師法嗣福州天寶銕關法樞禪師溫之平陽林氏子秊十七往常州華藏寺禮竺西坦和尚受業十九得度二十受具初參中峯次謁及菴皆不契聞元翁主秀之石門造而諮叩翁示以南泉三不是話經三年一日大悟述頌曰不是心佛物拶出虗空骨金毛獅子兒豈戀野狐窟喝一喝咄咄咄即詣方丈翁問作甚麼師曰南泉被我捉敗了也翁曰不是心不是佛不是物是箇什麼師曰牙齒一具骨耳朵兩片皮翁曰不是不是別道將來師曰鶯啼燕語鵲噪鴉鳴翁曰錯師亦曰錯翁曰南泉即今在什麼處師便喝翁曰離却者一喝南泉畢竟在什麼處師拂袖便出繇是徧謁諸方見虗谷陵於大仰復謁海印如於饒之蔗福纔上方丈印問誰師曰暫到相看印曰什麼處來師曰江西印曰江西近日有甚麼事師曰集雲峯下藤條被人拗折了也印曰莫亂統師曰不因亂統爭得到者裏印曰且道者裏事作麼生師叉手進前曰即日恭惟堂頭和尚尊候起居萬福印曰不涉泥水一句作麼生師喝一喝曰風從虎雲從龍印曰一喝不作一喝用是如何師曰兩箇泥牛鬬入海直至如今無消息印曰錯師亦曰錯印喚侍者點茶來師曰不受者供養印曰不受者供養受那箇供養師曰謝和尚供養印曰曾見甚麼人來師曰不曾見人印曰既不曾見人那裏得者箇消息來師曰若見人即無者箇消息於是服勤為淨頭印甞謂眾曰永嘉樞侍者是煅了底金復遊東林參澤山咸值咸開室為眾舉竹篦因緣聲未絕師奪却竹篦過左邊立曰喚作甚麼即得咸曰略虗漢師以竹篦打一下拗折而出次日咸復開室舉泗洲大聖因甚在揚州出現曰南山起雲北山下雨師又捉住竹篦曰南山起雲北山下雨意旨如何咸喝一喝師曰者是鬼窟裏活計畢竟意旨如何咸曰略虗漢師以竹篦一送曰見說洛陽華似錦拂袖而出後復歸石門翁纔見便曰南泉向什麼處去也師曰說甚南泉釋迦老子來也翁曰不是心不是佛不是物是什麼師曰劍去久矣翁曰趙州無聻師曰龍生金鳳子衝破碧瑠璃翁曰古人與麼道道道師喝一喝翁曰錯師又喝翁曰錯錯師遂禮拜翁曰放汝三十棒迺囑曰善自護持師又潛眾十五年延祐戊午出世閩之天寶帝師錫寺頟加號玅覺真空大師復遷松溪上堂當陽一句截斷根源把住放行全機歷落坐斷千聖頂𩕳鑿開衲僧眼睛疾焰過風奔流度刃直得玅峰𨁝跳慧海波騰正當恁麼時且道開堂祝贊一句作麼生道擊拂子龍袖拂開全體現象王行處絕狐蹤小參金剛正印率土咸歸佛祖鉗鎚人天罔措階梯不立知解不存德山棒通上徹下臨濟喝絕後光前一明一切明一用一切用大丈夫秉吹毛劍懸肘後符雙放雙收全殺全活拈拄杖鶴有九臯纔翥翼馬無千里謾追風佛誕上堂毗藍園降生八十種隨好行作象王行吼作獅子吼拈拄杖雲門大師來也復卓一卓阿爺阿爺上堂舉三聖問雪峰透網金鱗以何為食峰曰待汝出網來即向汝道聖曰千五百人善知識話頭也不識峰曰老僧住持事繁師曰三聖大似毒龍攪海白浪滔天若不是雪峰慣入洪波爭得驪珠在握擊拂子謝殿主上堂如何是佛殿裏底悉哩蘇盧蘇盧悉哩江國春風吹不起鷓鴣啼在深華裏擊拂子上堂舉香嚴上樹話虎頭上座出問上樹即不問未上樹時請和尚道嚴呵呵大笑師曰上樹未上樹銕蛇橫古路覿面笑呵呵苦瓠連根苦上堂舉臨濟大師示眾曰赤肉團上有一無位真人常在汝諸人面門出入未證據者看看時有僧出曰如何是無位真人濟下繩牀扭住曰速道速道僧擬議濟托開曰無位真人是什麼乾屎橛師曰無位真人乾屎橛臨濟未是白拈賊千古長如白練飛一條界破青山色上堂舉牛過櫺頭角四蹄都過了因甚尾巴過不得頌曰浪靜風恬意轉殊滿天星斗月輪孤時人休戀一泓水來上扁舟泛五湖居三載謝歸天寶以嗣法善儔主寺事至元六秊八月示微疾作手書邀諸所與遊者入山期而畢至求法施者隨其所欲了無倦色正午沐浴端坐書偈曰本無來去一句全提紅霞穿碧落白日遶須彌擲筆而逝壽六十三臘四十五全身塔于瑞雲院蒙山異禪師法嗣孤舟濟禪師月庭忠公居蔣山師為第一座時竺源參月庭至首座寮師問源曰蒙山嘗言栽松道者不具二緣而生達磨葬熊耳後隻屢西歸為復是神通妙用是法爾如然源曰形神俱妙師叱之曰不然子他日當自知之源後參無能舉師語能曰為汝不解故也源釋然大悟太湖寬禪師法嗣常州宜興龍池一源永寧禪師別號虗幻子族姓朱淮東通州人世為宦族六七歲時聞佛號遽注耳聳聽九歲懇求離俗父母弗許師輒不食乃師淵模上人於廣慧寺寺故淮海肇禪師說法處前一夕寺眾夢迎肇次日師至識者異之十二歲河南王屬僧錄給牒薙髮尋受具戒徧歷諸方參中峯海於蘇之萬壽復入穹窿謁克翁紹紹察師志不凡俾掌藏時年十九一旦欲歸省覲至毗陵復約明極於焦子山習定五年極曰藏主見解且如此宜亟往見人無滯於此師點首應之遂至淮西太湖謁無用寬用門庭嚴峻師方入門厲聲叱之師作禮於門外久之乃許入見問曰何處人師曰通州曰淮海近日盈虗若何師曰沃日滔天不存涓滴用便喝出師退徹夜不寐一日聞用舉雲門須彌山話聲未絕而有省急趨前用便打曰趙州無字作麼生師遽曰趙州狗子無佛性萬象森羅齊乞命無底藍兒盛死蛇多添少減無虗剩用喻然繇是執侍左右者三年用始以斷崖義所贊己像親署書授師曰汝緣在南逢龍即住遇池便居師遂受命南還時虗谷陵元叟端瀨翁慶幻住本諸尊宿各據名山大展化機師皆叩擊無不脗合元祐庚申住廣慧大洞洞左有實相寺馬祖弟子澄公道場師為起廢時有宿衲無一全者遯跡石溪谿與洞相望人謂廣德二甘露門云至治癸亥宜興龍池疏請師以名符懸記欣然赴之命曰禹門先是山巔有池其深叵測龍出每大水居民苦之師授龍三歸戒遂不復出居久復至絕巘築室壁立如削斵木為棧棲板空中足不越限者三年帝師稔師道行降號弘教普濟禪師泰定乙丑遷九里寺至順庚午再遷李山元統甲戌浙西江東道總管疏主常之天寧萬壽州守敦請師方倔起八年錫號本覺玅明真淨至正壬午復歸龍池尋召入京宣命龍光殿陞座說法上大悅賜金襴法衣加號佛心了悟庚子出領善權癸卯廣德亢旱師至大雨如注眾懇住麻蕻山慈慧菴洪武己酉夏六月示微疾囑弟子裁紙製內外衣且曰吾將逝矣命移龕至絕巘索筆書偈曰七十八年守拙明明一場敗闕泥牛海底翻身六月炎天飛雪書畢吉祥而逝先一月池水忽竭及師順寂噴湧異常時齋白戀慕至有然頂灼臂以供養者茶毗現五色光齒牙舌輪皆不壞設利無算門人分餘骨與不壞者就龍池太平齊山紫雲麻蕻五所建塔藏焉世壽七十八僧臘六十五有四會語錄行世無能教禪師法嗣杭州玅果竺源水盛禪師別號無住翁饒之樂平人范姓十七歲依羅山常公出家尋謁月庭于蔣山時孤舟居第一座諄諄誨師不置師每自奮且發願曰吾此生不作佛當入無間獄過匡廬止東林一日夜半不覺如出荊棘林洎歸羅山方得全體脫落如冰消瓦解默舉公案如鏡照鏡師自以為開悟及掌藏鑰於東林偶閱玅喜語明心見性非桑門事又復致疑不能自釋或譏之曰法離唇吻道絕言詮子何太滯也師終不敢自是越五載重會孤舟於蔣山語具孤舟章後謁無能盡脫玄玅知解歷觀從前所悟宛如一夢能撫師背曰子後當大弘吾宗也辭能東遊至薦福請師分座久之隱居南巢天曆己巳出世西湖之玅果甞示眾曰凡學道人當洞明諸佛心宗行解相應歲久月深具大無畏如透水月華萬浪千波觸之不散方始不被生死陰魔所惑師槌拂之下懸崖壁立務期實證實悟而後已未幾復還南巢至正丁亥戒徒眾且曰世尊有言我今背痛將入涅槃吾其時矣侍僧捧紙求偈師揮叱曰何以偈為端坐而逝世壽七十三僧臘五十三
