body:
  text: 明嗣祖沙門東吳通問編定笠澤居士華亭施沛彚集臨濟宗大鑑下第二十三世天目妙禪師法嗣杭州天目中峯明本禪師本郡錢塘孫氏子母夢無門開道者持燈籠至家覺而生師神儀挺異具大人相才離襁褓便跏趺坐能言即歌贊梵唄凡嬉戲必為佛事九歲喪母年十五決志出家甫冠閲傳燈録至菴摩羅女問曼殊明知生是不生之理為甚麼却被生死之所流轉有疑已而往參高峯峯孤峻嚴冷不假人辭色一見師歡然許為祝髮一日誦金剛經至荷擔如來處恍然開悟時年二十有四實至元丙戌歲也明年從高峯剃染又明年受具戒未幾觀流泉有省詣峯求證峯為打趂出既而民間訛傳選童男女師因問峯曰忽有人來問和尚討童男女時如何峯曰我但度竹篦子與他師于言下洞然徹法源底峯嘗書真贊示師曰我相不思議佛祖莫能識獨許不肖兒得見半邊鼻或問高峯諸弟子優劣峯曰若初院主等一知半解不道全無如義首座固是莖老竹其如七曲八曲惟本維那却是竿上林新篁他日成材未易量也逮峯遷化師領院事王臣問道無虗日因謝事遨遊江湖或船或菴居無定處咸榜曰幻住僧俗爭相瞻禮手額曰江南古佛仁宗聘召不至賜金襴袈裟并佛慈圓照廣慧禪師號復敕師子禪院為師子正宗禪寺時宣政院虗靈隱徑山待師師不就先是駙馬太尉瀋王王璋嘗遣人從師問法以為未足復請旨親賫御香入山參謁師為升座普説至治中特旨降香賜金襴伽黎師每斥學者但尚言通不求實悟嘗示衆曰今之參禪不靈驗者第一無古人真實志氣第二不把生死無常當做一件大事第三拌捨積劫以來所習所重不下又不具久遠不退轉身心畢竟病在于何其實不識生死根本故也凡見學者輒問曰汝喚甚麼作生死或者茫然無對或者謂生不知來處死不知去處是生死師曰直饒知得亦生死所知亦生死又或指一念忽起是生一念忽滅是死師曰離一念起滅亦生死也是説皆枝葉耳非根本也夫根本者性真圓明本無生滅去來之相良由不覺瞥起妄心迷失本源虗受輪轉以故道迷之則生死始悟之則輪回息蓋根乎迷而本乎妄也當知山河大地明暗色空五陰四大至於動不動法皆是生死根本若不曾向真實法中脫然超悟更于悟外別立生涯不存窠臼豈堪向生死岸畔劄腳或纖毫不盡未免復為勝妙境緣惑在那邊起諸異想雖曰曉了其實未然惟有痛以生死大事為己重任者死盡偷心方堪湊泊直下儻存毫髮許善惡取捨愛憎斷續之見則枝葉生矣可不慎乎示衆瞻在前忽在後竹雞晝啼華鯨夜吼未了聽一言如今誰動口嗟夫學人將此一等言句作箇相似底道理商量把自家一片潔白田地添者般野狐涎沫點污了也却不思古人開口處如大火聚如大風輪無你湊泊處又如吹毛利劍等間拈出直要斷人命根此豈可以心意識卜度而為得哉若然則阿難不假再修二祖不勞斷臂何則彼阿難二祖聰慧過人意識明了如汝所解者彼豈未聞耶蓋是心不妙悟則見地不脫若見地不脫則動是情意識輥作一團在處依草附木承虗接響致使上味醍醐薀在伊不淨器中變成毒藥一切時中如箇不解脫鬼相似見人説心説性便乃扶籬摸壁湊泊將去才見人舉起沒巴鼻捩轉面皮突出牙爪處未免意識不行便乃渾侖吞棗如此等輩日用一心中常有二主互相起滅有時緣般若則忘世諦或緣世諦則忘般若自不知是腳跟下蹉過却謂我工夫未熟履踐未純而然便乃精修白業作有漏因以為資助又有一等顢頇佛性儱侗真如者日用遇一切境界只作一箇道理硬自排遣乃至破律儀犯禁戒皆無忌憚及乎弄到差別境中排遣不行處自不知是當面著謾却謂我力量未充聞見不廣而然便乃參求古教該博見聞又或忘形死心停機息念以資狂慧如上二種學者蓋為自無正念況是打頭不曾遇著箇咬豬狗手腳底宗師與之滌蕩坐在病中不自覺知終日肆口而談縱舌而辨總是隔抓癢如此參學要於生死岸頭一念相應如吹網欲滿非愚即狂也近世為人師者往往不能窮其源底只欲學人速得知解暖熱門庭多將箇瑞巖主人公臨濟無位真人即心是佛他是阿誰等語與人打交輥亦不顧他立腳未穩恐他不能領解又向他道參底是誰學底是誰要見本性底是誰只欲他便向者裏認箇光影使其擎拳豎指進前退後不離當處便是西來本意矧乎學人不識好惡墮他窠臼如油入不得出頭誠可哀憫良由不知衆生心中圓淨湛然元無汙染只為情生智隔想變體殊一妄瞥興萬緣各立外則妄見山河大地明暗色空內則妄見四大五蘊見聞知覺乃至八萬四千塵勞及與菩提真如涅槃佛性等相皆不出此一妄而有然此妄念若欲去除直須是工夫純熟脫落根蒂坐斷聖凡劃然開悟不然直饒你見超二祖慧過阿難正坐在第八識中以識去識以妄遣妄如避身影於日中滅眼華於空裏徒自勞神轉成差別所以從上諸老宿不奈伊何拈出一把折柄刀子刺在伊命根上待伊捱到轉身不得處奮命一挨卒地斷𪹼地折妄消想滅見謝執忘便見森羅萬象廓爾平沉聞見覺知當處解脫併百千世界融歸一心自然法法全真頭頭顯露然雖如是若要向衲僧面前開口吐氣更須朝打三千暮打八百待伊死髑髏上活眼重開方有語話分大都是無量劫中生死根本今日要與一期和盤翻轉豈易事哉如其不爾你但以妄想心生妄想見忽忽草草認箇目前鑑覺昭昭靈靈喫飯著衣開口動舌底喚作自己又妄認山河大地鵲噪鴉鳴風動塵起處喚作法身却不思命根未斷見地不脫坐在六塵緣影裏不肯知非有時被人説箇不是便乃牽引古人談玄説理處從頭印過只與麼麻纏紙裹依稀倣佛輥過一生逗到臘月三十日四山交逼真境現前換却眼睛從前認底總皆不是了也到者裏甘聽處分噬臍何及然後招妄談般若欺罔聖賢之報百劫千生受諸苦楚如此等事從古至今賺人多矣豈不見古人有偈曰學道之人不識真只為從前認識神無量劫來生死本癡人喚作本來人本上座到者裏事不獲已更為伊與古人翻款去也學道之人不識真用識作麼只為從前認識神也不較多生死本即不問如何是本來人喝一喝切忌錯下注腳與大覺長老書曰初六日分袂不及拜送懸情依依未能暫忘昨者坐語未及他論而首以住院承嗣叩之者惟恐足下苟徇世諦故也某與足下納交一十六年彼此心懷洞然明白豈意足下不諒愚情反欲相及何臨事翻覆若此耶古人於法嗣嫡傳所以深明宗系者大法源委不可誣也世漓俗薄奉金請拂以院易嗣者有之某嘗痛心於此夫大覺雖先師開山然十方叢林儘有尊宿捨彼不取而必欲某尸之何識量之不廣也某非畏住持實畏嗣法於開山也故退避力辭而舉足下為之主政以足下自師一山禪師豈可苟徇世俗而易其所師哉由此言之某猶不欲以先師座下人迭尸大覺而況牽枝引蔓欲為某之嗣乎聞命駭然專浼逆流塔主預此拜聞望以玉峽之音直與拈出或欲徇俗易嗣則某斷然不敢與足下一日相聚也至扣至扣至治癸亥八月十五説偈辭衆曰我有一句分付大衆更問如何無本可據置筆安坐而逝世壽六十一僧臘三十七奉全身塔于本山之西岡天曆二年敕諡智覺塔曰法雲復命虞文靖公集為之銘元統二年賜廣録三十卷入藏號普應國師大覺泰定叟也皇慶間瞿運使霆發屢請師住大覺師力辭舉定叟應命叟嘗歷職於開先一山萬和尚會中後復參師及出世欲改嗣師師以是書却之令嗣一山杭州天目斷崖了義禪師湖之德清湯氏子年十七聞禪者誦高峯上堂語曰欲窮千里目更上一層樓師曰有大善知識必能為人拔釘去楔遂往參謁侍峯于死關峯令看萬法歸一一歸何處話因名從一他日峯為衆舉牛過櫺話師聞而有疑日夕體究偶過盂塘見松枝雪墜有省詣峯呈頌曰不問南北與東西大地山河一片雪聲未絶峯痛棒打出不覺隕身崖下崖懸壁立人意其必死同學捫蘿接磴以救之師無所苦乃自誓七日取證未至期豁然大悟復馳至死關大呼曰老和尚今日謾我不得也復説偈曰大地山河一片雪太陽一照便無蹤自此不疑諸佛祖更無南北與西東峯乃上堂曰山僧二十餘年布縵天網子打鳳羅龍不曾遇得一蝦一蟹今日有箇蟭螟蟲撞入網中固是不堪上眼三十年後向孤峯絶頂揚聲大叫且道叫箇甚麼舉拂子曰大地山河一片雪師謂同學曰盡大地有一人發真歸元從一皆知之峯歎其俊快尋回省親乃奉母入武康上柏結茅以居人見其混俗罔測其意後還山見峯峯曰大有人見你拖泥帶水師曰兩眼對兩眼遂為剃落改名了義峯既示寂師益韜晦頽然居下版四衆纍請勉住師子正宗禪寺一載示衆若要超凡入聖永脫塵勞直須去皮換骨絶後再蘇如寒灰發焰枯木重榮豈可作容易想我在老和尚處多年每被大棒打徹骨髓不曾有一念遠離心直至如今才觸著痛處不覺淚流豈似你等歡喜踴躍咬著些子苦味便乃掉頭不顧殊不知苦味能除百病大凡工夫若到省力時如順水流舟只要梢公牢牢把舵才有絲毫異念生管取喪身失命若到純一處不可起一念精進心不可起一念懈怠心不可起一念求悟心不可起一念得失心才有念生即有一切邪魔入你心腑使你顛狂胡説亂道永作魔家眷屬佛也難救你戒之戒之元統元年歲除日謂侍者曰有一件事天來大你還委悉麼良久曰明日是季朝正月六日詣法雲塔西指空地曰更好立箇無縫塔其晚與禪者談笑如平時至夜分乃曰老僧明日天台去也者曰某甲隨師去師曰你走馬也趂我不及翌旦跏趺而化世壽七十二僧臘四十九藏全身于雲深菴化之日雷砰雨射白晝晦瞑及葬雪華繽紛林木縞素送葬者數千人悲慟哀戀聲憾山谷初中峯示寂會葬齋次師謂衆曰後十二年更為老僧一會衆未深信至是始驗至順二年七月朝廷欽師道行敕諡佛慧圓明正覺普度大師大覺布衲祖雍禪師明州寧海人侍高峯最久躬事舂㸑貌甚黑瘠戇而少文初為院主後首衆提唱超卓高峯遷化衆請中峯居大覺中峯力辭推師主之惜乎住世不久嘗見其山居偈曰就樹縛茅成屋住拾荊編戶傍溪開是他懶瓚無靈驗惹得天書三度來高風遠韻槩可想見云後於中竺桂子堂書偈坐逝中峯和尚題師像贊曰浙東山浙西水面目儼存真機不倚蓮華峯突兀半天桂子堂腥臊萬里玻璃誰道匪家珍沉沉法海深無底按禪燈世譜高峯嗣下列有空中假五燈續略集有處州白雲空中假禪師得法高峯棲白雲山四方禪衲聞風來赴屨滿戶外至元丙子夏一日援筆書偈曰地水火風先佛記掘地深埋第一義一免檀那幾片柴二免人言無舍利書畢趺坐而化愚謂高峯老祖生平踞斷死關且罕接見何況許可當時如布衲雍公從初至終傳銘中班班可考尚未聞其紹祖嗣法其餘或參叩開悟未必絶無其人而一知半見但存以志不泯未敢擅列法嗣下也今濟宗僅老祖一脈雖於後學無關亦足為今時影響附會者作針砭靈雲定禪師法嗣般若絶學世誠禪師示衆有志之士趂衆中柴乾水便僧堂溫暖發願三年不出門決定有大受用有等才作工夫覺得胸次輕安目前清淨便一時放下作偈作頌口快舌便將謂是大了當誤了一生可惜前來許多心機中途而廢三寸氣斷將何保任衆兄弟若欲出離生死參須實參悟須實悟始得徑山陵禪師法嗣杭州徑山竺遠正源禪師歐陽文忠公之裔世居南康年二十七棄家剃染受具參方首謁虗谷谷舉龍潭吹滅紙燭話師曰焦石可破層冰谷曰破後如何師曰探索乃知谷曰所知者何事師擬對谷劈脊便棒師悚然喻旨後出世觀音興聖次補道場靈隱後遷徑山賜號佛慧慈照普應禪師後示寂全身塔于徑山弟子分爪髮舍利藏于道場世壽七十二僧臘四十五婺州寶林桐江紹大禪師嚴州吳氏子世居桐江因以為號幼入里之鳳山寺出家剃染受具戒參虗谷于徑山佩服心印遍遊江湖凡名匠所在咸往踄歷一日慨然嘆曰吾今而後乃知法之無異味也遂罷參手翻大藏凡三過內外學咸通其旨東嶼居淨慈請典藏鑰至順壬申出世郡之烏龍後遷雲黃寶林一時法會號稱極盛一日示微疾鳴鼓集衆敘謝衆請偈師接筆擲地曰縱書到彌勒下生寧復離此翛然而化世壽七十四僧臘五十八闍維舍利如紺珠齒牙不壞所著有三會語録鐵山瓊禪師法嗣汝州香嚴無聞思聰禪師香山人初參獨峯令看不是心不是佛不是物話同雲峯月山等六人立盟互相究竟次見淮西無能教示無字話一日晤同參敬上座敬問你六七年來有甚見處師曰每日只是目前無一物敬曰你者一絡索從甚處來師罔然問曰畢竟明此大事應作麼生敬曰不見道要知端的意北斗面南看説了便去師被一拶直得行不知行坐不知坐五七日間不提無字倒只看要知端的意北斗面南看偶到淨頭寮與衆同坐疑情不解有飯食頃頓覺胸次輕清情想破裂目前人物一切不見省來通身汗流遂見敬敬舉扇曰速道速道師遽曰舉起分明也妙哉清風匝匝透人懷箇中消息無多子直得通身歡喜來自此下語作頌都無滯礙及至向上一路又不得灑落乃入香嚴山過夏單提無字一日不覺身心如一座屋倒却四壁一般無一法可當情復謁無方普普問萬法歸一一歸何處師曰鼻豎眼橫普曰者是學得底師曰雞寒上樹鴨寒下水普曰不問者箇如何是你父母未生前面目師豎起拳曰看普曰好與三十拄杖師拂袖便出適值鐵山和尚從高麗回至石霜師往見山問仙府何處師曰汝州山曰風穴祖師面目如何師將二十年工夫通説一遍山把定咽喉問如何是無字師曰近從潭州來不得湖北信山曰未在更道師曰和尚幾時離高麗山曰未在更道師喝一喝拂袖便出山曰者兄弟都好只一件大病道我發明了師聞而感激因求決擇復入光州山中前後十七年方得穎脫嘗示衆曰法無定相遇緣即宗秉金剛劍吞栗棘蓬截斷衲僧舌頭坐却毗盧頂𩕳豎一莖草作丈六金身將丈六金身作一莖草直教寸絲不挂月冷秋空寒灰發焰到者裏喚作佛法入地獄如箭射不喚作佛法亦入地獄如箭射諸仁者畢竟作麼生會不見船子和尚道藏身處沒蹤迹沒蹤迹處莫藏身雖然恁麼正眼觀來盡是間家具衲僧分上料掉沒交涉道場信禪師法嗣湖州福源石屋清珙禪師蘇之常熟人俗姓溫生于宋咸淳初幼依興教崇福寺剃染受具戒首參高峯示萬法歸一一歸何處話服勤三年無所發明辭峯峯曰溫有瞎驢淮有及菴宜往見之因至建陽參及菴菴問何來師曰天目菴曰有何指示師曰萬法歸一一歸何處菴曰汝作麼生會師無語菴曰此是死句什麼害熱病底教汝與麼師拜求指的菴曰有佛處不得住無佛處急走過意旨如何師不契菴曰者也是死句師不覺悚栗汗下一日入室菴再理前話師曰上馬見路菴呵曰汝在此幾多時猶作者箇見解師發憤而去中途忽舉首見風亭豁然有省遂返語菴曰某甲今日會得活句也菴曰汝作麼生會師曰清明時節雨初晴黃鶯枝上分明語菴頷之因復親炙數載辭去菴門送之曰他日與汝同龕未幾菴遷道場師復依之典藏鑰悅堂誾主靈隱請師居第二座罷參後卓菴湖之霞霧山凡樵蔬之役皆躬為之喜吟味有山居諸偈流播叢林廣教府馳檄請住當湖福源師堅臥不起往返至再師勉就入院上堂把住也鋒鋩不露放行也十字縱橫水雲深處相逢却在千峯頂上千峯頂上相逢却在水雲深處今朝福源寺裏開堂演法昨日天湖菴畔墾土耕煙所以道法無定相遇緣即宗可傳真寂之風仰助無為之化正與麼時如何拈拄杖卓一下九萬里鵬才展翼十千年鶴便翱翔謝專使并三塔和尚首座都寺上堂睦州唆臨濟喫棒不是好心楊岐逼慈明晚參不是好心趙州訪道吾不是好心福源專使逼人住院且道是好心不是好心珊瑚枕上兩行淚半是思君半恨君謝殿主淨頭上堂一身清淨則多身清淨一世界清淨則多世界清淨東司頭臭氣佛殿裏蓬塵且道從什麼處得來以手掩鼻曰又是一點也中秋謝藏主上堂天上月正圓人間月方半諸人恐未知打鼓普請看道是如來藏裏摩尼珠又似賓頭盧尊者手中琉璃碗比也不可比辨也不可辨天風吹露溼桂華香浸雲邊廣寒殿上堂我有一句子欲與諸人説破又恐諸人罵我不與諸人説破又恐諸人疑我且道如今説即是不説即是撫膝曰知我罪我吾無辭焉上堂黃梅俾老盧踏碓石頭譏藥山不為有一丈篷可以使八面風無三尺鞭難以控千里馬伊蘭園裏不生旃檀黃檗樹頭討甚蜜果上堂動若行雲止猶谷神水中醎味色裏膠青細雨溼衣看不見間華落地聽無聲上堂所聞不可聞所見不可見昨夜五更風吹落桃華片蒼苔面上生紅霞百鳥不來春爛熳上堂喫飯要止飢飲水要止渴著衣要免寒歸鄉要到家學道要到三世諸佛開口不得處參禪要到歷代祖師插腳不入處若不如此倚他門戶傍他牆壁聽人指揮喫人洟唾總不丈夫福源與麼説話良藥苦口忠言逆耳上堂是聖是凡入門便見波斯鼻孔開眼便見蚌蛤心肝開口便見諸人兩莖眉毛橫在眼上因甚看他不見明眼人前三尺暗上堂臘月一水生骨虗明自照不勞心力白鷗寒鴈蘆華無處尋他蹤迹待得日暖冰融水面寬依舊飛來照破湖光碧平山和尚至上堂即心即佛也不是非心非佛也不是不是心不是佛不是物也不是恁麼也不是不恁麼也不