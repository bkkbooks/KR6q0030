藏室珍于天封次謁方山寶于瑞巖築室華頂乾乾朝夕一日作務次渙然冰釋趨白方山山説偈印之復歸華頂一坐四十夏華頂高寒莫能久處師足不越戶限闢娑羅軒以導來學示衆風泠泠日杲杲薝蔔華開滿路香池塘一夜生春草堪悲堪笑老瞿曇四十九年説不到阿呵呵拍禪牀下座示衆若論此事一大藏教詮注不及天下老和尚拈提不起直饒有傾湫之辨倒嶽之機到者裏一點也用不著諸仁者飢則喫飯困則打眠熱則乘涼寒則向火一一天真一一明妙何得踏步向前論禪論道將魚目為珠認橘皮作火不見道大機須透徹大用須直截不識東家孔丘翁却向他尋禮樂卓拄杖元統甲戌五月望日遺書謝道侶説偈跏趺而逝闍維白乳如注舍利凝結成五色彩瘞于所居之西錫號真覺塔曰寂光明州松巖秋江元湛禪師久從龍象遊後參方山得旨偶遊明之松巖愛其清勝不忍去遂趺坐石上俄有二虎踞坐其側若護衛狀師命之伏枕其背熟睡山民異之即其處創精藍以居之師不涉世事法施之外淡如也將化別衆就龕説偈曰洗浴著衣生祭了跏趺晏坐入龕藏華開鐵樹泥牛吼一月長輝天地光復謂衆曰十五年後寺當火啓龕則火可止至期果然衆亟開龕師神色如生爪髮俱長恕中和尚禮塔偈曰活葬松巖二十年眼睛鼻孔尚依然我來欲起那伽定石火光中話別傳杭州鳳山一源靈禪師寧海人從徑山雲峯芟染參方山於瑞巖充堂司一日入室請益趙州勘婆話山曰維那你試下一語看師曰盡大地人無奈者婆子何山曰山僧則不然盡大地人無奈趙州何師當下如病得汗後住鳳山上堂舉世尊升座文殊白椎公案師曰世尊已是錯説文殊已是錯傳新鳳山今日已是錯舉會麼字經三寫烏焉成馬一日見僧擲選佛圖師示偈曰百千諸佛及衆生休向圖中強較量心印當陽輕擲出堂堂安坐寂光場復曰古人無剪爪之工汝輩後生忍唐喪光陰且擲圖選佛到極合煞時擲得一箇印出便歡喜道我成佛了殊不知一切時一切處皆是汝成佛處汝却不知東巖日禪師法嗣明州天童平石砥禪師送慍藏主省徑山元叟和尚偈曰山頭老漢八十一如此東南大法城雙鬢又添新歲白片言能使古風清為人不用擊虎術養子寧忘舐犢情明月堂前坐深夜餘光分得到長庚高峯日禪師法嗣日本國夢智曤國師姓源氏本國勢州人宇多天王九世孫也九歲出家十八為大僧每夢遊中國乃決志參方初見一山寧備陳求法之誠山曰我宗無語句亦無一法與人師曰豈無方便乎山曰本來廓然是大方便師疑悶不輟復謁高峯峯曰一山有何指示師述前語峯厲聲喝曰何不道和尚漏逗不少師於言下有省益自奮勵一夕坐久忽倚壁身踣豁然大悟作偈有等間擊破虗空骨之句呈似峯峯為印可乃出無學元公淵源以界之後於本國大弘宗教賜號普濟國師薦嚴道禪師法嗣台州瑞巖空室恕中無慍禪師本郡臨海陳氏子從徑山寂照剃落參方首謁靈石于淨慈後參一元靈逾年歸覲照命居擇木寮復遊四明見太白砥典藏一日偕木菴聰大宗興往台州紫籜山謁竺元道才擬開口問無字話被元一喝師豁然大悟直得通身汗下遂呈頌曰狗子佛性無春色滿皇都趙州東院裏壁上挂葫蘆元笑曰恁麼會又爭得師拂袖便出繇茲感激間語同參曰此事如人飲水冷暖自知決不在言語文字上我輩若不遇者老和尚幾被知解埋沒一生他日設有把茅蓋頭當不忘所自後古鼎銘主徑山招師歸蒙堂日涉玄奧且為學者矜式無何以避兵還四明不喜出僅兩住山皆甫及三載而退初主象山之靈巖復主黃岩之瑞巖時夢堂噩居瑞龍覬師為寂照嗣師曰素志有在不可奪也開堂日拈香曰古人出世拈香酬法乳也今人出世拈香酬世恩也慍上座總不然昔年行腳到紫籜山中參箇老布衲彼亦無法可授我亦無法可受只向無授受中拈出供養前住崑山薦嚴禪寺竺元道和尚不圖報德酬恩只要大家知委僧問用則波騰海沸全真體以運行體則鏡淨水沉舉隨緣而會寂者箇是用不離體體不離用作麼生是體用雙忘一句師曰胡猻喫毛蟲曰窮諸玄辨若一毫置於太虗竭世樞機似一滴投於巨壑者是久客還家暫忘岐路作麼生是天然受用一句師曰騎馬踏凳不如步行曰豁開戶牖無邊剎境自他不隔於毫端瞥轉一機十世古今始終不離於當念者箇是揑定死蛇頭徹底無轉智作麼生是蓋天蓋地一句師曰虗空無向背日月自循環僧曰莫言少室兒孫少自有甘心斷臂人師曰家無白𤢟之圖亦無如是妖怪僧曰畢竟水須朝海去到頭雲定覓山歸師曰七棒對十三僧禮拜問如何是瑞巖境師曰風吹不入曰如何是境中人師曰水灑不著曰人境已蒙師指示向上宗乘事若何師曰真不掩偽曰諸法寂滅相因甚舟行岸移雲駛月運師曰好箇消息只恐錯會曰兩重公案師曰海水不生冰問如何是函蓋乾坤句師曰猛虎口裏活兒曰如何是截斷衆流句師曰金剛手中八楞棒曰如何是隨波逐浪句師曰李白捉月張騫乘槎問維摩丈室不以日月為明和尚丈室以何為明師曰物見主眼卓豎曰摩竭掩室毗耶杜詞相去多少師曰一坑埋却曰德山入門便棒臨濟入門便喝畢竟明什麼邊事師曰塞北千人帳江南萬斛船小參靈巖峭絶到者應難已到者享用安然未到者竛竮孤露孤露底正好踏步向前享用底直須退步就己所以道事無一向有時拈頭作尾有時拈尾作頭收放縱橫寧存軌轍摩竭掩室毗耶杜詞雖曰正令全提要且未臻其極山僧今夜入門之始聚首之初與汝諸人約法三章第一不得起佛見第二不得起法見第三不得道不起佛見法見若也依而行之管取眉毛廝結驀拈拄杖明眼漢沒窠臼高高處觀之不足低低處平之有餘卓拄杖鐵牛不喫欄邊草直向須彌頂上眠謝專使上堂達磨大師十萬里西來要作箇馳書達信漢及乎面對梁王盡力只道得箇不識拈拄杖有賓有主有禮有樂手面分開白月團頂門撼動黃金鐸上堂明月照高巖懸水響前嶺耳目一何清冥然了心境咄哉觀世音擔雪來填井下座上堂祖師意無別法下地走穿却鞋上牀眠脫却襪只恁麼太誵訛不恁麼無合煞溈山水牛百丈野鴨帶水拖泥不足觀腦後圓光最輝赫喝一喝上堂風不來樹不動心不生境不到僧問雲門如何是佛門曰乾屎橛僧問楊岐如何是佛岐曰三腳驢子弄蹄行好大衆向道是龍剛不信果然奪得錦標回上堂禪和家道我無有不知無有不會忽有人問如何是行腳事便口如匾擔病在於何病在多知多解恁麼參學不如三家村裏種田漢忽有人問今歲稼穡如何一一道出如瓶瀉水蓋其無知解故無揀擇故秋氣向寒各自歸堂珍重上堂辭親割愛剃髮染衣入此門來合為何事若也知漸識傀是真出家一出塵俗恩愛家二出三界火宅家三出粗惑煩惱家四出細惑無明家出得四家始稱衲僧家且道如何是衲僧家撞著冤家惡口小家上堂心如工伎兒意如和伎者五識為伴侶妄想觀衆伎大衆還識得心也未若識得心便識得意識得意便識得諸識識得諸識便識得妄想妄想滅則諸識滅諸識滅則意滅意滅則心滅心滅則一切滅所以道心生種種法生心滅種種法滅喝一喝山河大地日月星辰有什麼過下座上堂惟一堅密身一切塵中現拈拄杖釋迦老子來也三百六十骨節八萬四千毫竅一一放大光明照徹恆沙國土於其中間若聖若凡有情無情被其光者無不證大涅槃獲大安樂得大受用靠拄杖此時若不究根源直待當來問彌勒示衆巖寺春深草樹肥幾回特地啓柴扉行人只在青山外杜宇聲聲喚不歸上堂赤肉團上有一物昭昭靈靈恍恍惚惚隨事變通了無拘束要知來處分明不離舉足下足今時叢林中聞與麼道便道説老婆禪殊不知雲無心而出岫水盈科而或流遇高山而必止至大海而方休拍禪牀瑞巖上堂諸佛出世是第二頭祖師西來是第三首饒你向威音那畔別立生涯百草頭邊全明殺活布袋裏老鴉未知有出身一路在且道作麼生是出身一路是日無人問話師乃曰今日無人問話不是冷落門庭正是光顯門庭何也若論此事實不在語言上若在語言上釋迦老子四十九年説一大藏之乎者也豈是無言耶因甚末後向靈山百萬衆前單單拈起一枝華惟迦葉一人點頭知尾驀地破顏微笑既是物值貨當便道吾有正法眼藏分付摩訶迦葉由此代相傳直至於今當時豈有攢華簇錦辨口利辭問一句來答一句去湊得團圝合得恰好然後始相付囑乎諸禪德若要紹續此箇門風不用廣求文義不用息念歸空但向世尊未拈華處迦葉未微笑時一領領取如白衣拜相如平地登仙不涉階梯掀翻途轍巍巍自在穩坐家堂五欲八風窺覷無門四生九有籠不住便見無恩不報無德不酬亦見山僧遠離四明波波挈挈而至於此踞曲彔牀拋沙撒土不為分外拈拄杖祝融峯頂上露滴萬年松開山忌拈香未見巖頭口似磉盤既見巖頭眼如木棎本然理拄地撑天何勞置問主人翁呼來喚去猶欠惺惺插香相逢不下馬各自奔前程散忌上堂法不孤起仗境方生今日是開山空照祖師入般涅槃之晨山僧將不可説不可説恆河沙世界作一筵席百億須彌盧山作一碗飯百億香水海作一碗羹聊陳供養正恁麼時且道將此筵席向什麼處鋪設若向世界上鋪設世相已成筵席若向虗空鋪設虗空又如何鋪設不得顢頇儱侗只與麼休去衆中莫有出手措置者麼如無山僧自出手去也豎拂子恆河沙世界百億須彌山百億香水海華簇簇錦簇簇總在拂子頭上不寬不隘無欠無餘大衆且道空照祖師還來受此供養也無受與不受且置你道他即今在什麼處安身立命擊拂子家家門前赫日月太平不用將軍威結夏小參圓覺伽藍人人具足在天同天在地同地自是諸人探頭太過不能搆得故勞釋迦調御曲開方便之門立期立限如逼生蛇化龍要汝親證親悟龐居士道十方同聚會箇箇學無為此是選佛場心空及第歸好大衆箭不虗發發必中的語不虗發發必全真針眼魚吞却嘉州大象即不問且道可大師三拜得髓還端的也無拍禪牀一年春又過臺榭緑陰多上堂相逢不拈出舉意便知有打失雙眼睛留得一張口孤峯頂上呵佛罵祖竅鑿頂門十字街頭掣風掣顛符懸肘後長沙虎子湖狗拈起粗辣藜好與臂脊摟請侍者上堂趙州與文遠鬬劣不鬬勝老大不識羞相席還打令致使明眼人無由辨邪正邪正既不辨展轉成毛病瑞巖百不能愛用無星稱稱起太虗空錙銖無欠剩以此為瑞為祥以此為坑為穽斷衲僧之咽喉續佛祖之慧命上堂坐深井者不知太虗之寬廣忘偏見者方明至理之圓融與麼説話譬如以大地作射垛挽弓所向無不中的衆中忽有人出來道如斯舉唱今古罕聞山僧喚侍者點一碗茶供養他更有出來道如斯舉唱未獲全提亦喚侍者點一碗茶供養他且道還有為人處也無雪壓難摧澗底松風吹不動天邊月師嘗室中垂語曰穩坐家堂主人翁因甚不識掀翻大海摑碎須彌平地上因甚擡腳不起眼光爍破四天下自家眉毛落盡因甚不見前後下語多不契其機鋒峻拔學者莫能擬議一日謝事入松巖巖為秋江湛公隱處萬山之巔人迹罕至師悉遣徒御嶄然獨處衆涕泣哀請堅拒不出洪武七年夏日本國遣使入貢嚮師道風奏請師化其國以水晶數珠峩山石硯為贄上召至闕師以老病辭上憫而不遣留處天界全室泐公延致丈室時宋公景濂方在翰林詣師劇談道妙一時朝士靡不敬慕是年冬奉詔東還十七年弟子居頂住鄞之翠山迎師就養四方叩謁者無虗日金齒大理僧至京特入翠山五十餘人拜牀下各求偈語而去一日示微疾諄諄勉衆以祖道自重索筆書偈曰七十八年無法可説末後一句露柱饒舌咄書畢端坐而逝時洪武十九年丙寅七月十日也壽七十有八臘五十有九遺命闍維煅骨散水竹間居頂不敢遵乃于唐嶴之原奉骨瘞焉師天性純粹待衲子如慈母遇法門有叛教背義者必面折之不少貸奉師惟謹嘗侍寂照立至三鼓不命不敢退所著有二會語重拈雪竇拈古一百則續頌大慧竹菴頌古一百一十則山菴雜録淨土詩四明烏斯道撰行業明州天童了堂一禪師至正二年住台之紫籜次遷天寧天童上堂僧問昔日保壽開堂三聖橫身相為臨濟住院普化盡力扶持畢竟明甚麼邊事師曰兩頭俱坐斷一劍倚天寒曰與麼則五位君臣齊列下三玄戈甲一時收師曰錯下名言僧喝師曰亂統禪和如麻似粟乃曰拈一莖草作丈六金身將丈六金身作一莖草好大衆不是苦心人不知便下座上堂最初一句末後一機直下構得燈籠露柱動地放光其或未然竹山今日失利示衆樵歌來疊嶂帆影落汀洲胡猻戴席帽直上樹梢頭七星劍五雲樓毬打人兮人打毬萬事難把玩魚吞水面漚上堂長𭪿鳥芳樹不棲摩斯迦滄溟不入龍泉與鈯斧同鐵利鈍懸殊良驥與駑駘同途遲速有異以拂子畫一畫華須連夜發莫待曉風吹小參靈光不昧萬古徽猷智鑑洞明十虗普應時臨亞歲節屆書雲擊動法鼓大衆雲集一一天真一一明妙更説箇甚麼若説有法又被有礙若説無法又被無礙若説不有不無法又被不有不無礙若説不不有不不無法又被不不有不不無礙雲從龍風從虎聖人作而萬物覩日可冷月可熱衆魔不能壞真説以拂子畫一畫黃檗樹頭懸蜜果無言童子唱巴歌問文殊與普賢萬法悉同源如何是同源底法師曰胡張三黑李四曰一毛吞巨海于中更何言師曰不勞懸古鏡天曉自雞鳴曰是非不到處還有句也無師曰情知你亂會問名假法假人空法空請師直指師曰曾問幾人來曰無根樹子向甚麼處栽師曰更深猶自可午後更愁人曰只在目前為甚麼再三不覩師曰千年常住一朝僧徑山大宗興禪師台州人嘗與恕中木菴三人結伴參方罷遊紫籜纍歷名剎後遷徑山臨終忽嘆曰夫三十婦六齡畢竟偶不成遂坐脫去保寧茂禪師法嗣蘇州靈巖南堂了菴清欲禪師族朱氏台之臨海人得法於古林初出世中山之開福繼遷本覺三主靈巖開堂日僧問丹山鸞鳳九苞文地位清高隔五雲四海具瞻時一見願聞真唱答明君師曰千峯朝華嶽萬派肅滄溟曰萬方有道歸明主一句無私利有情師曰黃河九曲水出崑崙曰祝贊已蒙師指示向上宗乘事若何師曰眼不見鼻孔問曹溪流非止水一滴忽來千波競起時如何師曰退後退後曰平生不解藏人善到處逢人説項斯師曰莫謗山僧好問天不言四時行地不言萬物生學人有疑願聞開示師曰萬人遐仰處紅日到天心曰野老不知堯舜力鼕鼕打鼓祭江神師曰眼見如盲口説如啞曰千古華山山腳下又添潘閬倒騎驢師便喝問仲冬嚴寒年年事運推移事若何師曰昨夜日輪飄桂華今朝月窟生芝草曰仰山近前叉手意旨如何師曰奴見婢殷勤曰香嚴叉手近前又作麼生師曰大家廝淈𣸩曰去此二途請師別道師曰無人處斫額望汝問單傳直指已涉離微坐斷千差請師答話師曰破鏡不重照落華難上枝曰便恁麼去時如何師曰烏龜鑽敗壁曰即色明心附物顯理時如何師曰癩馬繫枯樁曰三九二十七牛頭南馬頭北如何是接手句師曰百華深處鷓鴣啼問一不做二不休時如何師曰水底撈明月曰退一步又作麼生師曰相逢盡道休官去林下何曾見一人問如何是佛師曰面前案山子曰法即不問如何是僧師曰三頭兩面得人憎僧禮拜師却問曰如何是法僧曰明年更有新條在惱亂春風卒未休師曰洎不問過問陰極陽生則不問祖師門下事如何師曰石筍抽條長丈二曰牛頭未見四祖時如何師曰華陰山前百尺井曰見後如何師曰祝融峯頂萬年松曰去此二途願聞法要師曰休將間學解埋沒祖師心問舉一不得舉二放過一著落在第二時如何師曰懷州牛喫禾益州馬腹脹曰雲門扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾又作麼生師曰西川斬畫像陝府人頭落問牛頭未見四祖時如何師曰處處緑楊堪繫馬曰見後如何師曰家家門首透長安曰見與未見時如何師曰鮎魚上竹竿俊鶻趂不及問説法不應機總是非時語作麼生得應機去師曰夜半起來失却牛天明起來失却火問如何是通宗通途師曰東去西去曰如何是叶帶叶路師曰南來北來問蟭螟蟲吞却虎時如何師曰賞你大膽曰恁麼則退身三步師曰漳泉福建頭匾如扇僧擬議師便打曰一任舉似諸方問如何是德山棒師曰義出豐年曰如何是臨濟喝師曰儉生不孝問佛未出世時如何師曰釋迦自釋迦曰出世後如何師曰彌勒自彌勒曰承師有言釋迦不受然燈記畢竟受什麼人記師曰自家肚皮自家畫問臘人冰鐵彈子即且置如何是金剛圈栗棘蓬師曰我早知你吞透不下曰豈無方便師喝曰棒上不成龍問以字不成八字不是是什麼字師曰一大藏教裏尋取曰恁麼則輝天鑑地去也師曰爍破闍黎面門問雲門放洞山三頓棒意旨如何師曰沙裏無油曰鳥窠吹起布毛又作麼生師曰石中有髓問離四句絶百非請師直指西來意師曰拈燈籠來佛殿裏將山門安燈籠上曰還有為人處也無師曰若無舉鼎拔山力千里烏騅不易騎上堂夜來州中琴堂上般雜劇也有端嚴奇特也有醜陋不堪鬼面神頭亦自好笑且道笑箇什麼我觀世間人是箇大雜劇所謂文武醫卜士農工商各逞己能互相欺誑逗到臘月盡頭不覺一場敗闕具眼旁觀掩口不暇喝一喝元正啓祚萬物咸新岸柳搖金梅破玉萬一氣轉洪鈞下座巡堂喫茶上堂絶羅籠脫羈鎖雖是善因而招惡果咄老松源與麼説話於唱教門中足可觀光要作臨濟兒孫未得在開福莫有長處麼擊拂子星河秋一鴈砧杵夜千家上堂舉松源和尚示衆古者道拈起也天回地轉放下也草偃風行冶父則不然拈起也乾坤黯黑放下也瓦礫生光忽有一箇半箇驀然𭣟瞎頂門達磨一宗未至寂寥在老松源只見錐頭利不見鑿頭方壽山即不然拈起也南山起雲放下也北山下雨不拈不放時如何三級浪高魚化龍癡人猶戽夜塘水上堂南泉斬貓趙州戴草鞋而出興化法戰克賓設饡飯便行是皆發揮本有靈光要且不借別人鼻孔出氣所以前日首座説法高聳人天今朝道伴相過光揚宗眼且道山僧鼓兩片皮成得什麼邊事拍禪牀從前汗馬無人識只要重論蓋代功清明上堂冬至寒食一百五今朝正是三月六山又緑水又緑一聲款乃漁家曲山僧昨日偶爾郊行作得一偈舉似大衆華冠不整舍那衣禿帚還隨破畚箕五箇老婆三箇醜一佛紅杏換消梨下座上堂舉五祖演和尚曰諸莊旱潦不以為憂一堂兄弟不會狗子無佛性話深為可憂師曰重處偏墜松源和尚曰久聚兄弟正路行者有只是不能用黑豆法難以荷負正宗雙法到此平沉苦屈苦屈師曰同坑無異土克由叵耐二大老把他諸人埋向萬仞坑裏若據山僧見處黑豆法有甚難用僧問洞山如何是佛山曰麻三斤豈不是黑豆法僧問雲門殺父殺母佛前懺悔殺佛殺祖向什麼處懺悔門曰露豈不是黑豆法乾峯示衆曰舉一不得舉二放過一著落在第二雲門出衆曰昨日有人從徑山來却往天台去峯曰典座明日不得普請豈不是黑豆法者裏悟去山僧性命在諸人手裏若也蹉過諸人性命却在山僧手裏卓拄杖路遙知馬力歲久見人心上堂藥山久不上堂院主椎鐘擊鼓分明盡底掀翻猶道一詞不措本覺據令提綱不作者般調度今朝月旦拈香撥開向上一路誰言射虎不真枉發千鈞之弩元宵上堂釋迦老子道一人發真歸元十方虗空悉皆消殞五祖和尚道一人發真歸元十方虗空築著磕著若向築著磕著處會得只會得祖師禪不會如來禪若向悉皆消殞處會得只會得如來禪要且未會祖師禪山僧道一人發真歸元十方虗空性相平等且道是如來禪是祖師禪喝一喝一釋迦二元和三佛陀自餘是什麼碗脫丘滿散青苗上堂佛以一音演説法衆生隨類各得解靈山會上退席五千逝多林中半聾半啞眼空四海必有商量心洞十方孰辨真假卓拄杖緑楊陰裏戴嵩牛芳草渡頭韓幹馬喝一喝下座上堂春日晴黃鶯鳴大藏小藏鼻孔眼睛木馬嘶泥牛舞壽山不打者破鼓便下座上堂一大藏教束之高閣長期短期無繩自縛莫更紛紛紜紜直須灑灑落落楊岐一頭驢只有三隻腳潘閬倒騎歸攧殺黃番綽五味拈來饡稱錘別有香風滿寥廓喝上堂八月秋何處熱達磨老臊胡有語非干舌齧鏃破關斬釘截鐵父子雖親不傳未是神仙妙訣喝上堂九九九釋迦老子不知有翻轉面皮伸出毛手握金剛椎碎窠臼突出無位真人一一面南看北斗應菴老人一時逞俊未免以己方人本覺則不然九九九狸奴白牯却知有展開驢腳伸出佛手把住黃絹幼婦放行外甥虀臼鐵鞭擊碎珊瑚枝驚起土星犯牛斗喝一喝上堂正覺山前明星現時釋迦世尊與大地衆生一時成佛祖師門下蹉口道著佛字嗽口三日前行不到末後太過各與二十拄杖忽有一箇不顧危亡底漢出來道本覺與麼判斷也合喫二十拄杖山僧却須分付明下安排何故佛滅二千歲比丘少慚愧上堂如來不出世亦無有涅槃以本大願力示現自在法拈拄杖不是大願力卓拄杖不是自在法舉起也千身彌勒放下也隨處釋迦只為諸人眨上眉毛却入娑羅雙樹間去也靠拄杖見之不取千載難忘師得壽七十至正二十八年八月二十五日示寂于秀之南堂蘇州定慧大方禪師至正十六年春出世定慧時方兵興占住佛屋緇徒戚戚師曰何不休去歇去語默跌宕不可測識一日忽謝院事僑居靈岩華首座寮盛稱總管周侯義卿之賢且曰我將火化須侯作證明十八年九月八日侯以郡事登靈岩時蘇録判善長賈典史天瑞從侯至山師聞欣然出迎陪侯夜話曰某將此月十四日即此山火化侯其為我證明兼吾教下衰侯念世尊付囑國王大臣為法外護慎無忘此言至十三日復以偈寄侯曰昨日岩前拾得薪今朝幻質化為塵殷勤寄語賢侯道碧落雲收月一痕侯未深信師復以偈別衆是夜請于華乞以燥薪疊高棚仍借一龕坐去華謂薪當從命龕則無有師指其牀曰此亦足矣翌晨登殿與衆僧別即升柴棚兩袖皆析燥薪得火即烈焰熾然于大火聚中祝香曰靈苗不屬陰陽種根本元從劫外來不是休居親説破如何移向火中栽於烈熾中度數珠與華曰聊當記憶於是四衆始驚信拜禮煙焰所至多得舍利且聞異香薪盡火滅不壞者二舌根齒牙侯聞驚怛不已為悼章二復為建塔於靈岩別衆偈曰前身元是石橋僧故向人間供愛憎憎愛盡時全體現鐵蛇火裏嚼寒冰鄭明德為之銘明州瑞雲清涼實菴松隱茂禪師族鄭氏奉化人自幼喜習禪趺坐輒達旦年十八投杭之傳法寺希顏出家既剃落稟戒於昭慶惠律師奮志參方見南澗泉公于雲居一夕松下經行聞巖泉聲微有所觸泉命往永福謁古林林問來作什麼師曰生死事大特求出離林曰明知四大五蘊是生死根本何緣入此革囊師擬對林便打師豁然悟入林器之命居第一座逾年回浙中月江印主道場延師分座説法至正壬午行宣政院請主明之瑞雲山清涼寺一日有僧問答未竟以手拍地而笑師曰滯貨何煩拈出僧噓一聲師厲聲便喝一住十五年後退隱東堂影不出山元明良公師之猶子也迎歸天童之此軒一日示微疾集衆訣別衆請偈師舉手自指曰此中廓然何偈之為端坐憑几握右手為拳枕額而逝火葬有天華之祥舍利無數塔于瑞雲西岡世壽八十五僧臘七十諡佛光普照大師溫州仙岩仲謀猷禪師謝藏主侍者上堂一默相酬雷轟電激三呼領旨玉轉珠回七十三八十四築著磕著礙塞煞人拈拄杖昨夜西風枕簟秋無數蟬聲噪高樹越州龍華會翁海禪師台之臨海人年三十棄家投徑山虎岩祝髮初詣旃檀林挂搭或見其舉止山野譏誚之師發憤即住天目參中峯求開示於是寢食皆廢久之無所入時東州居虎丘古林居開元東嶼居寒山師出入三老之門有年後住龍華法嗣古林年九十三往育王守橫川祖塔偶損左足艱於步履日牀坐每至清夜朗吟古人偈語其徒文渙曰和尚一生參學至此不能受用託吟詠自遣師笑而言曰不見大慧和尚因病呻吟左右曰生平呵佛罵祖今乃爾大慧曰癡子呻吟便不是耶渙便禮拜既寂火化異香襲人靈隱海禪師法嗣明州育王大千慧照禪師永嘉麻氏子年十五出家于邑之瑞光寺禮了定落髮受具戒初謁晦機于淨慈一日閲真淨語頭陀石被莓苔裹擲筆峯遭薜荔纏默識懸解遂謁東嶼于薦嚴嶼問東奔西走將欲何為師曰特來參禮嶼曰天無四壁地絶八荒汝向什麼處措足師拍案而退嶼復召至返覆勘辨遂留執侍天曆間出世樂清之明慶嘗示衆曰佛法欲得現前莫存知解縛禪看教皆為障礙何如一法不立而起居自在乎德山棒臨濟喝亦有大不得已爾至正間遷寶陀未幾宣政院署師名命主育王室中垂三關語以驗來學山中猛虎以肉為命何故不食其子虗空無背向何緣有東西南北飲乳等四大海水積骨如毗富羅山何者是汝最初父母一時罕有契其機者居九年退居妙喜泉上築室曰夢菴掩關獨處凝塵滿案泊如也洪武六年沐浴更衣索紙書偈恬然坐逝世壽八十五僧臘七十茶毗牙齒目睛不壞設利五色塔于夢菴之後杭州徑山悅堂顏禪師出家于婺之寶林得法東嶼初住崑山之東禪次遷萬壽升淨慈後主徑山璽書錫金襴法衣明州育王雪悟光禪師字公實姓楊氏蜀之新都人初出世白馬繼遷開元育王復領天童虞文靖公集嘗贊師謂為佛果一枝鳳毛麟角宋文憲公濂有四會語録序杭州徑山月林鏡禪師本郡人受業於無傳久依東嶼因參本來人有省述偈曰本來人本來人無腦無頭作麼尋驀然揪著箇鼻孔試勘元來是白丁時有老宿睨視曰可是師與一摑由是名振叢林後主徑山至正己卯示寂壽八十六塔陵霄東崖建寧府斗峯大圭正璋禪師福州福清人禮湖南絶聽祝髮參東嶼聞嶼頌俱胝豎指話言下頓悟遂上方丈呈所得嶼曰作麼師曰古今現成事何必涉思惟嶼曰既不涉思惟汝來者裏作麼師曰請和尚證明嶼曰證明箇什麼師便喝嶼俾頌狗子無佛性話師遽曰狗子佛性無覷著眼睛枯瞥爾翻身轉唵悉哩蘇嚧嶼撫而印之後結茅斗峯漸成叢席上堂顧視左右良久曰黃金雖貴入眼成塵便下座上堂玉宇霜清瓊林葉落一句全提萬機寢削作者好求無病藥上堂舉青州布衫話頌曰昨夜三更裏雨打虗空溼狸奴知不知倒上樹梢立元旦上堂元正啓祚萬物咸亨喚作新年頭佛法瞎却你眼不喚作新年頭佛法折却我舌畢竟作麼生便下座臨終偈曰生本不生滅亦無滅幻化去來何用分別大衆珍重不在言説合掌而逝椔塘明因天淵湛禪師得法於東嶼嘗依鳳山一源分座説法一日呈秉拂語曰翔鳳山前行看白雲乍舒乍捲禺泉亭畔坐聽流水或抑或揚眼處作耳處佛事耳處作眼處佛事便見非唯觀世音我亦從中證鳳山指便見兩字曰有此二字便是別人説話師不覺解顏點首禮謝而退出語人曰還丹一粒點鐵成金堂頭老漢之謂也天寧曇禪師法嗣三空道人自幼具丈夫志不為富貴所奪見竺雲曇禪師示趙州無字話閲數年一日復見雲問曰生死到來時如何雲曰生是誰耶死是誰耶空乃低頭問訊雲覺其異於常時再以前話徵之空又低頭問訊雲呵之曰切忌死在者裏空拈起槵子曰數珠一百八不數日示微疾説偈而化火後得舍利無算天童坦禪師法嗣金陵天界孚中懷信禪師明之奉化人姓薑氏年十五出家祝髮為大僧竺西坦由華藏遷天童師往質疑一日室中舉興化打克賓因緣師曰俊哉獅子兒西頷之俾掌維那職後出世明之觀音遷補陀詔賜廣慧妙悟智寶弘教禪師至正間升中竺繼住天童御史臺奉疏命主大龍翔集慶寺大明兵下金陵僧徒竄散師宴坐一室高皇帝親幸嘉之敕龍翔為大天界寺一日晨興沐浴更衣趺坐謂左右曰吾歸去矣遂瞑目侍僧撼之請説偈師瞋目叱之遂握筆書曰平生為人列挈七十八年漏泄今朝撒手便行萬里晴空片雪書畢復瞑丁酉八月二十四日也時帝統兵江陰夢師謁見問師來何為對曰將西歸告別耳帝還聞師遷化與夢符異之詔出內府帛幣助喪且命卜藏龕之地于伏牛舉龕之日帝親致奠送出都門之外茶毗舍利如菽貯以寶瓶光發瓶外世壽七十八僧臘六十九宋文憲公濂為之銘天寧舜田明牧禪師台之黃巖人出家仙居三學寺聞天童竺西道望往見之西問達磨不來東土二祖不往西天意旨如何師曰金不博金水不洗水西異之謂左右曰此法門爪牙也復遍參名宿古林茂竺元道東州永元叟端東嶼海咸器重之時日溪泳居天寧師相與激揚泰定初出世天台淨慧次遷仙居廣度處州連山尋隱居鴈山丞相列怯里不華強起主天寧錫號佛智普慧禪師并賜金襴法衣師氣肅如秋嘗即中峯闢室以居蓄一鶴自號鶴松主人一日鶴忽死師以詩悼之踰年師亦示寂玉山珍禪師法嗣金陵蔣山曇芳忠禪師南康人寺災翌日梁王登山謂師曰興復若何師曰賴有大檀越在王曰寺既矣佛依何住師曰古佛過去今佛再來王大喜復笑而言曰衲子所謂蔣薄粥者何也師曰將謂殿下忘却賜號廣慧圓悟大師徑山伏禪師法嗣明州育王月江正印禪師郡之慈水劉氏子年十三禮月溪受業後參虎巖伏機緣相契蒙印可初住苕之道場繼遷育王僧問如何是千尺舍那之身師曰肥不露肉瘦不露骨曰如何是丈六紫磨金色之身師曰切忌認奴作郎曰和尚且莫壓良為賤師曰山僧從來柳下惠問有句無句如藤倚樹此意如何師曰無齒大蟲當路坐曰疏山曰忽若樹倒藤枯句歸何處溈山呵呵大笑又作麼生師曰曹娥讀夜曰後來明昭為他點破還端的也無師曰臨崖看滸眼特地一場愁曰今日學人問和尚樹倒藤枯句歸何處未審如何指示師喝一喝僧禮拜問朝離東土暮往西天是甚麼人師曰十字街頭石敢當曰昨日有人從天台來因甚向南嶽去師曰鮎魚上竹竿曰有一人常在途中不離家舍有一人離家舍不在途中且道孰優孰劣師曰兔馬有角牛羊無角曰恁麼則庭前一葉落天下盡知秋師曰知時別宜堪作闍黎問達磨面壁意旨如何師曰餿飯泥茶爐曰六祖踏碓又作麼生師曰兔子喫牛嬭曰一人道不識一人道不會意在甚麼處師曰鳳林叱之問師唱誰家曲宗風嗣阿誰師曰風吹石臼念摩訶曰恁麼則已得真人好消息人間天上更無疑師曰水底捉麒麟曰如何是奪人不奪境師曰西天人不會唐言曰如何是奪境不奪人師曰有馬騎馬無馬步行曰如何是人境兩俱奪師曰新羅打鼓大唐齋曰如何是人境俱不奪師曰鬧市裏拋碌甎曰人境已蒙師指示向上宗乘事若何師曰有水皆含月無山不帶雲曰只如楊岐祖師道踏著稱錘硬以鐵啞子得夢向誰説須彌頂上浪滔天大洋海底遭火熱明甚麼邊事師曰如驢覷井如井覷驢問如何是金佛不度爐師曰蘇嚧蘇嚧曰如何是木佛不度火師曰悉利悉利曰如何是泥佛不度水師曰趙州東院西曰如何是真佛內裏坐師曰嵩山破竈墮問如何是一生二師曰元首明股肱良曰如何是二生三師曰黃河三千年一度清曰如何是三生萬物師曰山河無隔礙光明處處通曰只如新年頭佛法還有者箇消息也無師曰樊噲踏鴻門都寺辦齋上堂雲門喫糊餅咬著帝釋鼻孔雲峯喫餺飥咬著憍梵鉢提舌頭諸人二時上堂喫粥喫飯合作麼生忽然咬破一箇鐵酸餡方知帝釋鼻孔即是憍梵鉢提舌頭憍梵鉢提舌頭即是帝釋鼻孔不見道一切智智清淨無二無二分無別無斷故喝一喝請頭首上堂善哉三下板知識盡來參既善知時節吾今不再三古人與麼道大似按牛頭喫草雲峯則不然善哉三下板收足上蒲團脊梁生鐵鑄透過祖師關一氣轉一大藏教背手拈却須彌山七處徵心無心可覓八還辨見無見可還夢入天宮猶未醒金雞啼上玉闌干行化歸上堂有佛處不得住無佛處急走過三千里外逢人不得錯舉趙州老人大似抱橋柱澡洗把放船山僧一出四十餘日有佛處與他錐破卦文無佛處也曾勘過歷了三州五縣逢人也曾錯舉來只是土曠人稀知音者少摘楊華摘楊華青山忽憶便歸去塵世要看還下來上堂性覺妙明本覺明妙截斷衲僧命根撥開向上一竅牛皮鞔露柱露柱啾啾叫凡耳聽不聞諸聖呵呵笑虗空𨁝跳舞三臺尉斗煎茶不同銚上堂麻三斤乾屎橛蠟人冰鵝護雪貓有歃血之功虎有起尸之德趙州親見老南泉臨濟未是白拈賊青苗會上堂常啼菩薩賣却心肝學般若則易破一微塵出大經卷則難破一微塵出大經卷則易攝大千經卷入一微塵則難一掬之水可以漲滔天之浪一簣之土可以成九仞之山也不易也不難青山長伴白雲間赴育王上堂拖犂拽耙幾經年鼻孔撩天不受穿業債依然逃不得又吹鐵笛過鄞州臘八上堂我觀大地衆生具有如來智慧德相但以妄想執著而不能證得釋迦老子與麼道大似蟭螟蟲向蚊子眼睫上作窠向十字街頭揚聲大叫道曠土人稀相逢者少簡點將來也是噇酒糟漢上堂舉僧問五祖一大藏教是箇切腳未審切甚麼字祖曰鉢囉娘應菴和尚問密菴如何是正法眼密曰破沙盆師曰閩蜀同風肚裏有蟲上堂不著佛求不著法求不著僧求燈籠發笑露柱點頭雲門拈出胡餅投子道箇油油腰纏十萬貫騎鶴上揚州上堂熏風自南來殿閣生微涼老妙喜錯認驢鞍轎作阿爺下頷帶纍多少人向者裏卜度還知諸佛出身處麼黃河三千年一度清卓拄杖下座上堂朝匆匆暮匆匆鉢盂開口只要噇空南泉打破鍋子甘贄禮拜蒸籠擊拂子萬里八九月一身西北風結夏小參琅琊點出五病西院商量兩錯井蛙不足以語東海夏蟲不可以語冰霜若是捎空俊鶻便合乘時止濼困魚徒勞激浪是故從上若佛若祖天下老和尚莫不向刀山劍樹上鑊湯爐炭中成等正覺拔濟有情若約山僧看來也是稱錘蘸酢喝一喝解夏上堂秋初夏末兄弟家東去西去如壯士展臂不假他力師子遊行不求伴侶蓋為人人腳跟下有條通天活路三世諸佛六代祖師天下老和尚與你把手共行豈不見雲門大師問洞山近離甚麼查渡夏在甚處湖南報慈幾時離彼八月二十五門曰放你三頓棒洞山次日上方丈問昨蒙和尚放三頓棒不知過在甚麼處門曰飯袋子江西湖南便恁麼去山於言下大悟雲門提出倚天長劍凜凜神鋒不易洞山敢將赤身衝他白刃正與麼時如何金烏破琉璃殼玉兔挨開碧海門昔汾陽有辨驗學人十條古林和尚擬十偈師從古林和之其辨正邪曰上門上戶數如麻來者須教驗正邪石火光中擒虎兕電光影裏辨龍蛇恐顢頇曰煩惱真如休儱侗無明佛性恐顢頇巨靈擡手無多子分破千重太華山巧辨不真曰八還辨見元非妄七處徵心錯認真惠我豈無三昧力阿難謾自説天倫得用全曰西河師子坐當門擬議教伊喪膽魂一陌紙錢并酒肉間神野鬼競頭奔擬將來曰荊山所得非良玉赤水求來不是珠索性一槌俱擊碎西天胡子沒髭鬚辨作家曰疾雷震地難回避赫日當空照大千劍客相逢無別事磨礲三尺古龍泉識機鋒曰德山棒下全生殺臨濟喝中分主賓擬議白雲千萬里藍田疑殺李將軍句內明真曰當陽突出囫圇句按下雲頭仔細參無足仙人劈胸踢無言童子口喃喃顯宗用曰宗説俱通體用全拋來栗棘與金圈看他吞透不得底空作楊岐直下孫贊師機曰白拈手段少人知板齒生毛老古錐臂膊幾曾從外曲倒拈禿帚畫蛾眉總頌曰衲僧須透祖師機大道堂堂達九衢十聖三賢明此旨森羅萬象轉靈樞奪將石像手中笏抉取驪龍頷下珠捉敗汾陽與浮佛禹門三級化龍魚至正間奉旨金山建水陸大會命師升座説法特降御香綵段晚年菴居榜曰松月自號松月翁杭州徑山南楚悅禪師隆興人上堂聞聲悟道見色明心驀拈拄杖者箇是色卓一下者箇是聲諸人總見總聞且道那箇是明底心那箇是悟底道喝一喝貪他一粒米失却半年糧敕諡佛慈法喜禪師雙林誾禪師法嗣杭州徑山月江宗淨禪師蘭溪倪氏子誦楞嚴至如標月指豁然有省參雙林正菴菴問黃檗打臨濟你作麼生會師曰按牛頭喫草後出世徑山臨示寂書偈曰祖師門下客開口論無生老我百不會日午打三更泊然而逝西白金禪師法嗣金陵保寧敏機覺慧禪師吳興人得法西白金公出世嘉禾之祥符復分座于天界尋主保寧宋文憲公濂嘗為師作沖默齋記時菴敷禪師法嗣杭州淨慈佛鑑簡菴希古師禪師嘉禾李氏子年十七依萬壽天宇淨公受業後宇住臨江西華師侍行室中因緣不契憤然走靈隱謁時菴菴問那裏來師曰江西菴曰曾見馬大師頂相否師曰千年桃核裏覓甚舊時仁菴頷之命居擇木寮後因狗子無佛性話有疑請益菴菴曰待冷泉逆流即向汝道忽一日有省詣方丈曰冷泉逆流也菴曰見什麼來師曰千峯勢倒嶽邊止萬派聲歸海上消菴喝曰脫空謾語漢三十年後落節去在師拂袖便出後住杭之崇福徙萬壽永樂中徵修大典師應詔事竣敕主淨慈宣德壬子忽語衆曰吾行矣命浴更衣書偈曰須彌一拳大海一口海竭山崩烏飛兔走危坐而寂天界曇禪師法嗣金陵靈谷定巖淨戒禪師吳興人參覺原於天界原舉桶篐𪹼因緣問之師擬議原厲聲曰早遲八刻了也師言下大悟洪武初詔住靈谷示衆舉長慶道總似今日老胡有望保福道總似今日老胡絶望師頌曰平展機籌不用誇抑揚元屬當行家曹溪波浪如相似那得兒孫若稻麻有續刻聯珠頌古行於叢林少師姚廣孝題師像贊曰以此見定巖指槐為柳不以此見定巖認辰作斗若然則何以見定巖也廓太虗而為量湛秋水以為神其於説也無説而説其於聞也無聞而聞行猶霜潔貌若春溫榮領非常之巨剎欽承莫大之鴻恩名無遠而弗屆德不孤而有鄰吁是誠可謂先龍翔欣大中之嫡孫也耶天界泐禪師法嗣明州天童佛朗湛然自性禪師雲陽韓氏子出家於溧陽泓溪慧照菴禮慧海智公為師一日海問父母未生前那箇是你本來面目自此懷疑蘊襟七年時與旌川草菴一幻生福友善切磨激發二公之力居多菴一日舉有句無句如藤倚樹話問師師擬議菴擘脊便打師憤然徹夜不睡天明忽聞敲火筯作聲豁然洞徹乃謂菴曰夜來公案今日要與汝決斷菴握拄杖問句歸何處語未絶師劈手奪却拗作兩橛攛向外曰別處燒徑入堂去臥幻聞特來問曰且喜性兄大事了畢也師喝曰賊不打貧兒家一日問菴祖意教意是同是別菴曰秋樹飄黃葉寒天掘地爐師曰我且不問他後謁天界全室室中舉似曰某昔年曾問一師友祖意教意是同是別他道秋樹飄黃葉寒天掘地爐今日請和尚決斷室曰病翁年來腕無力拄杖牀頭且靠壁師曰有人不肯和尚與麼道室拈拄杖打曰待他露柱眼自開鐵蒺藜槌當面擲師便禮拜後出世里之普光洪武十五年遷常州永慶公選住撫州疏山復被旨住持天童僧問牛過櫺頭角四蹄都過了因甚尾巴過不得師曰碗脫丘曰恁麼則昔時大慧今朝佛朗也師曰莫認六龍城作舅家曰的旨師分付回程事若何師曰急須吐却上堂一即三三即一是聖是凡分不出木人著錦衣石女風流急慣操沒絃琴能吹無孔笛深深海底行高高峯頂立露柱來稽首虗空齊應拍萬象側耳聽大家笑一擲且道笑箇什麼笑飯籮裏餓死人不肯自家開口喫饒你到三十三天本來飢苦爭消得卓拄杖曰吽吽便下座上堂今朝十月旦衲子修冬辦撥開爐焰火更莫問柴炭渴飲銅汁羹飢餐鐵釘飯大衆還知囊無繫蟻之絲廚乏聚蠅之糝麼到與麼地不可躲懶卓拄杖下座謝頭首上堂布毛才吹化現無邊華藏世界金槌在握縱擒一切諸佛如來撲碎茶甌遍地金聲玉振挈漏燈盞觸處耀古騰今兔角杖挑大千日月龜毛拂轉塵劫法輪還見佛國山𨁝跳撞破汝諸人鼻孔𭣟瞎汝諸人眼睛麼喝一喝春風夏雨應時來李白桃紅次第開上堂去年今日居楞伽山彼四衆喜此處少一人今年此日居佛國山此四衆喜彼處少一人擊拂子一身為無量身無量身為一身行則普天普地行坐則一切坐説甚麼東西南北他方此界檢點將來猶在化城且道寶所一句作麼生便下座上堂貪瞋癡戒定慧戒定慧貪瞋癡無明解脫知見解脫知見無明一切衆生諸佛諸佛一切衆生月落山無影風來樹有聲大千無對待露柱鬧縱橫喝一喝下座上堂今朝十月初一衲子備炭開爐汝善知時識節吾不者也之乎生佛已前茅草令清風自在滿皇都一日有一峯寧和尚會下數僧到師問汝等是一峯和尚弟子否僧曰是師曰借問汝家事得麼曰得師曰錯復問峽富山前三草二木晝夜作師子吼是一峯語否曰是師復曰錯僧無語師曰汝等何得五戒也不持晚年退歸普光淨慈德禪師法嗣杭州靈隱無文本褧禪師四明定海人姓謝氏年十四出家於郡之五臺寺剃染受具嚴習毗尼聞孤峯旺化保寧往叩一日峯問曰聞汝和梁山十牛頌試舉看師擬對峯遽掩其口曰牛在甚麼處師曰已犯和尚苗稼了也峯曰未在更道師掩耳而出峯異之命為侍者時仲芳倫公退居寺右新菴師往來決擇至正二十六年開法姑蘇覺嚴一瓣為孤峯嗣洪武中宜興靜樂院請師易講為禪未幾詔徙蔣山禪寺于孝陵之東賜額靈谷敕物外仲羲禪師住持命師居第一座為衆表率洪武二十八年補靈隱居五載一日示微疾蒙室範堂洪候問值師氣喘洪曰趙州道諸人被十二時辰使老僧使得十二時辰和尚作麼生師竦身曰喚甚麼作十二時辰洪曰爭奈氣急乎師震聲一喝問左右今朝是幾曰二月二十七日乃索筆書偈曰吾年七十有五涅槃生死不墮虗空背上翻身靠倒飛來小朵擲筆泊然而化闍維頂骨不壞舍利無算門人宗衍等斂諸不壞塔于雙桂菴分爪髮瘞于靜樂止嚴成禪師法嗣衢州烏石傑峯世愚禪師郡之西安余氏子自幼好禮佛塔弱冠棄家投蘭溪顯教寺剃染受具足戒謁古崖石門斷崖中峯諸大老佩受法訓棲止南屏三年不踰戶限時止巖成倡道大慈師復往謁巖舉南泉不是心不是佛不是物是甚麼師茫然於是仍返南屏一夕聞鄰僧誦證道歌至不除妄想不求真豁然如釋重負乃曰佛法元在目前人自遠之耳即述偈曰時時覿面不相逢喫盡娘生氣力窮夜半忽然忘月指虗空迸出日輪紅走見止巖巖才見便喝曰何處見神見鬼來師曰今日捉了賊也巖曰贓在何處師便喝巖曰開口合口都不是向上道將一句來師曰遍界明明不覆藏巖拈竹篦師便掀倒禪牀巖曰敢來者裏捋虎鬚連打三下因命為侍者後出世里之烏石遷廣德石溪開堂日僧問遠離烏石嶺來赴石溪山開示人天路如何透祖關師曰龍生金鳳子衝破碧琉璃曰與麼則覿面不相識千里可同風師曰重疊關山路曰達磨西來不立文字直指人心見性成佛既然不立文字何得流傳至今師曰官不容針私通車馬曰直指人心指那箇心師曰開口不在舌頭上曰見性成佛性在甚麼處師曰太湖三萬六千頃夜夜波心月色明曰記得傅大士道空手把鋤頭步行騎水牛人從橘上過橋流水不流此意如何師曰切忌當面蹉過曰與麼則有意氣時添意氣不風流處也風流師曰毫𨤲有差天地懸隔曰此事且止記得經中道大富長者即是如來為復是纍劫中來為復是今生契證師曰澗深華落遠山高樹影長曰今日直心居士捐捨家資營建石溪道場請和尚居住是同耶是別耶師曰師子吼時草紅緑象王行處百華紅曰既然如是得何果報師曰生生歸佛地世世樂人天上堂大道無形離名絶相不勞修證豈涉言詮一千七百祖師關仔細看來只者是依他作解障自悟門若欲掃去葛藤截斷露布直須向黃面老子方欲拈華之際金色頭陀未曾微笑之時便與掀倒禪牀喝散大衆免使後代兒孫行棒行喝豎指擎拳現出萬種形儀千般伎倆山僧今日更不指東畫西直截與諸人通箇消息良久曰天高羣象正海闊百川朝洪武三年十二月示微疾書偈曰生本不生滅本不滅撒手便行一天明月擲筆而逝天寶樞禪師法嗣杭州淨慈逆川智順禪師溫之瑞安陳氏子母奉智者大師像甚謹一夕夢僧項有圓光遡江流而上曰我當為汝子寤而有娠師生而美質宿成翛然有塵外志年七歲從仲父沙門慧光于崇興精舍及長受具遍歷義海忽棄去入閩參天寶鐵關求依住關叱曰丈夫漢不于大叢林相頡頏乃思局此耶抽身便入師下旦過悲泣關聞乃命參堂師由是壁立萬仞晝夜不辨踰月因如廁覩中園匏瓜觸發頓覺大地平沉見關求證關曰此才入門耳向上一著則千里萬里又踰半載一日忽厲聲告關曰南泉敗闕今已見矣關曰不是心不是佛不是物是甚麼師曰地上甎鋪屋上瓦覆關曰南泉即今在甚麼處師曰子過新羅關曰錯師亦曰錯關曰錯錯師禮拜而退俾典藏鑰尋命分座説法關趨寂師繼領院事未幾棄去過杉關抵百丈上迦葉峯渡江入淮禮諸祖塔由建業回浙旋返永嘉開報恩于瑞安遷主江心復開歸原于平陽朝廷賜院額及金襴袈裟號佛性圓辨禪師平章燕只不花鎮閩請住東禪雪峯洪武初詔徵有道高僧十人于鍾山建會師應詔命升座説法上幸臨慰勞備至南還升主淨慈六年復召入京俄示微疾沐浴説偈坐逝縉雲真禪師法嗣五臺山壁峯寶金禪師乾州永壽人族姓石為邑名胄父母崇善有桑門授以觀音像未幾生師誕時白光盈室父母異之甫六歲即命出家剃染後遍歷講肆忽嘆曰三藏之學皆標月指耳遂更衣謁如海真公于縉雲晝夜精勤偶攜筐擷蔬忽凝坐不動歷三時方寤真曰入定耶師曰然真曰何所見師曰有所悟真曰悟處如何師舉筐示之真曰不是師置筐于地拱手而立真又曰不是師便喝真攔胸擒住曰道道師揑拳便築真曰未在此塵勞暫息耳必使心路絶祖關透然後大法可明師由是脅不沾席者三年一日聞伐木聲汗下如雨乃曰古人道大悟一十八遍小悟無數豈欺我哉未生前事今日方知亟見真求證真不諾師掀倒禪牀而出翌日復見真真于地上畫一圓相師以袖拂去真復畫一圓相師于圓相中畫一畫又拂去真再畫一圓相師于圓相中畫十字又拂去真復畫如前師于十字隅作卍字又拂去真總畫三十圓相師一一具答真大笑曰參學悟者世豈無之能明大機用寧復幾人遂授記莂命往朔方道當大行先是師嘗於定中見一山秀麗重樓傑閣金碧絢爛諸菩薩行道其中有招師者曰此祕魔巖也爾修道其中何遽忘之後師遊臺山道逢蓬首女子身被五彩斃衣赤足徐行一黑獒隨後師問何之答曰入山師曰入山何為答曰一切不為言訖而沒叩同行者皆不見或謂文殊化身云師因就山建靈鷲菴以待方來僧俗聞風千里趨赴常至萬指至正間召入內廷值大雪夜有紅光自師室中直透霄漢上驚嘆賜金襴伽黎明年禱雨輒應敕賜寂照圓明大禪師號詔住海印寺洪武初高皇帝即位明年燕都平詔師至京住大天界寺問法稱旨辛亥設普濟會于鍾山命師涖其事賜伊蒲饌上親幸臨御翰賜詩寵賚優渥壬子六月沐浴更衣集衆言別弟子請偈師曰三藏十二部尚為故紙吾言何為端坐遂瞑目世壽六十五僧臘五十茶毗舍利成五色齒舌皆不壞
