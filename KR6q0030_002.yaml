body:
  text: 明嗣祖沙門東吳通問編定笠澤居士華亭施沛彚集臨濟宗大鑑下第十九世天童傑禪師法嗣夔州臥龍破菴祖先禪師廣安王氏子從德山涓公祝髮尋受具遍叩諸方抵蘇之萬壽值雪夜坐自念行腳數年未得安穩正悶悶不已忽聞鐘動趨後架舉首見照堂二字疑情頓釋既而見水菴一於雙林水曰師子尊者被罽賓斬却頭且置你道西天胡子為什麼無鬚師曰非雙林不舉此話水曰作家禪客師曰心不負人面無慚色水遂以手拓開師曰勘破了也逮水菴謝事往參密菴於烏巨命典客一日室中菴舉不是風動不是幡動師豁然大悟次日菴遇師於寮前謂師曰你總不得作伎倆試露箇消息來師應聲曰方丈裏有客菴呵呵大笑洎菴遷蔣山師侍行親炙凡五載盡其旨要辭還蜀菴送以偈曰萬里南來川藞䕢奔流度刃叩玄關頂門𭣟瞎金剛眼去住還同珠走盤師至夔州尚書楊公輔以臥龍請師出世未幾棄去復遊吳中首衆於徑山靈隱後住常州薦福真州靈嵓蘇州秀峯穹窿湖州資福最後約齊張公鎡請師於慧雲開山凡六坐道場師首衆靈隱時有道者請益胡孫子捉不住願垂開示師曰用捉他作什麼如風吹水自然成紋時無準侍傍大悟上堂楊岐乍住屋壁疏滿牀盡撒雪珍珠縮却項暗嗟吁翻憶古人樹下居師曰楊岐鬬勝不鬬劣秀峯鬬劣不鬬勝秀峯乍住沒親踈箇箇盡懷滄海珠滿眼湖山看不足釋迦彌勒是他奴上堂舉密菴先師道有問冬來事京師出大黃貪他一粒米失却半年糧秀峯則不然有問冬來事京師出大黃只圖一粒米却得百年糧或被知事道長老長老莫道百年糧只得半年不少也得只向他道但辦肯心決不相賺上堂舉東山和尚道如何是禪閻浮樹在海南邊近則不離方寸遠則十萬八千畢竟如何禪禪師曰穹窿也有箇道處如何是禪閻浮樹在海南邊撐天拄地拄地撐天巧說不得只要心傳畢竟如何禪禪上堂不是心不是佛不是物山僧忍俊不禁為諸人作箇撇脫拈拄杖卓一下流水暗消溪畔石勸人除却是非難上堂十五日已前明似鏡十五日已後黑似漆正當十五日又且如何鶯遷喬木頻頻語蝶戀芳叢對對飛有示座主偈曰見猶離見非真見還盡八還無可還木落秋空山骨露不知誰識老瞿曇師將示寂作手書別交游復書偈曰末後一句已成忉怛寫出人前千錯萬錯書訖端坐而逝實嘉定四年六月九日也時客寓徑山遺命散骨林間住持石橋建塔於別峯塔之右瘞之壽七十六臘四十九杭州靈隱松源崇嶽禪師處州龍泉吳氏子自幼卓犖不凡早歲慕出世法年二十三棄家首造靈石妙繼見大慧杲於徑山慧升堂稱蔣山應菴為人徑捷師聞之不待旦而行既至入室朝夕咨請一日菴問世尊有密語迦葉不覆藏汝作麼生師曰鈍置和尚菴厲聲一喝師有省菴大喜以為法器說偈勸使祝髮隆興初得度於臨安白蓮精舍自是遍參諸大老罕當其意者乃入閩見木菴永一目辭永永舉有句無句如藤倚樹師曰裂破永曰琅瑘道好一堆爛柴聻師曰矢上加尖永曰吾兄下語老僧不能過其如未在他日拂柄在手為人不得驗人不得師曰為人者使博地凡夫一超入聖域固難矣驗人者打向面前過不待開口已知渠骨髓何難之有永舉手曰明明向汝道開口不在舌頭上後當自知逾年見密菴於衢之西山隨問即答密菴微笑而已師切於究竟至忘寢食密菴移蔣山華藏徑山師皆從之一日密菴挂牌為衆入室次問僧不是心不是佛不是物師侍側豁然大悟乃曰今日方會木菴和尚道開口不在舌頭上自是機辨縱橫密菴遷靈隱師遂分座旋出世於平江澄照徙江陰之光孝無為之冶父饒之薦福明之香山平江之虎丘慶元三年靈隱虗席被旨補處上堂大凡扶豎宗乘須具頂門正眼懸肘後靈符只如保壽開堂三聖推出一僧保壽便打三聖道與麼為人瞎却鎮州一城人眼去在保壽擲下拄杖便歸方丈二尊宿等閒一挨一拶便乃發明臨濟心髓殊不知性命總在者僧手裏還有檢點得出者麼昔年覓火和煙得今日擔泉帶月歸歲旦示衆元正改旦萬事成現有時放行有時坐斷不惜兩莖眉和坐盤掇轉佛法世法都盧一片既是佛法世法如何得成一片但辦肯心必不相賺示衆古者道拈起也天回地轉放下也草偃風行冶父則不然拈起也乾坤黯黑放下也瓦礫生光忽有一箇半箇驀然𭣟瞎頂門達磨一宗未至寂寥在示衆舉臨濟大師如蒿枝拂公案雪竇拈曰臨濟放處太危收來太速師拈拄杖曰臨濟據令而行不知孤負黃檗雪竇盡力擔荷也只見得一邊且道薦福節文在甚麼處擲下拄杖示衆舉汾陽曰識得拄杖子行腳事畢師曰汾陽雖則開口見瞻爭奈落在第二頭驀拈拄杖曰者箇不得喚作拄杖子漆桶參上堂舉保寧勇和尚曰大方無外大圓無內無內無外聖凡普會瓦礫生光須彌粉碎無量法門百千三昧拈拄杖曰總向者裏會去蘇盧蘇盧悉利悉利師曰大小保寧業識茫茫不奈船何打破戽斗示衆明眼衲僧因甚打失鼻孔有贓無贓僧問如何是一同一質師曰裂破曰如何是二同大事師曰一毛頭上定乾坤曰如何是三總同參師曰蝦蟇蚯蚓跛鱉盲龜曰如何是四同真智師曰一不成二不是曰如何是五同遍普師曰大地撮來無寸土曰如何是六同具足師曰猶缺一著曰如何是七同得失師曰入泥入水曰如何是八同生殺師曰自救不了曰如何是九同音吼師曰八角磨盤空裏走曰如何是十同得入師曰寒山逢拾得曰與什麼人同得入師曰胡張三黑李四曰與誰同音吼師曰狸奴白牯曰作麼生同生殺師曰德山棒臨濟喝曰甚麼物同得失師曰草裏輥曰阿那箇同具足師曰信手拈來著著親曰是甚麼同遍普師曰針鋒影裏騎大鵬等閒挨落天邊月曰何人同真智師曰黑山鬼窟曰孰與總同參師曰燈籠入露柱曰那箇同大事師曰嘉州大象陝府鐵牛曰何物同一質師曰碗脫丘居靈隱六年法道益盛得法者衆忽退居東菴示微疾作手書別諸公卿且垂二語以驗來學曰有力量人因甚擡腳不起開口不在舌頭上及遺書嗣法香山光睦雲居善開囑以珍重大法復書偈曰來無所來去無所去瞥轉玄關佛祖罔措跏趺而寂實嘉泰二年八月四日也得年七十有一坐夏四十奉全身塔于北高峯之原待制陸游放翁銘其塔饒州薦福曹源道生禪師南劍人分座雲居出世妙果徙龜峯上堂佛法二字人人知有狼毒砒霜如何下口直饒透過威音前也是癡狂外邊走山僧已是拖泥帶水諸人合作麼生喝一喝上堂今朝八月十五天色半晴半雨幾多門外遊人不覩月圓當戶也好笑又堪嗟爭似西湖寺裏一隊古佛參退歸堂喫茶上堂春風東扇西扇春雨似晴不晴淺碧深紅爛鋪錦繡鶯啼燕語互奏笙簧一一揭示圓通妙門頭頭流通正法眼藏擬心湊泊依前萬水千山直下知歸便見七穿八穴上堂雨雪落紛紛簷頭水滴滴良哉觀世音草裏跳不出也大屈水底烏龜鑽鐵壁咄上堂月生一拶倒銀山并鐵壁月生二土宿騎牛穿鬧市月生三屋頭幽鳥語喃喃不是葛藤露布亦非入理深談正恁麼時賓主交參一句作麼生道萬仞懸崖垂隻手百華叢裏現優曇上堂平旦清晨三月朝南山蒼翠插雲霄不須更覓西來意門外數聲婆餅焦拍膝一下曰好大哥詠靈雲石偈曰雲去雲來非有意雲來雲去亦無心有無截斷靈何在突兀一峯青到今後住薦福逾月示寂明州天童枯禪自鏡禪師福州高氏子首參木菴永水菴一或菴體諸尊宿後謁密菴於靈隱針芥相契開法隆興上藍遷建康旌忠撫州白楊福州太平西禪寶慶元年被旨升靈隱復移天童上堂有句無句如藤倚樹樹倒藤枯句歸何處良久曰長憶江南三月裏鷓鴣啼處百華香上堂一拽石二搬土夜半日輪正卓午老安曾牧溈山牛南泉不打鹽官鼓報君知莫莽鹵火裏蝍蟟吞却虎上堂舉鶴林因僧扣門林曰阿誰僧曰行腳僧林曰非但行腳僧我者裏佛來也不著僧曰因甚佛來也不著林曰無他棲泊處師曰天童則不然若有人扣門即大開了待他入來便攔𮌎搊住曰道道若擬開口便與劈𮌎一拳若向者裏轉得身吐得氣便請明下安排作上鐘偈曰一模脫就轉風流平地教他不肯休要得洪音喧宇宙直須更上一層樓杭州淨慈潛菴慧光禪師上堂舉趙州因僧問狗子還有佛性也無州曰無頌曰狗子無佛性全提摩竭令才擬犯鋒鋩喪却窮性命化鹽偈合水和泥一處烹水乾泥盡雪華生乘時索起遼天價公驗分明孰敢爭太平府隱靜萬菴致柔禪師潮州陳氏子母黃妙喜南遷道經於潮師祖父暹延禮甚謹其母夢僧入舍遂懷妊及誕父母誓不以俗纍師甫十歲俾從壽公受業越九載芟染初見木菴永染指後參密菴於蔣山一日入室次菴舉釋迦彌勒猶是他奴且道他是阿誰師曰無地頭漢菴曰千聞不如一見師便毆一拳菴擒住勵聲曰者小鬼子見箇什麼胡打亂打師曰更要喫一拳在菴連揮兩拳曰打者無地頭漢師豁然大悟無何以母老歸省郡將吏部朱公江請師於廣法出世後移太平隱靜上堂起道樹詣鹿苑不是向上機傳少室續曹溪未為性燥漢直得無依無欲無一法當情猶落第二見放過一著卷舒在我縱奪臨時於把住處放行露柱燈籠活鱍鱍於放行處把住釋迦彌勒是他奴卓拄杖且道是放行耶是把住耶一氣不言含有象萬靈何處謝無私上堂舉天衣懷禪師鴈過長空影沉寒水話頌曰長空孤鴈一聲秋獻寶波斯鼻似鉤風捲白雲歸別嶂黃昏月挂柳梢頭上堂毗盧師法身主若要動地放光且來搬柴運土嗄將謂忘却上堂百丈不再參馬祖爭得三日耳聾臨濟不到大愚焉知老婆心切仰山將得鎮海明珠為甚到東寺面前叉手當胸却道無理可伸無言可對咄直饒傾下一栲栳敢保老兄猶未徹上堂饑荒老鼠咬葫蘆巧計胡孫倒上樹要透報恩向上關直須一步低一步既是向上關因甚却要一步低一步待你踏著却向你道上堂東山和尚道空門有路人皆到到者方知旨趣長心地不生閒草木自然身放白毫光師曰東山只解無中覓有不解有裏尋無隱靜則不然空門有路人皆到到者方知礙處通石上栽華還結果到頭元不假春風師臨終集衆囑曰老僧生平無長物只依海衆常例安寢堂兩日足矣復書偈端坐而化越三日寺衆悟遺言若有旨也世壽七十臘五十二杭州靈隱笑菴了悟禪師姑蘇人上堂舉睦州因僧問以一重去一重即不問不以一重去一重時如何州曰昨日栽茄子今日種東瓜頌曰昨日栽茄子今日種東瓜一聲河滿子和月落誰家金陵蔣山一翁慶如禪師姓范氏福州長樂人上堂春雨如膏春雲似鶴春鳥關關春泉濯濯揭開觀音腦蓋踢倒慈氏樓閣切莫將錯就錯拍禪牀曰參上堂過去諸如來斯門已成就一盲引衆盲現在諸菩薩今各入圓明蝦跳不出斗未來修學人當依如是法賺殺一船人上堂意能剗句句能剗意意句交馳討甚巴鼻盡力道不得底句不是河南便是河北衲僧聞得與麼告報十箇有五雙鼻孔裏冷笑拈拄杖雲居拄杖子黨理不黨親卓一下雪巢初冷夜雲𩯭未梳時上堂霜明萬壑月皎千家達磨不會却返流沙拍膝一下曰好大哥歸堂喫茶上堂天地造化有陰有陽有晦有朔聖人治世有禮有樂有刑有政衲僧門下有殺有活有擒有縱其擒也縱也殺也活也總在黃龍指甲縫裏汝若擬議不消一掐然雖如是笑我者多哂我者少上堂一句截流萬機寢削且道是那一句良久卓拄杖曰歸堂喫茶上堂久雨忽晴天清地寧雲收嶽面月落波心拈拄杖卓一下恁麼會去達磨一宗掃土而盡上堂諸佛不出世人人舉足踏著祖師不西來人人滿口道著既踏著又道著畢竟是箇什麼有般漢東西不辨南北不分便道明明不覆藏切忌從他覓殊不知拋却真金隨羣撒土上堂豁開戶牗當軒無人撾動雷門憑誰側耳裴相國印心於老黃檗溫伯雪目擊於魯仲尼衲僧門下檢點將來猶在半途知縣學士今日到來雲居如何與伊相見拈拄杖畫一畫萬重關鎖盡一劍倚天寒𣆶年退隱南昌西山示寂塔於定林壽六十八夏四十九蘇州承天鐵鞭允韶禪師上堂一五二五機輪無阻南山起雲北山下雨有底却道錦上鋪華有底又道泥裏洗土有底又道離此二途便見丹霄獨步若總如斯論量山僧未敢相許畢竟如何良久曰逢人不得錯舉師住泉州光孝判府請開堂祝聖白槌畢師乃曰喚什麼作第一義莫有旁不甘者麼出來道看時有僧出問話語未竟師拈拄杖卓一卓曰住住今日開堂不比尋常佛事設問答到彌勒下生勾鎖連環盛水不漏也祇是空鼓粥飯氣於自己了沒交涉所以道問不在答處答不在問處問答交馳如青天轟霹靂看者不容眨眼那堪更向言中定旨句下明宗大似緣木求魚守株待兔殊不知我宗無語句亦無一法與人者裏徹去皇恩佛恩一時報畢其或未然更為錦上鋪華復卓拄杖一下下座佛涅槃日上堂老漢當年臘月八三更半夜顛狂發剛把長釘釘眼睛直至如今未能山僧今日下毒手為他一看便下座真祕閣學士張鎡居士字功甫別號約齊聞鐘聲悟道述偈曰鐘一擊耳根塞赤肉團邊去箇賊有人問我解何宗舜若多神面目黑後捨宅建寺曰慧雲請破菴先禪師開山疏曰捨林居為阿蘭若夫豈小緣請宗師據曲彔牀只因大事幾度遍參遭密菴打失鼻孔一朝拈出向冷泉捋下面皮不謂馨香奚煩鄭重辭青松於北㵎穿幾重出岫之雲對緑水於南湖祝萬歲如山之壽嘉定五年公復請滅翁文禮禪師相繼闡法今有專祠于慧雲青原禋禪師法嗣吉州青原淨居正菴宗廣禪師僧問不在內不在外不在中間且道在什麼處師曰逢人不得錯舉僧曰還有請益分也無師曰弄巧成拙僧禮拜師曰却較些子上堂父子相繼住此山叢林軌則沒多般主賓色色皆仍舊驀召大衆且道仍舊後如何一炷清香盡日閒下座上堂不用愛聖聖是假名不用厭凡凡是妄立但得聖凡情盡自然物我雙忘正恁麼時憑誰委悉石女穿針山色秀木人牽線海雲生鼓山永禪師法嗣杭州淨慈晦翁悟明禪師福州人上堂舉夾山會下一僧到高亭才禮拜亭便打僧曰特來禮拜師何打又拜亭又打趂出僧回舉似夾山山曰會麼曰不會山曰賴汝不會汝若會即夾山口啞去應菴和尚曰高亭一期忍俊不禁爭奈拄杖放行太速者僧當時若是箇漢莫道高亭夾山便是達磨大師出來也斬為三段何故家肥生孝子國霸有謀臣師曰高亭夾山門庭施設各得其宜但中間一人較些子應菴和尚與麼道也是鞏縣茶瓶師嘗纂修聯燈會要傳于叢林靈隱善禪師法嗣杭州徑山藏叟善珍禪師泉州南安呂氏子年十三依郡之崇福寺南和尚受業落䰂十六遊方至杭受具足戒謁妙峯于靈隱入室悟旨後出世住里之光孝升承天次遷安吉之思溪圓覺福之雪峯復以朝命移四明育王臨安徑山示衆古者道知之一字衆妙之門又有道知之一字衆禍之門只者二門入得更須出得三世諸佛出不得六代祖師出不得天下老和尚出不得何故變鐵成金易變金成鐵難據室者裏是問訊燒香了來老僧身邊立地底所在麼呆子你自鈍置猶可莫來鈍置老僧上堂盡大地是紫磨金色身諸人每日開眼覷見釋迦老子心肝舉步踏著釋迦老子鼻孔說有說無是誑說生說滅是謗說即心非心是妄不誑不謗不妄春風吹落桃李華淡煙疏雨籠青嶂上堂春雪寒春宵短古佛心破燈盞正法眼乾紙撚抖擻精神只管看看到北斗西移南斗東轉上元依舊正月半上堂靈雲見桃華悟去玄沙道敢保老兄未徹香嚴聞擊竹悟去仰山道祖師禪未會禪和家十箇五雙道我此一門全無肯路與麼亦未知玄沙仰山舌頭落處在要見二大老麼醉我落華天借他管絃裏除夕小參舉僧問古德年窮歲盡時如何德曰依舊孟春猶寒師曰古德恁麼答話只恐諸人忘却今日忽有人問年窮歲盡時如何拈棒便打待他道因甚麼打某甲即向他道你更要我道孟春猶寒那嘗自題其像曰參禪無悟識字有數眼三角似燕山愁胡面百摺如趙婆呷酢一著高出諸方敢道飯是米做送忍書記偈曰𩯭絲不可織寒衣煮字那能療得饑別欲與君安樂法正忙却未有閒時師生於紹興甲寅十月十二日示寂於嘉定丁丑五月二十一日壽八十三葬全身于南塔院杭州淨慈東叟仲穎禪師上堂切忌隨他覓無勞向己求縱橫活鱍鱍有放還有收是甚麼一葉落天下秋上堂迷生寂亂悟無好惡奉化縣裏契此翁凸箇肚矮雙足拖箇布袋十字街頭憨憨癡癡落落魄魄何似老龍牙手裏把柄破木杓上堂拈拂子畫一畫曰伏羲發天地之祕未明者消息又點三點瞿曇示圓伊之形未明者消息者消息如何辨的不見道冬至乃書雲物擊拂子上堂上不在天下不在地中不在人喝一喝且道者一喝落在甚麼處若也知得也有賓也有主也有照也有用若也不知參退巡堂喫茶上堂撾動鼓衆斯聚耳同聞目同覩超乾坤越今古夫何故五月五是端午上堂行者行坐者坐左之右之無可不可甘露園中蒺藜黃檗樹頭蜜果才與麼不與麼不與麼却與麼善賈之家不停滯貨吉州龍濟友雲宗鍪禪師廬陵王氏子幼喜趺坐年十二從海室淙禪師出家十九剃髮受具二十二參方首謁妙峯值佛涅槃日峯上堂拈拄杖曰釋迦老子來也諸人還見麼微妙淨法身具相三十二放下拄杖曰見你諸人不會入涅槃去也師于言下豁然契悟尋登吉水之東山佛頂得修山主故址木食㵎飲影不出山嘗自咏曰山僧有分住煙蘿無米無錢莫管他水似琉璃山似玉眼前儘有許來多後峯以法衣竹篦并自題肖像寄師曰妙峯孤頂草離離橫按竹篦三尺鐵只許佛頂龍濟知父子不傳真祕訣師嘗門榜以示來學曰除却眼耳鼻舌身意那箇是你自己若也道得許你親見龍濟來其或未然且居門外雪巖嘗叩問曰和尚曾接得幾人師曰山僧從來不會按牛頭喫草歲暮僧問臘月三十日到來時如何師曰門前無索債人至元丁亥七月二十七日忽示疾集衆囑後事彈指一聲曰只此是別衆語也衆請偈師不答將二鼓復索筆書曰一燈在望更無言說大地平沉虛空迸裂書畢泊然而寂世壽八十臘六十一全身塔于峯顛北澗簡禪師法嗣明州育王物初大觀禪師鄞縣橫溪陸氏子參北澗于淨慈悟旨命典文翰後住育王上堂一冬二冬你儂我儂暗中偷笑當面脫空雖是尋常茶飯誰知米裏有蟲夜來好風吹折門前一株松上堂用黑豆法換人眼睛如恆河沙會火爐頭話能有幾箇九九九三世諸佛不知有翻身踢倒五須彌何用法身藏北斗藏北斗分明向外揚家醜上堂達磨正宗衲僧巴鼻充塞虛空無處回避堪笑迷流白日青天開却眼只管瞌睡更有黃面老人不識好惡入泥入水却道我於然燈佛所無一法可得而為我授記何異好肉剜瘡空華求蒂畢竟如何悉唎悉唎既順世塔于寺如西菴徑山琰禪師法嗣杭州徑山偃溪廣聞禪師侯官林氏子母陳世業儒疏眉秀目哆口豐從季父沙門智隆於宛陵光孝十八得度受具初見鐵牛印少室睦無際派諸老後參浙翁於天童針芥雖投自知未穩及再參於雙徑翁笑而問曰汝來耶一夕坐簷間聞更三轉入堂曳履而蹶如夢忽醒翌朝造室翁舉趙州洗盂話師將啓吻翁遽以拳止之疑情當下冰釋紹定戊子四明制閫胡公以小淨慈致之歷住香山萬壽雪竇育王淨慈靈隱徑塢八山開爐上堂舉趙州示衆曰老僧三十年前在南方火爐頭有箇無賓主話直至如今無人舉著師曰森羅萬象明暗色空日夜舉揚趙州古佛不是不知只為貪程太速上堂楊岐眼裏睛臨濟頂中髓一不成二不是點著不來白雲萬里佛成道上堂錯錯六載草繩空自縛了了開得眼來天大曉古今天地古今日月古今星辰拍膝一下曰劍去久矣切忌刻舟上堂雲門放洞山三頓棒嚼飯餧嬰兒黃檗打臨濟三頓棒按牛頭喫草只今不犯絲毫有箇方便良久曰大事為你不得小事自家擔當上堂非風幡動仁者心動浣盆浣盆非風鈴鳴我心鳴耳漆桶漆桶盡古往今來和泥脫墼有什麼限還知萬壽落處麼劫石有銷日虛空無盡時上堂十字街頭石幢子無你遮護處一聲江上侍郎來無你回避處衲僧家朝出暮入腳前腳後也須仔細忽然築著磕著淨慈拄杖別有分付上堂一升三合拄杖頭邊萬水千山草鞋跟底未言先領誰家竈裏無煙撩起便行是處井中有水莫道空來又空去許多途路不相孤上堂一句絶離微囫圇無縫罅善財七日尋覓不得趙州五年分疏不下靈山今日快便難逢為通一線六月賣松風人間恐無價上堂繞禪牀一匝揮香案一下轉藏已竟講經已竟若具看經眼目方知落處其或未然依經解義三世佛冤離經一字還同魔說上堂趙州喫茶去金牛喫飯來龍門多上客有人續得末後句許你入阿字法門景定四年六月十四日示寂世壽七十五僧臘五十八杭州靈隱大川普濟禪師明州奉化人上堂舉睦州和尚因僧問如何是祖師西來意州曰一隊衲僧來一隊衲僧去頌曰一隊衲僧來一隊衲僧去打破睦州關大地無寸土題世尊出山相龍章鳳質出王宮肘露衣穿下雪峯智願必空諸有界不知諸有幾時空送僧偈曰雲遮劍閣三千里水隔瞿塘十二峯抖擻屎腸都說了莫教錯認甕為鐘蜘蛛頌曰一絲挂得虛空住百億絲頭殺氣生上下四圍羅織了待無漏網話方行師嘗纂修五燈會元杭州徑山淮海原肇禪師通州靜海潘氏子母陳幼從邑之利和寺妙觀出家年十九剃染受具參浙翁於徑山翁問汝何處人師曰淮東翁曰泗洲大聖為什麼在揚州出現師曰今日又在杭州撞著翁曰且喜沒交涉師徐曰自遠趨風翁以師警敏欲大激發未許參堂才見便曰下一轉語來擬開口即喝出師以書上又以頌呈末句曰空教回首望長安翁曰者裏是什麼所在師曰謝和尚挂搭於是密就入室之列命掌記室翁既示寂師出世里之光孝遷吳城雙塔金陵清涼天台萬年蘇之萬壽永嘉江心而四明育王虗席廟堂奏師補處復遷杭之淨慈靈隱徑山其住徑山值歉餘逋券山積僧殘屋老未幾樓閣矗霄雲衲踵至不減浙翁全盛氣象俄示疾囑其徒曰為吾祔一穴于東㵎見生死不忘奉師之意六月初十日浴訖書偈而逝嘗讚達磨像曰踏翻地軸與天關合國人追不再還去去一身輕似葉長江千古浪如山婺州雙林介石朋禪師上堂舉明招謙禪師一日天寒上堂衆才集招曰風頭稍硬且歸暖處商量便歸方丈衆隨至立定招曰才到暖室便見瞌睡以拄杖一時趂下頌曰稍硬風頭早已乖更將暖處自沉埋反令千古成踪跡枉喫羅山白飯來因見郁山主畫像旁僧索讚師信筆書曰拾得明珠笑眼開為言塵淨轉生埃若無直下承當者孤負闍黎一撲來佛成道日示衆曰六載將身草裏埋當時有眼幾曾開果然見得明星現未到門庭冷似灰明州天童辨山阡禪師舉李大夫翱參藥山因緣頌曰貴耳而賤目背手抽金鏃仰面看青天箭過新羅國送僧歸鄉偈曰奮志南方問正因正因一字不曾聞七零八落袈裟角惹得陵霄幾片雲讚觀音大士偈曰螺髻屈蟠春島碧緑衣零亂曉雲寒尋聲只麼隨流去說甚真觀清淨觀蘇州虎丘枯樁曇禪師上堂舉大梅常禪師問馬祖如何是佛祖曰即心是佛師曰要知馬祖落處麼水向石邊流出冷風從華裏過來香龍溪文禪師示衆無相無形本寂寥擬擡眸處轉迢遙蒲團靜倚無餘事外一聲婆餅焦蘇州虎丘東山道源禪師福建連江黃氏子肄業郡之白雲游歷兩浙見知識二十餘員末後到蔣山見浙翁室中舉即心即佛話有省出世奉化清涼遷蘇州虎丘上堂拈拄杖曰德山棒臨濟喝總是用過了底閒家潑具且道虎丘將什麼為人卓拄杖不假鉗鎚烹佛祖慣將折筯攪滄溟擲拄杖下座頌蜆子和尚紙錢堆裏可憐生臭口才開便葛藤蕩盡鬼家窮活計至今古廟絶人行建安徐直翁帥三山以雪峯起師至建寧先孝寺遺偈而化淳祐九年九月二十九日也壽五十九明州大慈芝嵒慧洪禪師越州新昌人姓朱誕時母夢前石佛高禪師入臥內寤而生師年十六從石佛淨因剃染謁徑山浙翁翁問曰汝何處人師曰越州翁曰近離甚處師曰淨慈翁曰如何是行腳事師擬議翁色莊曰汝前來答我一一分曉問著行腳事則茫然為何所礙師曰今日來見和尚翁曰念汝新到參堂去翁遷天童師再參室中舉不是心不是佛不是物師曰黃龍行處草不生翁曰且喜沒交涉師曰入水見長人翁便喝後應丞相忠獻越王之命出世崇報上堂住山懶慢百事無成教為剩語禪亦強名擊拂子曰夜來春睡重一覺到天明住石佛上堂紅塵堆裏四經秋驗盡諸方碗脫丘忽地船頭輕撥轉却來屋裏販揚州襴衫翻著曲唱還鄉坐斷千差壁立萬仞直得韶光溢目故園桃李爭妍瑞氣騰空本地風光顯現若也頓開千眼何妨把手同歸其或未然善財一去無消息樓閣門開竟日閒上堂若論此事如春行大地物物皆春若是焦芽敗種又爭怪得臨終書偈曰六十三年前六十三年後臘月火燒山虗空俱出醜跏趺而逝明州壽國夢嗣清禪師山陰于氏子出家於郡之天章佛涅槃上堂佛真法身猶若虗空因甚二月十五日却向雙林樹下做盡死模樣良久曰竹影掃階塵不動月穿潭底水無痕上堂舉白雲端和尚曰若端的得一回汗出一莖草上現瓊樓玉殿若未端的得一回汗出總有瓊樓玉殿却被一莖草蓋却師曰要知白雲老人落處麼自從塞北經鏖戰敢向江南說陳圖上堂德山入門便棒臨濟入門便喝逼龜成兆終不能靈寶陀者裏寂然不動感而遂通良久曰馬無千里謾追風上堂舉曹山辭洞山洞山曰子向甚麼處去曹山曰不變異處去洞山曰不變異處豈有去耶曹山曰去亦不變異師曰雲藏無縫襖鳥宿不萌枝上堂春風如刀春雨如膏裁剪不得處桃華色轉嬌靈雲一見不疑去謝郎舞棹更呈橈上堂歸宗斬蛇祕魔擎叉禾山打鼓趙州喫茶十字街頭開鋪席見錢買賣且無賒上堂三十年來尋劍客幾回葉落又抽枝自從一見桃華後直至如今更不疑師曰尋常春夢無奇特獨有靈雲說向人只如玄沙道諦當甚諦當敢保老兄未徹在又作麼生若不同牀睡焉知被底穿上堂萬里無寸草頭上漫漫出門便是草腳下漫漫夜行只管貪明月不覺和衣渡水寒育王印禪師法嗣湖州道場別浦法舟禪師嘗有魚籃觀音讚曰月眉斜印海門孤逐浪隨波不丈夫雙手向人提掇處却將魚目換明珠無極觀禪師題世尊出山像曰王宮不住箇癡呆半夜逾城真怪哉苦行六年誰采你計窮只得出山來育王端禪師法嗣明州瑞巖無量崇壽禪師上堂舉鳥窠和尚因白侍郎問如何是佛法大意鳥窠曰諸惡莫作衆善奉行侍郎曰三歲孩兒也解與麼道鳥窠曰三歲孩兒雖道得八十老人行不得頌曰惡無相貌善無形皆自心田長養成不露鋒鋩輕點破菩提煩惱等空平因僧問世尊臘月八日正覺山前夜覩明星悟道此意如何師答以偈曰明星現處眼皮穿漢語胡言萬萬千暴富乞兒休說夢誰家竈裏火無煙天童派禪師法嗣明州天寧無鏡徹禪師上堂舉巖頭和尚因僧問浩浩塵中如何辨主頭曰銅沙鑼裏滿盛油頌曰百萬雄兵入漢關威如猛虎陳如山單刀直取顏良首不是關公也大難鼇峰定禪師讚玄沙和尚偈曰青蓑不肯換金章千古風流屬謝郎釣得錦鱗人不薦夜寒沙上聽鳴榔育王堪禪師法嗣饒州薦福無文燦禪師從育王得法於寶慶三年六月受請住薦福次遷開先五年復還薦福據室山僧今日開地獄門普請盡大地人造地獄業證地獄果若有一人成佛作祖我誓不成正覺上堂拈香畢乃曰天高地厚日盈月昃全提半提天地懸隔燦上座平生只會著衣喫飯聞人說佛法二字如風過樹頭如水澆頑石今日裂破面門喚作長老也欲與諸人論說一上無端冒五六月大熱行三千里修途一時打失了也雖然賴有拄杖子在拈拄杖曰拄杖子試說看卓一下清平世界切忌訛言當晚小參鼓棹揚帆駕沒底船橫行海上神頭鬼面用無文印勘驗諸方二千里遠來住山單單地提持此事舉拂子看看印文已露劃一劃錦縫已開若佛若祖若聖若凡盡向者裏一印印定直得盡乾坤大地風颯颯地衆中忽有箇犯衆出來道長老你且莫大驚小怪我在威音王佛世已證是三昧又作麼生以拂子擊禪牀下座上堂雲門放洞山三頓棒黃檗打臨濟三頓棒減竈添兵傷鹽費醬一不成單二不成兩多少蘆華對蓼紅時人只看絲綸上上堂諸佛法門祖師要妙夜來四簷雨說得盛水不漏汝等諸人若向者裏承當者裏保任以手搖曳曰料掉料掉開爐併謝耆舊踏田上堂趙州無賓主話田地穩密底開口便道著信腳便踏著若是東西不辨南北不分未免被人侵疆越界薦福門下總是田地穩密底人拈起香匙放下火筯一一天真因甚如此公驗分明上堂臨濟處半杓末山處半杓玉本無瑕妄自雕琢有年無德老睦州無端拶折雲門腳端午上堂符不書藥不採起死禁不祥拈拄杖幸有者箇在卓一下滿院熏風夏日長人在藕華香世界開先結夏小參大華藏海渺無邊際江河溪㵎流入其中咸失本名魚龍蝦蟹游泳其中咸失本性三世諸佛於中成等正覺一切衆生於中流浪生死現前大衆於中成就無功用學拈拄杖卓一下開先拄杖子一口吸乾了也三世諸佛一切衆生現前大衆畢竟向甚麼處行履良久曹溪波浪如相似無限平人被陸沉冬至小參滴水冰生未可歇去崖崩石裂正好進程直饒會得一線長要且未會長一線直饒會得長一線要且未會一線長所以鄉談相似州縣不同開先則不然擾擾匇匇晨雞暮鐘喚冬作夏喚夏作冬一線短長誰管得雪霜盡處是春風再住薦福當晚小參去去實不去是法住法位來來實不來世間相常住山僧屈指五載重到東湖荷盡已無擎雨蓋春風猶在柳梢頭無一絲毫去來相無一絲毫新舊相見則與諸人共見聞則與諸人共聞箇中忽有箇出來道無文將常住物作自己用固有之你也忒煞忒煞嗄元來衆中有人在復舉德山小參不答話鉤在不疑之地時有僧出著了也山便打果然僧曰某甲話也未問因甚便打不識痛癢漢山曰你是甚處人第二下鐵鎚來也僧曰新羅人和聲送出山曰未跨船舷好與三十棒雷聲浩大雨點全無大衆大小德山龍頭蛇尾却引者僧向草窠裏頭出頭沒當時待他道某甲話也未問因甚打某甲腳跟下痛與三十何故為人須為徹上堂風蕭蕭雨蕭蕭天高地厚水闊山遙達磨大師無端游梁歷魏二祖大師平白失了一臂水潦和尚不合喫馬大師一踏天下大禪師枉自喫了四藤條說著令人恨不消上堂佛祖未興時天然一句子不東不西不橫不豎衲僧家東咬西嚼從朝至暮橫也無奈何豎也無奈何拍膝一下若向者裏進得一步自然和聲送出兩手分付若祇向冊子上學得來印板上脫將去山無重數水無重數結夏上堂百不知百不會飽喫飯熟打睡要得尅期取證須證如是三昧師嘗與其友知無聞書曰住院何足道哉近年敕差堂除者何限可挂齒牙者能幾人使吾有口可以吞三世諸佛則曲彔牀終身不坐又何慊無聞以為何如某昔者入衆見識字人多不修細行遂決意不作書記諸老據位稱師者又多看不上眼遂無意出世今皆不遂其初矣住院十年名為長老只是舊時燦上座飲食起居與堂僧無異相從衲子歲不下百數十人遇五日撾鼓升堂以平時在諸老間所得細大法門隨分東語西話斷不敢以脫空語籠學者亦不敢以過頭語欺謾學者說到無巴鼻無滋味處欣然自笑聽者不必解笑也士大夫多相知然所知者不過謂其讀書也能文也解起廢也硬脊梁也蓋膽毛幾莖則知者鮮矣何山清禪師法嗣福州雪峯北山信禪師頌佛成道曰六年凍得眼無光一見明星雪後霜擔水出山頻喚賣不知江海白茫茫天童觀禪師法嗣蘇州虎丘㑃堂善濟禪師題魚籃觀音像贊曰雲𩯭濃粧苦強顏為他閒事入塵寰𢹂來活底無人買只作尋常死貨看越州天衣嘯嵒文蔚禪師上堂舉雲門和尚示衆曰人人盡有光明在看時不見暗昏昏作麼生是諸人自己光明自代曰廚庫山門又曰好事不如無頌曰人人盡有光明在看時不見暗昏昏踢倒山門與廚庫此時明暗自然分柏嵒凝和尚作破衲頌曰零零落落幾經年信手拈來搭半肩午夜定回和束倒箇中消息許誰傳華藏純菴善淨禪師上堂舉六祖風幡話頌曰不是風兮不是幡白雲盡處見青山可憐無限英靈漢開眼堂堂入死關天童穎禪師法嗣杭州徑山荊叟如珏禪師婺州人初見癡鈍一日室中埀語如何是佛師遽曰爛東瓜復呈頌曰如何是佛爛東瓜咬著冰霜透齒牙根蒂雖然無窖子一年一度一開華又嘗作偈寄呈癡鈍曰鍾山白刃赤身挨幾度曾經被活埋一自人亡家破後了知無位可安排住後歲旦上堂新歲擊新鼓普施新法雨萬物盡從新一一就規矩普賢大士欣歡乘時打開門戶放出白象王遍地無尋處拈拄杖惟有者箇不屬故新等閒開口吞却法身擲下拄杖是什麼千年桃核裏元是舊時仁結夏小參我此一宗正令全提如暴風卒雨鼓蕩無前石火電光追奔不及舉意即迷源擡眸已錯過不是目前法莫生種種心縱汝三種互修尅期取證第二頭第三首萬拄千撐轉見氣急殊不知髑髏未具己眼先明呱地一聲千了萬當然雖如是親證者萬無一二錯會者數有河沙佛成道頌曰六年雪嶺方成道打失從前鬼眼睛滿面慚惶無著處至今生怕見明星福州雪峯大夢德因禪師作布袋和尚贊曰杖挑布袋走紅塵底事何曾見得親業識茫茫無本據不知開口笑何人金山奇禪師法嗣杭州靈隱高原祖泉禪師舉鏡清在雪峯一日普請次峯曰溈山道見色便見心還有過也無清曰古人為什麼事峯曰雖然如是我要共你商量清曰若與麼不如某甲钁地去師拈曰雪峯探竿在手影草隨身若不是鏡清普請幾乎狼藉又舉九祖伏䭾密多尊者問八祖佛䭾難提尊者父母非我親誰是最親者諸佛非我道誰是最道者頌曰父母分明非我親祖師肝膽向人傾直下若能親薦得優曇華發火中春贈黃漢嶺開接待偈曰路繞懸崖萬仞頭行人到此一場愁驀然得箇休歇處重疊關山信腳遊萬壽觀禪師法嗣隆興府黃龍無門慧開禪師杭州梁渚人族姓梁母宋氏禮天龍肱和尚受業參月林於萬壽林令看無字話經六年迥無入處乃奮志自誓曰若去睡眠爛却我身每至困時廊下行道以頭向露柱磕一日在法座邊忽聞齊鼓聲有省述偈曰青天白日一聲雷大地羣生眼豁開萬象森羅齊稽首須彌𨁝跳舞三臺次日入室欲通所得林遽曰何處見神見鬼了也師便喝林亦喝師又喝自此機用吻合嘉定十一年出世安吉報國次遷隆興天寧黃龍翠巖蘇之開元靈巖鎮江焦山金陵保寧淳祐六年奉旨開山護國仁皇寺上堂若人識得心大地無寸土古人恁麼道黃龍即不然若人識得心大地盡是土上堂是非長短耳邊風切莫於中覓異同要得八風吹不動放教心地等虗空慈受老人只解順水張帆不能逆風把拖黃龍又且不然是非都去了是非裏薦取何故聻幾度黑風翻大浪未曾聞道釣舟傾上堂三分光陰二早過懷州牛喫禾靈臺一點不揩磨益州馬腹脹貪生逐日區區去天下覓醫人喚不回頭爭奈何灸豬左膊上於斯薦得參學事畢其或未然拈拄杖請木上座與諸人說破卓拄杖下座上堂趙州和尚道南來者與他下載北來者與他上載大似世情看冷暖人面逐高低慈受和尚道南來者與他一面笑北來者與他一面笑大似歡喜廝殺笑裏有刀若是焦山又且不然南來者以平常待之北來者以平常待之也不瞋也不笑也無下也無高何故清平世界不用干戈作朝陽偈曰寒時急用底物趂暖著些針線忽然臘月到來免致腳忙手亂對月偈曰始見些兒光影要了末後一段若是無門拳頭不打者般鈍漢師晚年倦于槌拂菴居西湖之上參學者猶衆理宗召入選德殿說法祈雨感應敕賜金襴法衣佛眼之號興化府囊山孤峯德秀禪師福州連江陳氏子於蘇之寒山祝髮上堂舉僧問雪峯如何是第一句峯良久僧舉似長生生曰此是第二句雪峯令僧問生如何是第一句生曰蒼天蒼天師曰二大老與麼淚出痛腸若是第一句要且未夢見在忽有人問怡山如何是第一句只向他道劍去久矣上堂舉真淨和尚曰頭陀石被莓苔裹擲筆峯遭薜荔纏羅漢寺裏一年度三箇行者歸宗寺裏參退喫茶大衆要會麼聽取一頌天晴日頭出雨落地下溼盡情都說了只恐信不及潭州石霜竹巖妙印禪師進賢人族萬氏受業於龍塘紹曇遍叩諸方後抵蘇州萬壽謁月林一日入室次林問如何是祖師西來意師曰老鼠咬破燈盞林頷之歷住數剎後移石霜作對月看經偈曰未動舌頭文彩露五千餘卷一時周若言待月重開卷敢保驢年未徹頭師𣆶年築菴曰紫霞丞相趙公葵燕居里第嘗延師問道寶祐三年八月二十三日示疾書偈曰六十九年一場大夢歸去來兮珍重珍重書畢泊然而逝塔於紫霞
